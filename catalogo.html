<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080c10">
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c10;
  --bg2:#0c1018;
  --surface:#111820;
  --surface2:#161e28;
  --surface3:#1c2735;
  --border:rgba(255,255,255,0.07);
  --border-h:rgba(255,255,255,0.14);
  --text:#f0f6ff;
  --text2:#8b9ab0;
  --text3:#4a5568;
  --accent:#00e5a0;
  --accent2:#00b87c;
  --glow:rgba(0,229,160,0.15);
  --gold:#d4af37;
  --danger:#ff4757;
  --serif:'Playfair Display',serif;
  --sans:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:16px;--r2:12px;--r3:8px;
  --t:0.2s cubic-bezier(0.4,0,0.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior-y:none;}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -10%,rgba(0,229,160,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 90%,rgba(0,229,160,0.03) 0%,transparent 60%);
}

/* ── LOADER ─────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.5s ease,visibility 0.5s ease;
}
#loader.out{opacity:0;visibility:hidden;}
.ld-brand{text-align:center;}
.ld-name{font-family:var(--serif);font-size:32px;font-weight:600;letter-spacing:-0.5px;color:var(--text);margin-bottom:6px;}
.ld-sub{font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3);}
.ld-bar{width:120px;height:2px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.ld-prog{height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:ldAnim 1.2s ease infinite;}
@keyframes ldAnim{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

/* ── APP ─────────────────────────────────────── */
#app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding-bottom:calc(100px + var(--safe-bottom));}

/* ── TOPBAR ──────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(8,12,16,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:34px;height:34px;border-radius:10px;background:var(--surface2);font-size:18px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:1px solid var(--border);}
.tb-logo img{width:100%;height:100%;object-fit:cover;}
.tb-name{font-size:15px;font-weight:700;letter-spacing:-0.3px;color:var(--text);}
.tb-actions{display:flex;gap:6px;}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all var(--t);}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border-h);}
.icon-btn svg{width:16px;height:16px;}

/* ── SEARCH ──────────────────────────────────── */
.search-bar{
  overflow:hidden;max-height:0;transition:max-height 0.3s ease;
  background:rgba(8,12,16,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.search-bar.open{max-height:70px;}
.search-inner{display:flex;align-items:center;gap:10px;padding:10px 20px;}
.search-icon{color:var(--text3);flex-shrink:0;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:15px;}
.search-input::placeholder{color:var(--text3);}
.search-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color var(--t);}
.search-clear:hover{color:var(--text);}

/* ── HERO ────────────────────────────────────── */
.hero{
  position:relative;overflow:hidden;
  min-height:240px;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:28px 20px 24px;
}
.hero-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,var(--surface) 0%,var(--bg2) 100%);
}
.hero-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:0.25;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,16,0.95) 0%,rgba(8,12,16,0.4) 60%,transparent 100%);}
.hero-content{position:relative;z-index:1;}
.hero-tag{font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.hero-tag::before{content:'';width:20px;height:1px;background:var(--accent);}
.hero-name{font-family:var(--serif);font-size:38px;font-weight:600;letter-spacing:-0.5px;line-height:1.1;color:var(--text);margin-bottom:8px;}
.hero-desc{font-size:13px;color:var(--text2);line-height:1.6;max-width:320px;}

/* ── INFO STRIP ──────────────────────────────── */
.info-strip{
  display:flex;overflow-x:auto;gap:0;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.info-strip::-webkit-scrollbar{display:none;}
.info-item{
  flex:1;min-width:90px;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 12px;
  border-right:1px solid var(--border);
  text-align:center;
  gap:4px;
}
.info-item:last-child{border-right:none;}
.info-icon{font-size:18px;margin-bottom:2px;}
.info-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-weight:600;}
.info-value{font-size:12px;font-weight:600;color:var(--text2);}

/* ── FEATURED ────────────────────────────────── */
.featured-section{padding:24px 0 8px;}
.section-header{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.section-title{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:-0.2px;color:var(--text);}
.section-sub{font-size:11px;color:var(--text3);font-weight:400;}
.feat-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
.feat-scroll::-webkit-scrollbar{display:none;}
.feat-card{
  flex-shrink:0;width:140px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:all var(--t);
  position:relative;
}
.feat-card:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
.feat-img{height:100px;width:100%;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;}
.feat-img img{width:100%;height:100%;object-fit:cover;}
.feat-body{padding:10px 10px 12px;}
.feat-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px;}
.feat-price{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.feat-badge{
  position:absolute;top:8px;left:8px;
  font-size:8px;font-weight:700;padding:3px 7px;
  background:var(--accent);color:#000;
  border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;
}

/* ── CAT NAV ─────────────────────────────────── */
.cat-nav{
  position:sticky;top:61px;z-index:90;
  background:rgba(8,12,16,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.cat-inner{display:flex;overflow-x:auto;gap:4px;padding:10px 16px;scrollbar-width:none;}
.cat-inner::-webkit-scrollbar{display:none;}
.cat-chip{
  flex-shrink:0;padding:7px 14px;
  background:transparent;border:1px solid var(--border);
  border-radius:100px;font-family:var(--sans);font-size:12px;font-weight:600;
  color:var(--text2);cursor:pointer;transition:all var(--t);
  white-space:nowrap;
}
.cat-chip:hover{background:var(--surface2);color:var(--text);border-color:var(--border-h);}
.cat-chip.active{background:var(--accent);color:#000;border-color:var(--accent);}

/* ── CONTENT ─────────────────────────────────── */
.content{padding:0 16px;}

.cat-section{padding:24px 4px 4px;}
.cat-label{
  font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.cat-label::after{content:'';flex:1;height:1px;background:var(--border);}

.cat-name{
  font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.2px;
  color:var(--text);margin-bottom:14px;
}

.prod-grid{display:flex;flex-direction:column;gap:10px;}

/* ── PRODUCTO CARD ───────────────────────────── */
.prod-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;
  cursor:pointer;transition:all var(--t);
  position:relative;overflow:hidden;
}
.prod-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--accent);opacity:0;transition:opacity var(--t);
}
.prod-card:hover{border-color:var(--border-h);background:var(--surface2);}
.prod-card:hover::before{opacity:1;}
.prod-card:active{transform:scale(0.99);}

.prod-img{
  width:80px;height:80px;flex-shrink:0;
  border-radius:var(--r3);background:var(--surface2);
  font-size:32px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;border:1px solid var(--border);
}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;letter-spacing:-0.1px;}
.prod-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.prod-footer{display:flex;align-items:center;justify-content:space-between;}
.prod-price{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);}
.prod-price-original{font-size:11px;color:var(--text3);text-decoration:line-through;margin-right:6px;}
.prod-add{
  width:30px;height:30px;
  background:var(--accent);color:#000;
  border:none;border-radius:var(--r3);
  font-size:20px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--t);
  flex-shrink:0;
}
.prod-add:hover{background:var(--accent2);transform:scale(1.1);}
.prod-badge{
  display:inline-flex;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:100px;
  background:rgba(212,175,55,0.12);color:var(--gold);
  margin-bottom:4px;letter-spacing:0.06em;text-transform:uppercase;
}
.prod-tag-oferta{background:rgba(255,71,87,0.12);color:var(--danger);}
.prod-sin-stock{opacity:0.45;pointer-events:none;}

/* ── SHEET PRODUCTO ──────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0);visibility:hidden;
  transition:background 0.3s ease,visibility 0.3s ease;
}
.overlay.open{background:rgba(0,0,0,0.7);visibility:visible;backdrop-filter:blur(4px);}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:90vh;display:flex;flex-direction:column;
  overflow:hidden;
}
.overlay.open .sheet{transform:translateY(0);}
.sh-scroll{overflow-y:auto;flex:1;scrollbar-width:none;}
.sh-scroll::-webkit-scrollbar{display:none;}
.sh-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 0;}
.sh-img{width:100%;height:220px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:72px;}
.sh-img img{width:100%;height:100%;object-fit:cover;}
.sh-body{padding:20px 20px 8px;}
.sh-name{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:-0.3px;margin-bottom:6px;}
.sh-price{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent);margin-bottom:12px;}
.sh-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
.sh-opts{margin-bottom:16px;}
.sh-opt-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.sh-opt-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.sh-opt-btn{
  padding:8px 14px;border:1px solid var(--border);
  background:var(--surface);border-radius:var(--r3);
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all var(--t);
}
.sh-opt-btn:hover{border-color:var(--border-h);color:var(--text);}
.sh-opt-btn.selected{background:var(--accent-glow,rgba(0,229,160,0.1));border-color:var(--accent);color:var(--accent);}
.sh-qty{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.qty-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all var(--t);}
.qty-btn:hover{background:var(--surface3);border-color:var(--border-h);}
.qty-val{font-family:var(--mono);font-size:18px;font-weight:600;min-width:28px;text-align:center;}
.sh-footer{padding:16px 20px calc(16px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg2);}
.add-btn{
  width:100%;padding:16px;
  background:var(--accent);color:#000;
  border:none;border-radius:var(--r2);
  font-family:var(--sans);font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:space-between;
}
.add-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 24px var(--glow);}
.add-btn:active{transform:scale(0.98);}

/* ── CARRITO FAB ─────────────────────────────── */
.cart-fab{
  position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(80px);
  z-index:400;
  background:var(--accent);
  border-radius:100px;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(0,229,160,0.4);
  transition:all 0.35s cubic-bezier(0.32,0.72,0,1);
  min-width:200px;max-width:340px;width:calc(100% - 48px);
  opacity:0;
}
.cart-fab.visible{opacity:1;transform:translateX(-50%) translateY(0);}
.cart-fab:hover{transform:translateX(-50%) translateY(-2px);box-shadow:0 12px 40px rgba(0,229,160,0.5);}
.fab-body{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.fab-left{display:flex;align-items:center;gap:10px;}
.fab-count{
  width:26px;height:26px;background:rgba(0,0,0,0.2);border-radius:50%;
  font-size:12px;font-weight:800;color:#000;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);
}
.fab-label{font-size:14px;font-weight:700;color:#000;letter-spacing:-0.2px;}
.fab-total{font-family:var(--mono);font-size:15px;font-weight:700;color:#000;}

/* ── CARRITO SHEET ───────────────────────────── */
.cart-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,0);visibility:hidden;
  transition:background 0.3s,visibility 0.3s;
}
.cart-overlay.open{background:rgba(0,0,0,0.7);visibility:visible;backdrop-filter:blur(4px);}
.cart-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:90vh;display:flex;flex-direction:column;
}
.cart-overlay.open .cart-sheet{transform:translateY(0);}
.cs-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.cs-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cs-title{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.cs-close{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r3);cursor:pointer;font-size:16px;color:var(--text2);transition:all var(--t);display:flex;align-items:center;justify-content:center;}
.cs-close:hover{background:var(--surface3);color:var(--text);}
.cs-body{overflow-y:auto;flex:1;padding:16px 20px;scrollbar-width:none;}
.cs-body::-webkit-scrollbar{display:none;}
.cs-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.cs-item:last-child{border-bottom:none;}
.cs-item-img{width:52px;height:52px;border-radius:var(--r3);background:var(--surface2);font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);overflow:hidden;}
.cs-item-img img{width:100%;height:100%;object-fit:cover;}
.cs-item-info{flex:1;min-width:0;}
.cs-item-name{font-size:13.5px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs-item-price{font-family:var(--mono);font-size:12px;color:var(--accent);}
.cs-item-mods{font-size:11px;color:var(--text3);margin-top:2px;}
.cs-qty{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cs-qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all var(--t);}
.cs-qty-btn:hover{background:var(--surface3);}
.cs-qty-val{font-family:var(--mono);font-size:14px;font-weight:600;min-width:20px;text-align:center;}
.cs-footer{padding:16px 20px calc(16px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;}
.cs-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:15px;font-weight:700;}
.cs-total-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);}
.cs-checkout{
  width:100%;padding:16px;
  background:var(--accent);color:#000;
  border:none;border-radius:var(--r2);
  font-family:var(--sans);font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);
}
.cs-checkout:hover{background:var(--accent2);box-shadow:0 8px 24px var(--glow);}
.cs-empty{text-align:center;padding:40px 20px;color:var(--text2);}
.cs-empty .empty-icon{font-size:44px;opacity:0.3;margin-bottom:12px;}

/* ── COUPON ──────────────────────────────────── */
.coupon-row{display:flex;gap:8px;margin-bottom:14px;}
.coupon-row input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r3);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color var(--t);}
.coupon-row input:focus{border-color:var(--accent);}
.coupon-row input::placeholder{color:var(--text3);}
.coupon-row button{padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r3);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t);white-space:nowrap;}
.coupon-row button:hover{background:var(--surface3);}
.coupon-applied{font-size:12px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.coupon-applied span{background:rgba(0,229,160,0.1);padding:3px 8px;border-radius:100px;font-family:var(--mono);}

/* ── TOAST ───────────────────────────────────── */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:900;pointer-events:none;
  display:flex;flex-direction:column;gap:8px;align-items:center;
}
.toast-msg{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  color:var(--text);padding:12px 18px;border-radius:var(--r3);
  font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation:toastIn .25s ease;
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* ── HORARIO BADGE ───────────────────────────── */
.horario-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:100px;
  margin:0 20px 16px;
}
.horario-badge.open{background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.2);}
.horario-badge.closed{background:rgba(255,71,87,0.1);color:var(--danger);border:1px solid rgba(255,71,87,0.2);}
.horario-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── EMPTY STATE ─────────────────────────────── */
.no-results{text-align:center;padding:60px 24px;color:var(--text2);}
.no-results .nr-icon{font-size:48px;margin-bottom:14px;opacity:0.3;}
.no-results p{font-size:14px;}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-brand">
    <div class="ld-name" id="ldName">Cargando</div>
    <div class="ld-sub">Menú digital</div>
  </div>
  <div class="ld-bar"><div class="ld-prog"></div></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo" id="tbLogo"></div>
      <span class="tb-name" id="tbName">Cargando...</span>
    </div>
    <div class="tb-actions">
      <button class="icon-btn" onclick="toggleSearch()" title="Buscar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div class="search-bar" id="searchBar">
    <div class="search-inner">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar en el menú..." oninput="buscar(this.value)">
      <button class="search-clear" id="searchClear" onclick="limpiarBusqueda()">✕</button>
    </div>
  </div>

  <div id="heroWrap"></div>
  <div id="infoStrip" class="info-strip"></div>
  <div id="featuredWrap"></div>
  <div class="cat-nav" id="catNav" style="display:none"><div class="cat-inner" id="catInner"></div></div>
  <div class="content" id="content"></div>
</div>

<div class="cart-fab" id="cartFab" onclick="abrirCarrito()">
  <div class="fab-body">
    <div class="fab-left">
      <div class="fab-count" id="fabCount">0</div>
      <span class="fab-label">Ver pedido</span>
    </div>
    <span class="fab-total" id="fabTotal">$0.00</span>
  </div>
</div>

<div class="overlay" id="prodOverlay" onclick="if(event.target===this)cerrarProd()">
  <div class="sheet">
    <div class="sh-scroll"><div class="sh-handle"></div><div id="shContent"></div></div>
    <div class="sh-footer"><button class="add-btn" id="addBtn" onclick="agregarAlCarrito()"><span>Agregar al pedido</span><span id="addPrice">$0.00</span></button></div>
  </div>
</div>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="cart-sheet">
    <div class="cs-handle"></div>
    <div class="cs-header">
      <span class="cs-title">Tu pedido</span>
      <button class="cs-close" onclick="cerrarCarrito()">✕</button>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-footer" id="csFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const SLUG = window.location.pathname.split('/')[2];
const BASE = window.location.origin;
let neg = null, cart = [], prod = null, sels = {}, qty = 1, notas = '', searchOpen = false;
let mitadSels = { 1: null, 2: null };

async function init() {
  try {
    const r = await fetch(BASE + '/catalogo-data/' + SLUG);
    if (!r.ok) { errLoader('Negocio no encontrado'); return; }
    neg = await r.json();
    renderAll();
    fadeLoader();
  } catch(e) { errLoader('Error al cargar el menú'); }
}

function fadeLoader() {
  const l = document.getElementById('loader');
  l.style.opacity = '0';
  setTimeout(() => { l.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 500);
}

function errLoader(msg) {
  document.getElementById('loader').innerHTML =
    '<div style="text-align:center;color:#6b6560;font-family:system-ui">' +
    '<div style="font-size:40px;margin-bottom:16px;opacity:.4">✦</div>' +
    '<div style="font-size:15px;font-weight:500">' + msg + '</div></div>';
}

function renderAll() {
  document.title = neg.nombre + ' — Menú';
  const ln = document.getElementById('ldName'); if (ln) ln.textContent = neg.nombre;
  document.getElementById('tbName').textContent = neg.nombre;
  const tl = document.getElementById('tbLogo');
  tl.innerHTML = neg.logo ? '<img src="' + neg.logo + '" alt="">' : (neg.emoji || '🛍️');
  renderHero(); renderInfoStrip(); renderFeatured(); renderCatalogo();
}

function estaAbierto() {
  if (typeof neg.esta_abierto === 'boolean') return neg.esta_abierto;
  if (neg.horarios) {
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
    const h = neg.horarios[dias[ec.getDay()]];
    if (!h || !h.abierto || !h.desde || !h.hasta) return false;
    const [dH,dM] = h.desde.split(':').map(Number);
    const [hH,hM] = h.hasta.split(':').map(Number);
    const min = ec.getHours()*60+ec.getMinutes();
    return min >= dH*60+dM && min < hH*60+hM;
  }
  const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
  return ec.getHours() >= 8 && ec.getHours() < 18;
}

function obtenerHorarioHoy() {
  if (!neg.horarios) return null;
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
  const h = neg.horarios[dias[ec.getDay()]];
  if (!h || !h.abierto) return null;
  return h.desde + ' — ' + h.hasta;
}

function renderHero() {
  const ab = estaAbierto();
  const horario = obtenerHorarioHoy();
  const w = document.getElementById('heroWrap');
  const statusDot = '<div class="status-dot' + (ab ? '' : ' closed') + '"></div>';
  const tags = [
    (neg.tipo ? '<div class="hero-tag">' + neg.tipo + '</div>' : ''),
    (horario ? '<div class="hero-tag">🕐 ' + horario + '</div>' : ''),
  ].filter(Boolean).join('');

  w.innerHTML =
    '<div class="hero">' +
      '<div class="hero-bg"></div>' +
      '<div class="hero-pattern"></div>' +
      (neg.banner ? '<img class="hero-banner-img" src="' + neg.banner + '" alt="">' : '') +
      '<div class="hero-vignette"></div>' +
      '<div class="hero-content">' +
        '<div class="hero-eyebrow">' + statusDot + '<span class="status-label">' + (ab ? 'Abierto ahora' : 'Cerrado') + '</span></div>' +
        '<div class="hero-name">' + (neg.emoji ? neg.emoji + ' ' : '') + neg.nombre + '</div>' +
        '<div class="hero-tags">' + tags + '</div>' +
      '</div>' +
    '</div>';
}

function renderInfoStrip() {
  const s = document.getElementById('infoStrip');
  const items = [];
  if (neg.tiempo_entrega) items.push('<div class="info-item"><span class="info-icon">🛵</span><div><span class="info-label">Entrega estimada</span><span class="info-value">' + neg.tiempo_entrega + '</span></div></div>');
  items.push('<div class="info-item"><span class="info-icon">💰</span><div><span class="info-label">Costo de delivery</span><span class="info-value">' + (neg.costo_delivery || 'Varía según distancia') + '</span></div></div>');
  if (neg.pedido_minimo) items.push('<div class="info-item"><span class="info-icon">🛒</span><div><span class="info-label">Pedido mínimo</span><span class="info-value">$' + neg.pedido_minimo + '</span></div></div>');
  s.innerHTML = items.join('');
  if (!items.length) s.style.display = 'none';
}

function renderFeatured() {
  const pops = (neg.catalogo || []).filter(p => p.activo !== false && p.destacado);
  if (!pops.length) return;
  document.getElementById('featuredWrap').innerHTML =
    '<div class="featured-section">' +
      '<div class="section-header"><span class="section-title">Destacados</span><span class="section-sub">Los más pedidos</span></div>' +
      '<div class="featured-scroll">' +
        pops.map(p =>
          '<div class="feat-card" onclick="abrirProd(\'' + String(p.id) + '\')">' +
            (p.imagen ? '<img class="feat-img" src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="feat-emoji">' + (p.emoji||'📦') + '</div>') +
            '<div class="feat-body">' +
              '<div class="feat-name">' + p.nombre + '</div>' +
              '<div class="feat-price">$' + p.precio.toFixed(2) + '</div>' +
            '</div>' +
            '<div class="feat-badge">Popular</div>' +
          '</div>'
        ).join('') +
      '</div>' +
    '</div>';
}

function slugify(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,''); }

function renderCatalogo(filtro) {
  filtro = (filtro || '').toLowerCase().trim();
  const todos = (neg.catalogo || []).filter(p => p.activo !== false);
  const prods = filtro
    ? todos.filter(p => p.nombre.toLowerCase().includes(filtro) || (p.descripcion||'').toLowerCase().includes(filtro))
    : todos;

  if (filtro) {
    document.getElementById('catNav').style.display = 'none';
    document.getElementById('content').innerHTML = prods.length
      ? '<div class="search-results"><div class="sr-count">' + prods.length + ' resultado' + (prods.length!==1?'s':'') + '</div><div class="products-grid">' + prods.map((p,i) => prodHTML(p,i)).join('') + '</div></div>'
      : '<div class="no-results"><div class="no-results-icon">🔍</div><h3>Sin resultados</h3><p>No encontramos "' + filtro + '"</p></div>';
    return;
  }

  const cats = {};
  prods.forEach(p => { const c = p.categoria || 'Menú'; if (!cats[c]) cats[c] = []; cats[c].push(p); });
  const names = Object.keys(cats);

  if (names.length > 1) {
    document.getElementById('catNav').style.display = 'block';
    document.getElementById('catInner').innerHTML = names.map((c,i) => '<button class="cat-btn' + (i===0?' active':'') + '" onclick="irACat(\'' + c + '\',this)">' + c + '</button>').join('');
  } else {
    document.getElementById('catNav').style.display = 'none';
  }

  let delay = 0;
  document.getElementById('content').innerHTML = names.map(c =>
    '<div class="cat-section" id="cs-' + slugify(c) + '">' +
      '<div class="cat-title">' + c + '</div>' +
      '<div class="products-grid">' + cats[c].map((p,i) => prodHTML(p, delay++)).join('') + '</div>' +
    '</div>'
  ).join('');

  setTimeout(() => document.querySelectorAll('.cat-section').forEach(s => io.observe(s)), 80);
}

function prodHTML(p, idx) {
  const agotado = p.stock === 0;
  const enCarrito = cart.filter(i => i.id === p.id).reduce((s,i) => s + i.cantidad, 0);
  const tieneMods = (p.modificadores||[]).length > 0;
  return '<div class="prod-row' + (agotado?' agotado':'') + '" onclick="abrirProd(\'' + String(p.id) + '\')" style="animation-delay:' + (idx * 40) + 'ms">' +
    '<div class="prod-info">' +
      '<div class="prod-name">' + p.nombre + '</div>' +
      (p.descripcion ? '<div class="prod-desc">' + p.descripcion + '</div>' : '') +
      '<div class="prod-foot">' +
        '<span class="prod-price">' + (tieneMods ? '<span class="prod-from">Desde </span>' : '') + '$' + p.precio.toFixed(2) + '</span>' +
        (enCarrito > 0 ? '<span class="in-cart-badge">✦ ' + enCarrito + ' en pedido</span>' : '') +
        (agotado ? '<span class="agotado-badge">Agotado</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="prod-thumb">' +
      (p.imagen ? '<img src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="thumb-emoji">' + (p.emoji||'📦') + '</div>') +
      (!agotado ? '<div class="add-dot">+</div>' : '') +
    '</div>' +
  '</div>';
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('cs-','');
      document.querySelectorAll('.cat-btn').forEach(b => {
        const match = slugify(b.textContent) === id;
        b.classList.toggle('active', match);
        if (match) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      });
    }
  });
}, { rootMargin:'-90px 0px -55% 0px' });

function irACat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('cs-' + slugify(cat));
  if (el) window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 106, behavior:'smooth'});
}

// ── MODAL PRODUCTO ──
function abrirProd(id) {
  prod = (neg.catalogo||[]).find(x => String(x.id) === String(id));
  if (!prod) return;
  sels = {}; qty = 1; mitadSels = {1:null, 2:null};
  (prod.modificadores||[]).forEach((g,i) => { sels[i] = g.tipo === 'unico' ? null : []; });
  renderSheet();
  document.getElementById('prodOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarProd() {
  document.getElementById('prodOverlay').classList.remove('open');
  document.body.style.overflow = '';
  prod = null;
}

function renderSheet() {
  const p = prod;
  const mods = p.modificadores || [];
  let html = (p.imagen ? '<img class="sh-img" src="' + p.imagen + '" alt="' + p.nombre + '">' : '<div class="sh-emoji">' + (p.emoji||'📦') + '</div>');
  html += '<div class="sh-body">';
  html += '<div class="sh-name">' + p.nombre + '</div>';
  if (p.descripcion) html += '<div class="sh-desc">' + p.descripcion + '</div>';
  html += '<div class="sh-price" id="shPrice">$' + p.precio.toFixed(2) + '<small>por unidad</small></div>';

  if (p.mitad_mitad && p.ingredientes_mitad?.length) {
    html += '<div class="divider"></div><div class="mm-title">Personaliza tu pizza</div><div class="mm-sub">Elige los ingredientes de cada mitad</div>';
    html += '<div class="mm-visual"><div class="mm-pizza"><div class="mm-half mm-left" id="mmVisL">½</div><div class="mm-half mm-right" id="mmVisR">½</div></div></div>';
    [1,2].forEach(m => {
      html += '<div class="mm-block"><div class="mm-block-title"><span class="mm-num">' + m + '</span> Mitad ' + m + '</div>';
      html += '<div class="mm-opts" id="mmOpts' + m + '">';
      p.ingredientes_mitad.forEach((ing,idx) => {
        html += '<div class="mm-opt" id="mm-' + m + '-' + idx + '" onclick="selMitad(' + m + ',' + idx + ',\'' + ing.replace(/'/g,"\\'") + '\')">' + ing + '</div>';
      });
      html += '</div></div>';
    });
    html += '<div class="divider"></div>';
  }

  if (mods.length) html += '<div class="divider"></div>';
  mods.forEach((g,gi) => {
    html += '<div class="mod-group"><div class="mod-title">' + g.nombre + (g.obligatorio ? '<span class="mod-req">Requerido</span>' : '') + '</div>';
    html += '<div class="mod-sub">' + (g.tipo==='unico' ? 'Elige una opción' : 'Puedes elegir varias') + '</div>';
    g.opciones.forEach((op,oi) => {
      html += '<div class="opt-row" id="op-' + gi + '-' + oi + '" onclick="toggleOpt(' + gi + ',' + oi + ',\'' + g.tipo + '\')">';
      html += '<div class="opt-left"><div class="opt-ctrl' + (g.tipo==='unico'?'':' sq') + '" id="oc-' + gi + '-' + oi + '"></div><span class="opt-name">' + op.nombre + '</span></div>';
      html += '<div class="opt-right-wrap">';
      html += '<div class="opt-qty-ctrl" id="oqc-' + gi + '-' + oi + '" style="display:none" onclick="event.stopPropagation()">';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',-1,\'' + g.tipo + '\')">−</button>';
      html += '<span class="oq-num" id="oqn-' + gi + '-' + oi + '">1</span>';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',1,\'' + g.tipo + '\')">+</button>';
      html += '</div>';
      html += '<span class="opt-price">' + (op.precio > 0 ? '+$'+op.precio.toFixed(2) : op.precio < 0 ? '-$'+Math.abs(op.precio).toFixed(2) : 'Incluido') + '</span>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  if (mods.length) html += '<div class="divider"></div>';
  html += '<div class="qty-row"><span class="qty-label">Cantidad</span><div class="qty-ctrl"><button class="qty-btn" id="qm" onclick="cambiarQty(-1)" disabled>−</button><span class="qty-val" id="qv">1</span><button class="qty-btn" onclick="cambiarQty(1)">+</button></div></div>';
  html += '</div>';
  document.getElementById('shContent').innerHTML = html;
  document.getElementById('addPrice').textContent = '$' + p.precio.toFixed(2);
}

function toggleOpt(gi,oi,tipo) {
  if (tipo === 'unico') {
    if (sels[gi] !== null) {
      const prev = sels[gi].oi;
      document.getElementById('op-'+gi+'-'+prev)?.classList.remove('sel');
      const oc = document.getElementById('oc-'+gi+'-'+prev); if(oc) oc.textContent='';
      const oqc = document.getElementById('oqc-'+gi+'-'+prev); if(oqc) oqc.style.display='none';
      const opr = document.getElementById('opr-'+gi+'-'+prev); if(opr) opr.style.display='';
    }
    if (sels[gi] !== null && sels[gi].oi === oi) { sels[gi] = null; }
    else {
      sels[gi] = {oi, qty:1};
      document.getElementById('op-'+gi+'-'+oi).classList.add('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '✓';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'flex';
      const opr2 = document.getElementById('opr-'+gi+'-'+oi); if(opr2) opr2.style.display='none';
      document.getElementById('oqn-'+gi+'-'+oi).textContent = '1';
    }
  } else {
    if (!Array.isArray(sels[gi])) sels[gi] = [];
    const idx = sels[gi].findIndex(s => s.oi === oi);
    if (idx >= 0) {
      sels[gi].splice(idx,1);
      document.getElementById('op-'+gi+'-'+oi).classList.remove('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'none';
      const opr3 = document.getElementById('opr-'+gi+'-'+oi); if(opr3) opr3.style.display='';
    } else {
      sels[gi].push({oi, qty:1});
      document.getElementById('op-'+gi+'-'+oi).classList.add('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '✓';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'flex';
      const opr4 = document.getElementById('opr-'+gi+'-'+oi); if(opr4) opr4.style.display='none';
      document.getElementById('oqn-'+gi+'-'+oi).textContent = '1';
    }
  }
  actualizarPrecioSheet();
}

function cambiarQtyOpt(gi,oi,delta,tipo) {
  const entry = tipo === 'unico' ? sels[gi] : (sels[gi]||[]).find(s => s.oi===oi);
  if (!entry) return;
  entry.qty = Math.max(1, entry.qty + delta);
  document.getElementById('oqn-'+gi+'-'+oi).textContent = entry.qty;
  actualizarPrecioSheet();
}

function calcExtra() {
  let e = 0;
  (prod.modificadores||[]).forEach((g,gi) => {
    const s = sels[gi];
    if (g.tipo==='unico' && s !== null) e += (g.opciones[s.oi]?.precio||0) * s.qty;
    else if (Array.isArray(s)) s.forEach(({oi,qty}) => { e += (g.opciones[oi]?.precio||0) * qty; });
  });
  return e;
}

function actualizarPrecioSheet() {
  const extra = calcExtra();
  const total = (prod.precio + extra) * qty;
  document.getElementById('shPrice').innerHTML = '$' + (prod.precio + extra).toFixed(2) + '<small>por unidad</small>';
  document.getElementById('addPrice').textContent = '$' + total.toFixed(2);
}

function cambiarQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qv').textContent = qty;
  document.getElementById('qm').disabled = qty <= 1;
  actualizarPrecioSheet();
}

function selMitad(mitad, idx, nombre) {
  mitadSels[mitad] = {idx, nombre};
  document.querySelectorAll('#mmOpts' + mitad + ' .mm-opt').forEach(el => el.classList.remove('sel'));
  document.getElementById('mm-'+mitad+'-'+idx)?.classList.add('sel');
  const vL = document.getElementById('mmVisL'), vR = document.getElementById('mmVisR');
  if (vL && mitad===1) vL.textContent = mitadSels[1]?.nombre?.split(' ')[0] || '½';
  if (vR && mitad===2) vR.textContent = mitadSels[2]?.nombre?.split(' ')[0] || '½';
}

function agregarAlCarrito() {
  if (prod.mitad_mitad && prod.ingredientes_mitad?.length) {
    if (!mitadSels[1]) { toast('Elige el ingrediente para la Mitad 1'); return; }
    if (!mitadSels[2]) { toast('Elige el ingrediente para la Mitad 2'); return; }
  }
  const mods = prod.modificadores || [];
  for (let gi = 0; gi < mods.length; gi++) {
    const g = mods[gi]; if (!g.obligatorio) continue;
    const s = sels[gi];
    if (g.tipo==='unico' ? s==null : !s?.length) { toast('Elige una opción en: ' + g.nombre); return; }
  }
  const extra = calcExtra();
  const modsGuardados = [];
  if (prod.mitad_mitad && mitadSels[1] && mitadSels[2]) {
    modsGuardados.push({grupo:'Mitades', opciones:['Mitad 1: '+mitadSels[1].nombre, 'Mitad 2: '+mitadSels[2].nombre]});
  }
  mods.forEach((g,gi) => {
    const s = sels[gi]; let ops = [];
    if (g.tipo==='unico' && s !== null) ops = [s.qty>1 ? g.opciones[s.oi].nombre+' x'+s.qty : g.opciones[s.oi].nombre];
    else if (Array.isArray(s)) ops = s.map(({oi,qty}) => qty>1 ? g.opciones[oi].nombre+' x'+qty : g.opciones[oi].nombre);
    if (ops.length) modsGuardados.push({grupo:g.nombre, opciones:ops});
  });
  const _nombre = prod.nombre;
  cart.push({uid:Date.now()+Math.random(), id:prod.id, nombre:prod.nombre, precio:prod.precio+extra, emoji:prod.emoji||'🍽️', imagen:prod.imagen||'', cantidad:qty, modificadores:modsGuardados});
  cerrarProd(); actualizarFab();
  renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim() || '');
  toast('✦ ' + _nombre + ' agregado');
}

function actualizarFab() {
  const count = cart.reduce((s,i) => s+i.cantidad, 0);
  const total = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  document.getElementById('fabCount').textContent = count;
  document.getElementById('fabTotal').textContent = '$' + total.toFixed(2);
  document.getElementById('cartFab').classList.toggle('on', count > 0);
}

function abrirCarrito() {
  renderCarrito();
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarCarrito() {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCarrito() {
  const body = document.getElementById('csBody');
  const footer = document.getElementById('csFooter');
  if (!cart.length) {
    body.innerHTML = '<div class="cart-empty"><div class="ce-icon">✦</div><div class="ce-title">Tu pedido está vacío</div><div class="ce-sub">Agrega productos del menú</div></div>';
    footer.innerHTML = ''; return;
  }
  const subtotal = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  body.innerHTML = cart.map((item,idx) =>
    '<div class="cart-item">' +
      '<div class="ci-thumb">' + (item.imagen ? '<img src="'+item.imagen+'" alt="">' : item.emoji) + '</div>' +
      '<div class="ci-info">' +
        '<div class="ci-name">' + item.nombre + '</div>' +
        (item.modificadores?.map(m => '<div class="ci-mods">' + m.grupo + ': ' + m.opciones.join(', ') + '</div>').join('') || '') +
        '<div class="ci-row">' +
          '<span class="ci-price">$' + (item.precio*item.cantidad).toFixed(2) + '</span>' +
          '<div class="ci-qty">' +
            '<button class="cq-btn rm" onclick="cambiarQtyCart('+idx+',-1)">' + (item.cantidad===1?'🗑':'−') + '</button>' +
            '<span class="cq-num">' + item.cantidad + '</span>' +
            '<button class="cq-btn" onclick="cambiarQtyCart('+idx+',1)">+</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('') +
  '<div class="notes-section"><span class="notes-label">Notas del pedido</span><textarea class="notes-textarea" id="notasInput" rows="2" placeholder="Ej: Sin cebolla, pago con $50...">' + notas + '</textarea></div>';

  const delivery = isNaN(parseFloat(neg.costo_delivery)) ? 0 : parseFloat(neg.costo_delivery);
  footer.innerHTML =
    '<div class="cart-summary">' +
      '<div class="sum-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>' +
      (neg.costo_delivery ? '<div class="sum-row"><span>Delivery</span><span>' + neg.costo_delivery + '</span></div>' : '<div class="sum-row"><span>Delivery</span><span>Se coordina al confirmar</span></div>') +
      '<div class="sum-total"><span>Total</span><span>$' + (subtotal + delivery).toFixed(2) + '</span></div>' +
      '<button class="wa-btn" onclick="confirmarPedido()">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
        'Confirmar por WhatsApp' +
      '</button>' +
    '</div>';
}

function cambiarQtyCart(idx, d) {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  if (d < 0 && cart[idx].cantidad === 1) cart.splice(idx,1);
  else cart[idx].cantidad = Math.max(1, cart[idx].cantidad + d);
  actualizarFab();
  if (!cart.length) { cerrarCarrito(); return; }
  renderCarrito();
  renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim() || '');
}

function confirmarPedido() {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  if (!cart.length) return;
  const lineas = cart.map(item => {
    let l = '• ' + item.nombre + ' x' + item.cantidad + ' — $' + (item.precio*item.cantidad).toFixed(2);
    (item.modificadores||[]).forEach(m => { l += '\n   ' + m.grupo + ': ' + m.opciones.join(', '); });
    return l;
  });
  const subtotal = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  let msg = 'Hola! Quiero hacer un pedido 🛒\n\n' + lineas.join('\n\n') + '\n\n💰 Total: $' + subtotal.toFixed(2);
  if (notas.trim()) msg += '\n\n📝 Notas: ' + notas.trim();
  msg += '\n\n_(Pedido desde el catálogo web)_';
  const wa = (neg.whatsapp_numero || neg.whatsapp_dueno || '').replace(/\D/g,'');
  if (!wa) { toast('Sin número de WhatsApp configurado'); return; }
  window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(msg), '_blank');
}

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchBar').classList.toggle('open', searchOpen);
  document.getElementById('catNav').classList.toggle('search-open', searchOpen);
  if (searchOpen) setTimeout(() => document.getElementById('searchInput').focus(), 260);
  else limpiarBusqueda();
}

function buscar(val) {
  const v = (val||'').toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('show', v.length > 0);
  renderCatalogo(v.length >= 2 ? v : '');
}

function limpiarBusqueda() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderCatalogo();
}

let toastTimer;
function toast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2400);
}

init();

</script>
</body>
</html>
