<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020912;--bg2:#040e1c;
  --s1:rgba(0,212,255,.05);--s2:rgba(0,212,255,.09);--s3:rgba(0,212,255,.14);
  --b:rgba(0,212,255,.18);--bh:rgba(0,212,255,.5);
  --tx:#b8e8ff;--t2:#3d7a99;--t3:#1a3f55;
  --c:#00d4ff;--r:#ff1a4a;--g:#00ff88;
  --safe:env(safe-area-inset-bottom,0px);
  --f:'Rajdhani',sans-serif;--fh:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;overscroll-behavior-y:none;font-weight:500;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(0,212,255,.09) 0%,transparent 55%),
    radial-gradient(ellipse 40% 35% at 95% 95%,rgba(255,26,74,.07) 0%,transparent 55%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(ellipse 120% 60% at 50% 0%,black 20%,transparent 75%);}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .5s,visibility .5s;}
#loader.out{opacity:0;visibility:hidden;}
.ld-ring{position:relative;width:72px;height:72px;}
.ld-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--c);border-right-color:var(--c);animation:spin 1s linear infinite;box-shadow:0 0 24px rgba(0,212,255,.5);}
.ld-ring::after{content:'';position:absolute;inset:12px;border-radius:50%;border:1px solid transparent;border-bottom-color:var(--r);border-left-color:var(--r);animation:spin .6s linear infinite reverse;}
.ld-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:8px;letter-spacing:.2em;color:var(--c);}
@keyframes spin{to{transform:rotate(360deg);}}
.ld-name{font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:.2em;color:var(--c);text-shadow:0 0 20px rgba(0,212,255,.7);}
.ld-sub{font-family:var(--fm);font-size:10px;letter-spacing:.22em;color:var(--t3);}
.ld-bar{width:160px;height:1px;background:rgba(0,212,255,.1);overflow:hidden;}
.ld-prog{height:100%;background:linear-gradient(90deg,transparent,var(--c),transparent);animation:ldp 1.3s ease infinite;}
@keyframes ldp{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

/* ── APP ── */
#app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding-bottom:calc(110px + var(--safe));}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:rgba(2,9,18,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--b);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--c) 25%,var(--r) 75%,transparent 100%);opacity:.6;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:34px;height:34px;flex-shrink:0;overflow:hidden;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:16px;
  clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);}
.tb-logo img{width:100%;height:100%;object-fit:cover;}
.tb-name{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.1em;}
.icon-btn{width:34px;height:34px;background:var(--s1);border:1px solid var(--b);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .18s;
  clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.icon-btn:hover{border-color:var(--c);color:var(--c);background:var(--s2);box-shadow:0 0 14px rgba(0,212,255,.25);}
.icon-btn svg{width:15px;height:15px;}

/* ── SEARCH ── */
.search-bar{overflow:hidden;max-height:0;transition:max-height .3s;background:rgba(2,9,18,.95);border-bottom:1px solid var(--b);}
.search-bar.open{max-height:60px;}
.search-inner{display:flex;align-items:center;gap:10px;padding:10px 16px;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-family:var(--f);font-size:15px;font-weight:500;}
.search-input::placeholder{color:var(--t3);}
.search-clear{background:none;border:none;color:var(--t2);cursor:pointer;font-size:13px;}
.search-clear:hover{color:var(--c);}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;min-height:270px;display:flex;flex-direction:column;justify-content:flex-end;padding:32px 18px 26px;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#071828 0%,#020912 100%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.05) 1px,transparent 1px);background-size:40px 40px;}
.hero-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.012) 3px,rgba(0,212,255,.012) 4px);pointer-events:none;}
.hero-banner{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.12;}
.hero-vignette{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,9,18,1) 0%,rgba(2,9,18,.6) 45%,rgba(2,9,18,.15) 100%);}
.hero-glow{position:absolute;top:-80px;right:-80px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.09),transparent 70%);}
.hero-content{position:relative;z-index:2;}
.hero-status{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 10px var(--g),0 0 20px rgba(0,255,136,.3);animation:blink 2s ease infinite;}
.status-dot.closed{background:var(--r);box-shadow:0 0 10px var(--r);animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.status-label{font-family:var(--fm);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--t2);}
.hero-name{font-family:var(--fh);font-size:28px;font-weight:700;letter-spacing:.06em;line-height:1.15;margin-bottom:14px;text-shadow:0 0 30px rgba(0,212,255,.25);}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;}
.hero-tag{display:inline-flex;align-items:center;font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 12px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.22);color:var(--c);
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}

/* ── INFO STRIP ── */
.info-strip{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--b);background:rgba(4,14,28,.8);}
.info-strip::-webkit-scrollbar{display:none;}
.info-item{flex:1;min-width:88px;display:flex;flex-direction:column;align-items:center;padding:12px 10px;border-right:1px solid var(--b);text-align:center;gap:3px;}
.info-item:last-child{border-right:none;}
.info-icon{font-size:15px;}
.info-label{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);}
.info-value{font-family:var(--fm);font-size:12px;color:var(--c);}

/* ── FEATURED ── */
.featured-section{padding:20px 0 6px;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:14px;}
.section-title{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--c);display:flex;align-items:center;gap:8px;}
.section-title::before{content:'//';font-family:var(--fm);color:var(--r);opacity:.8;font-size:12px;}
.section-sub{font-family:var(--fm);font-size:10px;color:var(--t3);}
.feat-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.feat-scroll::-webkit-scrollbar{display:none;}
.feat-card{flex-shrink:0;width:148px;background:var(--s1);border:1px solid var(--b);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:.6;}
.feat-card:hover{border-color:var(--bh);transform:translateY(-3px);box-shadow:0 0 22px rgba(0,212,255,.18),inset 0 0 22px rgba(0,212,255,.04);}
.feat-img-wrap{height:108px;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;}
.feat-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.feat-card:hover .feat-img-wrap img{transform:scale(1.08);}
.feat-body{padding:10px 11px 13px;}
.feat-name{font-size:12px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:5px;}
.feat-price{font-family:var(--fm);font-size:14px;color:var(--c);}
.feat-badge{position:absolute;top:8px;right:8px;font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;background:var(--r);color:#fff;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}

/* ── CAT NAV ── */
.cat-nav{position:sticky;top:55px;z-index:90;background:rgba(2,9,18,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);}
.cat-inner{display:flex;overflow-x:auto;gap:6px;padding:10px 14px;scrollbar-width:none;}
.cat-inner::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:6px 18px;background:transparent;border:1px solid var(--b);cursor:pointer;font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);transition:all .18s;white-space:nowrap;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
.cat-btn:hover{color:var(--c);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.06);}
.cat-btn.active{background:rgba(0,212,255,.1);border-color:var(--c);color:var(--c);box-shadow:0 0 16px rgba(0,212,255,.2);}

/* ── CONTENT & PRODUCT ── */
.content{padding:0 14px;}
.cat-section{padding:22px 0 4px;}
.cat-title{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--t2);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.cat-title::before{content:'›';color:var(--c);font-size:16px;}
.cat-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--b),transparent);}
.products-grid{display:flex;flex-direction:column;gap:8px;}
.prod-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--s1);border:1px solid var(--b);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  clip-path:polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
  animation:fadeUp .35s ease both;}
.prod-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--c),var(--r));opacity:0;transition:opacity .2s;}
.prod-row::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--c),transparent);opacity:0;transition:opacity .2s;}
.prod-row:hover{border-color:rgba(0,212,255,.38);background:var(--s2);box-shadow:0 0 22px rgba(0,212,255,.1),inset 0 0 22px rgba(0,212,255,.03);}
.prod-row:hover::before,.prod-row:hover::after{opacity:1;}
.prod-row:active{transform:scale(.99);}
.prod-row.agotado{opacity:.3;pointer-events:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:4px;}
.prod-desc{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.prod-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.prod-price{font-family:var(--fm);font-size:16px;color:var(--c);}
.prod-from{font-size:10px;color:var(--t3);font-family:var(--f);}
.in-cart-badge{font-family:var(--fm);font-size:9px;letter-spacing:.08em;padding:2px 8px;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:var(--g);clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.agotado-badge{font-family:var(--fm);font-size:9px;padding:2px 8px;background:rgba(255,26,74,.08);border:1px solid rgba(255,26,74,.2);color:var(--r);clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.prod-thumb{flex-shrink:0;width:80px;height:80px;overflow:hidden;background:var(--s2);border:1px solid var(--b);position:relative;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.prod-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.prod-row:hover .prod-thumb img{transform:scale(1.08);}
.thumb-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;}
.add-dot{position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--c);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;
  clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px);}

.no-results{text-align:center;padding:64px 20px;}
.no-results-icon{font-size:44px;margin-bottom:14px;opacity:.2;}
.no-results h3{font-family:var(--fh);font-size:16px;letter-spacing:.12em;color:var(--t2);margin-bottom:6px;}
.no-results p{font-family:var(--fm);font-size:12px;color:var(--t3);}
.sr-count{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;padding:16px 0 0;}
.search-results{padding:0;}

/* ── FAB ── */
.cart-fab{position:fixed;bottom:calc(20px + var(--safe));left:50%;transform:translateX(-50%) translateY(120px);z-index:400;width:calc(100% - 32px);max-width:480px;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;opacity:0;}
.cart-fab.on{transform:translateX(-50%) translateY(0);pointer-events:all;opacity:1;}
.fab-body{
  background:rgba(0,212,255,.1);border:1px solid var(--c);padding:14px 20px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 0 30px rgba(0,212,255,.3),0 0 60px rgba(0,212,255,.1),inset 0 0 30px rgba(0,212,255,.05);
  clip-path:polygon(14px 0%,100% 0%,100% calc(100% - 14px),calc(100% - 14px) 100%,0% 100%,0% 14px);
  transition:all .18s;position:relative;overflow:hidden;
}
.fab-body::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);}
.fab-body::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.5),transparent);}
.fab-body:hover{box-shadow:0 0 40px rgba(0,212,255,.45),0 0 80px rgba(0,212,255,.15);}
.fab-left{display:flex;align-items:center;gap:12px;}
.fab-count{width:26px;height:26px;background:var(--c);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:13px;font-weight:700;clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px);}
.fab-label{font-family:var(--fh);font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--c);}
.fab-total{font-family:var(--fm);font-size:18px;color:var(--c);}

/* ── OVERLAYS ── */
.overlay,.cart-overlay{position:fixed;inset:0;z-index:500;background:transparent;visibility:hidden;transition:background .3s,visibility .3s;display:flex;align-items:flex-end;justify-content:center;}
.overlay.open,.cart-overlay.open{background:rgba(2,9,18,.88);visibility:visible;backdrop-filter:blur(4px);}
.cart-overlay{z-index:600;}
.sheet,.cart-sheet{background:var(--bg2);border-top:1px solid var(--b);width:100%;max-width:640px;max-height:92dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);position:relative;}
.sheet::before,.cart-sheet::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),var(--r),transparent);}
.overlay.open .sheet,.cart-overlay.open .cart-sheet{transform:translateY(0);}
.sh-handle,.cs-handle{width:32px;height:2px;background:var(--b);margin:14px auto 0;flex-shrink:0;}
.sh-scroll{flex:1;overflow-y:auto;scrollbar-width:none;}
.sh-scroll::-webkit-scrollbar{display:none;}
.sh-img{width:100%;height:230px;object-fit:cover;display:block;}
.sh-emoji{width:100%;height:180px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:72px;}
.sh-body{padding:22px 18px 8px;}
.sh-name{font-family:var(--fh);font-size:20px;font-weight:600;letter-spacing:.06em;color:var(--tx);margin-bottom:6px;}
.sh-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:12px;}
.sh-price{font-family:var(--fm);font-size:22px;color:var(--c);margin-bottom:4px;}
.sh-price small{font-size:11px;color:var(--t3);font-family:var(--f);margin-left:5px;}
.divider{height:1px;background:var(--b);margin:18px 0;}
.sh-footer{padding:14px 18px calc(14px + var(--safe));border-top:1px solid var(--b);background:var(--bg2);flex-shrink:0;}

/* ── MITAD MITAD ── */
.mm-title{font-family:var(--fh);font-size:13px;letter-spacing:.1em;color:var(--c);margin-bottom:4px;}
.mm-sub{font-family:var(--fm);font-size:11px;color:var(--t3);margin-bottom:16px;}
.mm-visual{display:flex;justify-content:center;margin-bottom:20px;}
.mm-pizza{position:relative;width:110px;height:110px;border-radius:50%;background:var(--s2);border:2px solid rgba(0,212,255,.3);overflow:hidden;box-shadow:0 0 20px rgba(0,212,255,.15);}
.mm-half{position:absolute;top:0;width:50%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;color:var(--t2);text-align:center;padding:4px;word-break:break-word;}
.mm-left{left:0;background:rgba(0,212,255,.05);border-right:1px dashed rgba(0,212,255,.25);}
.mm-right{right:0;background:rgba(0,212,255,.08);}
.mm-block{margin-bottom:18px;}
.mm-block-title{font-family:var(--fh);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.mm-num{width:20px;height:20px;border:1px solid var(--b);background:var(--s2);color:var(--c);font-family:var(--fm);font-size:11px;display:inline-flex;align-items:center;justify-content:center;clip-path:polygon(3px 0%,100% 0%,100% calc(100% - 3px),calc(100% - 3px) 100%,0% 100%,0% 3px);}
.mm-opts{display:flex;flex-wrap:wrap;gap:7px;}
.mm-opt{padding:6px 14px;border:1px solid var(--b);background:var(--s1);font-size:13px;color:var(--t2);cursor:pointer;transition:all .16s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.mm-opt:hover{border-color:rgba(0,212,255,.4);color:var(--c);}
.mm-opt.sel{border-color:var(--c);background:rgba(0,212,255,.1);color:var(--c);}

/* ── MODIFICADORES ── */
.mod-group{margin-bottom:20px;}
.mod-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px;}
.mod-req{font-family:var(--fm);font-size:9px;letter-spacing:.1em;padding:2px 7px;background:rgba(255,26,74,.1);border:1px solid rgba(255,26,74,.25);color:var(--r);margin-left:8px;clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);}
.mod-sub{font-family:var(--fm);font-size:11px;color:var(--t3);margin-bottom:12px;}
.opt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--b);margin-bottom:7px;cursor:pointer;transition:all .16s;background:var(--s1);gap:10px;
  clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.opt-row:hover{border-color:rgba(0,212,255,.35);background:var(--s2);}
.opt-row.sel{border-color:var(--c);background:rgba(0,212,255,.08);}
.opt-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.opt-ctrl{width:16px;height:16px;border:1.5px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .16s;flex-shrink:0;clip-path:polygon(2px 0%,100% 0%,100% calc(100% - 2px),calc(100% - 2px) 100%,0% 100%,0% 2px);}
.opt-row.sel .opt-ctrl{background:var(--c);border-color:var(--c);color:var(--bg);}
.opt-name{font-size:14px;color:var(--tx);}
.opt-price{font-family:var(--fm);font-size:12px;color:var(--t2);}
.opt-right-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.opt-qty-ctrl{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);padding:3px 7px;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.oq-btn{width:20px;height:20px;border:none;background:transparent;color:var(--c);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.oq-num{font-family:var(--fm);font-size:13px;color:var(--tx);min-width:14px;text-align:center;}

/* ── QTY ── */
.qty-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 20px;}
.qty-label{font-size:14px;font-weight:600;color:var(--t2);}
.qty-ctrl{display:flex;align-items:center;gap:16px;}
.qty-btn{width:34px;height:34px;border:1px solid var(--b);background:var(--s1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx);transition:all .16s;
  clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.qty-btn:hover:not(:disabled){border-color:var(--c);color:var(--c);box-shadow:0 0 12px rgba(0,212,255,.2);}
.qty-btn:disabled{opacity:.2;cursor:not-allowed;}
.qty-val{font-family:var(--fm);font-size:22px;min-width:28px;text-align:center;}

/* ── BOTÓN PRINCIPAL ── */
.add-btn,.cs-checkout,.wa-btn{
  width:100%;padding:14px 20px;
  border:1px solid var(--c);background:transparent;color:var(--c);
  font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.1em;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  clip-path:polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
  box-shadow:0 0 18px rgba(0,212,255,.18),inset 0 0 18px rgba(0,212,255,.04);
  transition:all .18s;position:relative;overflow:hidden;
}
.add-btn::before,.cs-checkout::before,.wa-btn::before{content:'';position:absolute;inset:0;background:rgba(0,212,255,.08);pointer-events:none;}
.add-btn:hover,.cs-checkout:hover{background:rgba(0,212,255,.12);box-shadow:0 0 30px rgba(0,212,255,.35),inset 0 0 30px rgba(0,212,255,.08);}
.cs-checkout,.wa-btn{justify-content:center;gap:10px;margin-top:12px;}
.wa-btn{border-color:rgba(37,211,102,.5);color:#25D366;box-shadow:0 0 18px rgba(37,211,102,.15);}
.wa-btn:hover{background:rgba(37,211,102,.1);box-shadow:0 0 30px rgba(37,211,102,.3);}

/* ── CARRITO ── */
.cs-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 14px;border-bottom:1px solid var(--b);flex-shrink:0;}
.cs-title{font-family:var(--fh);font-size:15px;font-weight:600;letter-spacing:.1em;}
.cs-close{width:30px;height:30px;background:var(--s1);border:1px solid var(--b);cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .16s;clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.cs-close:hover{border-color:var(--r);color:var(--r);}
.cs-body{flex:1;overflow-y:auto;scrollbar-width:none;}
.cs-body::-webkit-scrollbar{display:none;}
.cs-footer{flex-shrink:0;border-top:1px solid var(--b);background:var(--bg2);padding:16px 18px calc(14px + var(--safe));}
.cart-item{display:flex;gap:12px;padding:14px 18px;border-bottom:1px solid var(--b);}
.ci-thumb{width:54px;height:54px;overflow:hidden;flex-shrink:0;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--b);clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.ci-thumb img{width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.ci-mods{font-family:var(--fm);font-size:11px;color:var(--t3);margin-bottom:9px;line-height:1.5;}
.ci-row{display:flex;align-items:center;justify-content:space-between;}
.ci-price{font-family:var(--fm);font-size:16px;color:var(--c);}
.ci-qty{display:flex;align-items:center;gap:8px;}
.cq-btn{width:26px;height:26px;border:1px solid var(--b);background:var(--s1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);transition:all .15s;clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px);}
.cq-btn:hover{border-color:var(--c);color:var(--c);}
.cq-btn.rm:hover{border-color:var(--r);color:var(--r);}
.cq-num{font-family:var(--fm);font-size:15px;min-width:16px;text-align:center;}
.notes-section{padding:14px 18px;border-bottom:1px solid var(--b);}
.notes-label{font-family:var(--fm);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:8px;}
.notes-textarea{width:100%;padding:10px 13px;border:1px solid var(--b);background:var(--s1);color:var(--tx);font-family:var(--f);font-size:13px;outline:none;resize:none;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.notes-textarea::placeholder{color:var(--t3);}
.notes-textarea:focus{border-color:rgba(0,212,255,.4);}
.sum-row{display:flex;justify-content:space-between;font-family:var(--fm);font-size:12px;color:var(--t2);margin-bottom:8px;}
.sum-total{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--b);margin-top:4px;margin-bottom:0;}
.sum-total span:first-child{font-family:var(--fh);font-size:12px;letter-spacing:.1em;color:var(--t2);align-self:center;}
.sum-total span:last-child{font-family:var(--fm);font-size:22px;color:var(--c);}
.cart-empty{text-align:center;padding:64px 20px;}
.ce-icon{font-family:var(--fh);font-size:32px;color:var(--b);margin-bottom:16px;letter-spacing:.1em;}
.ce-title{font-family:var(--fh);font-size:15px;letter-spacing:.12em;color:var(--t2);margin-bottom:8px;}
.ce-sub{font-family:var(--fm);font-size:12px;color:var(--t3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--b);border-left:2px solid var(--c);color:var(--tx);padding:10px 20px;font-family:var(--fm);font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;box-shadow:0 0 20px rgba(0,212,255,.15);clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loader">
  <div class="ld-ring"><div class="ld-center">SYS</div></div>
  <div class="ld-name" id="ldName">INICIANDO</div>
  <div class="ld-sub">// cargando sistema</div>
  <div class="ld-bar"><div class="ld-prog"></div></div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo" id="tbLogo"></div>
      <span class="tb-name" id="tbName">CARGANDO...</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="icon-btn" onclick="toggleSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <div class="search-inner">
      <span style="color:var(--t3);flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" id="searchInput" type="text" placeholder="BUSCAR EN EL MENÚ..." oninput="buscar(this.value)">
      <button class="search-clear" id="searchClear" onclick="limpiarBusqueda()">✕</button>
    </div>
  </div>
  <div id="heroWrap"></div>
  <div id="infoStrip" class="info-strip"></div>
  <div id="featuredWrap"></div>
  <div class="cat-nav" id="catNav" style="display:none"><div class="cat-inner" id="catInner"></div></div>
  <div class="content" id="content"></div>
</div>

<div class="cart-fab" id="cartFab" onclick="abrirCarrito()">
  <div class="fab-body">
    <div class="fab-left">
      <div class="fab-count" id="fabCount">0</div>
      <span class="fab-label">VER PEDIDO</span>
    </div>
    <span class="fab-total" id="fabTotal">$0.00</span>
  </div>
</div>

<div class="overlay" id="prodOverlay" onclick="if(event.target===this)cerrarProd()">
  <div class="sheet">
    <div class="sh-scroll"><div class="sh-handle"></div><div id="shContent"></div></div>
    <div class="sh-footer"><button class="add-btn" id="addBtn" onclick="agregarAlCarrito()"><span>AGREGAR AL PEDIDO</span><span id="addPrice">$0.00</span></button></div>
  </div>
</div>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="cart-sheet">
    <div class="cs-handle"></div>
    <div class="cs-header">
      <span class="cs-title">// TU PEDIDO</span>
      <button class="cs-close" onclick="cerrarCarrito()">✕</button>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-footer" id="csFooter"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SLUG=window.location.pathname.split('/')[2];const BASE=window.location.origin;
let neg=null,cart=[],prod=null,sels={},qty=1,notas='',searchOpen=false,mitadSels={1:null,2:null};
async function init(){try{const r=await fetch(BASE+'/catalogo-data/'+SLUG);if(!r.ok){errLoader('NEGOCIO NO ENCONTRADO');return;}neg=await r.json();renderAll();fadeLoader();}catch(e){errLoader('ERROR DE CONEXIÓN');}}
function fadeLoader(){const l=document.getElementById('loader');l.classList.add('out');setTimeout(()=>{l.style.display='none';document.getElementById('app').style.display='block';},500);}
function errLoader(msg){document.getElementById('loader').innerHTML='<div style="font-family:var(--fh);font-size:14px;color:var(--r);letter-spacing:.1em;text-align:center">'+msg+'</div>';}
function renderAll(){document.title=neg.nombre+' — MENÚ';const ln=document.getElementById('ldName');if(ln)ln.textContent=neg.nombre;document.getElementById('tbName').textContent=neg.nombre;const tl=document.getElementById('tbLogo');tl.innerHTML=neg.logo?'<img src="'+neg.logo+'" alt="">':(neg.emoji||'🛍️');renderHero();renderInfoStrip();renderFeatured();renderCatalogo();}
function estaAbierto(){if(typeof neg.esta_abierto==='boolean')return neg.esta_abierto;if(neg.horarios){const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];const ec=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));const h=neg.horarios[dias[ec.getDay()]];if(!h||!h.abierto||!h.desde||!h.hasta)return false;const[dH,dM]=h.desde.split(':').map(Number);const[hH,hM]=h.hasta.split(':').map(Number);const min=ec.getHours()*60+ec.getMinutes();return min>=dH*60+dM&&min<hH*60+hM;}const ec=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));return ec.getHours()>=8&&ec.getHours()<18;}
function obtenerHorarioHoy(){if(!neg.horarios)return null;const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];const ec=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));const h=neg.horarios[dias[ec.getDay()]];if(!h||!h.abierto)return null;return h.desde+' — '+h.hasta;}
function renderHero(){const ab=estaAbierto();const horario=obtenerHorarioHoy();const w=document.getElementById('heroWrap');w.innerHTML='<div class="hero"><div class="hero-bg"></div><div class="hero-grid"></div><div class="hero-scan"></div>'+(neg.banner?'<img class="hero-banner" src="'+neg.banner+'" alt="">':'')+'<div class="hero-vignette"></div><div class="hero-glow"></div><div class="hero-content"><div class="hero-status"><div class="status-dot'+(ab?'':' closed')+'"></div><span class="status-label">'+(ab?'SISTEMA ACTIVO':'SISTEMA OFFLINE')+'</span></div><div class="hero-name">'+(neg.emoji?neg.emoji+' ':'')+neg.nombre+'</div><div class="hero-tags">'+(neg.tipo?'<div class="hero-tag">'+neg.tipo+'</div>':'')+(horario?'<div class="hero-tag">⏱ '+horario+'</div>':'')+'</div></div></div>';}
function renderInfoStrip(){const s=document.getElementById('infoStrip');const items=[];if(neg.tiempo_entrega)items.push('<div class="info-item"><span class="info-icon">🛵</span><div><span class="info-label">entrega</span><span class="info-value">'+neg.tiempo_entrega+'</span></div></div>');items.push('<div class="info-item"><span class="info-icon">💰</span><div><span class="info-label">delivery</span><span class="info-value">'+(neg.costo_delivery||'Variable')+'</span></div></div>');if(neg.pedido_minimo)items.push('<div class="info-item"><span class="info-icon">🛒</span><div><span class="info-label">mínimo</span><span class="info-value">$'+neg.pedido_minimo+'</span></div></div>');s.innerHTML=items.join('');if(!items.length)s.style.display='none';}
function renderFeatured(){const pops=(neg.catalogo||[]).filter(p=>p.activo!==false&&p.destacado);if(!pops.length)return;document.getElementById('featuredWrap').innerHTML='<div class="featured-section"><div class="section-header"><span class="section-title">DESTACADOS</span><span class="section-sub">TOP_ITEMS</span></div><div class="feat-scroll">'+pops.map(p=>'<div class="feat-card" onclick="abrirProd(\''+String(p.id)+'\')">'+(p.imagen?'<div class="feat-img-wrap"><img src="'+p.imagen+'" alt="'+p.nombre+'" loading="lazy"></div>':'<div class="feat-img-wrap">'+(p.emoji||'📦')+'</div>')+'<div class="feat-body"><div class="feat-name">'+p.nombre+'</div><div class="feat-price">$'+p.precio.toFixed(2)+'</div></div><div class="feat-badge">POPULAR</div></div>').join('')+'</div></div>';}
function slugify(s){return s.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');}
function renderCatalogo(filtro){filtro=(filtro||'').toLowerCase().trim();const todos=(neg.catalogo||[]).filter(p=>p.activo!==false);const prods=filtro?todos.filter(p=>p.nombre.toLowerCase().includes(filtro)||(p.descripcion||'').toLowerCase().includes(filtro)):todos;if(filtro){document.getElementById('catNav').style.display='none';document.getElementById('content').innerHTML=prods.length?'<div class="search-results"><div class="sr-count">'+prods.length+' RESULTADO'+(prods.length!==1?'S':'')+'</div><div class="products-grid">'+prods.map((p,i)=>prodHTML(p,i)).join('')+'</div></div>':'<div class="no-results"><div class="no-results-icon">⌀</div><h3>SIN RESULTADOS</h3><p>// No encontramos "'+filtro+'"</p></div>';return;}const cats={};prods.forEach(p=>{const c=p.categoria||'MENÚ';if(!cats[c])cats[c]=[];cats[c].push(p);});const names=Object.keys(cats);if(names.length>1){document.getElementById('catNav').style.display='block';document.getElementById('catInner').innerHTML=names.map((c,i)=>'<button class="cat-btn'+(i===0?' active':'')+'" onclick="irACat(\''+c+'\',this)">'+c+'</button>').join('');}else document.getElementById('catNav').style.display='none';let delay=0;document.getElementById('content').innerHTML=names.map(c=>'<div class="cat-section" id="cs-'+slugify(c)+'"><div class="cat-title">'+c+'</div><div class="products-grid">'+cats[c].map((p,i)=>prodHTML(p,delay++)).join('')+'</div></div>').join('');setTimeout(()=>document.querySelectorAll('.cat-section').forEach(s=>io.observe(s)),80);}
function prodHTML(p,idx){const agotado=p.stock===0;const enCarrito=cart.filter(i=>i.id===p.id).reduce((s,i)=>s+i.cantidad,0);const tieneMods=(p.modificadores||[]).length>0;return'<div class="prod-row'+(agotado?' agotado':'')+'" onclick="abrirProd(\''+String(p.id)+'\')" style="animation-delay:'+(idx*35)+'ms"><div class="prod-info"><div class="prod-name">'+p.nombre+'</div>'+(p.descripcion?'<div class="prod-desc">'+p.descripcion+'</div>':'')+'<div class="prod-foot"><span class="prod-price">'+(tieneMods?'<span class="prod-from">DESDE </span>':'')+'$'+p.precio.toFixed(2)+'</span>'+(enCarrito>0?'<span class="in-cart-badge">✓ '+enCarrito+'</span>':'')+(agotado?'<span class="agotado-badge">AGOTADO</span>':'')+'</div></div><div class="prod-thumb">'+(p.imagen?'<img src="'+p.imagen+'" alt="'+p.nombre+'" loading="lazy">':'<div class="thumb-emoji">'+(p.emoji||'📦')+'</div>')+(!agotado?'<div class="add-dot">+</div>':'')+'</div></div>';}
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id.replace('cs-','');document.querySelectorAll('.cat-btn').forEach(b=>{const match=slugify(b.textContent)===id;b.classList.toggle('active',match);if(match)b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});});}});},{rootMargin:'-90px 0px -55% 0px'});
function irACat(cat,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const el=document.getElementById('cs-'+slugify(cat));if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-106,behavior:'smooth'});}
function abrirProd(id){prod=(neg.catalogo||[]).find(x=>String(x.id)===String(id));if(!prod)return;sels={};qty=1;mitadSels={1:null,2:null};(prod.modificadores||[]).forEach((g,i)=>{sels[i]=g.tipo==='unico'?null:[];});renderSheet();document.getElementById('prodOverlay').classList.add('open');document.body.style.overflow='hidden';}
function cerrarProd(){document.getElementById('prodOverlay').classList.remove('open');document.body.style.overflow='';prod=null;}
function renderSheet(){const p=prod;const mods=p.modificadores||[];let html=(p.imagen?'<img class="sh-img" src="'+p.imagen+'" alt="'+p.nombre+'">':'<div class="sh-emoji">'+(p.emoji||'📦')+'</div>');html+='<div class="sh-body"><div class="sh-name">'+p.nombre+'</div>';if(p.descripcion)html+='<div class="sh-desc">'+p.descripcion+'</div>';html+='<div class="sh-price" id="shPrice">$'+p.precio.toFixed(2)+'<small>/ unidad</small></div>';if(p.mitad_mitad&&p.ingredientes_mitad?.length){html+='<div class="divider"></div><div class="mm-title">// PERSONALIZA TU PIZZA</div><div class="mm-sub">Selecciona por mitad</div><div class="mm-visual"><div class="mm-pizza"><div class="mm-half mm-left" id="mmVisL">½</div><div class="mm-half mm-right" id="mmVisR">½</div></div></div>';[1,2].forEach(m=>{html+='<div class="mm-block"><div class="mm-block-title"><span class="mm-num">'+m+'</span> MITAD '+m+'</div><div class="mm-opts" id="mmOpts'+m+'">';p.ingredientes_mitad.forEach((ing,idx)=>{html+='<div class="mm-opt" id="mm-'+m+'-'+idx+'" onclick="selMitad('+m+','+idx+',\''+ing.replace(/'/g,"\\'")+'\')">'+ing+'</div>';});html+='</div></div>';});html+='<div class="divider"></div>';}if(mods.length)html+='<div class="divider"></div>';mods.forEach((g,gi)=>{html+='<div class="mod-group"><div class="mod-title">'+g.nombre+(g.obligatorio?'<span class="mod-req">REQ</span>':'')+'</div><div class="mod-sub">'+(g.tipo==='unico'?'// Una opción':'// Varias opciones')+'</div>';g.opciones.forEach((op,oi)=>{html+='<div class="opt-row" id="op-'+gi+'-'+oi+'" onclick="toggleOpt('+gi+','+oi+',\''+g.tipo+'\')">';html+='<div class="opt-left"><div class="opt-ctrl'+(g.tipo==='unico'?'':' sq')+'" id="oc-'+gi+'-'+oi+'"></div><span class="opt-name">'+op.nombre+'</span></div>';html+='<div class="opt-right-wrap"><div class="opt-qty-ctrl" id="oqc-'+gi+'-'+oi+'" style="display:none" onclick="event.stopPropagation()"><button class="oq-btn" onclick="cambiarQtyOpt('+gi+','+oi+',-1,\''+g.tipo+'\')">−</button><span class="oq-num" id="oqn-'+gi+'-'+oi+'">1</span><button class="oq-btn" onclick="cambiarQtyOpt('+gi+','+oi+',1,\''+g.tipo+'\')">+</button></div><span class="opt-price">'+(op.precio>0?'+$'+op.precio.toFixed(2):op.precio<0?'-$'+Math.abs(op.precio).toFixed(2):'INC')+'</span></div></div>';});html+='</div>';});if(mods.length)html+='<div class="divider"></div>';html+='<div class="qty-row"><span class="qty-label">CANTIDAD</span><div class="qty-ctrl"><button class="qty-btn" id="qm" onclick="cambiarQty(-1)" disabled>−</button><span class="qty-val" id="qv">1</span><button class="qty-btn" onclick="cambiarQty(1)">+</button></div></div></div>';document.getElementById('shContent').innerHTML=html;document.getElementById('addPrice').textContent='$'+p.precio.toFixed(2);}
function toggleOpt(gi,oi,tipo){if(tipo==='unico'){if(sels[gi]!==null){const prev=sels[gi].oi;document.getElementById('op-'+gi+'-'+prev)?.classList.remove('sel');const oc=document.getElementById('oc-'+gi+'-'+prev);if(oc)oc.textContent='';const oqc=document.getElementById('oqc-'+gi+'-'+prev);if(oqc)oqc.style.display='none';}if(sels[gi]!==null&&sels[gi].oi===oi)sels[gi]=null;else{sels[gi]={oi,qty:1};document.getElementById('op-'+gi+'-'+oi).classList.add('sel');document.getElementById('oc-'+gi+'-'+oi).textContent='✓';document.getElementById('oqc-'+gi+'-'+oi).style.display='flex';document.getElementById('oqn-'+gi+'-'+oi).textContent='1';}}else{if(!Array.isArray(sels[gi]))sels[gi]=[];const idx=sels[gi].findIndex(s=>s.oi===oi);if(idx>=0){sels[gi].splice(idx,1);document.getElementById('op-'+gi+'-'+oi).classList.remove('sel');document.getElementById('oc-'+gi+'-'+oi).textContent='';document.getElementById('oqc-'+gi+'-'+oi).style.display='none';}else{sels[gi].push({oi,qty:1});document.getElementById('op-'+gi+'-'+oi).classList.add('sel');document.getElementById('oc-'+gi+'-'+oi).textContent='✓';document.getElementById('oqc-'+gi+'-'+oi).style.display='flex';document.getElementById('oqn-'+gi+'-'+oi).textContent='1';}}actualizarPrecioSheet();}
function cambiarQtyOpt(gi,oi,delta,tipo){const entry=tipo==='unico'?sels[gi]:(sels[gi]||[]).find(s=>s.oi===oi);if(!entry)return;entry.qty=Math.max(1,entry.qty+delta);document.getElementById('oqn-'+gi+'-'+oi).textContent=entry.qty;actualizarPrecioSheet();}
function calcExtra(){let e=0;(prod.modificadores||[]).forEach((g,gi)=>{const s=sels[gi];if(g.tipo==='unico'&&s!==null)e+=(g.opciones[s.oi]?.precio||0)*s.qty;else if(Array.isArray(s))s.forEach(({oi,qty})=>{e+=(g.opciones[oi]?.precio||0)*qty;});});return e;}
function actualizarPrecioSheet(){const extra=calcExtra();const total=(prod.precio+extra)*qty;document.getElementById('shPrice').innerHTML='$'+(prod.precio+extra).toFixed(2)+'<small>/ unidad</small>';document.getElementById('addPrice').textContent='$'+total.toFixed(2);}
function cambiarQty(d){qty=Math.max(1,qty+d);document.getElementById('qv').textContent=qty;document.getElementById('qm').disabled=qty<=1;actualizarPrecioSheet();}
function selMitad(mitad,idx,nombre){mitadSels[mitad]={idx,nombre};document.querySelectorAll('#mmOpts'+mitad+' .mm-opt').forEach(el=>el.classList.remove('sel'));document.getElementById('mm-'+mitad+'-'+idx)?.classList.add('sel');const vL=document.getElementById('mmVisL'),vR=document.getElementById('mmVisR');if(vL&&mitad===1)vL.textContent=mitadSels[1]?.nombre?.split(' ')[0]||'½';if(vR&&mitad===2)vR.textContent=mitadSels[2]?.nombre?.split(' ')[0]||'½';}
function agregarAlCarrito(){if(prod.mitad_mitad&&prod.ingredientes_mitad?.length){if(!mitadSels[1]){toast('Elige ingrediente: Mitad 1');return;}if(!mitadSels[2]){toast('Elige ingrediente: Mitad 2');return;}}const mods=prod.modificadores||[];for(let gi=0;gi<mods.length;gi++){const g=mods[gi];if(!g.obligatorio)continue;const s=sels[gi];if(g.tipo==='unico'?s==null:!s?.length){toast('Requerido: '+g.nombre);return;}}const extra=calcExtra();const modsGuardados=[];if(prod.mitad_mitad&&mitadSels[1]&&mitadSels[2])modsGuardados.push({grupo:'Mitades',opciones:['Mitad 1: '+mitadSels[1].nombre,'Mitad 2: '+mitadSels[2].nombre]});mods.forEach((g,gi)=>{const s=sels[gi];let ops=[];if(g.tipo==='unico'&&s!==null)ops=[s.qty>1?g.opciones[s.oi].nombre+' x'+s.qty:g.opciones[s.oi].nombre];else if(Array.isArray(s))ops=s.map(({oi,qty})=>qty>1?g.opciones[oi].nombre+' x'+qty:g.opciones[oi].nombre);if(ops.length)modsGuardados.push({grupo:g.nombre,opciones:ops});});const _nombre=prod.nombre;cart.push({uid:Date.now()+Math.random(),id:prod.id,nombre:prod.nombre,precio:prod.precio+extra,emoji:prod.emoji||'🍽️',imagen:prod.imagen||'',cantidad:qty,modificadores:modsGuardados});cerrarProd();actualizarFab();renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim()||'');toast('[ '+_nombre+' ] AGREGADO');}
function actualizarFab(){const count=cart.reduce((s,i)=>s+i.cantidad,0);const total=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);document.getElementById('fabCount').textContent=count;document.getElementById('fabTotal').textContent='$'+total.toFixed(2);document.getElementById('cartFab').classList.toggle('on',count>0);}
function abrirCarrito(){renderCarrito();document.getElementById('cartOverlay').classList.add('open');document.body.style.overflow='hidden';}
function cerrarCarrito(){const ta=document.getElementById('notasInput');if(ta)notas=ta.value;document.getElementById('cartOverlay').classList.remove('open');document.body.style.overflow='';}
function renderCarrito(){const body=document.getElementById('csBody');const footer=document.getElementById('csFooter');if(!cart.length){body.innerHTML='<div class="cart-empty"><div class="ce-icon">[ VACÍO ]</div><div class="ce-title">PEDIDO VACÍO</div><div class="ce-sub">// Agrega productos</div></div>';footer.innerHTML='';return;}const subtotal=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);body.innerHTML=cart.map((item,idx)=>'<div class="cart-item"><div class="ci-thumb">'+(item.imagen?'<img src="'+item.imagen+'" alt="">':item.emoji)+'</div><div class="ci-info"><div class="ci-name">'+item.nombre+'</div>'+(item.modificadores?.map(m=>'<div class="ci-mods">'+m.grupo+': '+m.opciones.join(', ')+'</div>').join('')||'')+'<div class="ci-row"><span class="ci-price">$'+(item.precio*item.cantidad).toFixed(2)+'</span><div class="ci-qty"><button class="cq-btn rm" onclick="cambiarQtyCart('+idx+',-1)">'+(item.cantidad===1?'🗑':'−')+'</button><span class="cq-num">'+item.cantidad+'</span><button class="cq-btn" onclick="cambiarQtyCart('+idx+',1)">+</button></div></div></div></div>').join('')+'<div class="notes-section"><span class="notes-label">// NOTAS</span><textarea class="notes-textarea" id="notasInput" rows="2" placeholder="Instrucciones especiales...">'+notas+'</textarea></div>';const delivery=isNaN(parseFloat(neg.costo_delivery))?0:parseFloat(neg.costo_delivery);footer.innerHTML='<div class="sum-row"><span>SUBTOTAL</span><span>$'+subtotal.toFixed(2)+'</span></div>'+(neg.costo_delivery?'<div class="sum-row"><span>DELIVERY</span><span>'+neg.costo_delivery+'</span></div>':'<div class="sum-row"><span>DELIVERY</span><span>A COTIZAR</span></div>')+'<div class="sum-total"><span>TOTAL</span><span>$'+(subtotal+delivery).toFixed(2)+'</span></div><button class="wa-btn" onclick="confirmarPedido()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>CONFIRMAR POR WHATSAPP</button>';}
function cambiarQtyCart(idx,d){const ta=document.getElementById('notasInput');if(ta)notas=ta.value;if(d<0&&cart[idx].cantidad===1)cart.splice(idx,1);else cart[idx].cantidad=Math.max(1,cart[idx].cantidad+d);actualizarFab();if(!cart.length){cerrarCarrito();return;}renderCarrito();renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim()||'');}
function confirmarPedido(){const ta=document.getElementById('notasInput');if(ta)notas=ta.value;if(!cart.length)return;const lineas=cart.map(item=>{let l='• '+item.nombre+' x'+item.cantidad+' — $'+(item.precio*item.cantidad).toFixed(2);(item.modificadores||[]).forEach(m=>{l+='\n   '+m.grupo+': '+m.opciones.join(', ');});return l;});const subtotal=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);let msg='Hola! Quiero hacer un pedido 🛒\n\n'+lineas.join('\n\n')+'\n\n💰 Total: $'+subtotal.toFixed(2);if(notas.trim())msg+='\n\n📝 Notas: '+notas.trim();msg+='\n\n_(Pedido desde el catálogo web)_';const wa=(neg.whatsapp_numero||neg.whatsapp_dueno||'').replace(/\D/g,'');if(!wa){toast('Sin número configurado');return;}window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg),'_blank');}
function toggleSearch(){searchOpen=!searchOpen;document.getElementById('searchBar').classList.toggle('open',searchOpen);if(searchOpen)setTimeout(()=>document.getElementById('searchInput').focus(),260);else limpiarBusqueda();}
function buscar(val){const v=(val||'').toLowerCase().trim();renderCatalogo(v.length>=2?v:'');}
function limpiarBusqueda(){document.getElementById('searchInput').value='';renderCatalogo();}
let tt;function toast(txt){const t=document.getElementById('toast');t.textContent=txt;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2400);}
init();
</script>
