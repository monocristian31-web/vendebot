<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b0f;
  --bg2: #0d1117;
  --bg3: #131920;
  --surface: #161d26;
  --surface2: #1c2535;
  --border: rgba(255,255,255,.06);
  --border2: rgba(255,255,255,.11);
  --text: #f0ede8;
  --text2: #b8b2a8;
  --text3: #6b6560;
  --gold: #c9a84c;
  --gold2: #e8c96d;
  --gold-bg: rgba(201,168,76,.08);
  --gold-border: rgba(201,168,76,.22);
  --red: #e05252;
  --green: #4caf7d;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Outfit', system-ui, sans-serif;
  --r: 8px;
  --r2: 14px;
  --r3: 20px;
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --s1: 0 2px 8px rgba(0,0,0,.3);
  --s2: 0 8px 32px rgba(0,0,0,.4);
  --s3: 0 20px 60px rgba(0,0,0,.55);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior-y:none; }
::-webkit-scrollbar { width:0; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px;
  transition:opacity .6s var(--ease);
}
.ld-brand {
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.ld-name {
  font-family:var(--serif); font-size:42px; font-weight:300; color:var(--text);
  letter-spacing:.08em; opacity:0; animation:fadeUp .9s .1s var(--ease) forwards;
}
.ld-sub {
  font-size:10px; font-weight:500; letter-spacing:.35em; text-transform:uppercase;
  color:var(--text3); opacity:0; animation:fadeUp .9s .28s var(--ease) forwards;
}
.ld-line {
  width:1px; height:0; background:linear-gradient(to bottom, transparent, var(--gold), transparent);
  animation:lineGrow 1.4s .4s var(--ease) forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
@keyframes lineGrow { to{height:60px} }
#app { display:none; }

/* ── TOPBAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200; height:58px;
  background:rgba(8,11,15,.88);
  backdrop-filter:blur(24px) saturate(140%); -webkit-backdrop-filter:blur(24px) saturate(140%);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 18px;
}
.tb-brand { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
.tb-logo {
  width:34px; height:34px; border-radius:var(--r);
  border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; overflow:hidden; flex-shrink:0;
  background:var(--surface);
}
.tb-logo img { width:100%; height:100%; object-fit:cover; }
.tb-name {
  font-family:var(--serif); font-size:19px; font-weight:400; letter-spacing:.04em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text);
}
.tb-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.icon-btn {
  width:36px; height:36px; border-radius:var(--r); background:transparent;
  border:1px solid transparent; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text3); transition:all .18s var(--ease);
}
.icon-btn:hover { background:var(--surface); border-color:var(--border2); color:var(--text); }
.icon-btn svg { width:16px; height:16px; }

/* ── SEARCH ── */
.search-bar {
  position:fixed; top:58px; left:0; right:0; z-index:199;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:10px 16px 12px;
  transform:translateY(-110%); transition:transform .26s var(--ease);
}
.search-bar.open { transform:translateY(0); }
.search-inner { position:relative; }
.search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
.search-input {
  width:100%; height:40px; padding:0 38px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r2); font-family:var(--sans); font-size:14px;
  color:var(--text); outline:none; transition:all .18s var(--ease);
}
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:var(--gold); background:var(--surface2); }
.search-clear {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:var(--surface2); border:none; border-radius:50%; width:20px; height:20px;
  cursor:pointer; color:var(--text3); display:none; align-items:center; justify-content:center;
  font-size:10px; transition:all .15s;
}
.search-clear.show { display:flex; }

/* ── HERO ── */
.hero {
  margin-top:58px; position:relative; overflow:hidden;
  min-height:260px; display:flex; flex-direction:column; justify-content:flex-end;
}
.hero-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg, var(--bg2) 0%, var(--surface) 50%, var(--bg3) 100%);
}
.hero-pattern {
  position:absolute; inset:0; opacity:.04;
  background-image:
    linear-gradient(rgba(201,168,76,.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.5) 1px, transparent 1px);
  background-size:40px 40px;
}
.hero-banner-img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  opacity:.35;
}
.hero-vignette {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(8,11,15,.2) 0%, rgba(8,11,15,.85) 100%);
}
.hero-content {
  position:relative; z-index:2; padding:32px 20px 28px;
}
.hero-eyebrow {
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}
.status-dot {
  width:6px; height:6px; border-radius:50%; background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s infinite;
}
.status-dot.closed { background:var(--red); box-shadow:0 0 8px var(--red); animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-label {
  font-size:10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
  color:var(--text2);
}
.hero-name {
  font-family:var(--serif); font-size:40px; font-weight:300; color:var(--text);
  letter-spacing:.02em; line-height:1.05; margin-bottom:14px;
}
.hero-tags { display:flex; gap:8px; flex-wrap:wrap; }
.hero-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.06); border:1px solid var(--border2);
  color:var(--text2); font-size:11px; font-weight:500; letter-spacing:.08em;
  padding:5px 12px; border-radius:99px;
  backdrop-filter:blur(8px);
}
.hero-tag.gold { background:var(--gold-bg); border-color:var(--gold-border); color:var(--gold); }

/* ── INFO STRIP ── */
.info-strip {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; overflow-x:auto; scrollbar-width:none;
}
.info-strip::-webkit-scrollbar { display:none; }
.info-item {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:14px 20px; border-right:1px solid var(--border);
}
.info-item:last-child { border-right:none; }
.info-icon { font-size:16px; flex-shrink:0; opacity:.8; }
.info-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); font-weight:500; display:block; margin-bottom:2px; }
.info-value { font-size:13px; font-weight:500; color:var(--text2); }

/* ── DESTACADOS ── */
.featured-section {
  padding:28px 0 4px;
  border-bottom:1px solid var(--border);
}
.section-header {
  padding:0 20px 18px;
  display:flex; align-items:baseline; justify-content:space-between;
}
.section-title {
  font-family:var(--serif); font-size:22px; font-weight:400;
  color:var(--text); letter-spacing:.02em;
}
.section-sub { font-size:11px; color:var(--text3); font-weight:400; }
.featured-scroll {
  display:flex; gap:14px; overflow-x:auto; padding:0 20px 20px; scrollbar-width:none;
}
.featured-scroll::-webkit-scrollbar { display:none; }
.feat-card {
  flex-shrink:0; width:160px; border-radius:var(--r2); overflow:hidden;
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; transition:all .22s var(--ease); position:relative;
}
.feat-card:hover { border-color:var(--gold-border); transform:translateY(-4px); box-shadow:var(--s2); }
.feat-card:active { transform:scale(.97); }
.feat-img {
  width:100%; height:120px; object-fit:cover; display:block;
  transition:transform .4s var(--ease);
}
.feat-card:hover .feat-img { transform:scale(1.06); }
.feat-emoji {
  width:100%; height:120px; display:flex; align-items:center; justify-content:center;
  font-size:40px; background:var(--surface2);
}
.feat-body { padding:12px 13px 14px; }
.feat-name { font-size:12px; font-weight:500; color:var(--text2); line-height:1.4; margin-bottom:6px; }
.feat-price { font-family:var(--serif); font-size:17px; font-weight:400; color:var(--gold); }
.feat-badge {
  position:absolute; top:10px; right:10px;
  background:var(--gold); color:var(--bg);
  font-size:8px; font-weight:700; padding:3px 8px;
  border-radius:99px; letter-spacing:.1em; text-transform:uppercase;
}

/* ── CAT NAV ── */
.cat-nav {
  position:sticky; top:58px; z-index:100;
  background:rgba(8,11,15,.92);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:top .26s var(--ease);
}
.cat-nav.search-open { top:110px; }
.cat-inner {
  display:flex; gap:2px; padding:10px 16px; overflow-x:auto; scrollbar-width:none;
}
.cat-inner::-webkit-scrollbar { display:none; }
.cat-btn {
  flex-shrink:0; padding:7px 18px; border-radius:99px;
  font-family:var(--sans); font-size:12px; font-weight:500; letter-spacing:.04em;
  border:1px solid transparent; cursor:pointer; transition:all .18s var(--ease);
  color:var(--text3); background:transparent; white-space:nowrap;
}
.cat-btn:hover { color:var(--text2); background:var(--surface); border-color:var(--border2); }
.cat-btn.active {
  background:var(--gold-bg); color:var(--gold);
  border-color:var(--gold-border);
}

/* ── CONTENIDO ── */
.content { max-width:800px; margin:0 auto; padding:8px 0 180px; }
.cat-section { padding:28px 0 4px; }
.cat-title {
  font-family:var(--serif); font-size:24px; font-weight:300; letter-spacing:.04em;
  color:var(--text); padding:0 20px 16px;
  display:flex; align-items:center; gap:14px;
}
.cat-title::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right, var(--border2), transparent);
}
.products-grid { display:flex; flex-direction:column; }

/* ── PRODUCTO ROW ── */
.prod-row {
  display:flex; align-items:center; gap:16px;
  padding:18px 20px; background:transparent;
  border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .18s var(--ease);
  position:relative;
}
.prod-row:last-child { border-bottom:none; }
.prod-row:hover { background:var(--surface); }
.prod-row:active { background:var(--surface2); }
.prod-row.agotado { opacity:.35; pointer-events:none; }
.prod-info { flex:1; min-width:0; }
.prod-name {
  font-size:15px; font-weight:500; color:var(--text); line-height:1.3;
  margin-bottom:5px;
}
.prod-desc {
  font-size:13px; color:var(--text3); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  margin-bottom:10px;
}
.prod-foot { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.prod-price {
  font-family:var(--serif); font-size:18px; font-weight:400; color:var(--text);
}
.prod-from { font-family:var(--sans); font-size:11px; color:var(--text3); font-weight:400; margin-right:2px; }
.in-cart-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--gold-bg); border:1px solid var(--gold-border);
  color:var(--gold); font-size:11px; font-weight:600; padding:2px 9px; border-radius:99px;
}
.agotado-badge {
  display:inline-flex; align-items:center;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text3); font-size:11px; font-weight:500; padding:2px 9px; border-radius:99px;
}
.prod-thumb {
  flex-shrink:0; width:84px; height:84px; border-radius:var(--r2);
  overflow:hidden; background:var(--surface2); position:relative;
  border:1px solid var(--border);
}
.prod-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .4s var(--ease); }
.prod-row:hover .prod-thumb img { transform:scale(1.08); }
.thumb-emoji { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:30px; }
.add-dot {
  position:absolute; bottom:-3px; right:-3px;
  width:24px; height:24px; border-radius:50%;
  background:var(--gold); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; box-shadow:0 2px 8px rgba(201,168,76,.4);
  transition:all .18s var(--spring);
}
.prod-row:hover .add-dot { transform:scale(1.2); background:var(--gold2); }

/* ── BÚSQUEDA ── */
.search-results { padding:20px 20px 0; }
.sr-count { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); font-weight:500; margin-bottom:14px; }
.no-results { text-align:center; padding:72px 20px; }
.no-results-icon { font-size:48px; margin-bottom:16px; opacity:.3; }
.no-results h3 { font-family:var(--serif); font-size:22px; font-weight:300; color:var(--text2); margin-bottom:8px; }
.no-results p { font-size:13px; color:var(--text3); }

/* ── FAB ── */
.cart-fab {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(140px);
  z-index:190; width:calc(100% - 32px); max-width:460px;
  transition:transform .42s var(--spring); pointer-events:none;
}
.cart-fab.on { transform:translateX(-50%) translateY(0); pointer-events:all; }
.fab-body {
  background:var(--text); color:var(--bg);
  border-radius:var(--r3); padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; box-shadow:var(--s3);
  transition:transform .14s, box-shadow .14s;
  position:relative; overflow:hidden;
}
.fab-body::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(201,168,76,.12), transparent);
  pointer-events:none;
}
.fab-body:hover { transform:translateY(-2px); box-shadow:0 24px 70px rgba(0,0,0,.65); }
.fab-body:active { transform:scale(.985); }
.fab-left { display:flex; align-items:center; gap:12px; }
.fab-count {
  width:26px; height:26px; border-radius:50%;
  background:var(--bg); color:var(--text);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0;
}
.fab-label { font-size:14px; font-weight:600; color:var(--bg); }
.fab-total { font-family:var(--serif); font-size:20px; font-weight:400; color:var(--bg); letter-spacing:.01em; }

/* ── SHEET PRODUCTO ── */
.overlay {
  position:fixed; inset:0; z-index:300; background:transparent;
  pointer-events:none; transition:background .3s;
  display:flex; align-items:flex-end; justify-content:center;
}
.overlay.open { background:rgba(0,0,0,.72); pointer-events:all; }
.sheet {
  background:var(--bg2); border-radius:24px 24px 0 0;
  width:100%; max-width:580px; max-height:93dvh;
  display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -12px 60px rgba(0,0,0,.5);
  border-top:1px solid var(--border2);
}
.overlay.open .sheet { transform:translateY(0); }
.sh-handle { width:32px; height:3px; background:var(--border2); border-radius:2px; margin:14px auto 0; flex-shrink:0; }
.sh-scroll { flex:1; overflow-y:auto; overscroll-behavior:contain; }
.sh-img { width:100%; height:260px; object-fit:cover; display:block; }
.sh-emoji { width:100%; height:200px; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:80px; }
.sh-body { padding:24px 20px 8px; }
.sh-name { font-family:var(--serif); font-size:30px; font-weight:300; color:var(--text); letter-spacing:.02em; line-height:1.1; margin-bottom:8px; }
.sh-desc { font-size:14px; color:var(--text3); line-height:1.7; margin-bottom:14px; }
.sh-price { font-family:var(--serif); font-size:26px; font-weight:300; color:var(--gold); letter-spacing:.01em; }
.sh-price small { font-family:var(--sans); font-size:12px; color:var(--text3); font-weight:400; margin-left:6px; }
.divider { height:1px; background:var(--border); margin:20px 0; }
.sh-footer {
  padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0;
}

/* ── MITAD Y MITAD ── */
.mm-title { font-family:var(--serif); font-size:18px; font-weight:400; color:var(--text); margin-bottom:4px; }
.mm-sub { font-size:12px; color:var(--text3); margin-bottom:18px; }
.mm-visual { display:flex; justify-content:center; margin-bottom:22px; }
.mm-pizza { position:relative; width:120px; height:120px; border-radius:50%; background:var(--surface); border:2px solid var(--gold-border); overflow:hidden; box-shadow:0 4px 24px rgba(201,168,76,.15); }
.mm-half { position:absolute; top:0; width:50%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text2); text-align:center; padding:6px; line-height:1.2; word-break:break-word; transition:background .2s; }
.mm-left { left:0; background:rgba(201,168,76,.06); border-right:1px dashed var(--gold-border); }
.mm-right { right:0; background:rgba(201,168,76,.1); }
.mm-block { margin-bottom:20px; }
.mm-block-title { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.mm-num { width:22px; height:22px; border-radius:50%; border:1px solid var(--gold-border); background:var(--gold-bg); color:var(--gold); display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.mm-opts { display:flex; flex-wrap:wrap; gap:8px; }
.mm-opt { padding:7px 15px; border-radius:99px; border:1px solid var(--border2); font-size:13px; font-weight:400; cursor:pointer; transition:all .16s var(--ease); background:var(--surface); color:var(--text2); }
.mm-opt:hover { border-color:var(--gold-border); color:var(--gold); }
.mm-opt.sel { border-color:var(--gold); background:var(--gold-bg); color:var(--gold); font-weight:600; }

/* ── MODIFICADORES ── */
.mod-group { margin-bottom:24px; }
.mod-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:3px; }
.mod-req { display:inline-block; background:rgba(224,82,82,.1); border:1px solid rgba(224,82,82,.2); color:var(--red); font-size:9px; font-weight:700; padding:2px 8px; border-radius:99px; margin-left:8px; vertical-align:middle; letter-spacing:.08em; text-transform:uppercase; }
.mod-sub { font-size:12px; color:var(--text3); margin-bottom:14px; }
.opt-row { display:flex; align-items:center; justify-content:space-between; padding:13px 14px; border-radius:var(--r); border:1px solid var(--border); margin-bottom:8px; cursor:pointer; transition:all .16s var(--ease); gap:12px; background:var(--surface); }
.opt-row:hover { border-color:var(--border2); background:var(--surface2); }
.opt-row.sel { border-color:var(--gold-border); background:var(--gold-bg); }
.opt-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.opt-ctrl { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:9px; color:transparent; transition:all .16s; flex-shrink:0; }
.opt-ctrl.sq { border-radius:4px; }
.opt-row.sel .opt-ctrl { background:var(--gold); border-color:var(--gold); color:var(--bg); }
.opt-name { font-size:14px; font-weight:400; color:var(--text2); }
.opt-price { font-size:12px; color:var(--text3); font-weight:500; flex-shrink:0; }
.opt-right-wrap { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.opt-qty-ctrl { display:flex; align-items:center; gap:6px; background:var(--surface2); border-radius:99px; padding:3px 7px; }
.oq-btn { width:22px; height:22px; border-radius:50%; border:none; background:var(--border); color:var(--text); font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.oq-btn:hover { background:var(--border2); }
.oq-num { color:var(--text); font-size:13px; font-weight:600; min-width:14px; text-align:center; }

/* ── QTY + BTN ── */
.qty-row { display:flex; align-items:center; justify-content:space-between; margin:8px 0 22px; }
.qty-label { font-size:14px; font-weight:500; color:var(--text2); }
.qty-ctrl { display:flex; align-items:center; gap:18px; }
.qty-btn {
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--border2); background:var(--surface);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:300; color:var(--text); transition:all .16s;
}
.qty-btn:hover:not(:disabled) { border-color:var(--gold-border); background:var(--gold-bg); color:var(--gold); }
.qty-btn:disabled { opacity:.25; cursor:not-allowed; }
.qty-val { font-family:var(--serif); font-size:24px; font-weight:300; min-width:28px; text-align:center; color:var(--text); }
.add-btn {
  width:100%; padding:15px 20px; border-radius:var(--r2);
  background:var(--text); color:var(--bg); border:none;
  font-family:var(--sans); font-size:15px; font-weight:600; letter-spacing:.02em;
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  transition:all .18s var(--ease); position:relative; overflow:hidden;
}
.add-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,168,76,.15),transparent); pointer-events:none; }
.add-btn:hover { background:#e8e3db; transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
.add-btn:active { transform:scale(.99); }
.add-btn:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; transform:none; box-shadow:none; }

/* ── CARRITO ── */
.cart-overlay { position:fixed; inset:0; z-index:400; background:transparent; pointer-events:none; transition:background .3s; display:flex; align-items:flex-end; justify-content:center; }
.cart-overlay.open { background:rgba(0,0,0,.72); pointer-events:all; }
.cart-sheet {
  background:var(--bg2); border-radius:24px 24px 0 0;
  width:100%; max-width:580px; max-height:92dvh;
  display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -12px 60px rgba(0,0,0,.5);
  border-top:1px solid var(--border2);
}
.cart-overlay.open .cart-sheet { transform:translateY(0); }
.cs-handle { width:32px; height:3px; background:var(--border2); border-radius:2px; margin:14px auto 0; flex-shrink:0; }
.cs-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.cs-title { font-family:var(--serif); font-size:24px; font-weight:300; color:var(--text); letter-spacing:.02em; }
.cs-close { width:30px; height:30px; border-radius:50%; background:var(--surface); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:12px; transition:all .16s; }
.cs-close:hover { background:var(--surface2); color:var(--text); }
.cs-body { flex:1; overflow-y:auto; overscroll-behavior:contain; }
.cs-footer { flex-shrink:0; border-top:1px solid var(--border); background:var(--bg2); }
.cart-item { display:flex; gap:14px; padding:16px 20px; border-bottom:1px solid var(--border); align-items:flex-start; }
.cart-item:last-child { border-bottom:none; }
.ci-thumb { width:60px; height:60px; border-radius:var(--r); overflow:hidden; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:24px; border:1px solid var(--border); }
.ci-thumb img { width:100%; height:100%; object-fit:cover; }
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:14px; font-weight:500; color:var(--text); margin-bottom:3px; }
.ci-mods { font-size:11px; color:var(--text3); line-height:1.5; margin-bottom:10px; }
.ci-row { display:flex; align-items:center; justify-content:space-between; }
.ci-price { font-family:var(--serif); font-size:17px; font-weight:300; color:var(--text); }
.ci-qty { display:flex; align-items:center; gap:10px; }
.cq-btn { width:28px; height:28px; border-radius:50%; border:1px solid var(--border2); background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text2); transition:all .15s; }
.cq-btn:hover { border-color:var(--gold-border); color:var(--gold); }
.cq-btn.rm:hover { border-color:rgba(224,82,82,.4); color:var(--red); }
.cq-num { font-family:var(--serif); font-size:16px; font-weight:400; min-width:16px; text-align:center; color:var(--text); }
.notes-section { padding:16px 20px; border-bottom:1px solid var(--border); }
.notes-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); font-weight:500; margin-bottom:8px; display:block; }
.notes-textarea { width:100%; padding:11px 14px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surface); font-family:var(--sans); font-size:13px; color:var(--text); outline:none; resize:none; transition:border .18s; }
.notes-textarea::placeholder { color:var(--text3); }
.notes-textarea:focus { border-color:var(--gold-border); }
.cart-summary { padding:18px 20px 6px; }
.sum-row { display:flex; justify-content:space-between; font-size:13px; color:var(--text3); margin-bottom:10px; }
.sum-row span:last-child { color:var(--text2); }
.sum-total { display:flex; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border); margin-top:6px; }
.sum-total span:first-child { font-family:var(--serif); font-size:20px; font-weight:300; color:var(--text); }
.sum-total span:last-child { font-family:var(--serif); font-size:22px; font-weight:300; color:var(--gold); }
.wa-btn {
  width:100%; padding:15px 20px; margin-top:14px; margin-bottom:2px;
  background:#25D366; color:#fff; border:none; border-radius:var(--r2);
  font-family:var(--sans); font-size:15px; font-weight:600; letter-spacing:.02em;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
  transition:all .18s var(--ease); box-shadow:0 4px 20px rgba(37,211,102,.25);
}
.wa-btn:hover { background:#1eba5a; transform:translateY(-1px); box-shadow:0 8px 28px rgba(37,211,102,.35); }
.wa-btn:active { transform:scale(.99); }
.cart-empty { text-align:center; padding:72px 20px; }
.ce-icon { font-size:52px; margin-bottom:16px; opacity:.25; }
.ce-title { font-family:var(--serif); font-size:22px; font-weight:300; color:var(--text2); margin-bottom:8px; }
.ce-sub { font-size:13px; color:var(--text3); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:108px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface2); border:1px solid var(--border2); color:var(--text);
  padding:10px 22px; border-radius:99px;
  font-size:13px; font-weight:500; z-index:9999;
  opacity:0; pointer-events:none; transition:all .22s var(--ease);
  white-space:nowrap; box-shadow:var(--s2);
}
.toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── ANIMACIONES ENTRADA ── */
@keyframes slideIn {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:none; }
}
.prod-row { animation:slideIn .4s var(--ease) both; }

/* ── RESPONSIVE ── */
@media(min-width:560px) {
  .hero { min-height:300px; }
  .prod-thumb { width:92px; height:92px; }
}
@media(min-width:700px) {
  .products-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
  .prod-row { border-right:1px solid var(--border); }
  .prod-row:nth-child(2n) { border-right:none; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-brand">
    <div class="ld-name" id="ldName">Cargando</div>
    <div class="ld-sub">Menú digital</div>
  </div>
  <div class="ld-line"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo" id="tbLogo"></div>
      <span class="tb-name" id="tbName">Cargando...</span>
    </div>
    <div class="tb-actions">
      <button class="icon-btn" onclick="toggleSearch()" title="Buscar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div class="search-bar" id="searchBar">
    <div class="search-inner">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar en el menú..." oninput="buscar(this.value)">
      <button class="search-clear" id="searchClear" onclick="limpiarBusqueda()">✕</button>
    </div>
  </div>

  <div id="heroWrap"></div>
  <div id="infoStrip" class="info-strip"></div>
  <div id="featuredWrap"></div>
  <div class="cat-nav" id="catNav" style="display:none"><div class="cat-inner" id="catInner"></div></div>
  <div class="content" id="content"></div>
</div>

<div class="cart-fab" id="cartFab" onclick="abrirCarrito()">
  <div class="fab-body">
    <div class="fab-left">
      <div class="fab-count" id="fabCount">0</div>
      <span class="fab-label">Ver pedido</span>
    </div>
    <span class="fab-total" id="fabTotal">$0.00</span>
  </div>
</div>

<div class="overlay" id="prodOverlay" onclick="if(event.target===this)cerrarProd()">
  <div class="sheet">
    <div class="sh-scroll"><div class="sh-handle"></div><div id="shContent"></div></div>
    <div class="sh-footer"><button class="add-btn" id="addBtn" onclick="agregarAlCarrito()"><span>Agregar al pedido</span><span id="addPrice">$0.00</span></button></div>
  </div>
</div>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="cart-sheet">
    <div class="cs-handle"></div>
    <div class="cs-header">
      <span class="cs-title">Tu pedido</span>
      <button class="cs-close" onclick="cerrarCarrito()">✕</button>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-footer" id="csFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SLUG = window.location.pathname.split('/')[2];
const BASE = window.location.origin;
let neg = null, cart = [], prod = null, sels = {}, qty = 1, notas = '', searchOpen = false;
let mitadSels = { 1: null, 2: null };

async function init() {
  try {
    const r = await fetch(BASE + '/catalogo-data/' + SLUG);
    if (!r.ok) { errLoader('Negocio no encontrado'); return; }
    neg = await r.json();
    renderAll();
    fadeLoader();
  } catch(e) { errLoader('Error al cargar el menú'); }
}

function fadeLoader() {
  const l = document.getElementById('loader');
  l.style.opacity = '0';
  setTimeout(() => { l.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 500);
}

function errLoader(msg) {
  document.getElementById('loader').innerHTML =
    '<div style="text-align:center;color:#6b6560;font-family:system-ui">' +
    '<div style="font-size:40px;margin-bottom:16px;opacity:.4">✦</div>' +
    '<div style="font-size:15px;font-weight:500">' + msg + '</div></div>';
}

function renderAll() {
  document.title = neg.nombre + ' — Menú';
  const ln = document.getElementById('ldName'); if (ln) ln.textContent = neg.nombre;
  document.getElementById('tbName').textContent = neg.nombre;
  const tl = document.getElementById('tbLogo');
  tl.innerHTML = neg.logo ? '<img src="' + neg.logo + '" alt="">' : (neg.emoji || '🛍️');
  renderHero(); renderInfoStrip(); renderFeatured(); renderCatalogo();
}

function estaAbierto() {
  if (typeof neg.esta_abierto === 'boolean') return neg.esta_abierto;
  if (neg.horarios) {
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
    const h = neg.horarios[dias[ec.getDay()]];
    if (!h || !h.abierto || !h.desde || !h.hasta) return false;
    const [dH,dM] = h.desde.split(':').map(Number);
    const [hH,hM] = h.hasta.split(':').map(Number);
    const min = ec.getHours()*60+ec.getMinutes();
    return min >= dH*60+dM && min < hH*60+hM;
  }
  const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
  return ec.getHours() >= 8 && ec.getHours() < 18;
}

function obtenerHorarioHoy() {
  if (!neg.horarios) return null;
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ec = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
  const h = neg.horarios[dias[ec.getDay()]];
  if (!h || !h.abierto) return null;
  return h.desde + ' — ' + h.hasta;
}

function renderHero() {
  const ab = estaAbierto();
  const horario = obtenerHorarioHoy();
  const w = document.getElementById('heroWrap');
  const statusDot = '<div class="status-dot' + (ab ? '' : ' closed') + '"></div>';
  const tags = [
    (neg.tipo ? '<div class="hero-tag">' + neg.tipo + '</div>' : ''),
    (horario ? '<div class="hero-tag">🕐 ' + horario + '</div>' : ''),
  ].filter(Boolean).join('');

  w.innerHTML =
    '<div class="hero">' +
      '<div class="hero-bg"></div>' +
      '<div class="hero-pattern"></div>' +
      (neg.banner ? '<img class="hero-banner-img" src="' + neg.banner + '" alt="">' : '') +
      '<div class="hero-vignette"></div>' +
      '<div class="hero-content">' +
        '<div class="hero-eyebrow">' + statusDot + '<span class="status-label">' + (ab ? 'Abierto ahora' : 'Cerrado') + '</span></div>' +
        '<div class="hero-name">' + (neg.emoji ? neg.emoji + ' ' : '') + neg.nombre + '</div>' +
        '<div class="hero-tags">' + tags + '</div>' +
      '</div>' +
    '</div>';
}

function renderInfoStrip() {
  const s = document.getElementById('infoStrip');
  const items = [];
  if (neg.tiempo_entrega) items.push('<div class="info-item"><span class="info-icon">🛵</span><div><span class="info-label">Entrega estimada</span><span class="info-value">' + neg.tiempo_entrega + '</span></div></div>');
  items.push('<div class="info-item"><span class="info-icon">💰</span><div><span class="info-label">Costo de delivery</span><span class="info-value">' + (neg.costo_delivery || 'Varía según distancia') + '</span></div></div>');
  if (neg.pedido_minimo) items.push('<div class="info-item"><span class="info-icon">🛒</span><div><span class="info-label">Pedido mínimo</span><span class="info-value">$' + neg.pedido_minimo + '</span></div></div>');
  s.innerHTML = items.join('');
  if (!items.length) s.style.display = 'none';
}

function renderFeatured() {
  const pops = (neg.catalogo || []).filter(p => p.activo !== false && p.destacado);
  if (!pops.length) return;
  document.getElementById('featuredWrap').innerHTML =
    '<div class="featured-section">' +
      '<div class="section-header"><span class="section-title">Destacados</span><span class="section-sub">Los más pedidos</span></div>' +
      '<div class="featured-scroll">' +
        pops.map(p =>
          '<div class="feat-card" onclick="abrirProd(\'' + String(p.id) + '\')">' +
            (p.imagen ? '<img class="feat-img" src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="feat-emoji">' + (p.emoji||'📦') + '</div>') +
            '<div class="feat-body">' +
              '<div class="feat-name">' + p.nombre + '</div>' +
              '<div class="feat-price">$' + p.precio.toFixed(2) + '</div>' +
            '</div>' +
            '<div class="feat-badge">Popular</div>' +
          '</div>'
        ).join('') +
      '</div>' +
    '</div>';
}

function slugify(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,''); }

function renderCatalogo(filtro) {
  filtro = (filtro || '').toLowerCase().trim();
  const todos = (neg.catalogo || []).filter(p => p.activo !== false);
  const prods = filtro
    ? todos.filter(p => p.nombre.toLowerCase().includes(filtro) || (p.descripcion||'').toLowerCase().includes(filtro))
    : todos;

  if (filtro) {
    document.getElementById('catNav').style.display = 'none';
    document.getElementById('content').innerHTML = prods.length
      ? '<div class="search-results"><div class="sr-count">' + prods.length + ' resultado' + (prods.length!==1?'s':'') + '</div><div class="products-grid">' + prods.map((p,i) => prodHTML(p,i)).join('') + '</div></div>'
      : '<div class="no-results"><div class="no-results-icon">🔍</div><h3>Sin resultados</h3><p>No encontramos "' + filtro + '"</p></div>';
    return;
  }

  const cats = {};
  prods.forEach(p => { const c = p.categoria || 'Menú'; if (!cats[c]) cats[c] = []; cats[c].push(p); });
  const names = Object.keys(cats);

  if (names.length > 1) {
    document.getElementById('catNav').style.display = 'block';
    document.getElementById('catInner').innerHTML = names.map((c,i) => '<button class="cat-btn' + (i===0?' active':'') + '" onclick="irACat(\'' + c + '\',this)">' + c + '</button>').join('');
  } else {
    document.getElementById('catNav').style.display = 'none';
  }

  let delay = 0;
  document.getElementById('content').innerHTML = names.map(c =>
    '<div class="cat-section" id="cs-' + slugify(c) + '">' +
      '<div class="cat-title">' + c + '</div>' +
      '<div class="products-grid">' + cats[c].map((p,i) => prodHTML(p, delay++)).join('') + '</div>' +
    '</div>'
  ).join('');

  setTimeout(() => document.querySelectorAll('.cat-section').forEach(s => io.observe(s)), 80);
}

function prodHTML(p, idx) {
  const agotado = p.stock === 0;
  const enCarrito = cart.filter(i => i.id === p.id).reduce((s,i) => s + i.cantidad, 0);
  const tieneMods = (p.modificadores||[]).length > 0;
  return '<div class="prod-row' + (agotado?' agotado':'') + '" onclick="abrirProd(\'' + String(p.id) + '\')" style="animation-delay:' + (idx * 40) + 'ms">' +
    '<div class="prod-info">' +
      '<div class="prod-name">' + p.nombre + '</div>' +
      (p.descripcion ? '<div class="prod-desc">' + p.descripcion + '</div>' : '') +
      '<div class="prod-foot">' +
        '<span class="prod-price">' + (tieneMods ? '<span class="prod-from">Desde </span>' : '') + '$' + p.precio.toFixed(2) + '</span>' +
        (enCarrito > 0 ? '<span class="in-cart-badge">✦ ' + enCarrito + ' en pedido</span>' : '') +
        (agotado ? '<span class="agotado-badge">Agotado</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="prod-thumb">' +
      (p.imagen ? '<img src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="thumb-emoji">' + (p.emoji||'📦') + '</div>') +
      (!agotado ? '<div class="add-dot">+</div>' : '') +
    '</div>' +
  '</div>';
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('cs-','');
      document.querySelectorAll('.cat-btn').forEach(b => {
        const match = slugify(b.textContent) === id;
        b.classList.toggle('active', match);
        if (match) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      });
    }
  });
}, { rootMargin:'-90px 0px -55% 0px' });

function irACat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('cs-' + slugify(cat));
  if (el) window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 106, behavior:'smooth'});
}

// ── MODAL PRODUCTO ──
function abrirProd(id) {
  prod = (neg.catalogo||[]).find(x => String(x.id) === String(id));
  if (!prod) return;
  sels = {}; qty = 1; mitadSels = {1:null, 2:null};
  (prod.modificadores||[]).forEach((g,i) => { sels[i] = g.tipo === 'unico' ? null : []; });
  renderSheet();
  document.getElementById('prodOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarProd() {
  document.getElementById('prodOverlay').classList.remove('open');
  document.body.style.overflow = '';
  prod = null;
}

function renderSheet() {
  const p = prod;
  const mods = p.modificadores || [];
  let html = (p.imagen ? '<img class="sh-img" src="' + p.imagen + '" alt="' + p.nombre + '">' : '<div class="sh-emoji">' + (p.emoji||'📦') + '</div>');
  html += '<div class="sh-body">';
  html += '<div class="sh-name">' + p.nombre + '</div>';
  if (p.descripcion) html += '<div class="sh-desc">' + p.descripcion + '</div>';
  html += '<div class="sh-price" id="shPrice">$' + p.precio.toFixed(2) + '<small>por unidad</small></div>';

  if (p.mitad_mitad && p.ingredientes_mitad?.length) {
    html += '<div class="divider"></div><div class="mm-title">Personaliza tu pizza</div><div class="mm-sub">Elige los ingredientes de cada mitad</div>';
    html += '<div class="mm-visual"><div class="mm-pizza"><div class="mm-half mm-left" id="mmVisL">½</div><div class="mm-half mm-right" id="mmVisR">½</div></div></div>';
    [1,2].forEach(m => {
      html += '<div class="mm-block"><div class="mm-block-title"><span class="mm-num">' + m + '</span> Mitad ' + m + '</div>';
      html += '<div class="mm-opts" id="mmOpts' + m + '">';
      p.ingredientes_mitad.forEach((ing,idx) => {
        html += '<div class="mm-opt" id="mm-' + m + '-' + idx + '" onclick="selMitad(' + m + ',' + idx + ',\'' + ing.replace(/'/g,"\\'") + '\')">' + ing + '</div>';
      });
      html += '</div></div>';
    });
    html += '<div class="divider"></div>';
  }

  if (mods.length) html += '<div class="divider"></div>';
  mods.forEach((g,gi) => {
    html += '<div class="mod-group"><div class="mod-title">' + g.nombre + (g.obligatorio ? '<span class="mod-req">Requerido</span>' : '') + '</div>';
    html += '<div class="mod-sub">' + (g.tipo==='unico' ? 'Elige una opción' : 'Puedes elegir varias') + '</div>';
    g.opciones.forEach((op,oi) => {
      html += '<div class="opt-row" id="op-' + gi + '-' + oi + '" onclick="toggleOpt(' + gi + ',' + oi + ',\'' + g.tipo + '\')">';
      html += '<div class="opt-left"><div class="opt-ctrl' + (g.tipo==='unico'?'':' sq') + '" id="oc-' + gi + '-' + oi + '"></div><span class="opt-name">' + op.nombre + '</span></div>';
      html += '<div class="opt-right-wrap">';
      html += '<div class="opt-qty-ctrl" id="oqc-' + gi + '-' + oi + '" style="display:none" onclick="event.stopPropagation()">';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',-1,\'' + g.tipo + '\')">−</button>';
      html += '<span class="oq-num" id="oqn-' + gi + '-' + oi + '">1</span>';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',1,\'' + g.tipo + '\')">+</button>';
      html += '</div>';
      html += '<span class="opt-price">' + (op.precio > 0 ? '+$'+op.precio.toFixed(2) : op.precio < 0 ? '-$'+Math.abs(op.precio).toFixed(2) : 'Incluido') + '</span>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  if (mods.length) html += '<div class="divider"></div>';
  html += '<div class="qty-row"><span class="qty-label">Cantidad</span><div class="qty-ctrl"><button class="qty-btn" id="qm" onclick="cambiarQty(-1)" disabled>−</button><span class="qty-val" id="qv">1</span><button class="qty-btn" onclick="cambiarQty(1)">+</button></div></div>';
  html += '</div>';
  document.getElementById('shContent').innerHTML = html;
  document.getElementById('addPrice').textContent = '$' + p.precio.toFixed(2);
}

function toggleOpt(gi,oi,tipo) {
  if (tipo === 'unico') {
    if (sels[gi] !== null) {
      const prev = sels[gi].oi;
      document.getElementById('op-'+gi+'-'+prev)?.classList.remove('sel');
      const oc = document.getElementById('oc-'+gi+'-'+prev); if(oc) oc.textContent='';
      const oqc = document.getElementById('oqc-'+gi+'-'+prev); if(oqc) oqc.style.display='none';
      const opr = document.getElementById('opr-'+gi+'-'+prev); if(opr) opr.style.display='';
    }
    if (sels[gi] !== null && sels[gi].oi === oi) { sels[gi] = null; }
    else {
      sels[gi] = {oi, qty:1};
      document.getElementById('op-'+gi+'-'+oi).classList.add('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '✓';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'flex';
      const opr2 = document.getElementById('opr-'+gi+'-'+oi); if(opr2) opr2.style.display='none';
      document.getElementById('oqn-'+gi+'-'+oi).textContent = '1';
    }
  } else {
    if (!Array.isArray(sels[gi])) sels[gi] = [];
    const idx = sels[gi].findIndex(s => s.oi === oi);
    if (idx >= 0) {
      sels[gi].splice(idx,1);
      document.getElementById('op-'+gi+'-'+oi).classList.remove('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'none';
      const opr3 = document.getElementById('opr-'+gi+'-'+oi); if(opr3) opr3.style.display='';
    } else {
      sels[gi].push({oi, qty:1});
      document.getElementById('op-'+gi+'-'+oi).classList.add('sel');
      document.getElementById('oc-'+gi+'-'+oi).textContent = '✓';
      document.getElementById('oqc-'+gi+'-'+oi).style.display = 'flex';
      const opr4 = document.getElementById('opr-'+gi+'-'+oi); if(opr4) opr4.style.display='none';
      document.getElementById('oqn-'+gi+'-'+oi).textContent = '1';
    }
  }
  actualizarPrecioSheet();
}

function cambiarQtyOpt(gi,oi,delta,tipo) {
  const entry = tipo === 'unico' ? sels[gi] : (sels[gi]||[]).find(s => s.oi===oi);
  if (!entry) return;
  entry.qty = Math.max(1, entry.qty + delta);
  document.getElementById('oqn-'+gi+'-'+oi).textContent = entry.qty;
  actualizarPrecioSheet();
}

function calcExtra() {
  let e = 0;
  (prod.modificadores||[]).forEach((g,gi) => {
    const s = sels[gi];
    if (g.tipo==='unico' && s !== null) e += (g.opciones[s.oi]?.precio||0) * s.qty;
    else if (Array.isArray(s)) s.forEach(({oi,qty}) => { e += (g.opciones[oi]?.precio||0) * qty; });
  });
  return e;
}

function actualizarPrecioSheet() {
  const extra = calcExtra();
  const total = (prod.precio + extra) * qty;
  document.getElementById('shPrice').innerHTML = '$' + (prod.precio + extra).toFixed(2) + '<small>por unidad</small>';
  document.getElementById('addPrice').textContent = '$' + total.toFixed(2);
}

function cambiarQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qv').textContent = qty;
  document.getElementById('qm').disabled = qty <= 1;
  actualizarPrecioSheet();
}

function selMitad(mitad, idx, nombre) {
  mitadSels[mitad] = {idx, nombre};
  document.querySelectorAll('#mmOpts' + mitad + ' .mm-opt').forEach(el => el.classList.remove('sel'));
  document.getElementById('mm-'+mitad+'-'+idx)?.classList.add('sel');
  const vL = document.getElementById('mmVisL'), vR = document.getElementById('mmVisR');
  if (vL && mitad===1) vL.textContent = mitadSels[1]?.nombre?.split(' ')[0] || '½';
  if (vR && mitad===2) vR.textContent = mitadSels[2]?.nombre?.split(' ')[0] || '½';
}

function agregarAlCarrito() {
  if (prod.mitad_mitad && prod.ingredientes_mitad?.length) {
    if (!mitadSels[1]) { toast('Elige el ingrediente para la Mitad 1'); return; }
    if (!mitadSels[2]) { toast('Elige el ingrediente para la Mitad 2'); return; }
  }
  const mods = prod.modificadores || [];
  for (let gi = 0; gi < mods.length; gi++) {
    const g = mods[gi]; if (!g.obligatorio) continue;
    const s = sels[gi];
    if (g.tipo==='unico' ? s==null : !s?.length) { toast('Elige una opción en: ' + g.nombre); return; }
  }
  const extra = calcExtra();
  const modsGuardados = [];
  if (prod.mitad_mitad && mitadSels[1] && mitadSels[2]) {
    modsGuardados.push({grupo:'Mitades', opciones:['Mitad 1: '+mitadSels[1].nombre, 'Mitad 2: '+mitadSels[2].nombre]});
  }
  mods.forEach((g,gi) => {
    const s = sels[gi]; let ops = [];
    if (g.tipo==='unico' && s !== null) ops = [s.qty>1 ? g.opciones[s.oi].nombre+' x'+s.qty : g.opciones[s.oi].nombre];
    else if (Array.isArray(s)) ops = s.map(({oi,qty}) => qty>1 ? g.opciones[oi].nombre+' x'+qty : g.opciones[oi].nombre);
    if (ops.length) modsGuardados.push({grupo:g.nombre, opciones:ops});
  });
  const _nombre = prod.nombre;
  cart.push({uid:Date.now()+Math.random(), id:prod.id, nombre:prod.nombre, precio:prod.precio+extra, emoji:prod.emoji||'🍽️', imagen:prod.imagen||'', cantidad:qty, modificadores:modsGuardados});
  cerrarProd(); actualizarFab();
  renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim() || '');
  toast('✦ ' + _nombre + ' agregado');
}

function actualizarFab() {
  const count = cart.reduce((s,i) => s+i.cantidad, 0);
  const total = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  document.getElementById('fabCount').textContent = count;
  document.getElementById('fabTotal').textContent = '$' + total.toFixed(2);
  document.getElementById('cartFab').classList.toggle('on', count > 0);
}

function abrirCarrito() {
  renderCarrito();
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarCarrito() {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCarrito() {
  const body = document.getElementById('csBody');
  const footer = document.getElementById('csFooter');
  if (!cart.length) {
    body.innerHTML = '<div class="cart-empty"><div class="ce-icon">✦</div><div class="ce-title">Tu pedido está vacío</div><div class="ce-sub">Agrega productos del menú</div></div>';
    footer.innerHTML = ''; return;
  }
  const subtotal = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  body.innerHTML = cart.map((item,idx) =>
    '<div class="cart-item">' +
      '<div class="ci-thumb">' + (item.imagen ? '<img src="'+item.imagen+'" alt="">' : item.emoji) + '</div>' +
      '<div class="ci-info">' +
        '<div class="ci-name">' + item.nombre + '</div>' +
        (item.modificadores?.map(m => '<div class="ci-mods">' + m.grupo + ': ' + m.opciones.join(', ') + '</div>').join('') || '') +
        '<div class="ci-row">' +
          '<span class="ci-price">$' + (item.precio*item.cantidad).toFixed(2) + '</span>' +
          '<div class="ci-qty">' +
            '<button class="cq-btn rm" onclick="cambiarQtyCart('+idx+',-1)">' + (item.cantidad===1?'🗑':'−') + '</button>' +
            '<span class="cq-num">' + item.cantidad + '</span>' +
            '<button class="cq-btn" onclick="cambiarQtyCart('+idx+',1)">+</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('') +
  '<div class="notes-section"><span class="notes-label">Notas del pedido</span><textarea class="notes-textarea" id="notasInput" rows="2" placeholder="Ej: Sin cebolla, pago con $50...">' + notas + '</textarea></div>';

  const delivery = isNaN(parseFloat(neg.costo_delivery)) ? 0 : parseFloat(neg.costo_delivery);
  footer.innerHTML =
    '<div class="cart-summary">' +
      '<div class="sum-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>' +
      (neg.costo_delivery ? '<div class="sum-row"><span>Delivery</span><span>' + neg.costo_delivery + '</span></div>' : '<div class="sum-row"><span>Delivery</span><span>Se coordina al confirmar</span></div>') +
      '<div class="sum-total"><span>Total</span><span>$' + (subtotal + delivery).toFixed(2) + '</span></div>' +
      '<button class="wa-btn" onclick="confirmarPedido()">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
        'Confirmar por WhatsApp' +
      '</button>' +
    '</div>';
}

function cambiarQtyCart(idx, d) {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  if (d < 0 && cart[idx].cantidad === 1) cart.splice(idx,1);
  else cart[idx].cantidad = Math.max(1, cart[idx].cantidad + d);
  actualizarFab();
  if (!cart.length) { cerrarCarrito(); return; }
  renderCarrito();
  renderCatalogo(document.getElementById('searchInput')?.value?.toLowerCase().trim() || '');
}

function confirmarPedido() {
  const ta = document.getElementById('notasInput'); if (ta) notas = ta.value;
  if (!cart.length) return;
  const lineas = cart.map(item => {
    let l = '• ' + item.nombre + ' x' + item.cantidad + ' — $' + (item.precio*item.cantidad).toFixed(2);
    (item.modificadores||[]).forEach(m => { l += '\n   ' + m.grupo + ': ' + m.opciones.join(', '); });
    return l;
  });
  const subtotal = cart.reduce((s,i) => s+i.precio*i.cantidad, 0);
  let msg = 'Hola! Quiero hacer un pedido 🛒\n\n' + lineas.join('\n\n') + '\n\n💰 Total: $' + subtotal.toFixed(2);
  if (notas.trim()) msg += '\n\n📝 Notas: ' + notas.trim();
  msg += '\n\n_(Pedido desde el catálogo web)_';
  const wa = (neg.whatsapp_numero || neg.whatsapp_dueno || '').replace(/\D/g,'');
  if (!wa) { toast('Sin número de WhatsApp configurado'); return; }
  window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(msg), '_blank');
}

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchBar').classList.toggle('open', searchOpen);
  document.getElementById('catNav').classList.toggle('search-open', searchOpen);
  if (searchOpen) setTimeout(() => document.getElementById('searchInput').focus(), 260);
  else limpiarBusqueda();
}

function buscar(val) {
  const v = (val||'').toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('show', v.length > 0);
  renderCatalogo(v.length >= 2 ? v : '');
}

function limpiarBusqueda() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderCatalogo();
}

let toastTimer;
function toast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2400);
}

init();
</script>
</body>
</html>
