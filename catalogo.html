<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Cargando...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface2: #f0f0eb;
  --border: #e2e2da;
  --accent: #1a1a1a;
  --cta: #ff4500;
  --cta-hover: #e03d00;
  --text: #1a1a1a;
  --text2: #777770;
  --green: #00b37e;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }

/* LOADER */
#loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
.loader-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); margin: 0 5px; animation: bounce 0.8s infinite alternate; }
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { from { transform: translateY(0); opacity: 0.4; } to { transform: translateY(-12px); opacity: 1; } }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,245,240,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; overflow: hidden; flex-shrink: 0;
}
.brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; line-height: 1.1; }
.brand-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.badge-open { background: #e8f8f1; color: var(--green); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.badge-closed { background: #ffeaea; color: #e05252; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }

/* HERO BANNER */
.hero {
  background: var(--accent); color: #fff;
  padding: 32px 20px; text-align: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(255,69,0,0.3) 0%, transparent 60%);
}
.hero-emoji { font-size: 48px; line-height: 1; position: relative; }
.hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; margin-top: 8px; position: relative; }
.hero-sub { font-size: 14px; opacity: 0.75; margin-top: 6px; position: relative; }
.hero-delivery { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; font-size: 13px; margin-top: 12px; position: relative; }

/* CATEGORÍAS NAV */
.cat-nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 69px; z-index: 40; }
.cat-nav-inner { display: flex; gap: 4px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; }
.cat-nav-inner::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--text2); transition: all 0.2s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.cat-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cat-pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* CONTENIDO */
.content { max-width: 860px; margin: 0 auto; padding: 24px 16px 120px; }

/* SECCIÓN */
.section { margin-bottom: 36px; }
.section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* GRID PRODUCTOS */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
@media (max-width: 580px) { .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
@media (max-width: 360px) { .products-grid { grid-template-columns: 1fr; } }

/* CARD PRODUCTO */
.product-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1.5px solid var(--border); overflow: hidden;
  cursor: pointer; transition: all 0.2s; position: relative;
  box-shadow: var(--shadow);
}
.product-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.product-card.out-of-stock { opacity: 0.55; pointer-events: none; }
.product-img-wrap { position: relative; padding-top: 65%; overflow: hidden; background: var(--surface2); }
.product-img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.product-card:hover .product-img-wrap img { transform: scale(1.04); }
.product-emoji-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.stock-badge { position: absolute; top: 8px; right: 8px; background: #ff4444; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
.product-body { padding: 12px; }
.product-name { font-weight: 600; font-size: 14px; line-height: 1.3; }
.product-desc { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.product-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; color: var(--accent); }
.add-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.add-btn:hover { background: #333; transform: scale(1.1); }
.in-cart-indicator { position: absolute; top: 8px; left: 8px; background: var(--cta); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

/* CARRITO FLOTANTE BOTTOM */
.cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
  padding: 12px 16px; background: rgba(245,245,240,0.95); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.cart-bar.visible { transform: translateY(0); }
.cart-bar-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--accent); color: #fff; border-radius: 14px; padding: 14px 18px;
  cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transition: background 0.2s;
}
.cart-bar-inner:hover { background: #333; }
.cart-bar-left { display: flex; align-items: center; gap: 12px; }
.cart-count { background: var(--cta); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.cart-bar-text { font-weight: 600; font-size: 15px; }
.cart-bar-total { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; }

/* MODAL PRODUCTO */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 560px; max-height: 92vh;
  overflow-y: auto; transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
  padding-bottom: 20px;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-img { width: 100%; height: 220px; object-fit: cover; background: var(--surface2); }
.modal-img-placeholder { width: 100%; height: 180px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 64px; }
.modal-body { padding: 20px; }
.modal-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
.modal-desc { color: var(--text2); font-size: 14px; margin-top: 8px; line-height: 1.5; }
.modal-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: var(--cta); margin-top: 12px; }
.modal-divider { height: 1px; background: var(--border); margin: 18px 0; }
.modifier-group { margin-bottom: 20px; }
.modifier-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.modifier-req { background: #fff0eb; color: var(--cta); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.modifier-sub { font-size: 12px; color: var(--text2); margin-top: 3px; margin-bottom: 10px; }
.option-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-radius: 10px; cursor: pointer;
  border: 1.5px solid var(--border); margin-bottom: 8px;
  transition: all 0.15s; background: var(--surface);
}
.option-row:hover { border-color: var(--accent); }
.option-row.selected { border-color: var(--accent); background: #f5f5f0; }
.option-row.selected .option-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.option-left { display: flex; align-items: center; gap: 10px; }
.option-check {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  flex-shrink: 0; transition: all 0.15s;
}
.option-check.square { border-radius: 5px; }
.option-name { font-size: 14px; font-weight: 500; }
.option-price { font-size: 13px; color: var(--text2); font-weight: 500; }

/* CANTIDAD EN MODAL */
.qty-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
.qty-label { font-weight: 600; font-size: 15px; }
.qty-control { display: flex; align-items: center; gap: 12px; }
.qty-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: transparent; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'DM Sans', sans-serif; color: var(--text); }
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.qty-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; min-width: 28px; text-align: center; }

/* BOTÓN AGREGAR AL CARRITO */
.add-to-cart-btn {
  width: 100%; padding: 16px; background: var(--cta); color: #fff;
  border: none; border-radius: 14px; font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 17px; cursor: pointer; margin-top: 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.2s;
}
.add-to-cart-btn:hover { background: var(--cta-hover); }
.add-to-cart-btn:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; }

/* MODAL CARRITO */
.cart-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 300; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.cart-modal-overlay.open { opacity: 1; pointer-events: all; }
.cart-modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 560px; max-height: 88vh;
  overflow-y: auto; transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
}
.cart-modal-overlay.open .cart-modal { transform: translateY(0); }
.cart-header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.cart-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
.close-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.close-btn:hover { background: var(--border); }
.cart-items { padding: 16px 20px; }
.cart-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.cart-item:last-child { border-bottom: none; }
.cart-item-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden; }
.cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 15px; }
.cart-item-mods { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
.cart-item-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--cta); margin-top: 4px; }
.cart-item-qty { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.cqty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.cqty-btn:hover { border-color: var(--cta); color: var(--cta); }
.cqty-num { font-weight: 700; font-size: 15px; min-width: 20px; text-align: center; }
.remove-item { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 13px; margin-top: 4px; padding: 0; transition: color 0.15s; }
.remove-item:hover { color: #e05252; }

/* TOTALES CARRITO */
.cart-summary { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface2); }
.summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
.summary-row.total { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

/* BOTÓN CONFIRMAR */
.confirm-btn {
  width: 100%; padding: 16px 20px; background: #25D366; color: #fff;
  border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.2s;
}
.confirm-btn:hover { background: #20ba58; }
.cart-empty { text-align: center; padding: 48px 20px; color: var(--text2); }
.cart-empty-icon { font-size: 48px; margin-bottom: 12px; }
.cart-empty-text { font-size: 15px; }

/* NOTAS */
.notes-wrap { padding: 0 20px 16px; }
.notes-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
.notes-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; }
.notes-input:focus { border-color: var(--accent); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }
.empty-icon { font-size: 56px; margin-bottom: 16px; }

/* ANIMACIÓN BOUNCE ADD */
@keyframes addBounce { 0% { transform: scale(1); } 40% { transform: scale(0.85); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
.bounce { animation: addBounce 0.35s ease; }

/* TOAST */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
<div id="app" style="display:none;">

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <div class="brand-logo" id="brandLogo"></div>
    <div>
      <div class="brand-name" id="brandName">Cargando...</div>
      <div class="brand-sub" id="brandSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span id="statusBadge"></span>
  </div>
</header>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-emoji" id="heroEmoji">🛍️</div>
  <div class="hero-title" id="heroTitle"></div>
  <div class="hero-sub" id="heroSub"></div>
  <div class="hero-delivery" id="heroDelivery"></div>
</div>

<!-- CATEGORÍAS -->
<div class="cat-nav" id="catNav" style="display:none;">
  <div class="cat-nav-inner" id="catPills"></div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="content" id="content"></div>

</div><!-- /app -->

<!-- BARRA CARRITO -->
<div class="cart-bar" id="cartBar" onclick="abrirCarrito()">
  <div class="cart-bar-inner">
    <div class="cart-bar-left">
      <div class="cart-count" id="cartCount">0</div>
      <span class="cart-bar-text">Ver mi pedido</span>
    </div>
    <span class="cart-bar-total" id="cartBarTotal">$0.00</span>
  </div>
</div>

<!-- MODAL PRODUCTO -->
<div class="modal-overlay" id="productModal" onclick="e => { if(e.target===this) cerrarModal(); }">
  <div class="modal" id="modalContent">
    <div id="modalInner"></div>
  </div>
</div>

<!-- MODAL CARRITO -->
<div class="cart-modal-overlay" id="cartModal">
  <div class="cart-modal">
    <div class="cart-header">
      <div class="cart-title">🛒 Tu pedido</div>
      <button class="close-btn" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="cartContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SLUG = window.location.pathname.split('/')[2];
const BASE = window.location.origin;
let negocio = null;
let carrito = []; // [{id, nombre, precio, emoji, imagen, cantidad, modificadores:[{grupo,opciones:[]}], precioExtra, notas}]
let modalProducto = null;
let modalSelecciones = {};
let modalCantidad = 1;

// ─── INICIALIZACIÓN ───────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${BASE}/catalogo-data/${SLUG}`);
    if (!res.ok) { mostrarError(); return; }
    negocio = await res.json();
    renderNegocio();
    renderCatalogo();
    ocultarLoader();
  } catch(e) {
    mostrarError();
  }
}

function ocultarLoader() {
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => { loader.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 400);
}

function mostrarError() {
  document.getElementById('loader').innerHTML = '<div style="text-align:center;color:#777;"><div style="font-size:48px;">😕</div><div style="margin-top:12px;font-size:16px;">Negocio no encontrado</div></div>';
}

// ─── RENDER NEGOCIO ───────────────────────────────────────────
function renderNegocio() {
  document.title = negocio.nombre + ' — Menú';
  document.getElementById('pageTitle').textContent = negocio.nombre;
  document.getElementById('brandName').textContent = negocio.nombre;
  document.getElementById('brandSub').textContent = negocio.tipo || '';
  document.getElementById('heroTitle').textContent = negocio.nombre;
  document.getElementById('heroSub').textContent = negocio.mensajes?.bienvenida || `Bienvenido a ${negocio.nombre}`;
  document.getElementById('heroEmoji').textContent = negocio.emoji || '🛍️';

  const logo = document.getElementById('brandLogo');
  if (negocio.logo) logo.innerHTML = `<img src="${negocio.logo}" alt="">`;
  else logo.textContent = negocio.emoji || '🛍️';

  if (negocio.tiempo_entrega) {
    document.getElementById('heroDelivery').innerHTML = `🛵 Entrega: ${negocio.tiempo_entrega}`;
  } else {
    document.getElementById('heroDelivery').style.display = 'none';
  }

  // Estado abierto/cerrado
  const badge = document.getElementById('statusBadge');
  const abierto = estaAbierto();
  badge.className = abierto ? 'badge-open' : 'badge-closed';
  badge.textContent = abierto ? '● Abierto' : '● Cerrado';

  // Cambiar color del hero si hay imagen de portada
  if (negocio.color_primario) {
    document.querySelector('.hero').style.background = negocio.color_primario;
  }
}

function estaAbierto() {
  // Simple check por horario (podría venir del servidor)
  const h = new Date().getHours();
  return h >= 8 && h < 18 && !negocio.modo_vacaciones;
}

// ─── RENDER CATÁLOGO ──────────────────────────────────────────
function renderCatalogo() {
  const productos = (negocio.catalogo || []).filter(p => p.activo !== false);
  if (!productos.length) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div>No hay productos disponibles</div></div>`;
    return;
  }

  // Agrupar por categoría
  const cats = {};
  productos.forEach(p => {
    const cat = p.categoria || 'Menú';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(p);
  });

  const catNames = Object.keys(cats);

  // Mostrar pills de categorías si hay más de una
  if (catNames.length > 1) {
    document.getElementById('catNav').style.display = 'block';
    document.getElementById('catPills').innerHTML = catNames.map((c, i) =>
      `<button class="cat-pill ${i===0?'active':''}" onclick="scrollToSection('${c}', this)">${c}</button>`
    ).join('');
  }

  // Renderizar secciones
  document.getElementById('content').innerHTML = catNames.map(cat => `
    <div class="section" id="sec-${cat.replace(/\s+/g,'-')}">
      <div class="section-title">${cat}</div>
      <div class="products-grid">
        ${cats[cat].map(p => renderProductCard(p)).join('')}
      </div>
    </div>
  `).join('');
}

function renderProductCard(p) {
  const sinStock = p.stock === 0;
  const enCarrito = carrito.filter(i => i.id === p.id).reduce((s, i) => s + i.cantidad, 0);
  return `
    <div class="product-card ${sinStock ? 'out-of-stock' : ''}" onclick="abrirProducto(${p.id})">
      <div class="product-img-wrap">
        ${p.imagen
          ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">`
          : `<div class="product-emoji-placeholder">${p.emoji || '📦'}</div>`}
        ${sinStock ? '<div class="stock-badge">Agotado</div>' : ''}
        ${enCarrito > 0 ? `<div class="in-cart-indicator">× ${enCarrito}</div>` : ''}
      </div>
      <div class="product-body">
        <div class="product-name">${p.nombre}</div>
        ${p.descripcion ? `<div class="product-desc">${p.descripcion}</div>` : ''}
        <div class="product-footer">
          <div class="product-price">$${p.precio.toFixed(2)}</div>
          <button class="add-btn" onclick="event.stopPropagation(); abrirProducto(${p.id})">+</button>
        </div>
      </div>
    </div>
  `;
}

// ─── MODAL PRODUCTO ───────────────────────────────────────────
function abrirProducto(id) {
  const p = negocio.catalogo.find(x => x.id === id);
  if (!p) return;
  modalProducto = p;
  modalSelecciones = {};
  modalCantidad = 1;

  // Inicializar selecciones vacías
  (p.modificadores || []).forEach((grupo, gi) => {
    modalSelecciones[gi] = grupo.tipo === 'unico' ? null : [];
  });

  renderModal();
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
  modalProducto = null;
}

function renderModal() {
  const p = modalProducto;
  const mods = p.modificadores || [];

  document.getElementById('modalInner').innerHTML = `
    ${p.imagen
      ? `<img class="modal-img" src="${p.imagen}" alt="${p.nombre}">`
      : `<div class="modal-img-placeholder">${p.emoji || '📦'}</div>`}
    <div class="modal-body">
      <div class="modal-name">${p.nombre}</div>
      ${p.descripcion ? `<div class="modal-desc">${p.descripcion}</div>` : ''}
      <div class="modal-price" id="modalPrecio">$${p.precio.toFixed(2)}</div>

      ${mods.length > 0 ? `<div class="modal-divider"></div>` : ''}

      ${mods.map((grupo, gi) => `
        <div class="modifier-group">
          <div class="modifier-title">
            ${grupo.nombre}
            ${grupo.obligatorio ? '<span class="modifier-req">Obligatorio</span>' : ''}
          </div>
          <div class="modifier-sub">${grupo.tipo === 'unico' ? 'Elige una opción' : 'Puedes elegir varias'}</div>
          ${grupo.opciones.map((op, oi) => `
            <div class="option-row" id="opt-${gi}-${oi}" onclick="toggleOpcion(${gi}, ${oi}, '${grupo.tipo}')">
              <div class="option-left">
                <div class="option-check ${grupo.tipo === 'unico' ? '' : 'square'}" id="check-${gi}-${oi}"></div>
                <span class="option-name">${op.nombre}</span>
              </div>
              <span class="option-price">${op.precio > 0 ? '+$'+op.precio.toFixed(2) : op.precio < 0 ? '-$'+Math.abs(op.precio).toFixed(2) : 'Incluido'}</span>
            </div>
          `).join('')}
        </div>
      `).join('')}

      ${mods.length > 0 ? `<div class="modal-divider"></div>` : ''}

      <div class="qty-row">
        <span class="qty-label">Cantidad</span>
        <div class="qty-control">
          <button class="qty-btn" id="qtyMinus" onclick="cambiarCantidad(-1)" ${modalCantidad <= 1 ? 'disabled' : ''}>−</button>
          <span class="qty-num" id="qtyNum">${modalCantidad}</span>
          <button class="qty-btn" onclick="cambiarCantidad(1)">+</button>
        </div>
      </div>

      <button class="add-to-cart-btn" id="addCartBtn" onclick="agregarAlCarrito()">
        <span>Agregar al pedido</span>
        <span id="addCartTotal">$${(p.precio * modalCantidad).toFixed(2)}</span>
      </button>
    </div>
  `;
}

function toggleOpcion(gi, oi, tipo) {
  const grupo = modalProducto.modificadores[gi];
  if (tipo === 'unico') {
    // Deseleccionar todos primero
    grupo.opciones.forEach((_, i) => {
      document.getElementById(`opt-${gi}-${i}`)?.classList.remove('selected');
      const chk = document.getElementById(`check-${gi}-${i}`);
      if (chk) chk.textContent = '';
    });
    modalSelecciones[gi] = oi;
    document.getElementById(`opt-${gi}-${oi}`).classList.add('selected');
    document.getElementById(`check-${gi}-${oi}`).textContent = '✓';
  } else {
    if (!Array.isArray(modalSelecciones[gi])) modalSelecciones[gi] = [];
    const idx = modalSelecciones[gi].indexOf(oi);
    if (idx >= 0) {
      modalSelecciones[gi].splice(idx, 1);
      document.getElementById(`opt-${gi}-${oi}`).classList.remove('selected');
      document.getElementById(`check-${gi}-${oi}`).textContent = '';
    } else {
      modalSelecciones[gi].push(oi);
      document.getElementById(`opt-${gi}-${oi}`).classList.add('selected');
      document.getElementById(`check-${gi}-${oi}`).textContent = '✓';
    }
  }
  actualizarPrecioModal();
}

function calcularExtraModal() {
  let extra = 0;
  const mods = modalProducto.modificadores || [];
  mods.forEach((grupo, gi) => {
    const sel = modalSelecciones[gi];
    if (grupo.tipo === 'unico' && sel !== null && sel !== undefined) {
      extra += grupo.opciones[sel]?.precio || 0;
    } else if (Array.isArray(sel)) {
      sel.forEach(oi => { extra += grupo.opciones[oi]?.precio || 0; });
    }
  });
  return extra;
}

function actualizarPrecioModal() {
  const extra = calcularExtraModal();
  const total = (modalProducto.precio + extra) * modalCantidad;
  document.getElementById('addCartTotal').textContent = '$' + total.toFixed(2);
  document.getElementById('modalPrecio').textContent = '$' + (modalProducto.precio + extra).toFixed(2);
}

function cambiarCantidad(delta) {
  modalCantidad = Math.max(1, modalCantidad + delta);
  document.getElementById('qtyNum').textContent = modalCantidad;
  document.getElementById('qtyMinus').disabled = modalCantidad <= 1;
  actualizarPrecioModal();
}

function agregarAlCarrito() {
  const p = modalProducto;
  const mods = p.modificadores || [];

  // Validar obligatorios
  for (let gi = 0; gi < mods.length; gi++) {
    const grupo = mods[gi];
    if (grupo.obligatorio) {
      const sel = modalSelecciones[gi];
      const vacio = grupo.tipo === 'unico' ? (sel === null || sel === undefined) : (!Array.isArray(sel) || sel.length === 0);
      if (vacio) {
        mostrarToast(`Elige una opción en: ${grupo.nombre}`);
        return;
      }
    }
  }

  // Construir modificadores seleccionados
  const modsSeleccionados = [];
  mods.forEach((grupo, gi) => {
    const sel = modalSelecciones[gi];
    const opciones = [];
    if (grupo.tipo === 'unico' && sel !== null && sel !== undefined) {
      opciones.push(grupo.opciones[sel].nombre);
    } else if (Array.isArray(sel)) {
      sel.forEach(oi => opciones.push(grupo.opciones[oi].nombre));
    }
    if (opciones.length) modsSeleccionados.push({ grupo: grupo.nombre, opciones });
  });

  const extra = calcularExtraModal();
  const item = {
    uid: Date.now() + Math.random(),
    id: p.id,
    nombre: p.nombre,
    precio: p.precio + extra,
    precioBase: p.precio,
    emoji: p.emoji || '📦',
    imagen: p.imagen || '',
    cantidad: modalCantidad,
    modificadores: modsSeleccionados,
    notas: '',
  };

  carrito.push(item);
  cerrarModal();
  actualizarCarritoUI();
  mostrarToast(`✓ ${p.nombre} agregado`);
  // Actualizar indicadores en cards
  renderCatalogoSilencioso();
}

function renderCatalogoSilencioso() {
  // Solo actualiza los indicadores "en carrito" sin rerenderizar todo
  (negocio.catalogo || []).forEach(p => {
    const count = carrito.filter(i => i.id === p.id).reduce((s, i) => s + i.cantidad, 0);
    document.querySelectorAll(`.product-card`).forEach(card => {
      // update badge if visible
    });
  });
  // Rerenderizar el catálogo completo para actualizar badges
  const content = document.getElementById('content');
  const scrollY = window.scrollY;
  renderCatalogo();
  window.scrollTo(0, scrollY);
}

// ─── CARRITO ──────────────────────────────────────────────────
function actualizarCarritoUI() {
  const total = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  const count = carrito.reduce((s, i) => s + i.cantidad, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartBarTotal').textContent = '$' + total.toFixed(2);

  const bar = document.getElementById('cartBar');
  if (count > 0) bar.classList.add('visible');
  else bar.classList.remove('visible');
}

function abrirCarrito() {
  document.getElementById('cartModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderCarrito();
}

function cerrarCarrito() {
  document.getElementById('cartModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCarrito() {
  const container = document.getElementById('cartContent');
  if (!carrito.length) {
    container.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-text">Tu carrito está vacío</div>
      </div>`;
    return;
  }

  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);

  container.innerHTML = `
    <div class="cart-items">
      ${carrito.map((item, idx) => `
        <div class="cart-item">
          <div class="cart-item-img">
            ${item.imagen ? `<img src="${item.imagen}" alt="">` : item.emoji}
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.nombre}</div>
            ${item.modificadores?.map(m => `<div class="cart-item-mods">${m.grupo}: ${m.opciones.join(', ')}</div>`).join('') || ''}
            <div class="cart-item-price">$${(item.precio * item.cantidad).toFixed(2)}</div>
            <div class="cart-item-qty">
              <button class="cqty-btn" onclick="cambiarCantidadCarrito(${idx}, -1)">−</button>
              <span class="cqty-num">${item.cantidad}</span>
              <button class="cqty-btn" onclick="cambiarCantidadCarrito(${idx}, 1)">+</button>
              <button class="remove-item" onclick="eliminarDelCarrito(${idx})">✕ Quitar</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="notes-wrap">
      <div class="notes-label">📝 Notas adicionales (opcional)</div>
      <textarea class="notes-input" id="notasGlobal" rows="2" placeholder="Ej: Sin cebolla en todo, pago con billete de $50...">${notasGlobal}</textarea>
    </div>

    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
      <div class="summary-row"><span>Delivery</span><span style="color:var(--text2);">Se coordina con el negocio</span></div>
      <div class="summary-row total"><span>Total</span><span>$${subtotal.toFixed(2)}</span></div>
    </div>

    <button class="confirm-btn" onclick="confirmarPedido()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
      Enviar pedido por WhatsApp
    </button>
  `;
}

let notasGlobal = '';

function cambiarCantidadCarrito(idx, delta) {
  carrito[idx].cantidad = Math.max(1, carrito[idx].cantidad + delta);
  actualizarCarritoUI();
  renderCarrito();
}

function eliminarDelCarrito(idx) {
  carrito.splice(idx, 1);
  actualizarCarritoUI();
  renderCarrito();
  renderCatalogoSilencioso();
  if (!carrito.length) cerrarCarrito();
}

// ─── CONFIRMAR PEDIDO → WHATSAPP ──────────────────────────────
function confirmarPedido() {
  if (!carrito.length) return;
  notasGlobal = document.getElementById('notasGlobal')?.value || '';

  const lineas = carrito.map(item => {
    let linea = `• ${item.nombre} x${item.cantidad} — $${(item.precio * item.cantidad).toFixed(2)}`;
    if (item.modificadores?.length) {
      item.modificadores.forEach(m => {
        linea += `\n  ${m.grupo}: ${m.opciones.join(', ')}`;
      });
    }
    return linea;
  });

  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);

  let mensaje = `Hola! Quiero hacer un pedido 🛒\n\n`;
  mensaje += lineas.join('\n\n');
  mensaje += `\n\n💰 Total: $${subtotal.toFixed(2)}`;
  if (notasGlobal.trim()) mensaje += `\n\n📝 Notas: ${notasGlobal.trim()}`;
  mensaje += `\n\n_(Pedido desde el catálogo web)_`;

  const waNum = negocio.whatsapp_dueno?.replace(/\D/g, '');
  if (!waNum) { mostrarToast('No hay número de WhatsApp configurado'); return; }

  const url = `https://wa.me/${waNum}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
}

// ─── NAVEGACIÓN CATEGORÍAS ────────────────────────────────────
function scrollToSection(cat, btn) {
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById(`sec-${cat.replace(/\s+/g, '-')}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── TOAST ────────────────────────────────────────────────────
let toastTimer;
function mostrarToast(texto) {
  const t = document.getElementById('toast');
  t.textContent = texto;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Cerrar modales al hacer clic fuera
document.getElementById('productModal').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});
document.getElementById('cartModal').addEventListener('click', function(e) {
  if (e.target === this) cerrarCarrito();
});

init();
</script>
