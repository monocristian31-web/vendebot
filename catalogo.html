<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --c:#faf8f3; --c2:#f2ece0; --c3:#e8ddd0;
  --ink:#110f0c; --ink2:#211e18; --ink3:#332e25;
  --dim:#7a7060; --dim2:#b0a898; --dim3:#d4cec4;
  --split:rgba(17,15,12,.07); --split2:rgba(17,15,12,.13);
  --red:#d94020; --red-bg:rgba(217,64,32,.07); --red-br:rgba(217,64,32,.18);
  --go:#1a7a4a;  --gold:#bf8c32;
  --r:10px; --r2:16px; --r3:22px; --r4:28px; --rfull:999px;
  --sans:"DM Sans",sans-serif; --serif:"Fraunces",serif;
  --t:.2s cubic-bezier(.4,0,.2,1); --spring:.42s cubic-bezier(.34,1.56,.64,1);
  --s1:0 1px 3px rgba(17,15,12,.05),0 2px 6px rgba(17,15,12,.04);
  --s2:0 3px 12px rgba(17,15,12,.09),0 1px 4px rgba(17,15,12,.05);
  --s3:0 12px 40px rgba(17,15,12,.13),0 3px 10px rgba(17,15,12,.07);
  --s4:0 22px 64px rgba(17,15,12,.18),0 6px 20px rgba(17,15,12,.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body{font-family:var(--sans);background:var(--c);color:var(--ink);min-height:100vh;overscroll-behavior-y:none;}
::-webkit-scrollbar{width:0;height:0;}

/* ── LOADER ──────────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
.ld-logo{font-family:var(--serif);font-size:36px;font-weight:900;color:var(--c);
  letter-spacing:-.02em;opacity:0;animation:ldIn 1.4s ease forwards;}
.ld-tagline{font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--dim2);margin-top:7px;opacity:0;animation:ldIn 1.4s .18s ease forwards;}
.ld-track{width:100px;height:1px;background:rgba(255,255,255,.1);margin-top:32px;overflow:hidden;}
.ld-bar{height:100%;background:rgba(250,248,243,.7);animation:ldBar 1.9s ease-in-out infinite;}
@keyframes ldIn{to{opacity:1;transform:translateY(0);}}
@keyframes ldBar{0%{width:0%;margin-left:0}55%{width:55%;margin-left:22%}100%{width:0%;margin-left:100%}}
#app{display:none;}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:56px;
  background:rgba(250,248,243,.9);
  backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);
  border-bottom:1px solid var(--split);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;
}
.tb-brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.tb-logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--c2);border:1px solid var(--split2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;flex-shrink:0;box-shadow:var(--s1);
}
.tb-logo img{width:100%;height:100%;object-fit:cover;}
.tb-name{font-family:var(--serif);font-weight:700;font-size:16px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em;}
.tb-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ib{
  width:36px;height:36px;border-radius:10px;background:transparent;
  border:1px solid transparent;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--t);color:var(--dim);
}
.ib:hover{background:var(--c2);border-color:var(--split2);color:var(--ink);}

/* ── SEARCH ──────────────────────────────────────────────── */
.search-wrap{
  position:fixed;top:56px;left:0;right:0;z-index:199;
  background:var(--c);border-bottom:1px solid var(--split);
  padding:10px 16px 13px;
  box-shadow:0 6px 24px rgba(17,15,12,.07);
  transform:translateY(-110%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.search-wrap.open{transform:translateY(0);}
.si-wrap{position:relative;}
.si-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim2);pointer-events:none;}
.si{
  width:100%;height:42px;padding:0 40px;
  background:var(--c2);border:1.5px solid var(--split2);
  border-radius:var(--rfull);font-family:var(--sans);font-size:14px;
  color:var(--ink);outline:none;transition:var(--t);
}
.si:focus{border-color:var(--ink2);background:#fff;box-shadow:0 0 0 3px rgba(17,15,12,.05);}
.si::placeholder{color:var(--dim3);}
.si-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--c3);border:none;border-radius:50%;width:20px;height:20px;
  cursor:pointer;font-size:10px;color:var(--dim);display:none;align-items:center;justify-content:center;
}
.si-clear.show{display:flex;}

/* ── HERO CON BANNER ─────────────────────────────────────── */
.hero{margin-top:56px;height:270px;position:relative;overflow:hidden;background:var(--ink);}
.hero-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.82;}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(170deg,rgba(17,15,12,.05) 0%,rgba(17,15,12,.72) 100%);
}
.hero-info{position:absolute;bottom:0;left:0;right:0;padding:24px 20px;}
.hero-name{
  font-family:var(--serif);font-size:30px;font-weight:900;
  color:#fff;line-height:1.1;letter-spacing:-.025em;
  text-shadow:0 2px 20px rgba(0,0,0,.28);
}
.hero-pills{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;}
.pill-glass{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  font-size:11px;font-weight:600;padding:4px 11px;
  border-radius:var(--rfull);letter-spacing:.02em;
}
/* ── HERO SIN BANNER ─────────────────────────────────────── */
.hero-plain{
  margin-top:56px;background:var(--ink2);padding:30px 20px 26px;
  position:relative;overflow:hidden;
}
.hero-plain::after{
  content:'';position:absolute;bottom:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(250,248,243,.04),transparent);pointer-events:none;
}
.hero-plain-name{
  font-family:var(--serif);font-size:28px;font-weight:900;
  color:var(--c);letter-spacing:-.025em;line-height:1.1;
}
.hero-plain-pills{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(250,248,243,.08);border:1px solid rgba(250,248,243,.14);
  color:var(--c2);font-size:11px;font-weight:600;
  padding:4px 11px;border-radius:var(--rfull);letter-spacing:.02em;
}
.pill.open{background:rgba(26,122,74,.28);border-color:rgba(26,122,74,.45);color:#72e0a0;}
.pill.closed{background:rgba(217,64,32,.22);border-color:rgba(217,64,32,.38);color:#ffa0a0;}
.dot{width:6px;height:6px;border-radius:50%;background:#72e0a0;flex-shrink:0;}
.dot.off{background:#ffa0a0;}

/* ── INFO STRIP ─────────────────────────────────────────── */
.info-strip{
  background:#fff;border-bottom:1px solid var(--split);
  display:flex;overflow-x:auto;scrollbar-width:none;
}
.info-strip::-webkit-scrollbar{display:none;}
.ii{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:13px 18px;border-right:1px solid var(--split);
}
.ii:last-child{border-right:none;}
.ii-icon{font-size:17px;flex-shrink:0;}
.ii-lbl{font-size:10px;color:var(--dim2);display:block;
  letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
.ii strong{color:var(--ink2);font-weight:600;font-size:13px;display:block;margin-top:1px;}

/* ── POPULARES ──────────────────────────────────────────── */
.popular-section{background:#fff;padding:22px 0 8px;border-bottom:1px solid var(--split);}
.sec-hd{
  padding:0 20px 14px;
  display:flex;align-items:baseline;justify-content:space-between;
}
.sec-hd-title{
  font-family:var(--serif);font-size:19px;font-weight:700;
  letter-spacing:-.015em;
}
.sec-hd-sub{font-size:12px;color:var(--dim);font-weight:400;}
.pop-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 20px 18px;scrollbar-width:none;}
.pop-scroll::-webkit-scrollbar{display:none;}
.pop-card{
  flex-shrink:0;width:150px;border-radius:var(--r2);overflow:hidden;
  background:#fff;border:1px solid var(--split);cursor:pointer;
  transition:var(--t);box-shadow:var(--s1);position:relative;
}
.pop-card:hover{box-shadow:var(--s2);transform:translateY(-3px);border-color:var(--split2);}
.pop-card:active{transform:scale(.98);}
.pop-card-img{width:100%;height:112px;object-fit:cover;background:var(--c2);display:block;transition:transform .4s ease;}
.pop-card:hover .pop-card-img{transform:scale(1.04);}
.pop-card-emoji{width:100%;height:112px;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:38px;}
.pop-card-body{padding:10px 11px 12px;}
.pop-card-name{font-size:12px;font-weight:600;line-height:1.35;color:var(--ink2);}
.pop-card-price{
  font-family:var(--serif);font-size:15px;font-weight:700;color:var(--red);margin-top:4px;
}
.pop-badge{
  position:absolute;top:8px;left:8px;
  background:var(--ink);color:var(--c);
  font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:var(--rfull);letter-spacing:.06em;text-transform:uppercase;
}

/* ── NAV CATEGORÍAS ─────────────────────────────────────── */
.cat-nav{
  position:sticky;top:56px;z-index:80;
  background:rgba(250,248,243,.96);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--split);
  transition:top .28s cubic-bezier(.4,0,.2,1);
}
.cat-nav.search-open{top:112px;} /* FIX 6b */
.cat-inner{display:flex;gap:3px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;}
.cat-inner::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;padding:7px 16px;border-radius:var(--rfull);
  font-family:var(--sans);font-size:13px;font-weight:600;
  border:1.5px solid transparent;cursor:pointer;transition:var(--t);
  color:var(--dim);background:transparent;white-space:nowrap;letter-spacing:.01em;
}
.cat-btn:hover{color:var(--ink2);background:var(--c2);}
.cat-btn.active{background:var(--ink);color:var(--c);border-color:var(--ink);}

/* ── CONTENIDO ──────────────────────────────────────────── */
.content{max-width:760px;margin:0 auto;padding:6px 0 170px;}
.cat-sec{padding:22px 0 4px;}
.cat-sec-title{
  font-family:var(--serif);font-size:21px;font-weight:700;
  padding:0 20px 14px;letter-spacing:-.015em;
}
.rows{display:flex;flex-direction:column;}

/* ── FILA PRODUCTO ──────────────────────────────────────── */
.prow{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;background:#fff;cursor:pointer;
  transition:background var(--t);
  border-bottom:1px solid var(--split);position:relative;
}
.prow:last-child{border-bottom:none;}
.prow:hover{background:var(--c);}
.prow:active{background:var(--c2);}
.prow.sold-out{opacity:.42;pointer-events:none;}
.prow-info{flex:1;min-width:0;}
.prow-name{font-size:15px;font-weight:600;line-height:1.35;color:var(--ink);}
.prow-desc{
  font-size:13px;color:var(--dim);margin-top:3px;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.prow-foot{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.prow-price{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--ink2);}
.prow-from{font-size:10px;color:var(--dim2);font-weight:400;font-family:var(--sans);}
.in-cart-tag{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--red-bg);color:var(--red);border:1px solid var(--red-br);
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--rfull);
}
.sold-tag{
  display:inline-flex;align-items:center;
  background:var(--c2);color:var(--dim2);
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--rfull);
}
.prow-thumb{
  flex-shrink:0;width:88px;height:88px;border-radius:var(--r);
  overflow:hidden;background:var(--c2);position:relative;border:1px solid var(--split);
}
.prow-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
.prow:hover .prow-thumb img{transform:scale(1.06);}
.th-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.plus-circle{
  position:absolute;bottom:-4px;right:-4px;
  width:26px;height:26px;border-radius:50%;
  background:var(--ink);color:var(--c);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;box-shadow:var(--s2);transition:var(--t);
}
.prow:hover .plus-circle{background:var(--red);transform:scale(1.16);}

/* ── BÚSQUEDA RESULTADOS ─────────────────────────────────── */
.sr-wrap{padding:16px 20px;}
.sr-title{font-size:11px;color:var(--dim);font-weight:600;margin-bottom:12px;
  letter-spacing:.06em;text-transform:uppercase;}
.no-res{text-align:center;padding:64px 20px;color:var(--dim);}
.no-res-icon{font-size:44px;margin-bottom:14px;opacity:.45;}
.no-res h3{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink2);margin-bottom:6px;}
.no-res p{font-size:13px;}

/* ── FAB CARRITO ────────────────────────────────────────── */
.cart-fab{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(130px);
  z-index:190;width:calc(100% - 32px);max-width:440px;
  transition:transform var(--spring);pointer-events:none;
}
.cart-fab.on{transform:translateX(-50%) translateY(0);pointer-events:all;}
.fab-inner{
  background:var(--ink);color:var(--c);border-radius:var(--r3);
  padding:15px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;box-shadow:var(--s4);transition:background var(--t),transform .14s;
  position:relative;overflow:hidden;
}
.fab-inner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);pointer-events:none;
}
.fab-inner:hover{background:var(--ink3);}
.fab-inner:active{transform:scale(.985);}
.fab-left{display:flex;align-items:center;gap:12px;}
.fab-badge{
  background:var(--red);color:#fff;width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
  box-shadow:0 2px 10px rgba(217,64,32,.45);
}
.fab-txt{font-size:14px;font-weight:600;}
.fab-total{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:-.015em;}

/* ── OVERLAY / SHEET PRODUCTO ───────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:300;background:transparent;pointer-events:none;
  transition:background .3s;display:flex;align-items:flex-end;justify-content:center;
}
.overlay.open{background:rgba(17,15,12,.56);pointer-events:all;}
.sheet{
  background:var(--c);border-radius:28px 28px 0 0;
  width:100%;max-width:560px;max-height:92dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);
  overscroll-behavior:contain;
  box-shadow:0 -10px 48px rgba(17,15,12,.2);
}
.overlay.open .sheet{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:var(--split2);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.sh-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;}
.sh-body{padding:20px 20px 8px;}
.sh-footer{
  padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--split);background:var(--c);flex-shrink:0;
}
.sh-img{width:100%;height:240px;object-fit:cover;background:var(--c2);display:block;border-radius:18px 18px 0 0;}
.sh-emoji{width:100%;height:190px;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:76px;border-radius:18px 18px 0 0;}
.sh-name{font-family:var(--serif);font-size:26px;font-weight:900;line-height:1.12;letter-spacing:-.025em;margin-top:4px;}
.sh-desc{font-size:14px;color:var(--dim);margin-top:8px;line-height:1.65;}
.sh-price{font-family:var(--serif);font-size:23px;font-weight:700;margin-top:12px;letter-spacing:-.015em;}
.sh-price small{font-family:var(--sans);font-size:12px;color:var(--dim2);font-weight:400;margin-left:5px;}
.divider{height:1px;background:var(--split);margin:20px 0;}

/* ── MITAD Y MITAD ──────────────────────────────────────── */
.mm-section{padding:0 2px;}
.mm-title{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:3px;letter-spacing:-.01em;}
.mm-sub{font-size:12px;color:var(--dim);margin-bottom:16px;}
.mm-visual{display:flex;justify-content:center;margin-bottom:20px;}
.mm-pizza{position:relative;width:116px;height:116px;border-radius:50%;background:#fff9ee;border:3px solid var(--gold);overflow:hidden;box-shadow:0 4px 22px rgba(191,140,50,.22);}
.mm-half{position:absolute;top:0;width:50%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#7a5818;text-align:center;padding:6px;line-height:1.2;word-break:break-word;transition:background .2s;}
.mm-left{left:0;background:#fef9e8;border-right:2px dashed var(--gold);}
.mm-right{right:0;background:#fef0c4;}
.mm-line{position:absolute;left:50%;top:0;width:2px;height:100%;background:var(--gold);transform:translateX(-50%);pointer-events:none;}
.mm-block{margin-bottom:18px;}
.mm-block-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px;}
.mm-badge{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.mm-badge-1{background:#fef3c7;color:#92400e;border:2px solid var(--gold);}
.mm-badge-2{background:#fde68a;color:#92400e;border:2px solid var(--gold);}
.mm-side-label{font-size:10px;color:var(--dim2);font-weight:400;}
.mm-opts{display:flex;flex-wrap:wrap;gap:7px;}
.mm-opt{padding:7px 14px;border-radius:var(--rfull);border:1.5px solid var(--split2);font-size:13px;font-weight:500;cursor:pointer;transition:var(--t);background:#fff;color:var(--ink2);}
.mm-opt:hover{border-color:var(--gold);background:#fffbec;}
.mm-opt.sel{border-color:var(--gold);background:#fef3c7;color:#92400e;font-weight:700;}

/* ── MODIFICADORES ──────────────────────────────────────── */
.mod-group{margin-bottom:22px;}
.mod-head{margin-bottom:12px;}
.mod-title{font-size:15px;font-weight:700;color:var(--ink);}
.mod-req{
  display:inline-block;background:var(--red-bg);color:var(--red);border:1px solid var(--red-br);
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--rfull);
  margin-left:7px;vertical-align:middle;letter-spacing:.06em;text-transform:uppercase;
}
.mod-sub{font-size:12px;color:var(--dim);margin-top:3px;}
.opt-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-radius:var(--r);border:1.5px solid var(--split);
  margin-bottom:7px;cursor:pointer;transition:var(--t);gap:12px;background:#fff;
}
.opt-row:hover{border-color:var(--split2);background:var(--c);}
.opt-row.sel{border-color:var(--ink);background:#fff;}
.opt-row.sel .opt-ctrl{background:var(--ink);border-color:var(--ink);color:#fff;}
.opt-right-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.opt-qty-ctrl{display:flex;align-items:center;gap:6px;background:var(--ink);border-radius:var(--rfull);padding:3px 6px;}
.oq-btn{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s;}
.oq-btn:hover{background:rgba(255,255,255,.28);}
.oq-num{color:#fff;font-size:13px;font-weight:700;min-width:14px;text-align:center;}

.opt-ctrl{width:20px;height:20px;border-radius:50%;border:2px solid var(--split2);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:var(--t);flex-shrink:0;}

/* ── CANTIDAD + BOTÓN ───────────────────────────────────── */
.qty-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 20px;}

/* ── CARRITO SHEET ──────────────────────────────────────── */
.cart-overlay{

.cs-handle{width:36px;height:4px;background:var(--split2);border-radius:2px;margin:12px auto 0;flex-shrink:0;}

.close-btn{width:32px;height:32px;border-radius:50%;background:var(--c2);border:1px solid var(--split);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);transition:var(--t);}
.close-btn:hover{background:var(--c3);color:var(--ink);}
.cs-body{flex:1;overflow-y:auto;overscroll-behavior:contain;}
.cs-footer{flex-shrink:0;border-top:1px solid var(--split);background:var(--c);}
.ci{display:flex;gap:13px;padding:14px 20px;border-bottom:1px solid var(--split);align-items:flex-start;background:#fff;}
.ci:last-child{border-bottom:none;}
.ci-img{width:62px;height:62px;border-radius:var(--r);overflow:hidden;flex-shrink:0;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--split);}
.ci-img img{width:100%;height:100%;object-fit:cover;}
.ci-content{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:600;color:var(--ink);}
.ci-mods{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.5;}
.ci-row{display:flex;align-items:center;justify-content:space-between;margin-top:9px;}

.cq-btn:hover{border-color:var(--ink);}
.cq-btn.rm:hover{border-color:var(--red);color:var(--red);}
.cq-num{font-family:var(--serif);font-size:15px;font-weight:700;min-width:16px;text-align:center;}
.notes-sec{padding:14px 20px;border-bottom:1px solid var(--split);background:#fff;}
.notes-lbl{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;}
.notes-ta{width:100%;padding:10px 13px;border-radius:var(--r);border:1.5px solid var(--split);background:var(--c);font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;resize:none;transition:var(--t);}
.notes-ta:focus{border-color:var(--ink2);background:#fff;}
.summary{padding:16px 20px 4px;background:#fff;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:8px;}

.sum-row.total{font-size:19px;font-weight:800;color:var(--ink);padding-top:12px;border-top:1px solid var(--split);margin-top:4px;font-family:var(--serif);letter-spacing:-.015em;}
.wa-btn{

  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background var(--t),transform .14s;
  box-shadow:0 4px 18px rgba(37,211,102,.28);
}

/* ── TOAST ──────────────────────────────────────────────── */

  position:fixed;bottom:104px;left:50%;

  font-size:13px;font-weight:600;z-index:9999;
  opacity:0;pointer-events:none;transition:all .22s ease;
  white-space:nowrap;box-shadow:var(--s3);

/* ── RESPONSIVE ─────────────────────────────────────────── */

  .rows{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--split);}
}

</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo" id="ldLogo">Cargando…</div>
  <div class="ld-tagline">Menú digital</div><div class="ld-track"><div class="ld-bar"></div></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo" id="tbLogo"></div>
      <span class="tb-name" id="tbName">Cargando...</span>
    </div>
    <div class="tb-right">
      <button class="ib" onclick="toggleSearch()" title="Buscar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div class="search-wrap" id="searchWrap">
    <div class="si-wrap">
      <span class="si-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input class="si" id="si" type="text" placeholder="Buscar productos..." oninput="buscar(this.value)">
      <button class="si-clear" id="siClear" onclick="limpiarBusqueda()">✕</button>
    </div>
  </div>

  <div id="heroWrap"></div>
  <div id="infoStrip" class="info-strip"></div>
  <div id="popularWrap"></div>
  <div class="cat-nav" id="catNav" style="display:none"><div class="cat-inner" id="catInner"></div></div>
  <div class="content" id="content"></div>
</div>

<!-- FAB CARRITO -->
<div class="cart-fab" id="cartFab" onclick="abrirCarrito()">
  <div class="fab-inner">
    <div class="fab-left">
      <div class="fab-badge" id="fabBadge">0</div>
      <span class="fab-txt">Ver mi pedido</span>
    </div>
    <span class="fab-total" id="fabTotal">$0.00</span>
  </div>
</div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="prodOverlay" onclick="if(event.target===this)cerrarProd()">
  <div class="sheet">
    <div class="sh-scroll"><div class="sh-handle"></div><div id="shContent"></div></div>
    <div class="sh-footer"><button class="add-main" id="addBtn" onclick="agregarAlCarrito()"><span>Agregar al pedido</span><span id="addPrice">$0.00</span></button></div>
  </div>
</div>

<!-- MODAL CARRITO -->
<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="cart-sheet">
    <div class="cs-header">
      <span class="cs-title">Tu pedido</span>
      <button class="close-btn" onclick="cerrarCarrito()">✕</button>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-footer" id="csFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SLUG = window.location.pathname.split('/')[2];
const BASE = window.location.origin;
let neg = null, cart = [], prod = null, sels = {}, qty = 1, notas = '', searchOpen = false;
let mitadSels = { 1: null, 2: null }; // ingredientes seleccionados por mitad

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(BASE + '/catalogo-data/' + SLUG);
    if (!r.ok) { errLoader('Negocio no encontrado'); return; }
    neg = await r.json();
    renderAll();
    fadeLoader();
  } catch(e) { errLoader('Error al cargar el menú'); }
}

function fadeLoader() {
  const l = document.getElementById('loader');
  l.style.opacity = '0';
  setTimeout(() => { l.style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 420);
}

function errLoader(msg) {
  document.getElementById('loader').innerHTML =
    '<div style="text-align:center;color:#9a9a97;font-family:system-ui">' +
    '<div style="font-size:38px;margin-bottom:14px">😕</div>' +
    '<div style="font-size:15px;font-weight:600">' + msg + '</div></div>';
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  document.title = neg.nombre + ' — Menú';
  // topbar
  document.getElementById('tbName').textContent = neg.nombre;
  const _ld = document.getElementById('ldLogo'); if (_ld) _ld.textContent = neg.nombre;
  const tl = document.getElementById('tbLogo');
  tl.innerHTML = neg.logo ? '<img src="' + neg.logo + '" alt="">' : (neg.emoji || '🛍️');
  renderHero(); renderInfoStrip(); renderPopulares(); renderCatalogo();
}

function estaAbierto() {
  // Usar el estado calculado por el servidor si está disponible
  if (typeof neg.esta_abierto === 'boolean') return neg.esta_abierto;
  // Fallback con horarios locales si los hay
  if (neg.horarios) {
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const _ecH = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
    const hoy = dias[_ecH.getDay()]; // FIX 5b
    const h = neg.horarios[hoy];
    if (!h || !h.abierto || !h.desde || !h.hasta) return false;
    const ahora = new Date();
    const [dH,dM] = h.desde.split(':').map(Number);
    const [hH,hM] = h.hasta.split(':').map(Number);
    const min = ahora.getHours()*60+ahora.getMinutes();
    return min >= dH*60+dM && min < hH*60+hM;
  }
  // FIX 5: timezone Ecuador
  const _ec = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Guayaquil' }));
  const h = _ec.getHours();
  return h >= 8 && h < 18;
}

function obtenerHorarioHoy() {
  if (!neg.horarios) return null;
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const _ecNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Guayaquil' }));
  const hoy = dias[_ecNow.getDay()]; // FIX 5b
  const h = neg.horarios[hoy];
  if (!h || !h.abierto) return null;
  return h.desde + ' — ' + h.hasta;
}

function renderHero() {
  const ab = estaAbierto();
  const w = document.getElementById('heroWrap');
  if (neg.banner) {
    w.innerHTML =
      '<div class="hero">' +
        '<img class="hero-img" src="' + neg.banner + '" alt="' + neg.nombre + '">' +
        '<div class="hero-grad"></div>' +
        '<div class="hero-info">' +
          '<div class="hero-name">' + neg.nombre + '</div>' +
          '<div class="hero-chips">' +
            '<div class="chip-glass"><div class="dot' + (ab?'':' off') + '"></div>' + (ab?'Abierto':'Cerrado') + '</div>' +
            (neg.tipo ? '<div class="chip-glass">' + neg.tipo + '</div>' : '') + (obtenerHorarioHoy() ? '<div class="chip-glass">🕐 ' + obtenerHorarioHoy() + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
  } else {
    w.innerHTML =
      '<div class="hero-plain">' +
        '<div class="hero-plain-name">' + (neg.emoji || '🛍️') + ' ' + neg.nombre + '</div>' +
        '<div class="hero-plain-chips">' +
          '<div class="chip ' + (ab?'open':'closed') + '"><div class="dot' + (ab?'':' off') + '"></div>' + (ab?'Abierto ahora':'Cerrado') + '</div>' +
          (neg.tipo ? '<div class="chip">' + neg.tipo + '</div>' : '') +
        '</div>' +
      '</div>';
  }
}

function renderInfoStrip() {
  const s = document.getElementById('infoStrip');
  const items = [];
  if (neg.tiempo_entrega) items.push('<div class="ii"><span class="ii-icon">🛵</span><div><span class="ii-lbl">Entrega estimada</span><strong>' + neg.tiempo_entrega + '</strong></div></div>');
  items.push('<div class="ii"><span class="ii-icon">💲</span><div><span class="ii-lbl">Costo de delivery</span><strong>' + (neg.costo_delivery || 'Varía según distancia') + '</strong></div></div>'); // FIX 3
  if (neg.pedido_minimo) items.push('<div class="ii"><span class="ii-icon">🛒</span><div><span class="ii-lbl">Pedido mínimo</span><strong>$' + neg.pedido_minimo + '</strong></div></div>');
  s.innerHTML = items.join('');
  if (!items.length) s.style.display = 'none';
}

function renderPopulares() {
  const pops = (neg.catalogo || []).filter(p => p.activo !== false && p.destacado);
  if (!pops.length) return;
  document.getElementById('popularWrap').innerHTML =
    '<div class="popular-section">' +
      '<div class="sec-hd"><span class="sec-hd-title">✦ Más populares</span><span class="sec-hd-sub">Los favoritos</span></div>' +
      '<div class="pop-scroll">' +
        pops.map(p =>
          '<div class="pop-card" onclick="abrirProd(\'' + String(p.id) + '\')">' // FIX 10 +
            (p.imagen ? '<img class="pop-card-img" src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="pop-card-emoji">' + (p.emoji||'📦') + '</div>') +
            '<div class="pop-card-body">' +
              '<div class="pop-card-name">' + p.nombre + '</div>' +
              '<div class="pop-card-price">$' + p.precio.toFixed(2) + '</div>' +
            '</div>' +
            '<div class="pop-badge">Popular</div>' +
          '</div>'
        ).join('') +
      '</div>' +
    '</div>';
}

function slug(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,''); }

function renderCatalogo(filtro) {
  filtro = (filtro || '').toLowerCase().trim();
  const todos = (neg.catalogo || []).filter(p => p.activo !== false);
  const prods = filtro
    ? todos.filter(p => p.nombre.toLowerCase().includes(filtro) || (p.descripcion||'').toLowerCase().includes(filtro) || (p.categoria||'').toLowerCase().includes(filtro))
    : todos;

  if (filtro) {
    document.getElementById('catNav').style.display = 'none';
    if (!prods.length) {
      document.getElementById('content').innerHTML = '<div class="no-res"><div class="no-res-icon">🔍</div><h3>Sin resultados</h3><p>No encontramos &ldquo;' + filtro + '&rdquo; en el menú</p></div>';
    } else {
      document.getElementById('content').innerHTML = '<div class="sr-wrap"><div class="sr-title">' + prods.length + ' resultado' + (prods.length!==1?'s':'') + ' para "' + filtro + '"</div><div class="rows">' + prods.map(p => rowHTML(p)).join('') + '</div></div>';
    }
    return;
  }

  // Agrupar por categoría
  const cats = {};
  prods.forEach(p => { const c = p.categoria || 'Menú'; if (!cats[c]) cats[c] = []; cats[c].push(p); });
  const names = Object.keys(cats);

  if (names.length > 1) {
    document.getElementById('catNav').style.display = 'block';
    document.getElementById('catInner').innerHTML = names.map((c, i) => '<button class="cat-btn' + (i===0?' active':'') + '" onclick="irACat(\'' + c + '\',this)">' + c + '</button>').join('');
  } else {
    document.getElementById('catNav').style.display = 'none';
  }

  document.getElementById('content').innerHTML = names.map(c =>
    '<div class="cat-sec" id="cs-' + slug(c) + '">' +
      '<div class="cat-sec-title">' + c + '</div>' +
      '<div class="rows">' + cats[c].map(p => rowHTML(p)).join('') + '</div>' +
    '</div>'
  ).join('');

  setTimeout(() => document.querySelectorAll('.cat-sec').forEach(s => io.observe(s)), 80);
}

function rowHTML(p) {
  const agotado = p.stock === 0;
  const enCarrito = cart.filter(i => i.id === p.id).reduce((s, i) => s + i.cantidad, 0);
  const tieneMods = (p.modificadores||[]).length > 0;
  return '<div class="prow' + (agotado?' sold-out':'') + '" onclick="abrirProd(\'' + String(p.id) + '\')">' +
    '<div class="prow-info">' +
      '<div class="prow-name">' + p.nombre + '</div>' +
      (p.descripcion ? '<div class="prow-desc">' + p.descripcion + '</div>' : '') +
      '<div class="prow-foot">' +
        '<span class="prow-price">' + (tieneMods ? '<span class="prow-from">Desde </span>' : '') + '$' + p.precio.toFixed(2) + '</span>' +
        (enCarrito > 0 ? '<span class="in-cart-tag">✓ ' + enCarrito + ' agregado' + (enCarrito>1?'s':'') + '</span>' : '') +
        (agotado ? '<span class="sold-tag">Agotado</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="prow-thumb">' +
      (p.imagen ? '<img src="' + p.imagen + '" alt="' + p.nombre + '" loading="lazy">' : '<div class="th-emoji">' + (p.emoji||'📦') + '</div>') +
      (!agotado ? '<div class="plus-circle">+</div>' : '') +
    '</div>' +
  '</div>';
}

// Intersection Observer para categorías activas
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('cs-', '');
      document.querySelectorAll('.cat-btn').forEach(b => {
        const match = slug(b.textContent) === id;
        b.classList.toggle('active', match);
        if (match) b.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      });
    }
  });
}, { rootMargin: '-90px 0px -55% 0px' });

function irACat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('cs-' + slug(cat));
  if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 106, behavior:'smooth' });
}

// ── MODAL PRODUCTO ────────────────────────────────────────────
function abrirProd(id) {
  prod = (neg.catalogo||[]).find(x => String(x.id) === String(id)); // FIX 2
  if (!prod) return;
  sels = {}; qty = 1; mitadSels = { 1: null, 2: null };
  // sels[gi] = para único: { oi, qty } | null  — para múltiple: [{ oi, qty }]
  (prod.modificadores || []).forEach((g, i) => { sels[i] = g.tipo === 'unico' ? null : []; });
  renderSheet();
  document.getElementById('prodOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarProd() {
  document.getElementById('prodOverlay').classList.remove('open');
  document.body.style.overflow = '';
  prod = null;
}

function renderSheet() {
  const p = prod;
  const mods = p.modificadores || [];
  let html = (p.imagen ? '<img class="sh-img" src="' + p.imagen + '" alt="' + p.nombre + '">' : '<div class="sh-emoji">' + (p.emoji||'📦') + '</div>');
  html += '<div class="sh-body">';
  html += '<div class="sh-name">' + p.nombre + '</div>';
  if (p.descripcion) html += '<div class="sh-desc">' + p.descripcion + '</div>';
  html += '<div class="sh-price" id="shPrice">$' + p.precio.toFixed(2) + '<small>por unidad</small></div>';

  // ── MITAD Y MITAD ──
  if (p.mitad_mitad && p.ingredientes_mitad?.length) {
    html += '<div class="divider"></div>';
    html += '<div class="mm-section">';
    html += '<div class="mm-title">🍕 Personaliza tu pizza</div>';
    html += '<div class="mm-sub">Elige los ingredientes de cada mitad</div>';
    html += '<div class="mm-visual"><div class="mm-pizza"><div class="mm-half mm-left" id="mmVisL">½</div><div class="mm-half mm-right" id="mmVisR">½</div><div class="mm-line"></div></div></div>';
    [1, 2].forEach(mitad => {
      html += '<div class="mm-block">';
      html += '<div class="mm-block-title"><span class="mm-badge mm-badge-' + mitad + '">' + mitad + '</span> Mitad ' + mitad + (mitad === 1 ? ' <span class="mm-side-label">← izquierda</span>' : ' <span class="mm-side-label">derecha →</span>') + '</div>';
      html += '<div class="mm-opts" id="mmOpts' + mitad + '">';
      p.ingredientes_mitad.forEach((ing, idx) => {
        html += '<div class="mm-opt" id="mm-' + mitad + '-' + idx + '" onclick="selMitad(' + mitad + ',' + idx + ',\'' + ing.replace(/'/g,"\\'"  ) + '\')">' + ing + '</div>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    html += '<div class="divider"></div>';
  }

  if (mods.length) html += '<div class="divider"></div>';
  mods.forEach((g, gi) => {
    html += '<div class="mod-group">';
    html += '<div class="mod-head"><div class="mod-title">' + g.nombre + (g.obligatorio ? '<span class="mod-req">Obligatorio</span>' : '') + '</div>';
    html += '<div class="mod-sub">' + (g.tipo==='unico' ? 'Elige una opción' : 'Puedes elegir varias y ajustar cantidad') + '</div></div>';
    g.opciones.forEach((op, oi) => {
      html += '<div class="opt-row" id="op-' + gi + '-' + oi + '" onclick="toggleOpt(' + gi + ',' + oi + ',\'' + g.tipo + '\')">';
      html += '<div class="opt-left"><div class="opt-ctrl' + (g.tipo==='unico'?'':' sq') + '" id="oc-' + gi + '-' + oi + '"></div><span class="opt-name">' + op.nombre + '</span></div>';
      html += '<div class="opt-right-wrap">';
      html += '<div class="opt-qty-ctrl" id="oqc-' + gi + '-' + oi + '" style="display:none;" onclick="event.stopPropagation()">';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',-1,\'' + g.tipo + '\')">−</button>';
      html += '<span class="oq-num" id="oqn-' + gi + '-' + oi + '">1</span>';
      html += '<button class="oq-btn" onclick="cambiarQtyOpt(' + gi + ',' + oi + ',1,\'' + g.tipo + '\')">+</button>';
      html += '</div>';
      html += '<span class="opt-price" id="opr-' + gi + '-' + oi + '">' + (op.precio > 0 ? '+$'+op.precio.toFixed(2) : op.precio < 0 ? '-$'+Math.abs(op.precio).toFixed(2) : 'Incluido') + '</span>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  if (mods.length) html += '<div class="divider"></div>';
  html += '<div class="qty-row"><span class="qty-lbl">Cantidad</span><div class="qty-ctrl"><button class="qty-btn" id="qm" onclick="cambiarQty(-1)" disabled>−</button><span class="qty-val" id="qv">1</span><button class="qty-btn" onclick="cambiarQty(1)">+</button></div></div>';
  // botón movido al sh-footer fijo
  html += '</div>';
  document.getElementById('shContent').innerHTML = html;
  document.getElementById('addPrice').textContent = '$' + p.precio.toFixed(2);
}

function toggleOpt(gi, oi, tipo) {
  const g = prod.modificadores[gi];
  if (tipo === 'unico') {
    // Deseleccionar el anterior
    if (sels[gi] !== null) {
      const prev = sels[gi].oi;
      document.getElementById('op-' + gi + '-' + prev)?.classList.remove('sel');
      document.getElementById('oc-' + gi + '-' + prev) && (document.getElementById('oc-' + gi + '-' + prev).textContent = '');
      document.getElementById('oqc-' + gi + '-' + prev) && (document.getElementById('oqc-' + gi + '-' + prev).style.display = 'none');
      document.getElementById('opr-' + gi + '-' + prev) && (document.getElementById('opr-' + gi + '-' + prev).style.display = '');
    }
    // Si clic en el mismo, deseleccionar
    if (sels[gi] !== null && sels[gi].oi === oi) {
      sels[gi] = null;
    } else {
      sels[gi] = { oi, qty: 1 };
      document.getElementById('op-' + gi + '-' + oi).classList.add('sel');
      document.getElementById('oc-' + gi + '-' + oi).textContent = '✓';
      document.getElementById('oqc-' + gi + '-' + oi).style.display = 'flex';
      document.getElementById('opr-' + gi + '-' + oi).style.display = 'none';
      document.getElementById('oqn-' + gi + '-' + oi).textContent = '1';
    }
  } else {
    if (!Array.isArray(sels[gi])) sels[gi] = [];
    const idx = sels[gi].findIndex(s => s.oi === oi);
    if (idx >= 0) {
      // Deseleccionar
      sels[gi].splice(idx, 1);
      document.getElementById('op-' + gi + '-' + oi).classList.remove('sel');
      document.getElementById('oc-' + gi + '-' + oi).textContent = '';
      document.getElementById('oqc-' + gi + '-' + oi).style.display = 'none';
      document.getElementById('opr-' + gi + '-' + oi).style.display = '';
    } else {
      // Seleccionar
      sels[gi].push({ oi, qty: 1 });
      document.getElementById('op-' + gi + '-' + oi).classList.add('sel');
      document.getElementById('oc-' + gi + '-' + oi).textContent = '✓';
      document.getElementById('oqc-' + gi + '-' + oi).style.display = 'flex';
      document.getElementById('opr-' + gi + '-' + oi).style.display = 'none';
      document.getElementById('oqn-' + gi + '-' + oi).textContent = '1';
    }
  }
  actualizarPrecioSheet();
}

function cambiarQtyOpt(gi, oi, delta, tipo) {
  let entry = tipo === 'unico' ? sels[gi] : (sels[gi] || []).find(s => s.oi === oi);
  if (!entry) return;
  entry.qty = Math.max(1, entry.qty + delta);
  document.getElementById('oqn-' + gi + '-' + oi).textContent = entry.qty;
  actualizarPrecioSheet();
}

function calcExtra() {
  let e = 0;
  (prod.modificadores || []).forEach((g, gi) => {
    const s = sels[gi];
    if (g.tipo === 'unico' && s !== null) {
      e += (g.opciones[s.oi]?.precio || 0) * s.qty;
    } else if (Array.isArray(s)) {
      s.forEach(({ oi, qty }) => { e += (g.opciones[oi]?.precio || 0) * qty; });
    }
  });
  return e;
}

function actualizarPrecioSheet() {
  const extra = calcExtra();
  const total = (prod.precio + extra) * qty;
  document.getElementById('shPrice').innerHTML = '$' + (prod.precio + extra).toFixed(2) + '<small>por unidad</small>';
  document.getElementById('addPrice').textContent = '$' + total.toFixed(2);
}

function cambiarQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qv').textContent = qty;
  document.getElementById('qm').disabled = qty <= 1;
  actualizarPrecioSheet();
}

function selMitad(mitad, idx, nombre) {
  mitadSels[mitad] = { idx, nombre };
  // limpiar selección anterior de esa mitad
  document.querySelectorAll('#mmOpts' + mitad + ' .mm-opt').forEach(el => el.classList.remove('sel'));
  document.getElementById('mm-' + mitad + '-' + idx)?.classList.add('sel');
  // actualizar visual de la pizza
  const visL = document.getElementById('mmVisL');
  const visR = document.getElementById('mmVisR');
  if (visL && mitad === 1) visL.textContent = mitadSels[1]?.nombre?.split(' ')[0] || '½';
  if (visR && mitad === 2) visR.textContent = mitadSels[2]?.nombre?.split(' ')[0] || '½';
}

function agregarAlCarrito() {
  // Validar mitad y mitad si aplica
  if (prod.mitad_mitad && prod.ingredientes_mitad?.length) {
    if (!mitadSels[1]) { toast('Elige el ingrediente para la Mitad 1 🍕'); return; }
    if (!mitadSels[2]) { toast('Elige el ingrediente para la Mitad 2 🍕'); return; }
  }
  const mods = prod.modificadores || [];
  for (let gi = 0; gi < mods.length; gi++) {
    const g = mods[gi];
    if (!g.obligatorio) continue;
    const s = sels[gi];
    if (g.tipo === 'unico' ? s == null : !s?.length) { toast('Elige una opción en: ' + g.nombre); return; }
  }
  const extra = calcExtra();
  const modsGuardados = [];
  // Agregar mitades como primer modificador si aplica
  if (prod.mitad_mitad && mitadSels[1] && mitadSels[2]) {
    modsGuardados.push({ grupo: '🍕 Mitades', opciones: ['Mitad 1: ' + mitadSels[1].nombre, 'Mitad 2: ' + mitadSels[2].nombre], esMitad: true });
  }
  mods.forEach((g, gi) => {
    const s = sels[gi];
    let ops = [];
    if (g.tipo === 'unico' && s !== null) {
      const nombre = g.opciones[s.oi].nombre;
      ops = [s.qty > 1 ? nombre + ' x' + s.qty : nombre];
    } else if (Array.isArray(s)) {
      ops = s.map(({ oi, qty }) => {
        const nombre = g.opciones[oi].nombre;
        return qty > 1 ? nombre + ' x' + qty : nombre;
      });
    }
    if (ops.length) modsGuardados.push({ grupo: g.nombre, opciones: ops });
  });
  const _nombre = prod.nombre; // FIX 1: guardar antes de cerrarProd (prod=null después)
  cart.push({ uid: Date.now() + Math.random(), id: prod.id, nombre: prod.nombre, precio: prod.precio + extra, emoji: prod.emoji||'🍕', imagen: prod.imagen||'', cantidad: qty, modificadores: modsGuardados });
  cerrarProd(); actualizarFab();
  renderCatalogo(document.getElementById('si')?.value?.toLowerCase().trim() || '');
  toast('✓ ' + _nombre + ' agregado');
}

// ── CARRITO ───────────────────────────────────────────────────
function actualizarFab() {
  const count = cart.reduce((s, i) => s + i.cantidad, 0);
  const total = cart.reduce((s, i) => s + i.precio * i.cantidad, 0);
  document.getElementById('fabBadge').textContent = count;
  document.getElementById('fabTotal').textContent = '$' + total.toFixed(2);
  document.getElementById('cartFab').classList.toggle('on', count > 0);
}

function abrirCarrito() {
  renderCarrito();
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarCarrito() {
  const _ta3 = document.getElementById('notasInput'); if (_ta3) notas = _ta3.value; // FIX 8c
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCarrito() {
  const body = document.getElementById('csBody');
  const footer = document.getElementById('csFooter');

  if (!cart.length) {
    body.innerHTML = '<div class="cart-empty"><div class="ce-icon">🛒</div><div class="ce-title">Tu pedido está vacío</div><div class="ce-sub">Agrega productos del menú</div></div>';
    footer.innerHTML = '';
    return;
  }

  const subtotal = cart.reduce((s, i) => s + i.precio * i.cantidad, 0);

  body.innerHTML = cart.map((item, idx) =>
    '<div class="ci">' +
      '<div class="ci-img">' + (item.imagen ? '<img src="' + item.imagen + '" alt="">' : item.emoji) + '</div>' +
      '<div class="ci-content">' +
        '<div class="ci-name">' + item.nombre + '</div>' +
        (item.modificadores?.map(m => '<div class="ci-mods">' + m.grupo + ': ' + m.opciones.join(', ') + '</div>').join('') || '') +
        '<div class="ci-row">' +
          '<span class="ci-price">$' + (item.precio * item.cantidad).toFixed(2) + '</span>' +
          '<div class="ci-qty">' +
            '<button class="cq-btn rm" onclick="cambiarQtyCart(' + idx + ',-1)">' + (item.cantidad === 1 ? '🗑' : '−') + '</button>' +
            '<span class="cq-num">' + item.cantidad + '</span>' +
            '<button class="cq-btn" onclick="cambiarQtyCart(' + idx + ',1)">+</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('') +
  '<div class="notes-sec"><div class="notes-lbl">📝 Notas del pedido (opcional)</div><textarea class="notes-ta" id="notasInput" rows="2" placeholder="Ej: Sin cebolla, pago con $50...">' + notas + '</textarea></div>';

  footer.innerHTML =
    '<div class="summary">' +
      '<div class="sum-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>' +
      (neg.costo_delivery
        ? '<div class="sum-row"><span>Delivery</span><span>' + neg.costo_delivery + '</span></div>'
        : '<div class="sum-row"><span>Delivery</span><span style="color:var(--g400)">Se coordina al confirmar</span></div>') +
      '<div class="sum-row total"><span>Total</span><span>$' + (subtotal + (isNaN(parseFloat(neg.costo_delivery)) ? 0 : parseFloat(neg.costo_delivery))).toFixed(2) + '</span></div>' // FIX 4 +
      '<button class="wa-btn" onclick="confirmarPedido()">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
        'Confirmar pedido por WhatsApp' +
      '</button>' +
    '</div>';
}

function cambiarQtyCart(idx, d) {
  const _ta = document.getElementById('notasInput'); if (_ta) notas = _ta.value; // FIX 8
  if (d < 0 && cart[idx].cantidad === 1) cart.splice(idx, 1);
  else cart[idx].cantidad = Math.max(1, cart[idx].cantidad + d);
  actualizarFab(); // FIX 9: actualizarFab antes de cerrar
  if (!cart.length) { cerrarCarrito(); return; }
  renderCarrito();
  renderCatalogo(document.getElementById('si')?.value?.toLowerCase().trim() || '');
}

function confirmarPedido() {
  const _ta2 = document.getElementById('notasInput'); if (_ta2) notas = _ta2.value; // FIX 8b
  if (!cart.length) return;
  const lineas = cart.map(item => {
    let l = '• ' + item.nombre + ' x' + item.cantidad + ' — $' + (item.precio * item.cantidad).toFixed(2);
    (item.modificadores || []).forEach(m => { l += '\n   ' + m.grupo + ': ' + m.opciones.join(', '); });
    return l;
  });
  const subtotal = cart.reduce((s, i) => s + i.precio * i.cantidad, 0);
  let msg = 'Hola! Quiero hacer un pedido 🛒\n\n' + lineas.join('\n\n') + '\n\n💰 Total: $' + subtotal.toFixed(2);
  if (notas.trim()) msg += '\n\n📝 Notas: ' + notas.trim();
  msg += '\n\n_(Pedido desde el catálogo web)_';
  const wa = (neg.whatsapp_numero || neg.whatsapp_dueno || '').replace(/\D/g, '');
  if (!wa) { toast('Sin número de WhatsApp configurado'); return; }
  window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(msg), '_blank');
}

// ── BÚSQUEDA ──────────────────────────────────────────────────
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchWrap').classList.toggle('open', searchOpen);
  document.getElementById('catNav').classList.toggle('search-open', searchOpen); // FIX 6
  if (searchOpen) setTimeout(() => document.getElementById('si').focus(), 260);
  else limpiarBusqueda();
}

function buscar(val) {
  const v = (val || '').toLowerCase().trim();
  document.getElementById('siClear').classList.toggle('show', v.length > 0);
  renderCatalogo(v.length >= 2 ? v : ''); // FIX 7: resetea con 0 o 1 caracter
}

function limpiarBusqueda() {
  document.getElementById('si').value = '';
  document.getElementById('siClear').classList.remove('show');
  renderCatalogo();
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2400);
}

init();
</script>
