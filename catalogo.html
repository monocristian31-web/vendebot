<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Menú</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@450;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --brand:#c8102e;
      --brand-dark:#9e0c24;
      --brand-ink:#fff;
      --page:#f2f2f2;
      --page-soft:#e8ebef;
      --card:#fff;
      --ink:#1a1a1a;
      --muted:#5c5c5c;
      --line:#e8e8e8;
      --ok:#0a7d3e;
      --safe:env(safe-area-inset-bottom,0px);
      --banner-opacity:.45;
    }
    html{scroll-behavior:smooth;}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(1100px 520px at -10% -10%, color-mix(in srgb,var(--brand) 10%, transparent), transparent 60%),
        radial-gradient(1000px 480px at 110% -10%, color-mix(in srgb,var(--brand) 8%, transparent), transparent 62%),
        linear-gradient(180deg,var(--page-soft),var(--page));
      color:var(--ink);min-height:100vh;padding-bottom:calc(88px + var(--safe));
    }

    #loader{position:fixed;inset:0;z-index:9999;background:var(--page);display:flex;align-items:center;justify-content:center;}
    .ld{text-align:center;}
    .ld-ring{width:48px;height:48px;border:4px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 16px;animation:spin .9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ld-t{font-weight:800;font-size:14px;letter-spacing:.04em;}
    .ld-s{margin-top:8px;font-size:13px;color:var(--muted);}

    #app{display:none;}

    /* Header estilo app comida rápida */
    .hdr{
      position:sticky;top:0;z-index:100;
      background:var(--brand);color:var(--brand-ink);
      box-shadow:0 4px 18px rgba(0,0,0,.12);
    }
    .hdr-top{display:flex;align-items:center;gap:10px;padding:12px 14px;}
    .hdr-logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(255,255,255,.35);}
    .hdr-logo img{width:100%;height:100%;object-fit:cover;}
    .hdr-txt{flex:1;min-width:0;}
    .hdr-name{font-weight:900;font-size:17px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-sub{font-size:12px;opacity:.92;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-actions{display:flex;align-items:center;gap:8px;}
    .hdr-btn{
      width:42px;height:42px;border-radius:12px;border:none;background:rgba(255,255,255,.22);color:#fff;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .hdr-btn:active{opacity:.85;}
    .cart-badge-wrap{position:relative;}
    .cart-badge{
      position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#ffd23f;color:#1a1a1a;
      font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--brand);
    }

    /* Mini promo / banner */
    .promo{margin:12px 14px 0;border-radius:16px;overflow:hidden;position:relative;min-height:120px;background:var(--card);border:1px solid var(--line);}
    .promo img{width:100%;height:140px;object-fit:cover;display:block;opacity:var(--banner-opacity);}
    .promo-v{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.55) 0%,transparent 70%);pointer-events:none;}
    .promo-txt{position:absolute;left:16px;bottom:14px;right:16px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4);}
    .promo-txt h1{font-size:22px;font-weight:900;line-height:1.15;}
    .promo-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .tag{font-size:11px;font-weight:800;background:rgba(255,255,255,.25);padding:4px 10px;border-radius:999px;}
    .closed .tag{background:rgba(255,56,96,.9);}

    .strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 14px 0;}
    .strip-it{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center;}
    .strip-it small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.06em;margin-bottom:4px;}
    .strip-it strong{font-size:13px;font-weight:800;}

    /* Categorías horizontales (KFC) */
    .cats-wrap{
      position:sticky;top:68px;z-index:90;background:var(--page);
      padding:10px 0 6px;border-bottom:1px solid var(--line);
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .cats{display:flex;gap:8px;overflow-x:auto;padding:0 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-pill{
      flex-shrink:0;padding:10px 18px;border-radius:999px;border:2px solid var(--line);
      background:var(--card);font-weight:800;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;
    }
    .cat-pill.on{border-color:var(--brand);background:var(--brand);color:#fff;}

    /* Combo banner */
    .combo-card{
      margin:12px 14px;padding:14px 16px;border-radius:16px;
      background:linear-gradient(135deg,#fff7e6,#fff);
      border:2px solid #ffd23f;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;
      box-shadow:0 6px 20px rgba(0,0,0,.06);
    }
    .combo-card:active{transform:scale(.995);}
    .combo-t{font-weight:900;color:var(--brand);font-size:15px;}
    .combo-s{font-size:12px;color:var(--muted);margin-top:2px;}
    .combo-p{font-weight:900;font-size:18px;}
    .hl-wrap{display:flex;gap:10px;overflow:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
    .hl-wrap::-webkit-scrollbar{display:none;}
    .hl{
      min-width:220px;max-width:260px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;
      display:flex;gap:10px;align-items:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.05);
    }
    .hl-img{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#f4f4f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .hl-img img{width:100%;height:100%;object-fit:cover;}
    .hl-n{font-size:13px;font-weight:900;line-height:1.2;}
    .hl-p{font-size:12px;font-weight:800;color:var(--brand);margin-top:3px;}

    /* Grid productos 2 columnas */
    .menu-pad{padding:14px;}
    .sec-title{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    @media(min-width:520px){.grid-2{grid-template-columns:repeat(3,1fr);}}

    .cat-sec{margin-top:14px;}
    .cat-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:18px 0 10px;}
    .cat-head h2{font-size:16px;font-weight:900;letter-spacing:.01em;}
    .cat-head small{color:var(--muted);font-weight:800;}

    .p-card{
      background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
      display:flex;flex-direction:column;box-shadow:0 4px 14px rgba(0,0,0,.06);position:relative;
    }
    .p-card.agotado{opacity:.45;pointer-events:none;}
    .p-img-wrap{position:relative;aspect-ratio:1/1;background:#fafafa;}
    .p-img{width:100%;height:100%;object-fit:cover;}
    .p-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:#f7f7f7;}
    .badge-soon{position:absolute;top:8px;left:8px;background:var(--brand);color:#fff;font-size:10px;font-weight:900;padding:4px 8px;border-radius:8px;}
    .p-body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1;}
    .p-name{font-weight:900;font-size:14px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em;}
    .p-desc{font-size:11px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;}
    .p-foot{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .p-price{font-weight:900;font-size:15px;color:var(--brand);}
    .p-from{font-size:10px;color:var(--muted);font-weight:700;}
    .btn-add{
      border:none;border-radius:999px;padding:8px 14px;font-weight:900;font-size:12px;cursor:pointer;
      background:var(--brand);color:#fff;white-space:nowrap;box-shadow:0 4px 12px rgba(200,16,46,.35);
    }
    .btn-add:active{transform:scale(.97);}

    /* Overlay base */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);visibility:hidden;opacity:0;transition:.22s;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .ov.on{visibility:visible;opacity:1;}
    .sheet{
      width:100%;max-width:560px;max-height:92vh;background:#fff;border-radius:22px 22px 0 0;
      transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.9,.2,1);overflow:hidden;display:flex;flex-direction:column;
      box-shadow:0 -8px 40px rgba(0,0,0,.18);
    }
    .ov.on .sheet{transform:translateY(0);}
    .sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .sheet-x{width:44px;height:44px;border:none;background:#f0f0f0;border-radius:12px;font-size:18px;cursor:pointer;font-weight:900;}
    .sheet-h{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0;background:#fff;}
    .sheet-h span{flex:1;font-weight:900;font-size:15px;}

    /* Producto detalle */
    .pd-hero{position:relative;aspect-ratio:16/10;background:#f5f5f5;}
    .pd-hero img{width:100%;height:100%;object-fit:cover;}
    .pd-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;}
    .pd-body{padding:16px 16px 100px;}
    .pd-name{font-size:22px;font-weight:900;line-height:1.15;}
    .pd-desc{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.45;}
    .pd-price-row{display:flex;align-items:baseline;gap:8px;margin-top:12px;}
    .pd-price{font-size:22px;font-weight:900;color:var(--brand);}
    .pd-unit{font-size:13px;color:var(--muted);font-weight:700;}

    .grp{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);}
    .grp-t{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
    .grp-t h3{font-size:15px;font-weight:900;}
    .grp-hint{font-size:12px;color:var(--muted);font-weight:600;}
    .req{color:var(--brand);font-size:11px;font-weight:900;margin-left:6px;}

    /* Opciones tipo radio / check grande */
    .opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid var(--line);border-radius:14px;margin-bottom:8px;cursor:pointer;background:#fff;}
    .opt.sel{border-color:var(--brand);background:#fff8f8;}
    .opt-ctrl{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .opt.sel .opt-ctrl{border-color:var(--brand);background:var(--brand);box-shadow:inset 0 0 0 3px #fff;}
    .opt.sel .opt-ctrl.sq{border-radius:6px;}
    .opt-mid{flex:1;min-width:0;}
    .opt-name{font-weight:800;font-size:14px;}
    .opt-extra{font-size:13px;font-weight:700;color:var(--muted);}

    /* Cantidad */
    .qty-bar{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding:14px;border:2px solid var(--line);border-radius:16px;}
    .qty-bar span{font-weight:900;}
    .qty-ctrl{display:flex;align-items:center;gap:14px;}
    .qbtn{width:44px;height:44px;border-radius:12px;border:2px solid var(--line);background:#fff;font-size:22px;font-weight:800;cursor:pointer;}
    .qbtn:disabled{opacity:.35;cursor:not-allowed;}
    .qval{font-size:20px;font-weight:900;min-width:28px;text-align:center;}

    /* Sticky add bar (KFC) */
    .stick-add{
      position:absolute;left:0;right:0;bottom:0;padding:12px 16px calc(12px + var(--safe));
      background:linear-gradient(180deg,transparent,rgba(255,255,255,.97) 25%,#fff);
      border-top:1px solid var(--line);
    }
    .btn-big{width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;
      background:var(--ok);color:#fff;box-shadow:0 8px 24px rgba(10,125,62,.35);}
    .btn-big:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}

    /* Carrito */
    .cart-line{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card);}
    .cart-line img{width:56px;height:56px;object-fit:cover;border-radius:12px;background:#f5f5f5;}
    .cart-mid{flex:1;min-width:0;}
    .cart-n{font-weight:900;font-size:14px;}
    .cart-m{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.35;}
    .cart-p{font-weight:900;color:var(--brand);margin-top:8px;}
    .cart-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
    .cqty{display:flex;align-items:center;gap:6px;}
    .cq{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:900;cursor:pointer;}

    .wa-btn{width:100%;border:none;border-radius:16px;padding:16px;font-weight:900;background:#25D366;color:#fff;cursor:pointer;margin-top:8px;}

    .toast{
      position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(96px + var(--safe));
      background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:700;z-index:300;
      opacity:0;pointer-events:none;transition:.2s;max-width:92vw;text-align:center;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

    @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
  </style>
</head>
<body>
  <div id="loader"><div class="ld"><div class="ld-ring"></div><div class="ld-t" id="ldT">Cargando menú</div><div class="ld-s" id="ldS">Un momento…</div></div></div>

  <div id="app">
    <header class="hdr">
      <div class="hdr-top">
        <div class="hdr-logo" id="hdrLogo"></div>
        <div class="hdr-txt">
          <div class="hdr-name" id="hdrName">—</div>
          <div class="hdr-sub" id="hdrSub">Menú digital</div>
        </div>
        <div class="hdr-actions">
          <button type="button" class="hdr-btn" id="btnSearch" aria-label="Buscar">🔍</button>
          <div class="cart-badge-wrap">
            <button type="button" class="hdr-btn" id="btnCart" aria-label="Carrito">🛒</button>
            <span class="cart-badge" id="hdrCartN" style="display:none">0</span>
          </div>
        </div>
      </div>
    </header>

    <div id="searchBar" style="display:none;padding:10px 14px;background:var(--page);border-bottom:1px solid var(--line);">
      <div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;">
        <span style="opacity:.5">🔍</span>
        <input id="searchInput" type="search" placeholder="Buscar producto…" style="flex:1;border:none;outline:none;font:inherit;">
        <button type="button" id="searchClose" style="border:none;background:none;font-weight:800;cursor:pointer;color:var(--muted)">✕</button>
      </div>
    </div>

    <section class="promo" id="promoSec">
      <img id="promoImg" alt="" style="display:none">
      <div class="promo-v"></div>
      <div class="promo-txt" id="promoTxt">
        <h1 id="promoH1">—</h1>
        <div class="promo-tags" id="promoTags"></div>
      </div>
    </section>

    <div class="strip" id="strip"></div>
    <div id="highlights" style="padding:12px 14px 0;"></div>

    <div id="comboSlot"></div>

    <div class="cats-wrap" id="catsWrap" style="display:none">
      <div class="cats" id="cats"></div>
    </div>

    <div class="menu-pad">
      <div class="sec-title" id="gridTitle">Menú</div>
      <div class="grid-2" id="grid"></div>
    </div>
  </div>

  <!-- Product sheet -->
  <div class="ov" id="ovProd">
    <div class="sheet" style="position:relative;">
      <div class="sheet-h">
        <button type="button" class="sheet-x" id="prodClose">✕</button>
        <span>Personalizar</span>
        <span style="width:44px"></span>
      </div>
      <div class="sheet-scroll">
        <div class="pd-hero" id="pdHero"></div>
        <div class="pd-body" id="pdBody"></div>
      </div>
      <div class="stick-add" id="prodStick">
        <button type="button" class="btn-big" id="prodAddBtn">Agregar al carrito</button>
      </div>
    </div>
  </div>

  <!-- Cart sheet -->
  <div class="ov" id="ovCart">
    <div class="sheet">
      <div class="sheet-h">
        <button type="button" class="sheet-x" id="cartClose">✕</button>
        <span>Tu pedido</span>
        <span style="width:44px"></span>
      </div>
      <div class="sheet-scroll" style="padding:14px" id="cartList"></div>
      <div class="stick-add" style="position:relative;background:#fff;border-top:1px solid var(--line);">
        <div style="display:flex;justify-content:space-between;font-weight:900;margin-bottom:10px;font-size:15px;">
          <span>Total</span><span id="cartTotal">$0.00</span>
        </div>
        <button type="button" class="wa-btn" id="waBtn">Enviar pedido por WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  const SLUG = location.pathname.split('/')[2];
  const BASE = window.location.origin;

  let neg = null;
  let cart = [];
  let catAct = 'todas';
  let qFilter = '';

  let prod = null;
  let qty = 1;
  let selsUnico = {};
  let selsMulti = {};
  let sinSet = new Set();
  let mitad = {1:null,2:null};

  let comboDef = [];
  let comboStep = 0;
  let comboSels = [];
  let comboBase = 0;

  function money(n){ return '$' + (Number(n)||0).toFixed(2); }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function hexToRgb(h){
    if(typeof h !== 'string' || !/^#[0-9a-fA-F]{6}$/.test(h)) return null;
    return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};
  }
  function rgbToHex(r,g,b){
    const to = (n)=>clamp(Math.round(n),0,255).toString(16).padStart(2,'0');
    return `#${to(r)}${to(g)}${to(b)}`;
  }
  function mix(a,b,t){
    const ra=hexToRgb(a), rb=hexToRgb(b);
    if(!ra||!rb) return a || b || '#000000';
    return rgbToHex(ra.r+(rb.r-ra.r)*t, ra.g+(rb.g-ra.g)*t, ra.b+(rb.b-ra.b)*t);
  }
  function luminance(hex){
    const c = hexToRgb(hex); if(!c) return 0;
    const f = (x)=>{ x/=255; return x<=0.03928 ? x/12.92 : Math.pow((x+0.055)/1.055,2.4); };
    return 0.2126*f(c.r)+0.7152*f(c.g)+0.0722*f(c.b);
  }
  function contrastText(bg){
    const l = luminance(bg);
    return l > 0.6 ? '#101214' : '#ffffff';
  }
  function smartTheme(t){
    const pri = /^#[0-9a-fA-F]{6}$/.test(t?.color_primario||'') ? t.color_primario : '#c8102e';
    const fondo = /^#[0-9a-fA-F]{6}$/.test(t?.color_fondo||'') ? t.color_fondo : '#f2f2f2';
    const txt = /^#[0-9a-fA-F]{6}$/.test(t?.color_texto||'') ? t.color_texto : contrastText(fondo);
    const isDark = luminance(fondo) < 0.42;
    return {
      brand: pri,
      brandDark: mix(pri, isDark ? '#000000' : '#6b0012', .34),
      brandInk: contrastText(pri),
      page: fondo,
      pageSoft: mix(fondo, isDark ? '#111827' : '#ffffff', isDark ? .22 : .35),
      card: mix(fondo, isDark ? '#1b2230' : '#ffffff', isDark ? .24 : .92),
      line: mix(fondo, isDark ? '#ffffff' : '#0f172a', isDark ? .22 : .16),
      ink: txt,
      muted: mix(txt, fondo, .46)
    };
  }
  function toast(t){
    const el = document.getElementById('toast');
    el.textContent = t;
    el.classList.add('on');
    clearTimeout(window._tt);
    window._tt = setTimeout(()=>el.classList.remove('on'), 2200);
  }

  function aplicarTema(t){
    if(!t) return;
    const root = document.documentElement;
    const st = smartTheme(t);
    root.style.setProperty('--brand', st.brand);
    root.style.setProperty('--brand-dark', st.brandDark);
    root.style.setProperty('--brand-ink', st.brandInk);
    root.style.setProperty('--page', st.page);
    root.style.setProperty('--page-soft', st.pageSoft);
    root.style.setProperty('--card', st.card);
    root.style.setProperty('--line', st.line);
    root.style.setProperty('--ink', st.ink);
    root.style.setProperty('--muted', st.muted);

  function horarioHoy(){
    if(!neg?.horarios) return null;
    const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const h = neg.horarios[dias[d.getDay()]];
    if(!h||!h.abierto||!h.desde||!h.hasta) return null;
    return h.desde + ' – ' + h.hasta;
  }

  function estaAbierto(){
    if(typeof neg?.esta_abierto === 'boolean') return neg.esta_abierto;
    if(!neg?.horarios) return true;
    const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const h = neg.horarios[dias[d.getDay()]];
    if(!h||!h.abierto||!h.desde||!h.hasta) return false;
    const [dh,dm]=h.desde.split(':').map(Number),[hh,hm]=h.hasta.split(':').map(Number);
    const m = d.getHours()*60+d.getMinutes();
    return m >= dh*60+dm && m < hh*60+hm;
  }

  function construirCombos(){
    if(Array.isArray(neg.combos) && neg.combos.length){
      comboDef = neg.combos;
      comboBase = Number(neg.precio_combo)||0;
      return;
    }
    const catalogoFull = (neg.catalogo||[]).filter(p=>p.activo!==false);
    const catMap={
      principal:['Principal','Principales','Burger','Burgers','Hamburguesas','Comida','Platos'],
      acomp:['Acompañante','Acompañantes','Sides','Papas','Snacks'],
      bebida:['Bebida','Bebidas','Drinks','Jugos','Gaseosas']
    };
    const em={principal:'🍔',acomp:'🍟',bebida:'🥤'};
    const lb={principal:'Principal',acomp:'Acompañante',bebida:'Bebida'};
    const cats=[...new Set(catalogoFull.map(p=>p.categoria||'General'))];
    comboDef=[];
    Object.keys(catMap).forEach(k=>{
      const names=catMap[k];
      const match=cats.find(c=>names.some(n=>String(c).toLowerCase().includes(String(n).toLowerCase())));
      if(match) comboDef.push({label:lb[k],emoji:em[k],categoria:match,items:catalogoFull.filter(p=>(p.categoria||'General')===match)});
    });
    comboBase = Number(neg.precio_combo)||0;
  }

  }

  function allProducts(){ return (neg.catalogo||[]).filter(p=>p.activo!==false); }

  function buildCats(products){
    const byCat = new Map();
    for(const p of products){
      const c = p.categoria || 'Menú';
      if(!byCat.has(c)) byCat.set(c, []);
      byCat.get(c).push(p);
    }
    return byCat;
  }

    let list = allProducts();

    if(q.length>=2) list = list.filter(p=>(p.nombre||'').toLowerCase().includes(q)||(p.descripcion||'').toLowerCase().includes(q));
    return list;
  }

  function calcExtra(){
    if(!prod) return 0;
    let e=0;
    (prod.modificadores||[]).forEach((g,gi)=>{
      const tipo = g.tipo==='unico' ? 'unico' : (g.tipo==='multiple'?'multiple':(g.tipo?g.tipo:'unico'));
      if(tipo==='unico'){
        const oi=selsUnico[gi]; if(oi!=null) e+=Number(g.opciones?.[oi]?.precio||0);
      } else {
        const counts = selsMulti[gi] || {};
        Object.entries(counts).forEach(([oi, qtySel])=>{
          e += (Number(g.opciones?.[Number(oi)]?.precio||0) * (Number(qtySel)||0));
        });
      }
    });
    return e;
  }

  function reqOk(){
    if(!prod) return false;
    for(let gi=0;gi<(prod.modificadores||[]).length;gi++){
      const g=prod.modificadores[gi]; if(!g.obligatorio) continue;
      const tipo=g.tipo==='unico'?'unico':(g.tipo==='multiple'?'multiple':(g.tipo?g.tipo:'unico'));
      if(tipo==='unico' && selsUnico[gi]==null) return false;
      if(tipo!=='unico'){
        const counts = selsMulti[gi] || {};
        const totalSel = Object.values(counts).reduce((s,n)=>s+(Number(n)||0),0);
        if(totalSel === 0) return false;
      }
    }
    if(prod.mitad_mitad && (prod.ingredientes_mitad||[]).length){
      if(!mitad[1]||!mitad[2]) return false;
    }
    return true;
  }

  function modsTexto(){
    const parts=[];
    (prod.modificadores||[]).forEach((g,gi)=>{
      const tipo=g.tipo==='unico'?'unico':(g.tipo==='multiple'?'multiple':(g.tipo?g.tipo:'unico'));
      if(tipo==='unico'){
        const oi=selsUnico[gi]; const op=g.opciones?.[oi]; if(op) parts.push(`${g.nombre}: ${op.nombre}`);
      } else {
        const counts=selsMulti[gi]||{};
        const names = Object.entries(counts)
          .filter(([,q]) => Number(q) > 0)
          .map(([oi,q]) => {
            const n = g.opciones?.[Number(oi)]?.nombre;
            if(!n) return null;
            return Number(q) > 1 ? `${n} x${Number(q)}` : n;
          })
          .filter(Boolean);
        if(names.length) parts.push(`${g.nombre}: ${names.join(', ')}`);
      }
    });
    if(prod.mitad_mitad && mitad[1]&&mitad[2]) parts.push(`Mitad 1: ${mitad[1]} · Mitad 2: ${mitad[2]}`);
    const ings=prod.ingredientes||[];
    if(sinSet.size) parts.push('Sin: '+[...sinSet].map(i=>ings[i]).filter(Boolean).join(', '));
    return parts.join(' · ');
  }

  function openProduct(p){
    document.getElementById('prodStick').innerHTML = `<button type="button" class="btn-big" id="prodAddBtn">Agregar al carrito</button>`;
    document.getElementById('prodClose').onclick = closeProd;
    prod=p; qty=1; selsUnico={}; selsMulti={}; sinSet=new Set(); mitad={1:null,2:null};
    (p.modificadores||[]).forEach((g,gi)=>{
      const tipo=g.tipo==='unico'?'unico':(g.tipo==='multiple'?'multiple':(g.tipo?g.tipo:'unico'));
      if(tipo==='unico') selsUnico[gi]=null; else selsMulti[gi]={};
    });

    const hero=document.getElementById('pdHero');
    hero.innerHTML = p.imagen?`<img src="${p.imagen}" alt="">`:`<div class="pd-hero-ph">${p.emoji||'🍽️'}</div>`;

    function paint(){
      const base=Number(p.precio)||0;
      const ex=calcExtra();
      const unit=base+ex;
      const total=unit*qty;

      let html=`<div class="pd-name">${p.nombre}</div>`;
      if(p.descripcion) html+=`<div class="pd-desc">${p.descripcion}</div>`;
      html+=`<div class="pd-price-row"><div class="pd-price">${money(unit)}</div><div class="pd-unit">/ unidad · Total ${money(total)}</div></div>`;

      if(p.mitad_mitad && (p.ingredientes_mitad||[]).length){
        html+=`<div class="grp"><div class="grp-t"><h3>Mitad y mitad</h3><span class="grp-hint">Elige 2</span></div>`;
        [1,2].forEach(m=>{
          html+=`<div style="font-weight:800;font-size:13px;margin:10px 0 6px;">Mitad ${m}</div>`;
          (p.ingredientes_mitad||[]).forEach((ing,idx)=>{
            const sel = mitad[m]===ing;
            html+=`<div class="opt ${sel?'sel':''}" data-mitad="${m}" data-ing="${encodeURIComponent(ing)}">
              <div class="opt-ctrl"></div><div class="opt-mid"><div class="opt-name">${ing}</div></div></div>`;
          });
        });
        html+=`</div>`;
      }

      (p.modificadores||[]).forEach((g,gi)=>{
        const tipo=g.tipo==='unico'?'unico':(g.tipo==='multiple'?'multiple':(g.tipo?g.tipo:'unico'));
        html+=`<div class="grp">
          <div class="grp-t"><h3>${g.nombre}${g.obligatorio?'<span class="req">*</span>':''}</h3>
          <span class="grp-hint">${tipo==='unico'?'Elige una':'Elige varias'}</span></div>`;
        (g.opciones||[]).forEach((op,oi)=>{
          const sel = tipo==='unico' ? selsUnico[gi]===oi : ((Number(selsMulti?.[gi]?.[oi]||0))>0);
          const qtyOpt = Number(selsMulti?.[gi]?.[oi]||0);
          const pr=Number(op.precio||0);
          const px = pr===0 ? 'Incl.' : (pr>0?'+'+money(pr):'–'+money(Math.abs(pr)));
          if(tipo==='multiple'){
            html+=`<div class="opt ${sel?'sel':''}" data-gi="${gi}" data-oi="${oi}" data-tipo="${tipo}">
              <div class="opt-mid"><div class="opt-name">${op.nombre}</div></div>
              <div class="opt-extra" style="display:flex;align-items:center;gap:8px;">
                <span>${px}</span>
                <button type="button" data-mact="dec" data-gi="${gi}" data-oi="${oi}" class="qbtn" style="width:32px;height:32px;">−</button>
                <strong style="min-width:16px;text-align:center;">${qtyOpt}</strong>
                <button type="button" data-mact="inc" data-gi="${gi}" data-oi="${oi}" class="qbtn" style="width:32px;height:32px;">+</button>
              </div></div>`;
          } else {
            html+=`<div class="opt ${sel?'sel':''}" data-gi="${gi}" data-oi="${oi}" data-tipo="${tipo}">
              <div class="opt-ctrl"></div>
              <div class="opt-mid"><div class="opt-name">${op.nombre}</div></div>
              <div class="opt-extra">${px}</div></div>`;
          }
        });
        html+=`</div>`;
      });

      if((p.ingredientes||[]).length && !p.mitad_mitad){
        html+=`<div class="grp"><div class="grp-t"><h3>Quitar ingredientes</h3><span class="grp-hint">Opcional</span></div>`;
        (p.ingredientes||[]).forEach((ing,ii)=>{
          const sel=sinSet.has(ii);
          html+=`<div class="opt ${sel?'sel':''}" data-sin="${ii}">
            <div class="opt-ctrl sq">${sel?'✓':''}</div><div class="opt-mid"><div class="opt-name">${ing}</div></div></div>`;
        });
        html+=`</div>`;
      }

      html+=`<div class="qty-bar"><span>Cantidad</span><div class="qty-ctrl">
        <button type="button" class="qbtn" id="pqtyM">−</button><div class="qval" id="pqtyN">${qty}</div><button type="button" class="qbtn" id="pqtyP">+</button>
      </div></div>`;

      document.getElementById('pdBody').innerHTML = html;

      document.querySelectorAll('#pdBody .opt[data-gi]').forEach(el=>{
        el.onclick=(ev)=>{
          const gi=+el.dataset.gi, oi=+el.dataset.oi, tipo=el.dataset.tipo;
          if(tipo==='multiple' && ev.target?.closest?.('[data-mact]')) return;
          if(tipo==='unico') selsUnico[gi]=selsUnico[gi]===oi?null:oi;
          else{
            if(!selsMulti[gi]) selsMulti[gi]={};
            const cur = Number(selsMulti[gi][oi]||0);
            selsMulti[gi][oi] = cur > 0 ? 0 : 1;
          }
          paint();
        };
      });
      document.querySelectorAll('#pdBody [data-mact]').forEach(btn=>{
        btn.onclick=(ev)=>{
          ev.stopPropagation();
          const gi=Number(btn.dataset.gi), oi=Number(btn.dataset.oi);
          if(!selsMulti[gi]) selsMulti[gi]={};
          const cur = Number(selsMulti[gi][oi]||0);
          selsMulti[gi][oi] = btn.dataset.mact==='inc' ? cur + 1 : Math.max(0, cur - 1);
          paint();
        };
      });
      document.querySelectorAll('#pdBody .opt[data-sin]').forEach(el=>{
        el.onclick=()=>{ const ii=+el.dataset.sin; sinSet.has(ii)?sinSet.delete(ii):sinSet.add(ii); paint(); };
      });
      document.querySelectorAll('#pdBody .opt[data-mitad]').forEach(el=>{
        el.onclick=()=>{
          const m=+el.dataset.mitad; const ing=decodeURIComponent(el.dataset.ing);
          mitad[m]=mitad[m]===ing?null:ing; paint();
        };
      });
      document.getElementById('pqtyM').onclick=()=>{ qty=Math.max(1,qty-1); paint(); };
      document.getElementById('pqtyP').onclick=()=>{ qty++; paint(); };

      const btn=document.getElementById('prodAddBtn');
      btn.textContent = `Agregar al carrito · ${money(unit*qty)}`;
      btn.disabled = !reqOk();
      btn.onclick=()=>{
        if(!reqOk()) return;
        cart.push({uid:Date.now()+Math.random(),id:p.id,nombre:p.nombre,precio:base+calcExtra(),cantidad:qty,emoji:p.emoji||'🍽️',imagen:p.imagen||'',mods:modsTexto()});
        updateCartBadge();
        toast('Listo · en tu carrito');
        closeProd();
      };
    }
    paint();
    document.getElementById('ovProd').classList.add('on');
    document.body.style.overflow='hidden';
  }

  function closeProd(){
    document.getElementById('ovProd').classList.remove('on');
    document.body.style.overflow='';
    prod=null;
    document.getElementById('prodStick').innerHTML = `<button type="button" class="btn-big" id="prodAddBtn">Agregar al carrito</button>`;
    document.getElementById('prodClose').onclick = closeProd;
  }

  function openComboFlow(){
    if(!comboDef.length) return;
    comboStep=0; comboSels=new Array(comboDef.length).fill(null);
    paintComboStep();
    document.getElementById('ovProd').classList.add('on');
    document.body.style.overflow='hidden';
  }

  function comboTotal(){
    let t=comboBase;
    if(t===0) comboSels.forEach(p=>{ if(p) t+=Number(p.precio)||0; });
    return t;
  }

  function paintComboStep(){
    document.getElementById('prodClose').onclick=()=>{ document.getElementById('ovProd').classList.remove('on'); document.body.style.overflow=''; };
    document.getElementById('pdHero').innerHTML = `<div class="pd-hero-ph">🎯</div>`;
    const step = comboDef[comboStep];
    let html = `<div class="pd-name">Arma tu combo</div><div class="pd-desc">Paso ${comboStep+1} de ${comboDef.length}: elige ${step.label.toLowerCase()}</div>`;
    html += `<div class="pd-price-row"><div class="pd-price">${money(comboTotal())}</div></div>`;
    html += `<div class="grid-2" style="margin-top:12px;">`;
    step.items.forEach(p=>{
      const sel = comboSels[comboStep] && String(comboSels[comboStep].id)===String(p.id);
      html += `<div class="p-card ${sel?'':''}" style="cursor:pointer;box-shadow:none" data-pid="${p.id}">
        <div class="p-img-wrap" style="aspect-ratio:1">${p.imagen?`<img class="p-img" src="${p.imagen}">`:`<div class="p-emoji">${p.emoji||'📦'}</div>`}</div>
        <div class="p-body"><div class="p-name">${p.nombre}</div><div class="p-price">${money(p.precio)}</div></div>
      </div>`;
    });
    html += `</div>`;
    html += `<div style="display:flex;gap:10px;margin-top:16px;">
      <button type="button" class="btn-add" style="flex:1;background:#666;box-shadow:none" id="comboBack">${comboStep===0?'Cancelar':'← Atrás'}</button>
      <button type="button" class="btn-add" style="flex:1" id="comboNext">${comboStep===comboDef.length-1?'Agregar combo':'Siguiente →'}</button>
    </div>`;
    document.getElementById('pdBody').innerHTML = html;
    document.getElementById('prodStick').innerHTML = '';

    document.querySelectorAll('#pdBody .p-card[data-pid]').forEach(card=>{
      card.onclick=()=>{
        const id=card.dataset.pid;
        comboSels[comboStep]=step.items.find(p=>String(p.id)===String(id));
        paintComboStep();
      };
    });
    document.getElementById('comboBack').onclick=()=>{
      if(comboStep===0) closeProd();
      else { comboStep--; paintComboStep(); }
    };
    document.getElementById('comboNext').onclick=()=>{
      if(!comboSels[comboStep]){ toast('Elige una opción'); return; }
      if(comboStep < comboDef.length-1){ comboStep++; paintComboStep(); }
      else{
        const t = comboTotal();
        cart.push({uid:Date.now()+Math.random(),id:'combo_'+Date.now(),nombre:'🎯 Combo',precio:t,cantidad:1,emoji:'🎯',imagen:'',mods:comboSels.filter(Boolean).map(p=>p.nombre).join(' + ')});
        updateCartBadge();
        toast('Combo añadido');
        closeProd();
        document.getElementById('prodStick').innerHTML = `<button type="button" class="btn-big" id="prodAddBtn">Agregar al carrito</button>`;
      }
    };
  }

  function openCart(){
    document.getElementById('ovCart').classList.add('on');
    paintCart();
    document.body.style.overflow='hidden';
  }
  function closeCart(){
    document.getElementById('ovCart').classList.remove('on');
    document.body.style.overflow='';
  }

  function paintCart(){
    const box=document.getElementById('cartList');
    if(!cart.length){ box.innerHTML='<p style="text-align:center;color:var(--muted);padding:32px;">Tu carrito está vacío</p>'; document.getElementById('cartTotal').textContent=money(0); return; }
    const total=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);
    box.innerHTML = cart.map((it,i)=>`
      <div class="cart-line">
        ${it.imagen?`<img src="${it.imagen}" alt="">`:`<div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:12px;font-size:22px">${it.emoji||'🍽️'}</div>`}
        <div class="cart-mid"><div class="cart-n">${it.nombre}</div>${it.mods?`<div class="cart-m">${it.mods}</div>`:''}<div class="cart-p">${money(it.precio*it.cantidad)}</div></div>
        <div class="cart-r"><div class="cqty">
          <button type="button" class="cq" data-ci="${i}" data-d="-1">${it.cantidad===1?'🗑':'−'}</button>
          <span style="font-weight:900">${it.cantidad}</span>
          <button type="button" class="cq" data-ci="${i}" data-d="1">+</button>
        </div></div>
      </div>
    `).join('');
    document.getElementById('cartTotal').textContent=money(total);
    box.querySelectorAll('.cq').forEach(b=>{
      b.onclick=()=>{
        const idx=+b.dataset.ci, d=+b.dataset.d;
        if(d<0 && cart[idx].cantidad===1) cart.splice(idx,1);
        else if(d<0) cart[idx].cantidad--;
        else cart[idx].cantidad++;
        updateCartBadge();
        paintCart();
      };
    });
  }

  document.getElementById('btnCart').onclick=openCart;
  document.getElementById('cartClose').onclick=closeCart;
  document.getElementById('prodClose').onclick=closeProd;
  document.getElementById('ovProd').addEventListener('click',e=>{ if(e.target.id==='ovProd') closeProd(); });
  document.getElementById('ovCart').addEventListener('click',e=>{ if(e.target.id==='ovCart') closeCart(); });

  document.getElementById('btnSearch').onclick=()=>{
    const bar=document.getElementById('searchBar');
    bar.style.display=bar.style.display==='none'?'block':'none';
    if(bar.style.display==='block') setTimeout(()=>document.getElementById('searchInput').focus(),50);
  };
  document.getElementById('searchClose').onclick=()=>{
    document.getElementById('searchBar').style.display='none';
    document.getElementById('searchInput').value='';
    qFilter='';
    renderGrid();
  };
  document.getElementById('searchInput').addEventListener('input',e=>{ qFilter=e.target.value; catAct='todas'; renderGrid(); });

  document.getElementById('waBtn').onclick=()=>{
    const wa=(neg.whatsapp_numero||neg.whatsapp_dueno||'').replace(/\D/g,'');
    if(!wa){ toast('Sin WhatsApp configurado'); return; }
    const total=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);
    const lines=cart.map(i=>`• ${i.nombre} x${i.cantidad} — ${money(i.precio*i.cantidad)}${i.mods?'\n  '+i.mods:''}`).join('\n');
    const msg=`Hola! Quiero pedir:\n\n${lines}\n\nTotal: ${money(total)}\n\n_(Pedido desde el menú web)_`;
    window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg),'_blank');
  };

  async function init(){
    try{
      const r=await fetch(BASE+'/catalogo-data/'+SLUG,{cache:'no-store'});
      if(!r.ok) throw new Error('No encontrado');
      neg=await r.json();
      aplicarTema(neg.tema);
      construirCombos();
      renderHeader();
      catAct='todas';
      renderGrid();
      updateCartBadge();
      document.getElementById('loader').style.display='none';
      document.getElementById('app').style.display='block';
    }catch(e){
      document.getElementById('ldT').textContent='Error';
      document.getElementById('ldS').textContent=e.message||'';
    }
  }
  init();
  </script>
</body>
</html>
