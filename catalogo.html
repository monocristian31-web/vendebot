<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#070a10;
      --surface:rgba(255,255,255,.06);
      --surface2:rgba(255,255,255,.09);
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.18);
      --text:#f5f7ff;
      --muted:rgba(245,247,255,.62);
      --muted2:rgba(245,247,255,.34);
      --accent:#00c8ff;
      --accent2:#00a9ff;
      --good:#00e5a0;
      --bad:#ff3860;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --shadow2:0 10px 28px rgba(0,0,0,.28);
      --radius:18px;
      --safe:env(safe-area-inset-bottom,0px);
      --f:'Space Grotesk',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      --banner-opacity:.55;
    }
    html{scroll-behavior:smooth;}
    body{
      font-family:var(--f);
      background:radial-gradient(1200px 600px at 20% -10%, color-mix(in srgb,var(--accent) 18%, transparent), transparent 60%),
                 radial-gradient(900px 500px at 90% 0%, rgba(255,255,255,.08), transparent 58%),
                 var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none;}
    button,input,textarea{font:inherit;}

    /* Loader */
    #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;background:var(--bg);}
    .ld{
      width:min(520px,92vw);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border-radius:22px;
      padding:22px;
      box-shadow:var(--shadow);
    }
    .ld-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
    .ld-brand{display:flex;align-items:center;gap:10px;}
    .ld-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 20px color-mix(in srgb,var(--accent) 60%, transparent);}
    .ld-name{font-weight:800;letter-spacing:.04em;}
    .ld-sub{font-family:var(--mono);font-size:12px;color:var(--muted);}
    .ld-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid var(--stroke);}
    .ld-bar>div{height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:ld 1.2s linear infinite;}
    @keyframes ld{0%{transform:translateX(-100%);}100%{transform:translateX(260%);}}

    /* App shell */
    #app{display:none;max-width:720px;margin:0 auto;padding-bottom:calc(96px + var(--safe));}
    .topbar{
      position:sticky;top:0;z-index:50;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(7,10,16,.92), rgba(7,10,16,.68));
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .tb-left{display:flex;align-items:center;gap:10px;min-width:0;}
    .tb-logo{
      width:36px;height:36px;border-radius:12px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.03));
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;flex-shrink:0;
      box-shadow:var(--shadow2);
    }
    .tb-logo img{width:100%;height:100%;object-fit:cover;}
    .tb-title{min-width:0;}
    .tb-name{font-weight:800;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tb-tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tb-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .iconbtn{
      width:40px;height:40px;border-radius:14px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.02));
      color:var(--muted);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      transition:transform .15s ease,border-color .15s ease,background .15s ease,color .15s ease;
    }
    .iconbtn:hover{border-color:var(--stroke2);color:var(--text);transform:translateY(-1px);}

    /* Hero */
    .hero{
      margin:14px;
      border:1px solid var(--stroke);
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      position:relative;
    }
    .hero-bg{position:absolute;inset:0;background:var(--bg);}
    .hero-banner{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:var(--banner-opacity);transform:scale(1.03);}
    .hero-v{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%, rgba(0,0,0,.18) 40%, rgba(0,0,0,.56) 100%);}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(circle at 50% 30%,black 20%,transparent 75%);opacity:.28;}
    .hero-content{position:relative;padding:18px;}
    .hero-status{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 16px color-mix(in srgb,var(--good) 70%, transparent);}
    .dot.off{background:var(--bad);box-shadow:0 0 16px color-mix(in srgb,var(--bad) 70%, transparent);}
    .status{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
    .hero-name{font-size:30px;line-height:1.05;font-weight:900;letter-spacing:.01em;margin-bottom:12px;text-shadow:0 10px 28px rgba(0,0,0,.35);}
    .hero-badges{display:flex;flex-wrap:wrap;gap:8px;}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-family:var(--mono);font-size:11px;letter-spacing:.06em;
      box-shadow:0 10px 22px rgba(0,0,0,.18);
    }
    .badge b{color:var(--accent);}

    /* Info strip */
    .strip{
      margin:12px 14px 0;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .info{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.02));
      border-radius:18px;
      padding:12px 12px 14px;
      box-shadow:var(--shadow2);
      min-height:72px;
    }
    .info-l{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
    .info-v{font-weight:900;font-size:14px;}
    .info-v span{color:var(--accent);}

    /* Section title */
    .section{padding:18px 14px 8px;}
    .sec-h{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:12px;}
    .sec-t{font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase;font-size:11px;color:var(--muted);}
    .sec-t b{color:var(--accent);}
    .sec-sub{font-family:var(--mono);font-size:10px;color:var(--muted2);}

    /* Categories */
    .cats{
      position:sticky;top:68px;z-index:40;
      padding:10px 14px 12px;
      background:linear-gradient(180deg, rgba(7,10,16,.86), rgba(7,10,16,.62));
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.08);
      display:none;
    }
    .cats-row{display:flex;gap:8px;overflow:auto;scrollbar-width:none;}
    .cats-row::-webkit-scrollbar{display:none;}
    .pill{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      padding:9px 14px;
      border-radius:999px;
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:.08em;
      cursor:pointer;
      white-space:nowrap;
      transition:all .15s ease;
    }
    .pill:hover{border-color:var(--stroke2);color:var(--text);transform:translateY(-1px);}
    .pill.on{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 26%, rgba(255,255,255,.04)), rgba(255,255,255,.03));border-color:color-mix(in srgb,var(--accent) 40%, var(--stroke));color:var(--text);box-shadow:0 14px 30px rgba(0,0,0,.22);}

    /* Search */
    .searchWrap{padding:0 14px 12px;display:none;}
    .searchBox{
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:12px 12px;
      background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.02));
      display:flex;align-items:center;gap:10px;
      box-shadow:var(--shadow2);
    }
    .searchBox input{flex:1;border:none;background:transparent;outline:none;color:var(--text);font-weight:600;}
    .searchBox input::placeholder{color:var(--muted2);font-weight:600;}
    .searchClear{border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:12px;}
    .searchClear:hover{color:var(--text);}

    /* Products */
    .grid{display:flex;flex-direction:column;gap:10px;}
    .card{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.02));
      border-radius:var(--radius);
      padding:14px;
      display:flex;align-items:center;gap:12px;
      box-shadow:var(--shadow2);
      cursor:pointer;
      transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
      position:relative;
      overflow:hidden;
    }
    .card::after{content:'';position:absolute;inset:-120% -50%;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.12) 50%,transparent 65%);transform:translateX(-40%);transition:transform .8s ease;pointer-events:none;}
    .card:hover{border-color:var(--stroke2);transform:translateY(-1px);box-shadow:var(--shadow);}
    .card:hover::after{transform:translateX(30%);}
    .thumb{
      width:86px;height:86px;border-radius:16px;overflow:hidden;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      flex-shrink:0;
      box-shadow:0 12px 26px rgba(0,0,0,.22);
      position:relative;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;}
    .emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;}
    .plus{
      position:absolute;right:8px;bottom:8px;
      width:28px;height:28px;border-radius:12px;
      border:1px solid color-mix(in srgb,var(--accent) 45%, var(--stroke));
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#001018;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;
      box-shadow:0 14px 24px color-mix(in srgb,var(--accent) 28%, transparent);
    }
    .cinfo{flex:1;min-width:0;}
    .cname{font-size:16px;font-weight:900;line-height:1.2;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cdesc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
    .cfoot{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
    .price{font-family:var(--mono);font-size:16px;font-weight:900;color:var(--accent);}
    .meta{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;}
    .soldout{opacity:.35;pointer-events:none;}

    /* Bottom cart */
    .fab{
      position:fixed;left:50%;transform:translateX(-50%) translateY(120%);
      bottom:calc(16px + var(--safe));
      width:min(640px,calc(100% - 28px));
      z-index:60;
      opacity:0;pointer-events:none;
      transition:transform .35s cubic-bezier(.2,.9,.2,1),opacity .25s ease;
    }
    .fab.on{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all;}
    .fabBtn{
      width:100%;
      border:1px solid color-mix(in srgb,var(--accent) 45%, var(--stroke));
      background:linear-gradient(180deg, color-mix(in srgb,var(--accent) 16%, rgba(255,255,255,.05)), rgba(255,255,255,.03));
      border-radius:22px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }
    .fabBtn::after{content:'';position:absolute;inset:-120% -40%;background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.16) 50%,transparent 65%);animation:sweep 4.6s linear infinite;}
    @keyframes sweep{0%{transform:translateX(-50%);}100%{transform:translateX(50%);}}
    .fabLeft{display:flex;align-items:center;gap:12px;}
    .fabCount{
      width:30px;height:30px;border-radius:12px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#001018;font-weight:900;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 14px 24px color-mix(in srgb,var(--accent) 28%, transparent);
    }
    .fabLabel{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
    .fabTotal{font-family:var(--mono);font-size:18px;font-weight:900;color:var(--accent);}

    /* Drawer */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0);visibility:hidden;transition:background .25s ease,visibility .25s ease;z-index:70;display:flex;justify-content:center;align-items:flex-end;}
    .overlay.on{background:rgba(0,0,0,.72);visibility:visible;}
    .drawer{
      width:min(720px,100%);
      max-height:92vh;
      border-top-left-radius:24px;border-top-right-radius:24px;
      background:linear-gradient(180deg, rgba(10,12,18,.98), rgba(7,10,16,.98));
      border:1px solid rgba(255,255,255,.12);
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.2,.9,.2,1);
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .overlay.on .drawer{transform:translateY(0);}
    .drTop{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .drT{font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--muted);}
    .close{border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--text);border-radius:14px;width:40px;height:40px;cursor:pointer;}
    .drBody{padding:10px 16px 0;overflow:auto;max-height:calc(92vh - 168px);}
    .line{padding:12px;border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(255,255,255,.04);display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
    .lthumb{width:54px;height:54px;border-radius:14px;border:1px solid rgba(255,255,255,.12);overflow:hidden;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .lthumb img{width:100%;height:100%;object-fit:cover;}
    .lmid{flex:1;min-width:0;}
    .lname{font-weight:900;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lmods{font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.4;}
    .lright{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;}
    .lprice{font-family:var(--mono);font-weight:900;color:var(--accent);}
    .qty{display:flex;align-items:center;gap:8px;}
    .qbtn{width:32px;height:32px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-weight:900;}
    .qbtn.rm{border-color:rgba(255,56,96,.35);color:var(--bad);background:rgba(255,56,96,.10);}
    .qnum{font-family:var(--mono);font-weight:900;min-width:18px;text-align:center;}
    .drFoot{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.10);}
    .sum{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:8px;}
    .sum strong{color:var(--text);}
    .checkout{
      width:100%;
      border:none;
      border-radius:20px;
      padding:14px 16px;
      background:linear-gradient(180deg,#25D366,#1da851);
      color:#06110b;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 18px 40px rgba(37,211,102,.22);
    }
    .empty{padding:44px 18px;text-align:center;color:var(--muted2);font-family:var(--mono);}

    /* Toast */
    .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(10px);bottom:calc(106px + var(--safe));z-index:90;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;
      border:1px solid rgba(255,255,255,.14);background:rgba(10,12,18,.92);backdrop-filter:blur(12px);border-left:2px solid var(--accent);box-shadow:var(--shadow2);border-radius:14px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--text);}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

    @media (prefers-reduced-motion: reduce){
      *{transition:none!important;animation:none!important;}
      html{scroll-behavior:auto;}
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="ld">
      <div class="ld-top">
        <div class="ld-brand"><div class="ld-dot"></div><div>
          <div class="ld-name" id="ldName">CARGANDO</div>
          <div class="ld-sub" id="ldSub">// inicializando catálogo</div>
        </div></div>
        <div class="ld-sub" id="ldHint">VendeBot</div>
      </div>
      <div class="ld-bar"><div></div></div>
    </div>
  </div>

  <div id="app">
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-logo" id="tbLogo"></div>
        <div class="tb-title">
          <div class="tb-name" id="tbName">Cargando…</div>
          <div class="tb-tag" id="tbTag">// menú</div>
        </div>
      </div>
      <div class="tb-actions">
        <button class="iconbtn" id="btnSearch" title="Buscar" aria-label="Buscar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="searchWrap" id="searchWrap">
      <div class="searchBox">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted2)">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" placeholder="Buscar en el menú…" autocomplete="off" />
        <button class="searchClear" id="searchClear">✕</button>
      </div>
    </div>

    <div class="hero" id="hero">
      <div class="hero-bg"></div>
      <img class="hero-banner" id="heroBanner" alt="" style="display:none">
      <div class="hero-grid"></div>
      <div class="hero-v"></div>
      <div class="hero-content">
        <div class="hero-status">
          <div class="dot" id="heroDot"></div>
          <div class="status" id="heroStatus">SISTEMA</div>
        </div>
        <div class="hero-name" id="heroName">—</div>
        <div class="hero-badges" id="heroBadges"></div>
      </div>
    </div>

    <div class="strip" id="strip"></div>

    <div class="cats" id="cats">
      <div class="cats-row" id="catsRow"></div>
    </div>

    <div class="section">
      <div class="sec-h">
        <div class="sec-t"><b>//</b> Catálogo</div>
        <div class="sec-sub" id="secSub">READY</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="fab" id="fab">
    <div class="fabBtn" id="fabBtn">
      <div class="fabLeft">
        <div class="fabCount" id="fabCount">0</div>
        <div class="fabLabel">VER PEDIDO</div>
      </div>
      <div class="fabTotal" id="fabTotal">$0.00</div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="drawer" role="dialog" aria-modal="true" aria-label="Carrito">
      <div class="drTop">
        <div class="drT">// TU PEDIDO</div>
        <button class="close" id="btnClose">✕</button>
      </div>
      <div class="drBody" id="drBody"></div>
      <div class="drFoot" id="drFoot"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SLUG = window.location.pathname.split('/')[2];
    const BASE = window.location.origin;

    let neg = null;
    let cart = [];
    let searchOpen = false;
    let activeCat = null;

    // Modal producto (completo)
    let modalProd = null;
    let modalQty = 1;
    let modalSelUnico = {};    // {gi: oi|null}
    let modalSelMulti = {};    // {gi: Set<oi>}
    let modalSin = new Set();  // ingredientes a quitar (por índice)

    function money(n){ return '$' + (Number(n)||0).toFixed(2); }
    function toast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('on');
      clearTimeout(window.__tt);
      window.__tt=setTimeout(()=>t.classList.remove('on'),2200);
    }
    function slugify(s){ return String(s||'').toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,''); }

    function aplicarTema(tema){
      if(!tema) return;
      const root=document.documentElement;
      const hex = (h) => typeof h === 'string' && /^#[0-9a-fA-F]{6}$/.test(h) ? h : null;
      const hexToRgb = (h) => {
        if(!hex(h)) return null;
        return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
      };

      if(hex(tema.color_primario)){
        root.style.setProperty('--accent', tema.color_primario);
        const rgb = hexToRgb(tema.color_primario);
        if(rgb){
          root.style.setProperty('--accent2', `rgba(${rgb.r},${rgb.g},${rgb.b},.92)`);
          root.style.setProperty('--stroke2', `rgba(${rgb.r},${rgb.g},${rgb.b},.28)`);
        }
      }
      if(hex(tema.color_fondo)){
        root.style.setProperty('--bg', tema.color_fondo);
      }
      if(hex(tema.color_texto)){
        root.style.setProperty('--text', tema.color_texto);
      }
      if(typeof tema.banner_opacity === 'number'){
        root.style.setProperty('--banner-opacity', String(tema.banner_opacity));
      }
      if(tema.border_radius){
        root.style.setProperty('--radius', tema.border_radius);
      }
      if(tema.fuente){
        root.style.setProperty('--f', `'${tema.fuente}', ${getComputedStyle(root).getPropertyValue('--f')}`);
      }
    }

    function estaAbierto(){
      if(typeof neg.esta_abierto === 'boolean') return neg.esta_abierto;
      return true;
    }

    function renderHero(){
      document.getElementById('tbName').textContent = neg.nombre || 'Catálogo';
      document.getElementById('tbTag').textContent = `// ${neg.tipo || 'menú'}`;
      document.title = `${neg.nombre || 'Catálogo'} — MENÚ`;

      const logo = document.getElementById('tbLogo');
      logo.innerHTML = neg.logo ? `<img src="${neg.logo}" alt="">` : `<span style="font-size:18px">${neg.emoji||'🛍️'}</span>`;

      const heroName = document.getElementById('heroName');
      heroName.textContent = (neg.emoji ? (neg.emoji + ' ') : '') + (neg.nombre || 'Catálogo');

      const dot = document.getElementById('heroDot');
      const st = document.getElementById('heroStatus');
      const open = estaAbierto();
      dot.classList.toggle('off', !open);
      st.textContent = open ? 'SISTEMA ACTIVO' : 'SISTEMA OFFLINE';

      const banner = document.getElementById('heroBanner');
      if(neg.banner){
        banner.src = neg.banner;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }

      const badges = [];
      if(neg.tipo) badges.push(`<span class="badge"><b>●</b> ${neg.tipo}</span>`);
      if(neg.horario_hoy) badges.push(`<span class="badge"><b>⏱</b> ${neg.horario_hoy}</span>`);
      document.getElementById('heroBadges').innerHTML = badges.join('');
    }

    function renderStrip(){
      const items = [];
      if(neg.tiempo_entrega) items.push({l:'Entrega', v: neg.tiempo_entrega});
      items.push({l:'Delivery', v: neg.costo_delivery || 'Variable'});
      if(neg.pedido_minimo) items.push({l:'Mínimo', v: '$' + neg.pedido_minimo});

      const strip = document.getElementById('strip');
      strip.innerHTML = items.map(i => `
        <div class="info">
          <div class="info-l">${i.l}</div>
          <div class="info-v"><span>${i.v}</span></div>
        </div>
      `).join('');
    }

    function buildCats(products){
      const cats = new Map();
      for(const p of products){
        const c = p.categoria || 'Menú';
        if(!cats.has(c)) cats.set(c, []);
        cats.get(c).push(p);
      }
      return cats;
    }

    function renderCats(cats){
      const names = [...cats.keys()];
      const wrap = document.getElementById('cats');
      const row = document.getElementById('catsRow');
      if(names.length <= 1){
        wrap.style.display = 'none';
        activeCat = names[0] || null;
        return;
      }
      wrap.style.display = 'block';
      if(!activeCat) activeCat = names[0];
      row.innerHTML = names.map(n => `<button class="pill ${n===activeCat?'on':''}" data-cat="${n}">${n}</button>`).join('');
      row.querySelectorAll('.pill').forEach(b => b.addEventListener('click', () => {
        activeCat = b.dataset.cat;
        row.querySelectorAll('.pill').forEach(x => x.classList.toggle('on', x.dataset.cat === activeCat));
        renderGrid();
      }));
    }

    function cardHTML(p){
      const sold = p.stock === 0;
      return `
        <div class="card ${sold?'soldout':''}" data-id="${p.id}">
          <div class="thumb">
            ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">` : `<div class="emoji">${p.emoji||'📦'}</div>`}
            ${!sold ? `<div class="plus">+</div>` : ``}
          </div>
          <div class="cinfo">
            <div class="cname">${p.nombre}</div>
            ${p.descripcion ? `<div class="cdesc">${p.descripcion}</div>` : `<div class="cdesc" style="opacity:.6">// Sin descripción</div>`}
            <div class="cfoot">
              <div class="price">${money(p.precio)}</div>
              <div class="meta">${(p.modificadores||[]).length ? 'Personalizable' : 'Listo'}</div>
            </div>
          </div>
        </div>
      `;
    }

    function addToCart(p){
      cart.push({
        uid: Date.now() + Math.random(),
        id: p.id,
        nombre: p.nombre,
        precio: Number(p.precio)||0,
        cantidad: 1,
        emoji: p.emoji || '🍽️',
        imagen: p.imagen || '',
        mods: ''
      });
      updateFab();
      toast(`[ ${p.nombre} ] agregado`);
    }

    function renderGrid(filterText=''){
      const all = (neg.catalogo||[]).filter(p => p.activo !== false);
      const q = String(filterText||'').toLowerCase().trim();
      const filtered = q
        ? all.filter(p => (p.nombre||'').toLowerCase().includes(q) || (p.descripcion||'').toLowerCase().includes(q))
        : all;

      const cats = buildCats(filtered);
      renderCats(cats);

      const grid = document.getElementById('grid');

      if(q){
        document.getElementById('secSub').textContent = `${filtered.length} resultado${filtered.length===1?'':'s'}`;
        grid.innerHTML = filtered.length ? filtered.map(cardHTML).join('') : `<div class="empty">SIN RESULTADOS</div>`;
      } else {
        document.getElementById('secSub').textContent = `READY`;
        const current = activeCat && cats.has(activeCat) ? activeCat : ([...cats.keys()][0] || null);
        activeCat = current;
        const list = current ? (cats.get(current)||[]) : [];
        grid.innerHTML = list.length ? list.map(cardHTML).join('') : `<div class="empty">SIN PRODUCTOS</div>`;
      }

      grid.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.getAttribute('data-id');
          const p = (neg.catalogo||[]).find(x => String(x.id) === String(id));
          if(!p || p.stock === 0) return;
          abrirModal(p);
        });
      });
    }

    function calcExtra(){
      let extra = 0;
      (modalProd?.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico'){
          const oi = modalSelUnico[gi];
          if(oi != null) extra += Number(g.opciones?.[oi]?.precio||0);
        } else {
          (modalSelMulti[gi]||new Set()).forEach(oi=>{ extra += Number(g.opciones?.[oi]?.precio||0); });
        }
      });
      return extra;
    }

    function verificarObligatorios(){
      let ok = true;
      (modalProd?.modificadores||[]).forEach((g,gi)=>{
        if(!g.obligatorio) return;
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico' && (modalSelUnico[gi] == null)) ok = false;
        if(tipo !== 'unico' && (!modalSelMulti[gi] || modalSelMulti[gi].size === 0)) ok = false;
      });
      return ok;
    }

    function buildModsTexto(p){
      const parts = [];
      (p.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo==='unico'){
          const oi = modalSelUnico[gi];
          if(oi!=null) parts.push(`${g.nombre}: ${g.opciones?.[oi]?.nombre||''}`.trim());
        } else {
          const set = modalSelMulti[gi]||new Set();
          if(set.size){
            const names = [...set].map(oi=>g.opciones?.[oi]?.nombre).filter(Boolean);
            if(names.length) parts.push(`${g.nombre}: ${names.join(', ')}`);
          }
        }
      });
      const ings = p.ingredientes||[];
      if(modalSin.size){
        const names = [...modalSin].map(ii=>ings[ii]).filter(Boolean);
        if(names.length) parts.push(`Sin: ${names.join(', ')}`);
      }
      return parts.join(' · ');
    }

    function abrirModal(p){
      modalProd = p;
      modalQty = 1;
      modalSelUnico = {};
      modalSelMulti = {};
      modalSin = new Set();
      (p.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico') modalSelUnico[gi] = null;
        else modalSelMulti[gi] = new Set();
      });

      // Crear drawer de producto usando el overlay existente
      const overlay = document.getElementById('overlay');
      const drawer = overlay.querySelector('.drawer');
      const title = drawer.querySelector('.drT');
      title.textContent = '// PERSONALIZA';

      const body = document.getElementById('drBody');
      const foot = document.getElementById('drFoot');

      function render(){
        const base = Number(modalProd.precio)||0;
        const extra = calcExtra();
        const unit = base + extra;
        const total = unit * modalQty;

        const mods = modalProd.modificadores||[];
        const ings = modalProd.ingredientes||[];

        body.innerHTML = `
          <div class="line" style="align-items:center;">
            <div class="lthumb">${modalProd.imagen?`<img src="${modalProd.imagen}" alt="">`:`${modalProd.emoji||'📦'}`}</div>
            <div class="lmid">
              <div class="lname">${modalProd.nombre}</div>
              <div class="lmods">${modalProd.descripcion||''}</div>
            </div>
            <div class="lright">
              <div class="lprice">${money(unit)}</div>
            </div>
          </div>
          ${mods.map((g,gi)=>{
            const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
            const hint = tipo==='unico'?'Elige 1':'Elige varias';
            const req = g.obligatorio ? '<span style="color:var(--bad);font-weight:900;font-size:10px;">REQ</span>' : '';
            return `
              <div style="margin:12px 0 6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <div style="font-weight:900">${g.nombre} ${req}</div>
                <div style="margin-left:auto;color:var(--muted2);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;">${hint}</div>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                ${(g.opciones||[]).map((op,oi)=>{
                  const sel = tipo==='unico' ? (modalSelUnico[gi]===oi) : (modalSelMulti[gi]?.has(oi));
                  const ext = Number(op.precio||0);
                  return `<button type="button" data-gi="${gi}" data-oi="${oi}" data-tipo="${tipo}"
                    style="border:1px solid ${sel?'color-mix(in srgb,var(--accent) 45%, rgba(255,255,255,.14))':'rgba(255,255,255,.14)'};background:${sel?'rgba(255,255,255,.10)':'rgba(255,255,255,.04)'};color:${sel?'var(--text)':'var(--muted)'};padding:10px 14px;border-radius:16px;cursor:pointer;font-weight:900;">
                    ${op.nombre}${ext!==0?` <span style="opacity:.7;font-family:var(--mono);font-size:11px;">(${ext>0?'+':''}${money(Math.abs(ext))})</span>`:''}
                  </button>`;
                }).join('')}
              </div>
            `;
          }).join('')}
          ${ings.length?`
            <div style="margin:14px 0 6px;display:flex;align-items:center;gap:10px;">
              <div style="font-weight:900">Sin ingredientes</div>
              <div style="margin-left:auto;color:var(--muted2);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;">Toca para quitar</div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;">
              ${ings.map((ing,ii)=>{
                const sel = modalSin.has(ii);
                return `<button type="button" data-sin="${ii}"
                  style="border:1px solid ${sel?'rgba(255,56,96,.4)':'rgba(255,255,255,.14)'};background:${sel?'rgba(255,56,96,.12)':'rgba(255,255,255,.04)'};color:${sel?'rgba(255,255,255,.55)':'var(--muted)'};padding:10px 14px;border-radius:16px;cursor:pointer;font-weight:900;${sel?'text-decoration:line-through':''}">
                  ${ing}
                </button>`;
              }).join('')}
            </div>
          `:''}
        `;

        foot.innerHTML = `
          <div class="sum"><span>Precio unitario</span><strong>${money(unit)}</strong></div>
          <div class="sum"><span>Cantidad</span><strong>${modalQty}</strong></div>
          <div class="sum"><span>Total</span><strong>${money(total)}</strong></div>
          <div style="display:flex;gap:10px;margin-top:10px;">
            <button class="qbtn" id="mDec">−</button>
            <button class="qbtn" id="mInc">+</button>
            <button class="checkout" id="mAdd" style="flex:1;">Agregar</button>
          </div>
        `;

        // events
        body.querySelectorAll('button[data-gi]').forEach(b=>{
          b.addEventListener('click', ()=>{
            const gi = Number(b.dataset.gi);
            const oi = Number(b.dataset.oi);
            const tipo = b.dataset.tipo;
            if(tipo==='unico'){
              modalSelUnico[gi] = (modalSelUnico[gi]===oi) ? null : oi;
            } else {
              if(!modalSelMulti[gi]) modalSelMulti[gi]=new Set();
              modalSelMulti[gi].has(oi) ? modalSelMulti[gi].delete(oi) : modalSelMulti[gi].add(oi);
            }
            render();
          });
        });
        body.querySelectorAll('button[data-sin]').forEach(b=>{
          b.addEventListener('click', ()=>{
            const ii = Number(b.dataset.sin);
            modalSin.has(ii) ? modalSin.delete(ii) : modalSin.add(ii);
            render();
          });
        });
        document.getElementById('mDec').onclick = () => { modalQty = Math.max(1, modalQty-1); render(); };
        document.getElementById('mInc').onclick = () => { modalQty++; render(); };
        const add = document.getElementById('mAdd');
        add.disabled = !verificarObligatorios();
        add.onclick = () => {
          if(!verificarObligatorios()) return;
          cart.push({
            uid: Date.now() + Math.random(),
            id: modalProd.id,
            nombre: modalProd.nombre,
            precio: (Number(modalProd.precio)||0) + calcExtra(),
            cantidad: modalQty,
            emoji: modalProd.emoji || '🍽️',
            imagen: modalProd.imagen || '',
            mods: buildModsTexto(modalProd),
          });
          updateFab();
          toast(`[ ${modalProd.nombre} ] agregado`);
          closeDrawer();
        };
      }

      render();
      overlay.classList.add('on');
      document.body.style.overflow='hidden';
    }

    function updateFab(){
      const count = cart.reduce((s,i)=>s+(i.cantidad||0),0);
      const total = cart.reduce((s,i)=>s+(i.precio*i.cantidad),0);
      document.getElementById('fabCount').textContent = count;
      document.getElementById('fabTotal').textContent = money(total);
      document.getElementById('fab').classList.toggle('on', count>0);
    }

    function openDrawer(){
      document.getElementById('overlay').classList.add('on');
      renderDrawer();
      document.body.style.overflow='hidden';
    }
    function closeDrawer(){
      document.getElementById('overlay').classList.remove('on');
      document.body.style.overflow='';
      // restaurar título drawer
      const d = document.getElementById('overlay').querySelector('.drT');
      if(d) d.textContent = '// TU PEDIDO';
    }
    function renderDrawer(){
      const body = document.getElementById('drBody');
      const foot = document.getElementById('drFoot');
      if(!cart.length){
        body.innerHTML = `<div class="empty">TU CARRITO ESTÁ VACÍO</div>`;
        foot.innerHTML = '';
        return;
      }
      const total = cart.reduce((s,i)=>s+(i.precio*i.cantidad),0);
      body.innerHTML = cart.map((it,idx)=>`
        <div class="line">
          <div class="lthumb">${it.imagen?`<img src="${it.imagen}" alt="">`:`${it.emoji||'🍽️'}`}</div>
          <div class="lmid">
            <div class="lname">${it.nombre}</div>
            ${it.mods?`<div class="lmods">${it.mods}</div>`:''}
          </div>
          <div class="lright">
            <div class="lprice">${money(it.precio*it.cantidad)}</div>
            <div class="qty">
              <button class="qbtn rm" data-act="dec" data-i="${idx}">${it.cantidad===1?'🗑':'−'}</button>
              <div class="qnum">${it.cantidad}</div>
              <button class="qbtn" data-act="inc" data-i="${idx}">+</button>
            </div>
          </div>
        </div>
      `).join('');
      foot.innerHTML = `
        <div class="sum"><span>Subtotal</span><strong>${money(total)}</strong></div>
        <button class="checkout" id="btnCheckout">Confirmar por WhatsApp</button>
      `;

      body.querySelectorAll('.qbtn').forEach(b=>{
        b.addEventListener('click', ()=>{
          const i = Number(b.dataset.i);
          const act = b.dataset.act;
          if(act==='inc') cart[i].cantidad++;
          else{
            if(cart[i].cantidad===1) cart.splice(i,1);
            else cart[i].cantidad--;
          }
          updateFab();
          renderDrawer();
        });
      });

      document.getElementById('btnCheckout').addEventListener('click', () => {
        const wa = (neg.whatsapp_numero || neg.whatsapp_dueno || '').replace(/\\D/g,'');
        if(!wa){ toast('Sin número configurado'); return; }
        const lines = cart.map(i=>`• ${i.nombre} x${i.cantidad} — ${money(i.precio*i.cantidad)}`).join('\\n');
        const msg = `Hola! Quiero hacer un pedido 🛒\\n\\n${lines}\\n\\nTotal: ${money(total)}\\n\\n_(Pedido desde el catálogo web)_`;
        window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg),'_blank');
      });
    }

    function setSearch(open){
      searchOpen = open;
      const wrap = document.getElementById('searchWrap');
      wrap.style.display = open ? 'block' : 'none';
      if(open){
        setTimeout(()=>document.getElementById('searchInput').focus(), 50);
      }else{
        document.getElementById('searchInput').value='';
        renderGrid('');
      }
    }

    async function init(){
      try{
        const r = await fetch(`${BASE}/catalogo-data/${SLUG}`, { cache:'no-store' });
        if(!r.ok) throw new Error('Negocio no encontrado');
        neg = await r.json();
        aplicarTema(neg.tema);
        renderHero();
        renderStrip();
        renderGrid('');

        document.getElementById('loader').style.display='none';
        document.getElementById('app').style.display='block';
      }catch(e){
        document.getElementById('ldName').textContent = 'ERROR';
        document.getElementById('ldSub').textContent = '// ' + (e.message||'error');
      }
    }

    // Events
    document.getElementById('btnSearch').addEventListener('click', ()=> setSearch(!searchOpen));
    document.getElementById('searchClear').addEventListener('click', ()=> setSearch(false));
    document.getElementById('searchInput').addEventListener('input', (e)=> renderGrid(e.target.value));

    document.getElementById('fabBtn').addEventListener('click', openDrawer);
    document.getElementById('btnClose').addEventListener('click', closeDrawer);
    document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeDrawer(); });

    init();
  </script>
</body>
</html>
