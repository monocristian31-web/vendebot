<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kiosco</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@450;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --brand:#c8102e;
      --brand-ink:#fff;
      --page:#f2f2f2;
      --page-soft:#e8ebef;
      --card:#fff;
      --ink:#1a1a1a;
      --muted:#5c5c5c;
      --line:#e8e8e8;
      --ok:#0a7d3e;
      --danger:#dc2626;
      --warn:#d97706;
      --safe:env(safe-area-inset-bottom,0px);
    }
    html,body{width:100%;height:100%;overflow:hidden;}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(1100px 520px at -10% -10%, color-mix(in srgb,var(--brand) 10%, transparent), transparent 60%),
        radial-gradient(1000px 480px at 110% -10%, color-mix(in srgb,var(--brand) 8%, transparent), transparent 62%),
        linear-gradient(180deg,var(--page-soft),var(--page));
      color:var(--ink);user-select:none;
    }

    .screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .28s ease,transform .28s ease;z-index:1;}
    .screen.on{opacity:1;pointer-events:all;transform:none;}

    /* Idle */
    #idle{align-items:center;justify-content:center;padding:24px;text-align:center;}
    .idleCard{
      width:min(520px,94vw);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:28px 22px 24px;
      box-shadow:0 12px 40px rgba(0,0,0,.08);
    }
    .idleLogo{width:120px;height:120px;border-radius:22px;border:2px solid var(--line);background:#fafafa;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 14px;}
    .idleLogo img{width:100%;height:100%;object-fit:cover;}
    .idleEmoji{font-size:56px;}
    .idleTitle{font-weight:900;font-size:clamp(22px,4vw,34px);line-height:1.1;margin-bottom:8px;}
    .idleSub{color:var(--muted);font-size:15px;margin-bottom:20px;line-height:1.4;}
    .startBtn{
      width:100%;max-width:340px;border:none;cursor:pointer;padding:16px 22px;border-radius:999px;
      background:var(--brand);color:#fff;font-weight:900;font-size:17px;box-shadow:0 8px 24px color-mix(in srgb,var(--brand) 35%, transparent);
    }
    .startBtn:active{transform:scale(.99);opacity:.92;}
    .idleFoot{margin-top:16px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

    /* Menú — cabecera como catálogo */
    #menu{padding:0;background:var(--page);}
    .hdr{
      flex-shrink:0;background:var(--brand);color:var(--brand-ink);
      box-shadow:0 4px 16px rgba(0,0,0,.1);
    }
    .hdr-row{display:flex;align-items:center;gap:10px;padding:12px 14px;}
    .hdr-logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .hdr-logo img{width:100%;height:100%;object-fit:cover;}
    .hdr-txt{flex:1;min-width:0;}
    .hdr-name{font-weight:900;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-sub{font-size:12px;opacity:.92;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cartWrap{position:relative;}
    .cartHdrBtn{
      width:44px;height:44px;border-radius:12px;border:none;background:rgba(255,255,255,.22);color:#fff;
      display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;
    }
    .cartHdrBtn.hide{opacity:0;pointer-events:none;}
    .cartHdrBadge{
      position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:#ffd23f;color:#1a1a1a;
      font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--brand);
    }

    .cats-wrap{flex-shrink:0;background:var(--page);border-bottom:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .cats{padding:10px 14px;display:flex;gap:8px;overflow:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-pill{
      flex-shrink:0;padding:10px 18px;border-radius:999px;border:2px solid var(--line);
      background:var(--card);font-weight:800;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;
    }
    .cat-pill.on{border-color:var(--brand);background:var(--brand);color:#fff;}

    .scroll{flex:1;overflow:auto;padding:12px 14px 20px;-webkit-overflow-scrolling:touch;}
    .hl-wrap{display:flex;gap:10px;overflow:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;margin-bottom:6px;}
    .hl-wrap::-webkit-scrollbar{display:none;}
    .hl{
      min-width:220px;max-width:260px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;
      display:flex;gap:10px;align-items:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.05);
    }
    .hl-img{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#f4f4f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .hl-img img{width:100%;height:100%;object-fit:cover;}
    .hl-n{font-size:13px;font-weight:900;line-height:1.2;}
    .hl-p{font-size:12px;font-weight:800;color:var(--brand);margin-top:3px;}

    .cat-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:18px 0 10px;}
    .cat-head h2{font-size:16px;font-weight:900;letter-spacing:.01em;}
    .cat-head small{color:var(--muted);font-weight:800;}

    .combo-card{
      margin-bottom:12px;padding:14px 16px;border-radius:16px;
      background:linear-gradient(135deg,#fff7e6,#fff);border:2px solid #ffd23f;
      display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
    }
    .combo-card:active{transform:scale(.995);}
    .combo-t{font-weight:900;color:var(--brand);font-size:15px;}
    .combo-s{font-size:12px;color:var(--muted);margin-top:2px;}
    .combo-p{font-weight:900;font-size:18px;}

    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    @media(min-width:640px){.grid-2{grid-template-columns:repeat(3,1fr);}}

    .skGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    @media(min-width:640px){.skGrid{grid-template-columns:repeat(3,1fr);}}
    .sk{height:220px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(90deg,#f5f5f5 20%,#ececec 50%,#f5f5f5 80%);background-size:220% 100%;animation:sh 1s linear infinite;}
    @keyframes sh{to{background-position:-120% 0;}}

    .p-card{
      background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
      display:flex;flex-direction:column;box-shadow:0 4px 14px rgba(0,0,0,.06);cursor:pointer;position:relative;
    }
    .p-card.off{opacity:.45;pointer-events:none;}
    .p-img-wrap{position:relative;aspect-ratio:1/1;background:#fafafa;}
    .p-img{width:100%;height:100%;object-fit:cover;}
    .p-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;}
    .p-body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1;}
    .p-name{font-weight:900;font-size:14px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em;}
    .p-desc{font-size:11px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;}
    .p-foot{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .p-price{font-weight:900;font-size:15px;color:var(--brand);}
    .btn-add-mini{
      border:none;border-radius:999px;width:36px;height:36px;font-weight:900;font-size:18px;line-height:1;
      background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 4px 12px color-mix(in srgb,var(--brand) 35%, transparent);
    }

    /* Carrito */
    #cart{background:var(--page);}
    .cartTop{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--brand);color:#fff;flex-shrink:0;}
    .back{border:none;background:rgba(255,255,255,.22);color:#fff;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;}
    .cartT{font-weight:900;flex:1;font-size:17px;}
    .cartBody{flex:1;overflow:auto;padding:14px;}
    .line{
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;
      display:flex;gap:12px;margin-bottom:10px;box-shadow:0 4px 12px rgba(0,0,0,.04);
    }
    .lImg{width:56px;height:56px;border-radius:12px;background:#f5f5f5;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .lImg img{width:100%;height:100%;object-fit:cover;}
    .lMid{flex:1;min-width:0;}
    .lName{font-weight:900;font-size:14px;}
    .lMods{color:var(--muted);font-size:11px;line-height:1.35;margin-top:4px;}
    .lPrice{color:var(--brand);font-weight:900;margin-top:8px;}
    .lRight{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
    .qty{display:flex;align-items:center;gap:6px;}
    .qbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:900;cursor:pointer;}
    .qbtn.rm{border-color:rgba(220,38,38,.4);color:var(--danger);}
    .qnum{font-weight:900;min-width:20px;text-align:center;}
    .cartFoot{
      flex-shrink:0;padding:14px 16px calc(14px + var(--safe));
      background:var(--card);border-top:1px solid var(--line);
      box-shadow:0 -4px 20px rgba(0,0,0,.06);
    }
    .sum{display:flex;justify-content:space-between;font-weight:800;margin-bottom:12px;font-size:15px;}
    .confirm{
      width:100%;border:none;border-radius:16px;padding:16px;background:var(--ok);color:#fff;font-weight:900;font-size:16px;cursor:pointer;
      box-shadow:0 8px 22px rgba(10,125,62,.35);
    }
    .confirm:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
    .empty{padding:40px 16px;text-align:center;color:var(--muted);font-weight:700;}

    /* Ticket */
    #ticket{align-items:center;justify-content:center;text-align:center;padding:18px;background:var(--page);}
    .tick-icon{font-size:52px;margin-bottom:8px;}
    .tick-h{font-weight:900;font-size:20px;margin-bottom:10px;}
    .paper{
      width:min(400px,92vw);background:#fff;color:#111;border-radius:16px;padding:20px 16px;
      box-shadow:0 12px 36px rgba(0,0,0,.12);text-align:left;border:1px solid var(--line);
    }
    .tickNum{font-size:56px;font-weight:900;line-height:1;text-align:center;margin:10px 0 8px;color:var(--brand);}
    .hr{border:none;border-top:2px dashed #ddd;margin:12px 0;}
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px solid #f0f0f0;}
    .row:last-child{border-bottom:none;}
    .tTotal{display:flex;justify-content:space-between;font-weight:900;margin-top:10px;font-size:15px;}
    .btnRow{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
    .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;}
    .btn.primary{border:none;background:var(--brand);color:#fff;box-shadow:0 6px 18px color-mix(in srgb,var(--brand) 35%, transparent);}

    /* Modal producto / combo */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);visibility:hidden;opacity:0;transition:.22s;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .ov.on{visibility:visible;opacity:1;}
    .k-sheet{
      width:100%;max-width:560px;max-height:94vh;background:#fff;border-radius:22px 22px 0 0;
      transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.9,.2,1);
      overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.18);
    }
    .ov.on .k-sheet{transform:translateY(0);}
    .sheet-h{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0;background:#fff;}
    .sheet-x{width:44px;height:44px;border:none;background:#f0f0f0;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;}
    .sheet-h span.mid{flex:1;font-weight:900;font-size:15px;}
    .sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .pd-hero{position:relative;aspect-ratio:16/10;background:#f5f5f5;}
    #shImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
    .pd-hero-ph{width:100%;min-height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:#f5f5f5;}

    .pd-sheet-body{padding:16px 16px 24px;}
    .shName{font-size:22px;font-weight:900;line-height:1.15;}
    .shDesc{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.45;}
    .shPrice{font-size:22px;font-weight:900;color:var(--brand);margin-top:12px;}
    .qtyRow{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding:14px;border:2px solid var(--line);border-radius:16px;}
    .qtyRow span{font-weight:900;}
    .qtyCtrl{display:flex;align-items:center;gap:12px;}
    .qBig{width:44px;height:44px;border-radius:12px;border:2px solid var(--line);background:#fff;font-size:22px;font-weight:900;cursor:pointer;}
    .qVal{min-width:28px;text-align:center;font-weight:900;font-size:18px;}

    .stick-add{
      flex-shrink:0;padding:12px 16px calc(12px + var(--safe));
      background:linear-gradient(180deg,transparent,rgba(255,255,255,.97) 20%,#fff);
      border-top:1px solid var(--line);
    }
    .btn-big{width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;
      background:var(--ok);color:#fff;box-shadow:0 8px 22px rgba(10,125,62,.35);}
    .btn-big:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}

    @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
    @media print{
      body>*:not(#printArea){display:none!important;}
      #printArea{display:block!important;position:fixed;inset:0;background:#fff;padding:20px;}
      .paper{box-shadow:none;border-radius:0;max-width:100%;}
    }
    #printArea{display:none;}
  </style>
</head>
<body>
  <div class="screen on" id="idle">
    <div class="idleCard">
      <div class="idleLogo" id="idleLogo"></div>
      <div class="idleTitle" id="idleTitle">Bienvenido</div>
      <div class="idleSub">Toca para comenzar tu pedido</div>
      <button type="button" class="startBtn" id="startBtn">Hacer mi pedido</button>
      <div class="idleFoot">VendeBot · Kiosco</div>
    </div>
  </div>

  <div class="screen" id="menu">
    <header class="hdr">
      <div class="hdr-row">
        <div class="hdr-logo" id="bizLogo"></div>
        <div class="hdr-txt">
          <div class="hdr-name" id="bizName">Cargando…</div>
          <div class="hdr-sub" id="bizTag">Pedidos en ventanilla</div>
        </div>
        <div class="cartWrap">
          <button type="button" class="cartHdrBtn hide" id="cartBtn" aria-label="Carrito">🛒</button>
          <span class="cartHdrBadge" id="cartCount" style="display:none">0</span>
        </div>
      </div>
    </header>
    <div class="cats-wrap">
      <div class="cats" id="cats"></div>
    </div>
    <div class="scroll">
      <div id="highlightsWrap"></div>
      <div id="comboWrap"></div>
      <div id="gridWrap"></div>
    </div>
  </div>

  <div class="screen" id="cart">
    <div class="cartTop">
      <button type="button" class="back" id="backBtn">←</button>
      <div class="cartT">Tu pedido</div>
    </div>
    <div class="cartBody" id="cartBody"></div>
    <div class="cartFoot">
      <div class="sum"><span>Total</span><strong id="cartTotal">$0.00</strong></div>
      <button type="button" class="confirm" id="confirmBtn" disabled>Confirmar e imprimir</button>
    </div>
  </div>

  <div class="screen" id="ticket">
    <div class="tick-icon">✅</div>
    <div class="tick-h">Pedido registrado</div>
    <div class="paper" id="paper"></div>
    <div class="btnRow">
      <button type="button" class="btn primary" id="printBtn">🖨️ Imprimir</button>
      <button type="button" class="btn" id="newBtn">Nuevo pedido</button>
    </div>
  </div>

  <div class="ov" id="ov">
    <div class="k-sheet" id="sheet">
      <div class="sheet-h">
        <button type="button" class="sheet-x" id="closeX">✕</button>
        <span class="mid" id="sheetTitle">Personalizar</span>
        <span style="width:44px"></span>
      </div>
      <div class="sheet-scroll">
        <div class="pd-hero">
          <img id="shImg" alt="">
          <div id="shImgPh" class="pd-hero-ph">📦</div>
        </div>
        <div class="pd-sheet-body" id="shBodyMain">
          <div class="shName" id="shName">—</div>
          <div class="shDesc" id="shDesc"></div>
          <div class="shPrice" id="shPrice">$0.00</div>
          <div class="qtyRow">
            <span>Cantidad</span>
            <div class="qtyCtrl">
              <button type="button" class="qBig" id="qDec">−</button>
              <div class="qVal" id="qVal">1</div>
              <button type="button" class="qBig" id="qInc">+</button>
            </div>
          </div>
        </div>
      </div>
      <div class="stick-add" id="modalStick">
        <button type="button" class="btn-big" id="addCart">Agregar al pedido</button>
      </div>
    </div>
  </div>

  <div id="printArea"></div>

  <script>
    const slug = location.pathname.split('/')[2];
    let negocio = null;
    let catalogo = [];
    let cart = [];
    let catAct = 'todas';
    let firstPaint = true;

    let modalProd = null;
    let modalQty = 1;
    let modalSelUnico = {};
    let modalSelMulti = {};
    let modalSin = new Set();

    let comboDef = [];
    let comboStep = 0;
    let comboSels = [];
    let comboPrecioBase = 0;

    function money(n){ return '$' + (Number(n) || 0).toFixed(2); }
    function show(id){
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
      document.getElementById(id)?.classList.add('on');
    }

    function shBody(){ return document.getElementById('shBodyMain'); }

    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function hexToRgb(h){
      if(typeof h !== 'string' || !/^#[0-9a-fA-F]{6}$/.test(h)) return null;
      return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};
    }
    function rgbToHex(r,g,b){
      const to = (n)=>clamp(Math.round(n),0,255).toString(16).padStart(2,'0');
      return `#${to(r)}${to(g)}${to(b)}`;
    }
    function mix(a,b,t){
      const ra=hexToRgb(a), rb=hexToRgb(b);
      if(!ra||!rb) return a || b || '#000000';
      return rgbToHex(ra.r+(rb.r-ra.r)*t, ra.g+(rb.g-ra.g)*t, ra.b+(rb.b-ra.b)*t);
    }
    function luminance(hex){
      const c = hexToRgb(hex); if(!c) return 0;
      const f = (x)=>{ x/=255; return x<=0.03928 ? x/12.92 : Math.pow((x+0.055)/1.055,2.4); };
      return 0.2126*f(c.r)+0.7152*f(c.g)+0.0722*f(c.b);
    }
    function contrastText(bg){
      const l = luminance(bg);
      return l > 0.6 ? '#101214' : '#ffffff';
    }
    function smartTheme(t){
      const pri = /^#[0-9a-fA-F]{6}$/.test(t?.color_primario||'') ? t.color_primario : '#c8102e';
      const fondo = /^#[0-9a-fA-F]{6}$/.test(t?.color_fondo||'') ? t.color_fondo : '#f2f2f2';
      const txt = /^#[0-9a-fA-F]{6}$/.test(t?.color_texto||'') ? t.color_texto : contrastText(fondo);
      const isDark = luminance(fondo) < 0.42;
      return {
        brand: pri,
        brandInk: contrastText(pri),
        page: fondo,
        pageSoft: mix(fondo, isDark ? '#111827' : '#ffffff', isDark ? .22 : .35),
        card: mix(fondo, isDark ? '#1b2230' : '#ffffff', isDark ? .24 : .92),
        line: mix(fondo, isDark ? '#ffffff' : '#0f172a', isDark ? .22 : .16),
        ink: txt,
        muted: mix(txt, fondo, .46)
      };
    }
    function aplicarTemaKiosco(tema){
      if(!tema) return;
      const root = document.documentElement;
      const st = smartTheme(tema);
      root.style.setProperty('--brand', st.brand);
      root.style.setProperty('--brand-ink', st.brandInk);
      root.style.setProperty('--page', st.page);
      root.style.setProperty('--page-soft', st.pageSoft);
      root.style.setProperty('--card', st.card);
      root.style.setProperty('--line', st.line);
      root.style.setProperty('--ink', st.ink);
      root.style.setProperty('--muted', st.muted);
      if(typeof tema.banner_opacity === 'number'){}
    }

    async function init(){
      try{
        const r = await fetch(`/kiosco-data/${slug}`, { cache: 'no-store' });
        if(!r.ok) throw new Error('Kiosco no disponible');
        negocio = await r.json();
        if(negocio.pausado){
          document.getElementById('idleTitle').textContent = 'Kiosco pausado';
          document.querySelector('.idleSub').textContent = 'Vuelve en unos minutos';
          document.getElementById('startBtn').style.display = 'none';
          return;
        }
        aplicarTemaKiosco(negocio.tema || null);
        catalogo = (negocio.catalogo || []).filter(p => p.activo !== false);

        const idleLogo = document.getElementById('idleLogo');
        idleLogo.innerHTML = negocio.logo ? `<img src="${negocio.logo}" alt="">` : `<div class="idleEmoji">${negocio.emoji || '🏪'}</div>`;
        document.getElementById('idleTitle').textContent = `Bienvenido a ${negocio.nombre}`;

        document.getElementById('bizName').textContent = negocio.nombre || 'Kiosco';
        const bizLogo = document.getElementById('bizLogo');
        bizLogo.innerHTML = negocio.logo ? `<img src="${negocio.logo}" alt="">` : `<div style="font-size:22px">${negocio.emoji || '🏪'}</div>`;

        renderCats();
        construirCombos();
        renderProducts();
        updateCartUI();
      }catch(e){
        document.getElementById('idleTitle').textContent = 'Error';
        document.querySelector('.idleSub').textContent = e.message || 'No se pudo cargar';
        document.getElementById('startBtn').style.display = 'none';
      }
    }

    function renderCats(){
      const cats = ['todas', ...new Set(catalogo.map(p => p.categoria || 'General'))];
      const wrap = document.getElementById('cats');
      wrap.innerHTML = cats.map(c =>
        `<button type="button" class="cat-pill ${c === catAct ? 'on' : ''}" data-cat="${c}">${c === 'todas' ? 'Todo' : c}</button>`
      ).join('');
      wrap.querySelectorAll('.cat-pill').forEach(b => {
        b.addEventListener('click', () => {
          catAct = b.dataset.cat;
          wrap.querySelectorAll('.cat-pill').forEach(x => x.classList.toggle('on', x.dataset.cat === catAct));
          if(catAct==='todas') document.querySelector('.scroll')?.scrollTo({top:0,behavior:'smooth'});
          else document.getElementById('cat-'+String(catAct).toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,''))?.scrollIntoView({behavior:'smooth',block:'start'});
        });
      });
    }

    function construirCombos(){
      if(Array.isArray(negocio?.combos) && negocio.combos.length){
        comboDef = negocio.combos;
        comboPrecioBase = Number(negocio.precio_combo) || 0;
        return;
      }
      const catMap = {
        principal: ['Principal', 'Principales', 'Burger', 'Burgers', 'Hamburguesas', 'Comida', 'Platos'],
        acomp: ['Acompañante', 'Acompañantes', 'Sides', 'Papas', 'Snacks'],
        bebida: ['Bebida', 'Bebidas', 'Drinks', 'Jugos', 'Gaseosas']
      };
      const emojis = { principal: '🍔', acomp: '🍟', bebida: '🥤' };
      const labels = { principal: 'Principal', acomp: 'Acompañante', bebida: 'Bebida' };
      const cats = [...new Set(catalogo.map(p => p.categoria || 'General'))];
      comboDef = [];
      Object.entries(catMap).forEach(([key, nombres]) => {
        const match = cats.find(c => nombres.some(n => String(c).toLowerCase().includes(String(n).toLowerCase())));
        if(match){
          comboDef.push({
            label: labels[key],
            emoji: emojis[key],
            categoria: match,
            items: catalogo.filter(p => (p.categoria || 'General') === match)
          });
        }
      });
      comboPrecioBase = Number(negocio?.precio_combo) || 0;
    }

    function renderSkeleton(){
      document.getElementById('gridWrap').innerHTML = `<div class="skGrid">${Array.from({ length: 8 }).map(() => '<div class="sk"></div>').join('')}</div>`;
    }

    function renderProducts(){
      if(firstPaint){
        firstPaint = false;
        renderSkeleton();
        setTimeout(renderProducts, 120);
        return;
      }
      const list = catalogo;
      const hwrap = document.getElementById('highlightsWrap');
      const hsource = catalogo.filter(p=>p.destacado).slice(0,6);
      const hs = hsource.length ? hsource : catalogo.slice(0,6);
      if(hs.length){
        hwrap.innerHTML = `
          <div class="hl-wrap">
            ${hs.map(p=>`
              <article class="hl" data-id="${p.id}">
                <div class="hl-img">${p.imagen?`<img src="${p.imagen}" alt="">`:`${p.emoji||'🍽️'}`}</div>
                <div style="min-width:0;">
                  <div class="hl-n">${p.nombre}</div>
                  <div class="hl-p">${money(p.precio)}</div>
                </div>
              </article>
            `).join('')}
          </div>
        `;
        hwrap.querySelectorAll('.hl').forEach(el=>{
          el.onclick=()=>{
            const p = catalogo.find(x=>String(x.id)===String(el.dataset.id));
            if(p && p.stock!==0) abrirModal(p);
          };
        });
      } else hwrap.innerHTML='';

      const comboWrap = document.getElementById('comboWrap');
      if(comboDef.length && (catAct === 'todas' || comboDef.some(s => s.categoria === catAct))){
        const pc = comboPrecioBase;
        comboWrap.innerHTML = `
          <div class="combo-card" id="comboBtn">
            <div>
              <div class="combo-t">🎯 Arma tu combo</div>
              <div class="combo-s">${comboDef.map(s => s.label).join(' + ')}</div>
            </div>
            <div class="combo-p">${pc > 0 ? money(pc) : '→'}</div>
          </div>`;
        document.getElementById('comboBtn').onclick = abrirCombo;
      } else comboWrap.innerHTML = '';

      const grid = document.getElementById('gridWrap');
      const cats = [...new Set(list.map(p=>p.categoria||'General'))];
      const sections = (catAct==='todas'?cats:[catAct]).map(cat=>{
        const items = list.filter(p=>(p.categoria||'General')===cat);
        const secId = 'cat-'+String(cat).toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
        return `
          <section id="${secId}">
            <div class="cat-head">
              <h2>${cat}</h2>
              <small>${items.length} item${items.length===1?'':'s'}</small>
            </div>
            <div class="grid-2">
              ${items.map(p=>`
                <div class="p-card ${p.stock === 0 ? 'off' : ''}" data-id="${p.id}">
                  <div class="p-img-wrap">
                    ${p.imagen ? `<img class="p-img" src="${p.imagen}" alt="" loading="lazy">` : `<div class="p-emoji">${p.emoji || '📦'}</div>`}
                  </div>
                  <div class="p-body">
                    <div class="p-name">${p.nombre}</div>
                    <div class="p-desc">${p.descripcion || ''}</div>
                    <div class="p-foot">
                      <div class="p-price">${money(p.precio)}</div>
                      ${p.stock === 0 ? '' : '<button type="button" class="btn-add-mini" data-stop="1">+</button>'}
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>
        `;
      }).join('');
      grid.innerHTML = sections || `<div class="empty">Sin productos</div>`;

      grid.querySelectorAll('.p-card').forEach(el => {
        el.addEventListener('click', (ev) => {
          if(ev.target.closest('[data-stop]')) return;
          const id = el.getAttribute('data-id');
          const p = catalogo.find(x => String(x.id) === String(id));
          if(!p || p.stock === 0) return;
          abrirModal(p);
        });
      });
      grid.querySelectorAll('.btn-add-mini').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const card = btn.closest('.p-card');
          const p = catalogo.find(x => String(x.id) === String(card.dataset.id));
          if(p) abrirModal(p);
        });
      });
    }

    function abrirModal(p){
      document.getElementById('sheetTitle').textContent = 'Personalizar';
      modalProd = p;
      modalQty = 1;
      modalSelUnico = {};
      modalSelMulti = {};
      modalSin = new Set();
      (p.modificadores || []).forEach((g, gi) => {
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico') modalSelUnico[gi] = null;
        else modalSelMulti[gi] = {};
      });
      document.getElementById('qVal').textContent = '1';
      const body = shBody();
      body.querySelector('.qtyRow').style.display = '';
      document.getElementById('modalStick').style.display = '';
      document.getElementById('addCart').style.display = '';
      renderModalFull();
      const img = document.getElementById('shImg');
      const ph = document.getElementById('shImgPh');
      if(p.imagen){
        img.src = p.imagen;
        img.style.display = 'block';
        ph.style.display = 'none';
      }else{
        img.style.display = 'none';
        ph.style.display = 'flex';
        ph.textContent = p.emoji || '📦';
      }
      document.getElementById('ov').classList.add('on');
    }

    function cerrarModal(){
      document.getElementById('ov').classList.remove('on');
      modalProd = null;
      document.getElementById('sheetTitle').textContent = 'Personalizar';
    }

    function calcExtra(){
      let extra = 0;
      (modalProd?.modificadores || []).forEach((g, gi) => {
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico'){
          const oi = modalSelUnico[gi];
          if(oi != null) extra += Number(g.opciones?.[oi]?.precio || 0);
        } else {
          const counts = modalSelMulti[gi] || {};
          Object.entries(counts).forEach(([oi, qtySel]) => {
            extra += (Number(g.opciones?.[Number(oi)]?.precio || 0) * (Number(qtySel) || 0));
          });
        }
      });
      return extra;
    }

    function verificarObligatorios(){
      let ok = true;
      (modalProd?.modificadores || []).forEach((g, gi) => {
        if(!g.obligatorio) return;
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico' && modalSelUnico[gi] == null) ok = false;
        if(tipo !== 'unico'){
          const counts = modalSelMulti[gi] || {};
          const totalSel = Object.values(counts).reduce((s,n)=>s+(Number(n)||0),0);
          if(totalSel === 0) ok = false;
        }
      });
      return ok;
    }

    function optBtnStyle(selected){
      const b = '2px solid ' + (selected ? 'var(--brand)' : 'var(--line)');
      const bg = selected ? '#fff8f8' : '#fff';
      const cl = selected ? 'var(--ink)' : 'var(--muted)';
      return `border:${b};background:${bg};color:${cl};padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:800;font-size:13px;`;
    }

    function renderModalFull(){
      if(!modalProd) document.getElementById('sheetTitle').textContent = 'Personalizar';
      if(!modalProd) return;
      const p = modalProd;
      const base = Number(p.precio) || 0;
      const extra = calcExtra();
      const unit = base + extra;
      const total = unit * modalQty;

      document.getElementById('shName').textContent = p.nombre;
      document.getElementById('shDesc').textContent = p.descripcion || '';
      document.getElementById('shPrice').textContent = money(unit);

      const body = shBody();
      const old = body.querySelector('[data-dyn="1"]');
      if(old) old.remove();
      const wrap = document.createElement('div');
      wrap.setAttribute('data-dyn', '1');

      const mods = p.modificadores || [];
      if(mods.length){
        mods.forEach((g, gi) => {
          const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
          const hint = tipo === 'unico' ? 'Elige 1' : 'Elige varias';
          const req = g.obligatorio ? '<span style="color:var(--danger);font-weight:900;font-size:11px;margin-left:6px;">*</span>' : '';
          const sec = document.createElement('div');
          sec.style.margin = '16px 0 0';
          sec.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
              <div style="font-weight:900;font-size:15px">${g.nombre}${req}</div>
              <div style="margin-left:auto;color:var(--muted);font-size:12px;font-weight:700">${hint}</div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;" data-gi="${gi}"></div>`;
          const optWrap = sec.querySelector('[data-gi]');
          (g.opciones || []).forEach((op, oi) => {
            const selected = tipo === 'unico' ? modalSelUnico[gi] === oi : (Number(modalSelMulti?.[gi]?.[oi] || 0) > 0);
            const qtyOpt = Number(modalSelMulti?.[gi]?.[oi] || 0);
            const ext = Number(op.precio || 0);
            const label = `${op.nombre}${ext !== 0 ? ` <span style="opacity:.75;font-weight:700">(${ext > 0 ? '+' : ''}${money(Math.abs(ext))})</span>` : ''}`;
            if(tipo === 'multiple'){
              const row = document.createElement('div');
              row.style.cssText = `display:flex;align-items:center;gap:8px;${optBtnStyle(selected)}padding:8px 10px;`;
              row.innerHTML = `
                <div style="flex:1">${label}</div>
                <button type="button" data-mact="dec" style="width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-weight:900;">−</button>
                <strong style="min-width:16px;text-align:center;">${qtyOpt}</strong>
                <button type="button" data-mact="inc" style="width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-weight:900;">+</button>
              `;
              row.querySelector('[data-mact="inc"]').onclick = () => {
                if(!modalSelMulti[gi]) modalSelMulti[gi] = {};
                const cur = Number(modalSelMulti[gi][oi] || 0);
                modalSelMulti[gi][oi] = cur + 1;
                renderModalFull();
              };
              row.querySelector('[data-mact="dec"]').onclick = () => {
                if(!modalSelMulti[gi]) modalSelMulti[gi] = {};
                const cur = Number(modalSelMulti[gi][oi] || 0);
                modalSelMulti[gi][oi] = Math.max(0, cur - 1);
                renderModalFull();
              };
              optWrap.appendChild(row);
            } else {
              const btn = document.createElement('button');
              btn.type = 'button';
              btn.style.cssText = optBtnStyle(selected);
              btn.innerHTML = label;
              btn.onclick = () => {
                modalSelUnico[gi] = modalSelUnico[gi] === oi ? null : oi;
                renderModalFull();
              };
              optWrap.appendChild(btn);
            }
          });
          wrap.appendChild(sec);
        });
      }

      const ings = p.ingredientes || [];
      if(ings.length){
        const sec = document.createElement('div');
        sec.style.margin = '16px 0 0';
        sec.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="font-weight:900;font-size:15px">Sin ingredientes</div>
            <div style="margin-left:auto;color:var(--muted);font-size:12px;font-weight:700">Opcional</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;" id="sinWrap"></div>`;
        const w = sec.querySelector('#sinWrap');
        ings.forEach((ing, ii) => {
          const selected = modalSin.has(ii);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = `border:2px solid ${selected ? 'var(--danger)' : 'var(--line)'};background:${selected ? 'rgba(220,38,38,.08)' : '#fff'};color:${selected ? 'var(--danger)' : 'var(--muted)'};padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:800;font-size:13px;${selected ? 'text-decoration:line-through' : ''}`;
          btn.textContent = ing;
          btn.onclick = () => { selected ? modalSin.delete(ii) : modalSin.add(ii); renderModalFull(); };
          w.appendChild(btn);
        });
        wrap.appendChild(sec);
      }

      body.insertBefore(wrap, body.querySelector('.qtyRow'));

      const addBtn = document.getElementById('addCart');
      addBtn.textContent = `Agregar al pedido · ${money(total)}`;
      addBtn.disabled = !verificarObligatorios();
    }

    function buildModsTexto(p){
      const parts = [];
      (p.modificadores || []).forEach((g, gi) => {
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico'){
          const oi = modalSelUnico[gi];
          if(oi != null) parts.push(`${g.nombre}: ${g.opciones?.[oi]?.nombre || ''}`.trim());
        } else{
          const counts = modalSelMulti[gi] || {};
          const names = Object.entries(counts)
            .filter(([,q]) => Number(q) > 0)
            .map(([oi,q]) => {
              const n = g.opciones?.[Number(oi)]?.nombre;
              if(!n) return null;
              return Number(q) > 1 ? `${n} x${Number(q)}` : n;
            })
            .filter(Boolean);
            if(names.length) parts.push(`${g.nombre}: ${names.join(', ')}`);
        }
      });
      const ings = p.ingredientes || [];
      if(modalSin.size){
        const names = [...modalSin].map(ii => ings[ii]).filter(Boolean);
        if(names.length) parts.push(`Sin: ${names.join(', ')}`);
      }
      return parts.join(' · ');
    }

    function addToCart(p, qty){
      cart.push({
        uid: Date.now() + Math.random(),
        id: p.id,
        nombre: p.nombre,
        precio: (Number(p.precio) || 0) + (modalProd && String(modalProd.id) === String(p.id) ? calcExtra() : 0),
        cantidad: qty || 1,
        emoji: p.emoji || '🍽️',
        imagen: p.imagen || '',
        mods: (modalProd && String(modalProd.id) === String(p.id)) ? buildModsTexto(p) : ''
      });
      updateCartUI();
    }

    function updateCartUI(){
      const count = cart.reduce((s, i) => s + (i.cantidad || 0), 0);
      const total = cart.reduce((s, i) => s + i.precio * i.cantidad, 0);
      const badge = document.getElementById('cartCount');
      badge.textContent = count;
      badge.style.display = count ? 'flex' : 'none';
      document.getElementById('cartBtn').classList.toggle('hide', count === 0);
      document.getElementById('cartTotal').textContent = money(total);
      document.getElementById('confirmBtn').disabled = count === 0;
      renderCart();
    }

    function renderCart(){
      const el = document.getElementById('cartBody');
      if(!cart.length){
        el.innerHTML = '<div class="empty">Tu carrito está vacío</div>';
        return;
      }
      el.innerHTML = cart.map((it, idx) => `
        <div class="line">
          <div class="lImg">${it.imagen ? `<img src="${it.imagen}" alt="">` : (it.emoji || '🍽️')}</div>
          <div class="lMid">
            <div class="lName">${it.nombre}</div>
            ${it.mods ? `<div class="lMods">${it.mods}</div>` : ''}
            <div class="lPrice">${money(it.precio * it.cantidad)}</div>
          </div>
          <div class="lRight">
            <div class="qty">
              <button type="button" class="qbtn rm" data-i="${idx}" data-act="dec">${it.cantidad === 1 ? '🗑' : '−'}</button>
              <div class="qnum">${it.cantidad}</div>
              <button type="button" class="qbtn" data-i="${idx}" data-act="inc">+</button>
            </div>
          </div>
        </div>
      `).join('');
      el.querySelectorAll('.qbtn').forEach(b => {
        b.addEventListener('click', () => {
          const i = Number(b.dataset.i);
          const act = b.dataset.act;
          if(act === 'inc') cart[i].cantidad++;
          else if(cart[i].cantidad === 1) cart.splice(i, 1);
          else cart[i].cantidad--;
          updateCartUI();
        });
      });
    }

    async function confirmar(){
      if(!cart.length) return;
      const total = cart.reduce((s, i) => s + i.precio * i.cantidad, 0);
      const items = cart.map(i => ({ id: i.id, nombre: i.nombre, precio: i.precio, cantidad: i.cantidad, mods: i.mods || '' }));
      const r = await fetch(`/kiosco/${slug}/pedido`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items, total }) });
      const d = await r.json();
      if(!d.ok){ alert(d.error || 'Error'); return; }
      renderTicket(d.numero, items, total);
      show('ticket');
    }

    function renderTicket(numero, items, total){
      const now = new Date();
      const fecha = now.toLocaleDateString('es-EC', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const hora = now.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('paper').innerHTML = `
        <div style="text-align:center;font-weight:900;font-size:16px;margin-bottom:2px;">${negocio?.nombre || 'Kiosco'}</div>
        <div style="text-align:center;color:#666;font-size:11px;margin-bottom:10px;">${fecha} · ${hora}</div>
        <hr class="hr">
        <div style="text-align:center;color:#666;font-size:11px;letter-spacing:.12em;text-transform:uppercase;">Número de pedido</div>
        <div class="tickNum">#${numero}</div>
        <hr class="hr">
        <div>${items.map(i => `<div class="row"><span>${i.nombre} x${i.cantidad}</span><span>${money(i.precio * i.cantidad)}</span></div>`).join('')}</div>
        <div class="tTotal"><span>Total</span><span>${money(total)}</span></div>
        <hr class="hr">
        <div style="text-align:center;color:#777;font-size:11px;">Paga en ventanilla y espera tu número</div>
      `;
      document.getElementById('printArea').innerHTML = document.getElementById('paper').outerHTML;
    }

    function abrirCombo(){
      if(!comboDef.length) return;
      comboStep = 0;
      comboSels = new Array(comboDef.length).fill(null);
      document.getElementById('sheetTitle').textContent = 'Arma tu combo';
      renderComboSheet();
      document.getElementById('ov').classList.add('on');
    }

    function calcComboTotal(){
      let t = comboPrecioBase;
      if(t === 0) comboSels.forEach(p => { if(p) t += Number(p.precio) || 0; });
      return t;
    }

    function renderComboSheet(){
      modalProd = null;
      modalQty = 1;
      document.getElementById('qVal').textContent = '1';
      document.getElementById('shName').textContent = '🎯 Arma tu combo';
      document.getElementById('shDesc').textContent = `Paso ${comboStep + 1} de ${comboDef.length} — elige ${comboDef[comboStep].label.toLowerCase()}`;
      document.getElementById('shPrice').textContent = money(calcComboTotal());
      document.getElementById('shImg').style.display = 'none';
      const ph = document.getElementById('shImgPh');
      ph.style.display = 'flex';
      ph.textContent = '🎯';

      const body = shBody();
      const old = body.querySelector('[data-dyn="1"]');
      if(old) old.remove();
      const wrap = document.createElement('div');
      wrap.setAttribute('data-dyn', '1');

      const steps = document.createElement('div');
      steps.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 14px;';
      steps.innerHTML = comboDef.map((s, i) => `
        <div style="padding:6px 12px;border-radius:999px;border:2px solid var(--line);background:${i === comboStep ? '#fff8f8' : '#fff'};color:${i < comboStep ? 'var(--brand)' : 'var(--muted)'};font-weight:800;font-size:12px;">
          ${i < comboStep ? '✓ ' : ''}${s.emoji || ''} ${s.label}
        </div>
      `).join('');
      wrap.appendChild(steps);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;';
      const step = comboDef[comboStep];
      step.items.forEach(p => {
        const sel = comboSels[comboStep] && String(comboSels[comboStep].id) === String(p.id);
        const card = document.createElement('button');
        card.type = 'button';
        card.style.cssText = `text-align:left;border:2px solid ${sel ? 'var(--brand)' : 'var(--line)'};background:${sel ? '#fff8f8' : '#fff'};border-radius:14px;padding:10px;cursor:pointer;color:var(--ink);`;
        card.innerHTML = `
          ${p.imagen ? `<img src="${p.imagen}" alt="" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;margin-bottom:8px;">` : `<div style="font-size:32px;text-align:center;margin-bottom:6px;">${p.emoji || '📦'}</div>`}
          <div style="font-weight:800;font-size:12px;line-height:1.2;margin-bottom:4px;">${p.nombre}</div>
          <div style="font-weight:800;color:var(--brand);font-size:12px;">${money(p.precio)}</div>
        `;
        card.onclick = () => {
          comboSels[comboStep] = p;
          document.getElementById('shPrice').textContent = money(calcComboTotal());
          renderComboSheet();
        };
        grid.appendChild(card);
      });
      wrap.appendChild(grid);

      const nav = document.createElement('div');
      nav.style.cssText = 'display:flex;gap:10px;margin-top:14px;';
      const back = document.createElement('button');
      back.type = 'button';
      back.style.cssText = 'flex:1;border:2px solid var(--line);background:#fff;color:var(--muted);border-radius:14px;padding:14px;font-weight:800;cursor:pointer;';
      back.textContent = comboStep === 0 ? 'Cancelar' : '← Atrás';
      back.onclick = () => {
        if(comboStep === 0) cerrarModal();
        else { comboStep--; renderComboSheet(); }
      };
      const next = document.createElement('button');
      next.type = 'button';
      next.style.cssText = 'flex:1;border:none;background:var(--brand);color:#fff;border-radius:14px;padding:14px;font-weight:900;cursor:pointer;box-shadow:0 6px 18px color-mix(in srgb,var(--brand) 35%, transparent);';
      next.textContent = comboStep === comboDef.length - 1 ? 'Agregar combo' : 'Siguiente →';
      next.onclick = () => {
        if(!comboSels[comboStep]) return;
        if(comboStep < comboDef.length - 1){ comboStep++; renderComboSheet(); }
        else{
          const total = calcComboTotal();
          cart.push({
            uid: Date.now() + Math.random(),
            id: 'combo_' + Date.now(),
            nombre: '🎯 Combo',
            precio: total,
            cantidad: 1,
            emoji: '🎯',
            imagen: '',
            mods: comboSels.filter(Boolean).map(p => p.nombre).join(' + ')
          });
          updateCartUI();
          cerrarModal();
        }
      };
      nav.appendChild(back);
      nav.appendChild(next);
      wrap.appendChild(nav);

      body.querySelector('.qtyRow').style.display = 'none';
      document.getElementById('modalStick').style.display = 'none';
      body.insertBefore(wrap, body.querySelector('.qtyRow'));
    }

    document.getElementById('startBtn').addEventListener('click', () => show('menu'));
    document.getElementById('cartBtn').addEventListener('click', () => show('cart'));
    document.getElementById('backBtn').addEventListener('click', () => show('menu'));
    document.getElementById('confirmBtn').addEventListener('click', confirmar);
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('newBtn').addEventListener('click', () => {
      cart = [];
      updateCartUI();
      show('idle');
    });

    document.getElementById('closeX').addEventListener('click', cerrarModal);
    document.getElementById('ov').addEventListener('click', (e) => { if(e.target.id === 'ov') cerrarModal(); });

    document.getElementById('qDec').addEventListener('click', () => {
      modalQty = Math.max(1, modalQty - 1);
      document.getElementById('qVal').textContent = String(modalQty);
      if(modalProd) renderModalFull();
    });
    document.getElementById('qInc').addEventListener('click', () => {
      modalQty++;
      document.getElementById('qVal').textContent = String(modalQty);
      if(modalProd) renderModalFull();
    });
    document.getElementById('addCart').addEventListener('click', () => {
      if(!modalProd) return;
      if(!verificarObligatorios()) return;
      addToCart(modalProd, modalQty);
      cerrarModal();
    });

    init();
  </script>
</body>
</html>
