<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Kiosco</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#070a10;
      --surface:rgba(255,255,255,.06);
      --surface2:rgba(255,255,255,.10);
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.18);
      --text:#f5f7ff;
      --muted:rgba(245,247,255,.62);
      --muted2:rgba(245,247,255,.34);
      --accent:#25D366;
      --accent2:#1da851;
      --danger:#ef4444;
      --warn:#f59e0b;
      --shadow:0 18px 50px rgba(0,0,0,.38);
      --shadow2:0 10px 28px rgba(0,0,0,.28);
      --radius:20px;
      --glow:rgba(37,211,102,.22);
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);user-select:none;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:
      radial-gradient(1100px 600px at 20% -10%, var(--glow), transparent 60%),
      radial-gradient(900px 500px at 90% 0%, rgba(255,255,255,.08), transparent 58%);opacity:.9;z-index:0;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;background-image:
      linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
      background-size:42px 42px;mask-image:radial-gradient(circle at 50% 25%,black 20%,transparent 80%);opacity:.28;z-index:0;}

    .screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(10px) scale(.995);transition:opacity .32s ease,transform .32s ease;z-index:1;}
    .screen.on{opacity:1;pointer-events:all;transform:none;}

    /* IDLE */
    #idle{align-items:center;justify-content:center;text-align:center;padding:26px;}
    .idleCard{
      width:min(720px,94vw);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border-radius:26px;
      padding:26px 22px 22px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .idleCard::after{content:'';position:absolute;inset:-120% -45%;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.14) 50%,transparent 65%);animation:sweep 5.2s linear infinite;pointer-events:none;}
    @keyframes sweep{0%{transform:translateX(-50%);}100%{transform:translateX(50%);}}
    .idleLogo{width:130px;height:130px;border-radius:28px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 16px;box-shadow:var(--shadow2);}
    .idleLogo img{width:100%;height:100%;object-fit:cover;}
    .idleEmoji{font-size:60px;}
    .idleTitle{font-weight:950;font-size:clamp(28px,4.5vw,46px);line-height:1.05;margin-bottom:10px;}
    .idleSub{color:var(--muted);font-size:clamp(14px,2.2vw,20px);margin-bottom:22px;}
    .startBtn{
      border:none;cursor:pointer;
      padding:18px 26px;border-radius:999px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#07120b;
      font-weight:950;
      font-size:clamp(16px,2.4vw,22px);
      box-shadow:0 24px 50px var(--glow);
      transition:transform .15s ease,opacity .15s ease;
    }
    .startBtn:active{transform:scale(.99);opacity:.92;}
    .idleFoot{margin-top:18px;color:var(--muted2);font-size:12px;letter-spacing:.08em;text-transform:uppercase;}

    /* MENU */
    #menu{padding:0;}
    .top{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;
      background:linear-gradient(180deg,rgba(7,10,16,.92),rgba(7,10,16,.68));
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.10);
      flex-shrink:0;
    }
    .biz{display:flex;align-items:center;gap:10px;min-width:0;}
    .bizLogo{width:44px;height:44px;border-radius:16px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow2);}
    .bizLogo img{width:100%;height:100%;object-fit:cover;}
    .bizName{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bizTag{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cartBtn{
      position:relative;
      border:1px solid color-mix(in srgb,var(--accent) 35%, var(--stroke));
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      color:var(--text);
      border-radius:18px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow2);
      display:flex;align-items:center;gap:10px;
    }
    .cartBtn.hide{opacity:0;pointer-events:none;}
    .cartCount{
      position:absolute;top:-8px;right:-8px;
      width:24px;height:24px;border-radius:12px;
      background:var(--danger);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:950;
      border:2px solid rgba(7,10,16,.9);
    }

    .cats{
      padding:12px 16px;
      display:flex;gap:8px;overflow:auto;scrollbar-width:none;
      border-bottom:1px solid rgba(255,255,255,.08);
      flex-shrink:0;
    }
    .cats::-webkit-scrollbar{display:none;}
    .pill{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
      transition:all .15s ease;
    }
    .pill.on{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 22%, rgba(255,255,255,.04)), rgba(255,255,255,.03));border-color:color-mix(in srgb,var(--accent) 40%, var(--stroke));color:var(--text);box-shadow:0 16px 30px rgba(0,0,0,.22);}

    .scroll{flex:1;overflow:auto;padding:14px 16px 20px;scrollbar-width:thin;}
    .scroll::-webkit-scrollbar{width:4px;}
    .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:999px;}

    .combo{
      border:1px solid color-mix(in srgb,var(--accent) 30%, var(--stroke));
      background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 16%, rgba(255,255,255,.04)), rgba(255,255,255,.03));
      border-radius:22px;
      padding:16px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      cursor:pointer;
      box-shadow:var(--shadow2);
      margin-bottom:14px;
      transition:transform .15s ease;
    }
    .combo:active{transform:scale(.995);}
    .comboT{font-weight:950;color:var(--accent);margin-bottom:4px;}
    .comboS{color:var(--muted);font-size:12px;}
    .comboP{font-weight:950;font-size:20px;}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(170px,22vw,260px),1fr));gap:14px;}
    .skGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(170px,22vw,260px),1fr));gap:14px;}
    .sk{height:250px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(90deg,rgba(255,255,255,.05) 20%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.05) 80%);background-size:220% 100%;animation:sh 1.2s linear infinite;}
    @keyframes sh{to{background-position:-120% 0;}}

    .p{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border-radius:22px;
      overflow:hidden;
      cursor:pointer;
      box-shadow:var(--shadow2);
      transition:transform .15s ease,border-color .15s ease;
      position:relative;
    }
    .p:hover{border-color:var(--stroke2);transform:translateY(-1px);}
    .p.off{opacity:.4;pointer-events:none;}
    .pImg{width:100%;aspect-ratio:4/3;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden;}
    .pImg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.28) 100%);}
    .pImg img{width:100%;height:100%;object-fit:cover;}
    .pBody{padding:12px 12px 14px;}
    .pName{font-weight:950;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pDesc{color:var(--muted);font-size:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px;margin-bottom:10px;}
    .pFoot{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
    .pPrice{font-weight:950;color:var(--accent);}
    .add{
      width:38px;height:38px;border-radius:16px;
      border:1px solid color-mix(in srgb,var(--accent) 38%, var(--stroke));
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#07120b;
      font-weight:950;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 16px 26px var(--glow);
    }

    /* CART */
    #cart{background:var(--bg);}
    .cartTop{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg,rgba(7,10,16,.92),rgba(7,10,16,.68));backdrop-filter:blur(16px);flex-shrink:0;}
    .back{border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--text);border-radius:16px;padding:10px 14px;font-weight:900;cursor:pointer;}
    .cartT{font-weight:950;flex:1;}
    .cartBody{flex:1;overflow:auto;padding:14px 16px;}
    .line{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:20px;padding:12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
    .lImg{width:58px;height:58px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .lImg img{width:100%;height:100%;object-fit:cover;}
    .lMid{flex:1;min-width:0;}
    .lName{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lMods{color:var(--muted2);font-size:11px;line-height:1.4;margin-top:2px;}
    .lPrice{color:var(--accent);font-weight:950;margin-top:8px;}
    .lRight{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;}
    .qty{display:flex;align-items:center;gap:8px;}
    .qbtn{width:34px;height:34px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-weight:950;}
    .qbtn.rm{border-color:rgba(239,68,68,.35);color:var(--danger);background:rgba(239,68,68,.10);}
    .qnum{font-weight:950;min-width:18px;text-align:center;}
    .cartFoot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.10);flex-shrink:0;background:linear-gradient(180deg,rgba(7,10,16,.72),rgba(7,10,16,.92));}
    .sum{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:10px;}
    .sum strong{color:var(--text);}
    .confirm{
      width:100%;
      border:none;
      border-radius:22px;
      padding:16px 16px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#07120b;
      font-weight:950;
      cursor:pointer;
      box-shadow:0 24px 50px var(--glow);
    }
    .confirm:disabled{opacity:.4;cursor:not-allowed;}
    .empty{padding:50px 18px;text-align:center;color:var(--muted2);font-weight:800;}

    /* Ticket */
    #ticket{align-items:center;justify-content:center;text-align:center;padding:18px;}
    .paper{
      width:min(420px,92vw);
      background:#fff;color:#111;
      border-radius:20px;
      padding:22px 18px;
      box-shadow:0 22px 60px rgba(0,0,0,.35);
      text-align:left;
    }
    .tickNum{font-size:64px;font-weight:950;line-height:1;text-align:center;margin:10px 0 8px;}
    .hr{border:none;border-top:2px dashed #cfcfcf;margin:12px 0;}
    .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px solid #f0f0f0;}
    .row:last-child{border-bottom:none;}
    .tTotal{display:flex;justify-content:space-between;font-weight:950;margin-top:10px;}
    .btnRow{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
    .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--text);border-radius:18px;padding:12px 16px;font-weight:950;cursor:pointer;}
    .btn.primary{border:none;background:linear-gradient(180deg,var(--accent),var(--accent2));color:#07120b;box-shadow:0 18px 40px var(--glow);}

    /* Modal product (simple) */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.78);visibility:hidden;opacity:0;transition:opacity .2s ease,visibility .2s ease;display:flex;justify-content:center;align-items:flex-end;z-index:100;}
    .ov.on{visibility:visible;opacity:1;}
    .sheet{
      width:min(760px,100%);
      max-height:92vh;
      border-top-left-radius:26px;border-top-right-radius:26px;
      background:linear-gradient(180deg,rgba(10,12,18,.98),rgba(7,10,16,.98));
      border:1px solid rgba(255,255,255,.12);
      transform:translateY(100%);
      transition:transform .32s cubic-bezier(.2,.9,.2,1);
      overflow:auto;
      box-shadow:var(--shadow);
      padding-bottom:18px;
    }
    .ov.on .sheet{transform:translateY(0);}
    .shImg{width:100%;aspect-ratio:16/8;object-fit:cover;background:rgba(255,255,255,.06);}
    .shBody{padding:14px 16px;}
    .shName{font-weight:950;font-size:20px;margin-bottom:6px;}
    .shDesc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:10px;}
    .shPrice{color:var(--accent);font-weight:950;font-size:22px;margin-bottom:12px;}
    .qtyRow{display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:18px;padding:12px 12px;margin-bottom:12px;}
    .qtyCtrl{display:flex;align-items:center;gap:10px;}
    .qBig{width:44px;height:44px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);font-weight:950;font-size:22px;cursor:pointer;}
    .qVal{min-width:24px;text-align:center;font-weight:950;font-size:18px;}
    .addCart{width:100%;border:none;border-radius:22px;padding:16px;background:linear-gradient(180deg,var(--accent),var(--accent2));color:#07120b;font-weight:950;cursor:pointer;box-shadow:0 24px 50px var(--glow);}
    .closeX{position:absolute;top:10px;right:10px;width:40px;height:40px;border-radius:16px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.38);color:#fff;font-weight:950;cursor:pointer;}

    @media (prefers-reduced-motion: reduce){
      *{transition:none!important;animation:none!important;}
    }
    @media print{
      body>*:not(#printArea){display:none!important;}
      #printArea{display:block!important;position:fixed;inset:0;background:#fff;padding:20px;}
      .paper{box-shadow:none;border-radius:0;max-width:100%;}
    }
    #printArea{display:none;}
  </style>
</head>
<body>
  <div class="screen on" id="idle">
    <div class="idleCard">
      <div class="idleLogo" id="idleLogo"></div>
      <div class="idleTitle" id="idleTitle">Bienvenido</div>
      <div class="idleSub">Toca para comenzar tu pedido</div>
      <button class="startBtn" id="startBtn">🛒 Hacer mi pedido</button>
      <div class="idleFoot">VendeBot · Kiosco</div>
    </div>
  </div>

  <div class="screen" id="menu">
    <div class="top">
      <div class="biz">
        <div class="bizLogo" id="bizLogo"></div>
        <div style="min-width:0">
          <div class="bizName" id="bizName">Cargando…</div>
          <div class="bizTag" id="bizTag">// pedidos en ventanilla</div>
        </div>
      </div>
      <button class="cartBtn hide" id="cartBtn">🛒 Pedido <span class="cartCount" id="cartCount">0</span></button>
    </div>
    <div class="cats" id="cats"></div>
    <div class="scroll">
      <div id="comboWrap"></div>
      <div id="gridWrap"></div>
    </div>
  </div>

  <div class="screen" id="cart">
    <div class="cartTop">
      <button class="back" id="backBtn">←</button>
      <div class="cartT">Mi pedido</div>
    </div>
    <div class="cartBody" id="cartBody"></div>
    <div class="cartFoot">
      <div class="sum"><span>Total</span><strong id="cartTotal">$0.00</strong></div>
      <button class="confirm" id="confirmBtn" disabled>✅ Confirmar e imprimir</button>
    </div>
  </div>

  <div class="screen" id="ticket">
    <div style="font-size:60px;margin-bottom:10px;">✅</div>
    <div style="font-weight:950;font-size:22px;margin-bottom:10px;">Pedido registrado</div>
    <div class="paper" id="paper"></div>
    <div class="btnRow">
      <button class="btn primary" id="printBtn">🖨️ Imprimir</button>
      <button class="btn" id="newBtn">Nuevo pedido</button>
    </div>
  </div>

  <div class="ov" id="ov">
    <div class="sheet" id="sheet">
      <div style="position:relative">
        <img id="shImg" class="shImg" alt="" style="display:none">
        <div id="shImgPh" class="shImg" style="display:flex;align-items:center;justify-content:center;font-size:66px;">📦</div>
        <button class="closeX" id="closeX">✕</button>
      </div>
      <div class="shBody">
        <div class="shName" id="shName">—</div>
        <div class="shDesc" id="shDesc"></div>
        <div class="shPrice" id="shPrice">$0.00</div>
        <div class="qtyRow">
          <div style="font-weight:900">Cantidad</div>
          <div class="qtyCtrl">
            <button class="qBig" id="qDec">−</button>
            <div class="qVal" id="qVal">1</div>
            <button class="qBig" id="qInc">+</button>
          </div>
        </div>
        <button class="addCart" id="addCart">Agregar al pedido</button>
      </div>
    </div>
  </div>

  <div id="printArea"></div>

  <script>
    const slug = location.pathname.split('/')[2];
    let negocio = null;
    let catalogo = [];
    let cart = [];
    let catAct = 'todas';
    let firstPaint = true;

    // Modal producto (completo)
    let modalProd = null;
    let modalQty = 1;
    let modalSelUnico = {};    // {gi: oi|null}
    let modalSelMulti = {};    // {gi: Set<oi>}
    let modalSin = new Set();  // ingredientes a quitar (por índice)

    // Combo (completo)
    let comboDef = [];
    let comboStep = 0;
    let comboSels = [];
    let comboPrecioBase = 0;

    function money(n){return '$' + (Number(n)||0).toFixed(2);}
    function show(id){
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
      document.getElementById(id)?.classList.add('on');
    }

    function aplicarTemaKiosco(tema){
      if(!tema) return;
      const root = document.documentElement;
      if(typeof tema.banner_opacity === 'number'){}
      const hex = (h) => typeof h === 'string' && /^#[0-9a-fA-F]{6}$/.test(h) ? h : null;
      if(hex(tema.color_fondo)) root.style.setProperty('--bg', tema.color_fondo);
      if(hex(tema.color_texto)) root.style.setProperty('--text', tema.color_texto);
      if(hex(tema.color_primario)){
        root.style.setProperty('--accent', tema.color_primario);
        root.style.setProperty('--accent2', tema.color_primario);
        const r=parseInt(tema.color_primario.slice(1,3),16),g=parseInt(tema.color_primario.slice(3,5),16),b=parseInt(tema.color_primario.slice(5,7),16);
        root.style.setProperty('--glow',`rgba(${r},${g},${b},.22)`);
        root.style.setProperty('--stroke2',`rgba(${r},${g},${b},.24)`);
      }
    }

    async function init(){
      try{
        const r = await fetch(`/kiosco-data/${slug}`, { cache:'no-store' });
        if(!r.ok) throw new Error('Kiosco no disponible');
        negocio = await r.json();
        if(negocio.pausado){
          document.getElementById('idleTitle').textContent = 'Kiosco pausado';
          document.querySelector('.idleSub').textContent = 'Vuelve en unos minutos';
          document.getElementById('startBtn').style.display='none';
          return;
        }
        aplicarTemaKiosco(negocio.tema||null);
        catalogo = (negocio.catalogo||[]).filter(p=>p.activo!==false);

        // idle visuals
        const idleLogo = document.getElementById('idleLogo');
        idleLogo.innerHTML = negocio.logo ? `<img src="${negocio.logo}" alt="">` : `<div class="idleEmoji">${negocio.emoji||'🏪'}</div>`;
        document.getElementById('idleTitle').textContent = `Bienvenido a ${negocio.nombre}`;

        // header
        document.getElementById('bizName').textContent = negocio.nombre || 'Kiosco';
        const bizLogo = document.getElementById('bizLogo');
        bizLogo.innerHTML = negocio.logo ? `<img src="${negocio.logo}" alt="">` : `<div style="font-size:22px">${negocio.emoji||'🏪'}</div>`;

        renderCats();
        construirCombos();
        renderProducts();
        updateCartUI();
      }catch(e){
        document.getElementById('idleTitle').textContent = 'Error';
        document.querySelector('.idleSub').textContent = e.message || 'No se pudo cargar';
        document.getElementById('startBtn').style.display='none';
      }
    }

    function renderCats(){
      const cats = ['todas', ...new Set(catalogo.map(p => p.categoria || 'General'))];
      const wrap = document.getElementById('cats');
      wrap.innerHTML = cats.map(c => `<button class="pill ${c===catAct?'on':''}" data-cat="${c}">${c==='todas'?'📋 Todo':c}</button>`).join('');
      wrap.querySelectorAll('.pill').forEach(b=>{
        b.addEventListener('click', ()=>{
          catAct = b.dataset.cat;
          wrap.querySelectorAll('.pill').forEach(x=>x.classList.toggle('on', x.dataset.cat===catAct));
          renderProducts();
        });
      });
    }

    function construirCombos(){
      // Soporta combos predefinidos desde negocio.combos, o auto-detección por categorías
      if(Array.isArray(negocio?.combos) && negocio.combos.length){
        comboDef = negocio.combos;
        comboPrecioBase = Number(negocio.precio_combo)||0;
        return;
      }
      const catMap={principal:['Principal','Principales','Burger','Burgers','Hamburguesas','Comida','Platos'],acomp:['Acompañante','Acompañantes','Sides','Papas','Snacks'],bebida:['Bebida','Bebidas','Drinks','Jugos','Gaseosas']};
      const emojis={principal:'🍔',acomp:'🍟',bebida:'🥤'};
      const labels={principal:'Principal',acomp:'Acompañante',bebida:'Bebida'};
      const cats=[...new Set(catalogo.map(p=>p.categoria||'General'))];
      comboDef=[];
      Object.entries(catMap).forEach(([key,nombres])=>{
        const match=cats.find(c=>nombres.some(n=>String(c).toLowerCase().includes(String(n).toLowerCase())));
        if(match){
          comboDef.push({ label: labels[key], emoji: emojis[key], categoria: match, items: catalogo.filter(p => (p.categoria||'General')===match) });
        }
      });
      comboPrecioBase = Number(negocio?.precio_combo)||0;
    }

    function renderSkeleton(){
      document.getElementById('gridWrap').innerHTML = `<div class="skGrid">${Array.from({length:10}).map(()=>'<div class="sk"></div>').join('')}</div>`;
    }

    function renderProducts(){
      if(firstPaint){
        firstPaint=false;
        renderSkeleton();
        setTimeout(renderProducts, 120);
        return;
      }
      const list = catalogo.filter(p => catAct==='todas' ? true : (p.categoria||'General')===catAct);

      // Combo banner
      const comboWrap = document.getElementById('comboWrap');
      if(comboDef.length && (catAct==='todas' || comboDef.some(s=>s.categoria===catAct))){
        const pc = comboPrecioBase;
        comboWrap.innerHTML = `
          <div class="combo" id="comboBtn">
            <div>
              <div class="comboT">🎯 Arma tu combo</div>
              <div class="comboS">${comboDef.map(s=>s.label).join(' + ')}</div>
            </div>
            <div class="comboP">${pc>0?money(pc):'→'}</div>
          </div>
        `;
        document.getElementById('comboBtn').onclick = abrirCombo;
      } else {
        comboWrap.innerHTML = '';
      }

      const grid = document.getElementById('gridWrap');
      grid.innerHTML = `<div class="grid">${list.map(p => `
        <div class="p ${p.stock===0?'off':''}" data-id="${p.id}">
          <div class="pImg">${p.imagen?`<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">`:`<div>${p.emoji||'📦'}</div>`}</div>
          <div class="pBody">
            <div class="pName">${p.nombre}</div>
            <div class="pDesc">${p.descripcion||'// sin descripción'}</div>
            <div class="pFoot">
              <div class="pPrice">${money(p.precio)}</div>
              ${p.stock===0?'':`<div class="add">+</div>`}
            </div>
          </div>
        </div>
      `).join('')}</div>`;

      grid.querySelectorAll('.p').forEach(el=>{
        el.addEventListener('click', ()=>{
          const id = el.getAttribute('data-id');
          const p = catalogo.find(x => String(x.id)===String(id));
          if(!p || p.stock===0) return;
          abrirModal(p);
        });
      });
    }

    function abrirModal(p){
      modalProd = p;
      modalQty = 1;
      modalSelUnico = {};
      modalSelMulti = {};
      modalSin = new Set();
      (p.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico') modalSelUnico[gi] = null;
        else modalSelMulti[gi] = new Set();
      });
      document.getElementById('qVal').textContent = '1';
      // Restaurar qty + botón agregar en caso de venir de combo
      const body = document.querySelector('.shBody');
      const qtyRow = body.querySelector('.qtyRow');
      qtyRow.style.display = '';
      const addBtn = document.getElementById('addCart');
      addBtn.style.display = '';
      renderModalFull();
      const img = document.getElementById('shImg');
      const ph = document.getElementById('shImgPh');
      if(p.imagen){
        img.src = p.imagen; img.style.display='block'; ph.style.display='none';
      }else{
        img.style.display='none'; ph.style.display='flex'; ph.textContent = p.emoji || '📦';
      }
      document.getElementById('ov').classList.add('on');
    }
    function cerrarModal(){
      document.getElementById('ov').classList.remove('on');
      modalProd=null;
    }

    function calcExtra(){
      let extra = 0;
      (modalProd?.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico'){
          const oi = modalSelUnico[gi];
          if(oi != null) extra += Number(g.opciones?.[oi]?.precio||0);
        } else {
          (modalSelMulti[gi]||new Set()).forEach(oi=>{ extra += Number(g.opciones?.[oi]?.precio||0); });
        }
      });
      return extra;
    }

    function verificarObligatorios(){
      let ok = true;
      (modalProd?.modificadores||[]).forEach((g,gi)=>{
        if(!g.obligatorio) return;
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo === 'unico' && (modalSelUnico[gi] == null)) ok = false;
        if(tipo !== 'unico' && (!modalSelMulti[gi] || modalSelMulti[gi].size === 0)) ok = false;
      });
      return ok;
    }

    function renderModalFull(){
      if(!modalProd) return;
      const p = modalProd;
      const base = Number(p.precio)||0;
      const extra = calcExtra();
      const unit = base + extra;
      const total = unit * modalQty;

      document.getElementById('shName').textContent = p.nombre;
      document.getElementById('shDesc').textContent = p.descripcion || '';
      document.getElementById('shPrice').textContent = money(unit);

      // Insertar secciones dinámicas debajo del precio
      const body = document.querySelector('.shBody');
      const old = body.querySelector('[data-dyn="1"]');
      if(old) old.remove();
      const wrap = document.createElement('div');
      wrap.setAttribute('data-dyn','1');

      const mods = p.modificadores||[];
      if(mods.length){
        mods.forEach((g,gi)=>{
          const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
          const hint = tipo === 'unico' ? 'Elige 1' : 'Elige varias';
          const req = g.obligatorio ? '<span style="color:var(--danger);font-weight:950;font-size:11px;margin-left:8px;">REQ</span>' : '';
          const sec = document.createElement('div');
          sec.style.margin = '12px 0 0';
          sec.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
              <div style="font-weight:950">${g.nombre}${req}</div>
              <div style="margin-left:auto;color:var(--muted2);font-size:11px;font-weight:800">${hint}</div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;" data-gi="${gi}"></div>
          `;
          const optWrap = sec.querySelector('[data-gi]');
          (g.opciones||[]).forEach((op,oi)=>{
            const selected = (tipo==='unico') ? (modalSelUnico[gi]===oi) : (modalSelMulti[gi]?.has(oi));
            const ext = Number(op.precio||0);
            const label = `${op.nombre}${ext!==0?` <span style="opacity:.7">(${ext>0?'+':''}${money(Math.abs(ext))})</span>`:''}`;
            const btn = document.createElement('button');
            btn.type='button';
            btn.style.cssText = `border:1px solid ${selected?'color-mix(in srgb,var(--accent) 45%, var(--stroke))':'rgba(255,255,255,.12)'};background:${selected?'linear-gradient(180deg,color-mix(in srgb,var(--accent) 18%, rgba(255,255,255,.05)),rgba(255,255,255,.03))':'rgba(255,255,255,.04)'};color:${selected?'var(--text)':'var(--muted)'};padding:10px 14px;border-radius:16px;cursor:pointer;font-weight:900;font-size:13px;`;
            btn.innerHTML = label;
            btn.onclick = () => {
              if(tipo==='unico'){
                modalSelUnico[gi] = (modalSelUnico[gi]===oi) ? null : oi;
              } else {
                if(!modalSelMulti[gi]) modalSelMulti[gi]=new Set();
                if(modalSelMulti[gi].has(oi)) modalSelMulti[gi].delete(oi);
                else modalSelMulti[gi].add(oi);
              }
              renderModalFull();
            };
            optWrap.appendChild(btn);
          });
          wrap.appendChild(sec);
        });
      }

      const ings = p.ingredientes||[];
      if(ings.length){
        const sec = document.createElement('div');
        sec.style.margin = '14px 0 0';
        sec.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="font-weight:950">Sin ingredientes</div>
            <div style="margin-left:auto;color:var(--muted2);font-size:11px;font-weight:800">Toca para quitar</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;" id="sinWrap"></div>
        `;
        const w = sec.querySelector('#sinWrap');
        ings.forEach((ing,ii)=>{
          const selected = modalSin.has(ii);
          const btn = document.createElement('button');
          btn.type='button';
          btn.style.cssText = `border:1px solid ${selected?'rgba(239,68,68,.4)':'rgba(255,255,255,.12)'};background:${selected?'rgba(239,68,68,.12)':'rgba(255,255,255,.04)'};color:${selected?'rgba(255,255,255,.55)':'var(--muted)'};padding:10px 14px;border-radius:16px;cursor:pointer;font-weight:900;font-size:13px;${selected?'text-decoration:line-through':''}`;
          btn.textContent = ing;
          btn.onclick = () => { selected ? modalSin.delete(ii) : modalSin.add(ii); renderModalFull(); };
          w.appendChild(btn);
        });
        wrap.appendChild(sec);
      }

      body.insertBefore(wrap, body.querySelector('.qtyRow'));

      // Actualizar botón agregar
      const addBtn = document.getElementById('addCart');
      addBtn.textContent = `Agregar — ${money(total)}`;
      addBtn.disabled = !verificarObligatorios();
    }

    function buildModsTexto(p){
      const parts = [];
      (p.modificadores||[]).forEach((g,gi)=>{
        const tipo = g.tipo === 'unico' ? 'unico' : (g.tipo === 'multiple' ? 'multiple' : (g.tipo ? g.tipo : 'unico'));
        if(tipo==='unico'){
          const oi = modalSelUnico[gi];
          if(oi!=null) parts.push(`${g.nombre}: ${g.opciones?.[oi]?.nombre||''}`.trim());
        } else {
          const set = modalSelMulti[gi]||new Set();
          if(set.size){
            const names = [...set].map(oi=>g.opciones?.[oi]?.nombre).filter(Boolean);
            if(names.length) parts.push(`${g.nombre}: ${names.join(', ')}`);
          }
        }
      });
      const ings = p.ingredientes||[];
      if(modalSin.size){
        const names = [...modalSin].map(ii=>ings[ii]).filter(Boolean);
        if(names.length) parts.push(`Sin: ${names.join(', ')}`);
      }
      return parts.join(' · ');
    }

    function addToCart(p, qty){
      cart.push({
        uid: Date.now()+Math.random(),
        id: p.id,
        nombre: p.nombre,
        precio: (Number(p.precio)||0) + (modalProd && String(modalProd.id)===String(p.id) ? calcExtra() : 0),
        cantidad: qty || 1,
        emoji: p.emoji || '🍽️',
        imagen: p.imagen || '',
        mods: (modalProd && String(modalProd.id)===String(p.id)) ? buildModsTexto(p) : ''
      });
      updateCartUI();
    }

    function updateCartUI(){
      const count = cart.reduce((s,i)=>s+(i.cantidad||0),0);
      const total = cart.reduce((s,i)=>s+(i.precio*i.cantidad),0);
      document.getElementById('cartCount').textContent = count;
      document.getElementById('cartBtn').classList.toggle('hide', count===0);
      document.getElementById('cartTotal').textContent = money(total);
      document.getElementById('confirmBtn').disabled = count===0;
      renderCart();
    }

    function renderCart(){
      const body = document.getElementById('cartBody');
      if(!cart.length){
        body.innerHTML = `<div class="empty">Tu carrito está vacío</div>`;
        return;
      }
      body.innerHTML = cart.map((it,idx)=>`
        <div class="line">
          <div class="lImg">${it.imagen?`<img src="${it.imagen}" alt="">`:`${it.emoji||'🍽️'}`}</div>
          <div class="lMid">
            <div class="lName">${it.nombre}</div>
            ${it.mods?`<div class="lMods">${it.mods}</div>`:''}
            <div class="lPrice">${money(it.precio*it.cantidad)}</div>
          </div>
          <div class="lRight">
            <div class="qty">
              <button class="qbtn rm" data-i="${idx}" data-act="dec">${it.cantidad===1?'🗑':'−'}</button>
              <div class="qnum">${it.cantidad}</div>
              <button class="qbtn" data-i="${idx}" data-act="inc">+</button>
            </div>
          </div>
        </div>
      `).join('');
      body.querySelectorAll('.qbtn').forEach(b=>{
        b.addEventListener('click', ()=>{
          const i = Number(b.dataset.i);
          const act = b.dataset.act;
          if(act==='inc') cart[i].cantidad++;
          else{
            if(cart[i].cantidad===1) cart.splice(i,1);
            else cart[i].cantidad--;
          }
          updateCartUI();
        });
      });
    }

    async function confirmar(){
      if(!cart.length) return;
      const total = cart.reduce((s,i)=>s+(i.precio*i.cantidad),0);
      const items = cart.map(i=>({id:i.id,nombre:i.nombre,precio:i.precio,cantidad:i.cantidad,mods:i.mods||''}));
      const r = await fetch(`/kiosco/${slug}/pedido`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,total})});
      const d = await r.json();
      if(!d.ok) { alert(d.error||'Error'); return; }
      renderTicket(d.numero, items, total);
      show('ticket');
    }

    function renderTicket(numero, items, total){
      const now = new Date();
      const fecha = now.toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric'});
      const hora = now.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('paper').innerHTML = `
        <div style="text-align:center;font-weight:950;font-size:16px;margin-bottom:2px;">${negocio?.nombre||'Kiosco'}</div>
        <div style="text-align:center;color:#666;font-size:11px;margin-bottom:10px;">${fecha} · ${hora}</div>
        <hr class="hr">
        <div style="text-align:center;color:#666;font-size:11px;letter-spacing:.14em;text-transform:uppercase;">Número de pedido</div>
        <div class="tickNum">#${numero}</div>
        <hr class="hr">
        <div>${items.map(i=>`
          <div class="row"><span>${i.nombre} x${i.cantidad}</span><span>${money(i.precio*i.cantidad)}</span></div>
        `).join('')}</div>
        <div class="tTotal"><span>Total</span><span>${money(total)}</span></div>
        <hr class="hr">
        <div style="text-align:center;color:#777;font-size:11px;">Paga en ventanilla y espera tu número</div>
      `;
      document.getElementById('printArea').innerHTML = document.getElementById('paper').outerHTML;
    }

    // Events
    document.getElementById('startBtn').addEventListener('click', ()=> show('menu'));
    document.getElementById('cartBtn').addEventListener('click', ()=> show('cart'));
    document.getElementById('backBtn').addEventListener('click', ()=> show('menu'));
    document.getElementById('confirmBtn').addEventListener('click', confirmar);
    document.getElementById('printBtn').addEventListener('click', ()=> window.print());
    document.getElementById('newBtn').addEventListener('click', ()=>{
      cart=[]; updateCartUI(); show('idle');
    });

    document.getElementById('closeX').addEventListener('click', cerrarModal);
    document.getElementById('ov').addEventListener('click', (e)=>{ if(e.target.id==='ov') cerrarModal(); });
    document.getElementById('qDec').addEventListener('click', ()=>{ modalQty=Math.max(1,modalQty-1); document.getElementById('qVal').textContent=String(modalQty); });
    document.getElementById('qInc').addEventListener('click', ()=>{ modalQty++; document.getElementById('qVal').textContent=String(modalQty); });
    document.getElementById('addCart').addEventListener('click', ()=>{
      if(!modalProd) return;
      if(!verificarObligatorios()) return;
      addToCart(modalProd, modalQty);
      cerrarModal();
    });

    // Combo (modal simple usando el mismo sheet)
    function abrirCombo(){
      if(!comboDef.length) return;
      comboStep = 0;
      comboSels = new Array(comboDef.length).fill(null);
      renderComboSheet();
      document.getElementById('ov').classList.add('on');
    }

    function calcComboTotal(){
      let t = comboPrecioBase;
      if(t === 0){
        comboSels.forEach(p=>{ if(p) t += Number(p.precio)||0; });
      }
      return t;
    }

    function renderComboSheet(){
      // Reutiliza el sheet del modal producto, dibujando un selector por pasos dentro del dyn wrapper
      modalProd = null;
      modalQty = 1;
      document.getElementById('qVal').textContent = '1';
      document.getElementById('shName').textContent = '🎯 Arma tu combo';
      document.getElementById('shDesc').textContent = `Paso ${comboStep+1} de ${comboDef.length} — elige ${comboDef[comboStep].label.toLowerCase()}`;
      document.getElementById('shPrice').textContent = money(calcComboTotal());
      document.getElementById('shImg').style.display = 'none';
      const ph = document.getElementById('shImgPh');
      ph.style.display = 'flex';
      ph.textContent = '🎯';

      const body = document.querySelector('.shBody');
      const old = body.querySelector('[data-dyn="1"]');
      if(old) old.remove();
      const wrap = document.createElement('div');
      wrap.setAttribute('data-dyn','1');

      const steps = document.createElement('div');
      steps.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px;';
      steps.innerHTML = comboDef.map((s,i)=>`
        <div style="padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:${i===comboStep?'rgba(255,255,255,.10)':'rgba(255,255,255,.04)'};color:${i<comboStep?'var(--accent)':'var(--muted)'};font-weight:950;font-size:12px;">
          ${i<comboStep?'✓ ':''}${s.emoji||''} ${s.label}
        </div>
      `).join('');
      wrap.appendChild(steps);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;';
      const step = comboDef[comboStep];
      step.items.forEach((p,pi)=>{
        const sel = comboSels[comboStep] && String(comboSels[comboStep].id)===String(p.id);
        const card = document.createElement('button');
        card.type='button';
        card.style.cssText = `text-align:center;border:1px solid ${sel?'color-mix(in srgb,var(--accent) 45%, rgba(255,255,255,.12))':'rgba(255,255,255,.12)'};background:${sel?'rgba(255,255,255,.10)':'rgba(255,255,255,.04)'};border-radius:18px;padding:10px;cursor:pointer;color:var(--text);`;
        card.innerHTML = `
          ${p.imagen?`<img src="${p.imagen}" alt="" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;margin-bottom:8px;">`:`<div style="font-size:34px;margin-bottom:6px;">${p.emoji||'📦'}</div>`}
          <div style="font-weight:950;font-size:12px;line-height:1.2;margin-bottom:4px;">${p.nombre}</div>
          <div style="font-weight:950;color:var(--accent);font-size:12px;">${money(p.precio)}</div>
        `;
        card.onclick = () => {
          comboSels[comboStep] = p;
          document.getElementById('shPrice').textContent = money(calcComboTotal());
          renderComboSheet();
        };
        grid.appendChild(card);
      });
      wrap.appendChild(grid);

      const nav = document.createElement('div');
      nav.style.cssText = 'display:flex;gap:10px;margin-top:12px;';
      const back = document.createElement('button');
      back.type='button';
      back.style.cssText = 'flex:1;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:var(--muted);border-radius:18px;padding:14px;font-weight:950;cursor:pointer;';
      back.textContent = comboStep===0 ? 'Cancelar' : '← Atrás';
      back.onclick = () => {
        if(comboStep===0) cerrarModal();
        else { comboStep--; renderComboSheet(); }
      };
      const next = document.createElement('button');
      next.type='button';
      next.style.cssText = 'flex:1;border:none;background:linear-gradient(180deg,var(--accent),var(--accent2));color:#07120b;border-radius:18px;padding:14px;font-weight:950;cursor:pointer;box-shadow:0 18px 40px var(--glow);';
      next.textContent = comboStep===comboDef.length-1 ? '✅ Agregar combo' : 'Siguiente →';
      next.onclick = () => {
        if(!comboSels[comboStep]) return;
        if(comboStep < comboDef.length-1){ comboStep++; renderComboSheet(); }
        else{
          const total = calcComboTotal();
          cart.push({uid:Date.now()+Math.random(),id:'combo_'+Date.now(),nombre:'🎯 Combo',precio:total,cantidad:1,emoji:'🎯',imagen:'',mods:comboSels.filter(Boolean).map(p=>p.nombre).join(' + ')});
          updateCartUI();
          cerrarModal();
        }
      };
      nav.appendChild(back);
      nav.appendChild(next);
      wrap.appendChild(nav);

      // Ocultar qtyRow cuando es combo
      const qtyRow = body.querySelector('.qtyRow');
      qtyRow.style.display = 'none';
      body.insertBefore(wrap, qtyRow);

      const addBtn = document.getElementById('addCart');
      addBtn.style.display = 'none';
    }

    init();
  </script>
</body>
</html>
