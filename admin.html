<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendeBot Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Oxanium:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<canvas id="vb-particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020509;--bg2:#040810;--bg3:#060c18;
  --s1:rgba(0,148,255,.05);--s2:rgba(0,148,255,.09);--s3:rgba(0,148,255,.13);
  --b:rgba(0,148,255,.12);--bh:rgba(0,200,255,.32);
  --tx:#cce8ff;--t2:#5a8aaa;--t3:#1e3a55;
  --c:#00c8ff;--r:#ff3860;--g:#00e5a0;--gold:#ffd060;
  --f:'Space Grotesk',sans-serif;--fh:'Oxanium',monospace;--fm:'JetBrains Mono',monospace;
}

/* ── TEMAS ── */
[data-theme="blue"]{--c:#00c8ff;--bg:#020509;--bg2:#040810;--bg3:#060c18;--s1:rgba(0,148,255,.05);--s2:rgba(0,148,255,.09);--s3:rgba(0,148,255,.13);--b:rgba(0,148,255,.12);--bh:rgba(0,200,255,.32);--tx:#cce8ff;--t2:#5a8aaa;--t3:#1e3a55;}
[data-theme="green"]{--c:#00e5a0;--bg:#020a06;--bg2:#041210;--bg3:#061a14;--s1:rgba(0,229,160,.04);--s2:rgba(0,229,160,.08);--s3:rgba(0,229,160,.13);--b:rgba(0,229,160,.12);--bh:rgba(0,229,160,.35);--tx:#b8ffd8;--t2:#3d9960;--t3:#1a5535;}
[data-theme="red"]{--c:#ff3860;--bg:#090205;--bg2:#120408;--bg3:#1e060c;--s1:rgba(255,56,96,.04);--s2:rgba(255,56,96,.08);--s3:rgba(255,56,96,.13);--b:rgba(255,56,96,.12);--bh:rgba(255,56,96,.35);--tx:#ffccd8;--t2:#993d50;--t3:#551a28;}
[data-theme="purple"]{--c:#9b5cff;--bg:#070212;--bg2:#0e0420;--bg3:#15062e;--s1:rgba(155,92,255,.04);--s2:rgba(155,92,255,.08);--s3:rgba(155,92,255,.13);--b:rgba(155,92,255,.12);--bh:rgba(155,92,255,.35);--tx:#e8d0ff;--t2:#7a3d99;--t3:#3f1a55;}
[data-theme="gold"]{--c:#ffd060;--bg:#0a0800;--bg2:#181200;--bg3:#241c00;--s1:rgba(255,208,96,.04);--s2:rgba(255,208,96,.08);--s3:rgba(255,208,96,.13);--b:rgba(255,208,96,.12);--bh:rgba(255,208,96,.35);--tx:#fff2b8;--t2:#99853d;--t3:#55481a;}
[data-theme="orange"]{--c:#ff8040;--bg:#090400;--bg2:#140900;--bg3:#200e00;--s1:rgba(255,128,64,.04);--s2:rgba(255,128,64,.08);--s3:rgba(255,128,64,.13);--b:rgba(255,128,64,.12);--bh:rgba(255,128,64,.35);--tx:#ffd8b8;--t2:#99573d;--t3:#55301a;}
[data-theme="pink"]{--c:#ff2d9b;--bg:#090006;--bg2:#140010;--bg3:#200018;--s1:rgba(255,45,155,.04);--s2:rgba(255,45,155,.08);--s3:rgba(255,45,155,.13);--b:rgba(255,45,155,.12);--bh:rgba(255,45,155,.35);--tx:#ffd0ee;--t2:#993d70;--t3:#551a40;}
[data-theme="custom"]{}
.color-picker-wrap{position:relative;display:inline-block;}
.color-picker-panel{position:absolute;top:40px;right:0;background:var(--bg2);border:1px solid var(--bh);padding:16px;z-index:9999;display:none;width:260px;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 30px rgba(0,148,255,.1);}
.color-picker-panel.open{display:block;}
.cp-title{font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--t2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b);}
.cp-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cp-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.cp-dot:hover,.cp-dot.active{border-color:#fff;transform:scale(1.2);box-shadow:0 0 8px currentColor;}
.cp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cp-row label{font-family:var(--fm);font-size:10px;color:var(--t2);}
.cp-row input[type=color]{width:36px;height:24px;border:1px solid var(--b);background:none;cursor:pointer;padding:0;border-radius:3px;}

html{-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-weight:500;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(0,148,255,.1) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(0,200,255,.07) 0%,transparent 55%),
    radial-gradient(ellipse 30% 60% at 50% 50%,rgba(155,92,255,.04) 0%,transparent 70%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,148,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,148,255,.025) 1px,transparent 1px);
  background-size:50px 50px;}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.login-card{width:100%;max-width:380px;position:relative;}
.login-card::before{content:'';position:absolute;inset:-1px;background:linear-gradient(135deg,rgba(0,148,255,.4),rgba(155,92,255,.3));border-radius:17px;pointer-events:none;}
.login-inner{background:rgba(4,8,16,.95);backdrop-filter:blur(20px);padding:44px 36px;position:relative;z-index:1;border-radius:16px;}
.login-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),rgba(155,92,255,.7),transparent);border-radius:16px 16px 0 0;}
.login-logo{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:.08em;color:#fff;margin-bottom:5px;}
.login-logo span{color:var(--c);text-shadow:0 0 24px rgba(0,200,255,.7);}
.login-sub{font-family:var(--fm);font-size:10px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;margin-bottom:28px;}
.login-err{font-family:var(--fm);font-size:11px;color:var(--r);min-height:18px;margin-bottom:8px;letter-spacing:.04em;}
.login-inner input{width:100%;padding:11px 14px;background:rgba(0,148,255,.06);border:1px solid var(--b);color:var(--tx);font-family:var(--f);font-size:14px;outline:none;margin-bottom:12px;transition:all .18s;border-radius:8px;}
.login-inner input:focus{border-color:var(--c);box-shadow:0 0 0 3px rgba(0,148,255,.1);}
.login-inner input::placeholder{color:var(--t3);}

/* ── APP ── */
#app{display:none;position:relative;z-index:1;}
.admin-wrap{max-width:1100px;margin:0 auto;padding:28px 20px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.admin-logo-wrap{display:flex;align-items:center;gap:14px;}
.admin-logo{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:.08em;color:#fff;}
.admin-logo span{color:var(--c);text-shadow:0 0 20px rgba(0,200,255,.6);}
.admin-badge{font-family:var(--fm);font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px;background:rgba(0,148,255,.08);border:1px solid rgba(0,200,255,.2);color:var(--c);border-radius:4px;}
.header-right{display:flex;align-items:center;gap:10px;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-box{background:rgba(0,148,255,.05);backdrop-filter:blur(12px);border:1px solid var(--b);padding:18px;position:relative;overflow:hidden;border-radius:12px;transition:all .2s;}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:.6;}
.stat-box::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 100%,rgba(0,148,255,.06),transparent 60%);}
.stat-box:hover{border-color:var(--bh);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.stat-box-label{font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.stat-box-val{font-family:var(--fh);font-size:32px;color:var(--c);line-height:1;font-weight:700;text-shadow:0 0 12px rgba(0,200,255,.3);}

/* ── CARD ── */
.card{background:rgba(0,148,255,.04);backdrop-filter:blur(12px);border:1px solid var(--b);padding:24px;margin-bottom:16px;position:relative;border-radius:12px;transition:border-color .2s;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.15),transparent);border-radius:12px 12px 0 0;}
.card:hover{border-color:var(--bh);}
.card-title{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--c);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:12px;background:var(--c);border-radius:2px;box-shadow:0 0 6px var(--c);display:inline-block;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid>div{display:flex;flex-direction:column;}
@media(max-width:640px){.form-grid{grid-template-columns:1fr;}}
label{font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:5px;}
input,select{padding:9px 12px;background:rgba(0,148,255,.05);border:1px solid var(--b);color:var(--tx);font-family:var(--f);font-size:13px;outline:none;transition:all .18s;width:100%;border-radius:8px;}
input:focus,select:focus{border-color:var(--c);box-shadow:0 0 0 3px rgba(0,148,255,.1);}
input::placeholder{color:var(--t3);}
select option{background:var(--bg2);}

/* ── BOTONES ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 20px;font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .18s;border:1px solid;position:relative;overflow:hidden;border-radius:8px;}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .18s;}
.btn:hover::before{opacity:1;}
.btn-sm{padding:6px 13px;font-size:10px;}
.btn-lg{padding:13px 28px;font-size:12px;}
.btn-primary{background:rgba(0,148,255,.1);border-color:var(--c);color:var(--c);box-shadow:0 0 14px rgba(0,148,255,.12);}
.btn-primary::before{background:rgba(0,148,255,.08);}
.btn-primary:hover{box-shadow:0 0 26px rgba(0,200,255,.3);}
.btn-secondary{background:var(--s1);border-color:var(--b);color:var(--t2);}
.btn-secondary::before{background:var(--s2);}
.btn-secondary:hover{border-color:var(--bh);color:var(--c);}
.btn-edit{background:rgba(255,208,96,.08);border-color:rgba(255,208,96,.35);color:var(--gold);}
.btn-edit::before{background:rgba(255,208,96,.06);}
.btn-edit:hover{box-shadow:0 0 20px rgba(255,208,96,.2);}
.btn-danger{background:rgba(255,56,96,.08);border-color:rgba(255,56,96,.35);color:var(--r);}
.btn-danger::before{background:rgba(255,56,96,.06);}
.btn-danger:hover{box-shadow:0 0 20px rgba(255,56,96,.25);}
.btn-logout{background:var(--s1);border-color:var(--b);color:var(--t2);}

/* ── NEG GRID ── */
#negGrid{display:flex;flex-direction:column;gap:10px;}
.neg-card{background:rgba(0,148,255,.04);backdrop-filter:blur(12px);border:1px solid var(--b);padding:18px;display:flex;align-items:flex-start;gap:14px;transition:all .2s;position:relative;border-radius:12px;overflow:hidden;}
.neg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.12),transparent);}
.neg-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--c),rgba(155,92,255,.5));opacity:0;transition:opacity .2s;border-radius:12px 0 0 12px;}
.neg-card:hover{border-color:var(--bh);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.neg-card:hover::after{opacity:1;}
.neg-emoji{font-size:32px;flex-shrink:0;width:50px;height:50px;background:rgba(0,148,255,.08);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;border-radius:10px;}
.neg-info{flex:1;min-width:0;}
.neg-name{font-family:var(--fh);font-size:15px;font-weight:600;letter-spacing:.04em;color:var(--tx);margin-bottom:3px;}
.neg-slug{font-family:var(--fm);font-size:11px;color:var(--c);margin-bottom:4px;}
.neg-meta{font-size:12px;color:var(--t2);margin-bottom:4px;}
.neg-phone{font-family:var(--fm);font-size:11px;color:var(--t3);}
.neg-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;grid-column:1/-1;}

/* ── BADGES ── */
.badge{font-family:var(--fm);font-size:9px;letter-spacing:.08em;padding:3px 10px;border-radius:4px;}
.badge-on{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--g);}
.badge-off{background:rgba(255,56,96,.08);border:1px solid rgba(255,56,96,.25);color:var(--r);}
.badge-bot-on{background:rgba(0,148,255,.08);border:1px solid rgba(0,200,255,.25);color:var(--c);}
.badge-bot-off{background:rgba(255,208,96,.08);border:1px solid rgba(255,208,96,.25);color:var(--gold);}

/* ── TOGGLE (switch) ── */
.sw{position:relative;display:inline-flex;align-items:center;cursor:pointer;gap:0;}
.sw input{display:none;}
.sw-track{width:36px;height:20px;background:var(--s2);border:1px solid var(--b);transition:all .2s;border-radius:20px;display:block;}
.sw-knob{position:absolute;left:3px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:var(--t3);transition:all .2s;border-radius:50%;}
.sw input:checked~.sw-track{border-color:var(--c);background:rgba(0,148,255,.15);box-shadow:0 0 8px rgba(0,148,255,.2);}
.sw input:checked~.sw-knob{background:var(--c);left:calc(100% - 17px);box-shadow:0 0 8px rgba(0,200,255,.6);}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(2,5,9,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.modal.open{display:flex;}
.modal-box{background:rgba(4,8,16,.97);backdrop-filter:blur(20px);border:1px solid var(--b);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;position:relative;border-radius:14px;box-shadow:0 0 60px rgba(0,0,0,.6),0 0 30px rgba(0,148,255,.06);}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),rgba(155,92,255,.6),transparent);border-radius:14px 14px 0 0;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--c);}
.modal-close{width:28px;height:28px;background:var(--s1);border:1px solid var(--b);cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;}
.modal-close:hover{border-color:var(--r);color:var(--r);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--b);display:flex;gap:10px;justify-content:flex-end;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.2;}
.empty p{font-family:var(--fm);font-size:12px;color:var(--t3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(4,8,16,.97);backdrop-filter:blur(20px);border:1px solid var(--b);border-left:2px solid var(--c);color:var(--tx);padding:10px 22px;font-family:var(--fm);font-size:12px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;box-shadow:0 0 24px rgba(0,148,255,.15),0 8px 32px rgba(0,0,0,.4);border-radius:8px;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:640px){.stats-row{grid-template-columns:1fr 1fr;}.neg-card{flex-wrap:wrap;}.admin-header{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-inner">
      <div class="login-logo"><span>VENDE</span>BOT</div>
      <div class="login-sub">// acceso de administrador</div>
      <div class="login-err" id="loginError"></div>
      <input type="password" id="loginPass" placeholder="CONTRASEÑA MAESTRA" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-primary btn-lg" onclick="login()" style="width:100%;margin-top:4px;">INGRESAR AL SISTEMA</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="admin-wrap">

    <div class="admin-header">
      <div class="admin-logo-wrap">
        <div class="admin-logo">VENDE<span>BOT</span></div>
        <div class="admin-badge">ADMINISTRADOR</div>
      </div>
      <div class="header-right">
        <div class="color-picker-wrap">
          <button onclick="toggleColorPicker()" style="background:none;border:1px solid var(--b);padding:5px 10px;cursor:pointer;font-family:var(--fh);font-size:9px;letter-spacing:.1em;color:var(--c);">🎨 TEMA</button>
          <div class="color-picker-panel" id="colorPickerPanel">
            <div class="cp-title">// PRESETS RÁPIDOS</div>
            <div class="cp-presets">
              <div class="cp-dot active" data-theme="blue" style="background:#00d4ff;" onclick="setTheme('blue')" title="Azul"></div>
              <div class="cp-dot" data-theme="green" style="background:#00ff88;" onclick="setTheme('green')" title="Verde"></div>
              <div class="cp-dot" data-theme="red" style="background:#ff1a4a;" onclick="setTheme('red')" title="Rojo"></div>
              <div class="cp-dot" data-theme="purple" style="background:#a855f7;" onclick="setTheme('purple')" title="Morado"></div>
              <div class="cp-dot" data-theme="gold" style="background:#ffc200;" onclick="setTheme('gold')" title="Dorado"></div>
              <div class="cp-dot" data-theme="orange" style="background:#ff6b00;" onclick="setTheme('orange')" title="Naranja"></div>
              <div class="cp-dot" data-theme="pink" style="background:#ff2d78;" onclick="setTheme('pink')" title="Rosa"></div>
            </div>
            <div class="cp-title">// EDITOR AVANZADO</div>
            <div class="cp-row"><label>Color acento</label><input type="color" id="ce_accent" value="#00d4ff" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Fondo principal</label><input type="color" id="ce_bg" value="#020912" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Fondo tarjetas</label><input type="color" id="ce_bg2" value="#040e1c" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Texto principal</label><input type="color" id="ce_tx" value="#b8e8ff" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Texto secundario</label><input type="color" id="ce_t2" value="#3d7a99" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Color peligro</label><input type="color" id="ce_r" value="#ff1a4a" oninput="applyCustom()"></div>
            <div class="cp-row"><label>Color éxito</label><input type="color" id="ce_g" value="#00ff88" oninput="applyCustom()"></div>
            <button onclick="resetTheme()" style="margin-top:10px;width:100%;background:none;border:1px solid var(--b);color:var(--t2);font-family:var(--fm);font-size:10px;padding:6px;cursor:pointer;">↺ RESETEAR</button>
          </div>
        </div>
        <button class="btn btn-logout btn-sm" onclick="logout()">⏻ Salir</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-box-label">Negocios registrados</div><div class="stat-box-val" id="statTotal">—</div></div>
      <div class="stat-box"><div class="stat-box-label">Negocios activos</div><div class="stat-box-val" id="statActivos">—</div></div>
      <div class="stat-box"><div class="stat-box-label">Bots activos</div><div class="stat-box-val" id="statBots">—</div></div>
    </div>

    <!-- FORM NUEVO NEGOCIO -->
    <div class="card">
      <div class="card-title">Registrar nuevo negocio</div>
      <div class="form-grid">
        <div><label>Nombre *</label><input type="text" id="f_nombre" placeholder="Mi Negocio"></div>
        <div><label>Slug * (URL)</label><input type="text" id="f_slug" placeholder="mi-negocio"></div>
        <div><label>Tipo</label><input type="text" id="f_tipo" placeholder="Restaurante, Tienda..."></div>

<div class="toast" id="toast"></div>

<script>
let TOKEN=sessionStorage.getItem('admin_token')||'';

async function login(){
  const pass=document.getElementById('loginPass').value;
  const res=await fetch('/auth/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
  const data=await res.json();
  if(data.ok){TOKEN=data.token;sessionStorage.setItem('admin_token',TOKEN);mostrarApp();}
  else{document.getElementById('loginError').textContent='// ACCESO DENEGADO';document.getElementById('loginPass').value='';}
}

function logout(){sessionStorage.removeItem('admin_token');TOKEN='';document.getElementById('app').style.display='none';document.getElementById('loginScreen').style.display='flex';}

async function verificarToken(){if(!TOKEN)return false;const res=await fetch('/auth/verify',{headers:{Authorization:'Bearer '+TOKEN}});const data=await res.json();return data.ok;}

async function api(url,opts={}){const res=await fetch(url,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}});return res.json();}

async function mostrarApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';cargarNegocios();}

async function cargarNegocios(){
  const negocios=await api('/admin/negocios');
  if(!Array.isArray(negocios))return;
  document.getElementById('statTotal').textContent=negocios.length;
  document.getElementById('statActivos').textContent=negocios.filter(n=>n.activo).length;
  document.getElementById('statBots').textContent=negocios.filter(n=>n.activo&&n.bot_activo!==false).length;
  const grid=document.getElementById('negGrid');
  if(!negocios.length){grid.innerHTML='<div class="empty"><div class="empty-icon">⌀</div><p>// Sin negocios registrados. Crea el primero.</p></div>';return;}
  grid.innerHTML=negocios.map(n=>`
    <div class="neg-card" id="nc-${n.id}">
      <div class="neg-emoji">${n.emoji||'🏪'}</div>
      <div class="neg-info">
        <div class="neg-name">${n.nombre}</div>
        <div class="neg-slug">/${n.slug||n.id}</div>
        <div class="neg-meta">${n.tipo||'Negocio'}</div>
        <div class="neg-phone">📱 ${n.whatsapp_dueno||'—'} · ${n.whatsapp_phone_id?'<span style="color:#a78bfa;">📡 API Meta</span>':'<span style="color:var(--g);">✅ Baileys</span>'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <span class="badge ${n.activo?'badge-on':'badge-off'}">${n.activo?'● ACTIVO':'● INACTIVO'}</span>
          <span class="badge ${n.bot_activo!==false?'badge-bot-on':'badge-bot-off'}">${n.bot_activo!==false?'🤖 BOT ON':'⏸ BOT OFF'}</span>
          ${(()=>{const venc=n.fecha_vencimiento?new Date(n.fecha_vencimiento):null;const hoy=new Date();const diasRestantes=venc?Math.ceil((venc-hoy)/(1000*60*60*24)):null;if(n.suscripcion_activa===false)return'<span class="badge badge-off" style="background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444;">⛔ SUSPENDIDO</span>';if(diasRestantes!==null&&diasRestantes<=7&&diasRestantes>0)return`<span class="badge" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);color:var(--warn);">⚠ Vence en ${diasRestantes}d</span>`;if(diasRestantes!==null&&diasRestantes<=0)return'<span class="badge badge-off" style="background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444;">⛔ VENCIDO</span>';return'<span class="badge" style="background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);color:var(--g);">✓ Al día</span>';})()}
          ${n.plan_activo?`<span class="badge" style="background:rgba(0,148,255,.08);border:1px solid rgba(0,200,255,.3);color:var(--c);font-size:9px;">${n.plan_activo.toUpperCase()}</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;align-items:center;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--t3);">NEGOCIO</span>
            <label class="sw" title="${n.activo?'Desactivar':'Activar'}">
              <input type="checkbox" ${n.activo?'checked':''} onchange="toggleActivo('${n.id}',this.checked)">
              <span class="sw-track"></span>
              <span class="sw-knob"></span>
            </label>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--t3);">🖥️ KIOSCO</span>
            <label class="sw" title="${n.kiosco_activo?'Desactivar kiosco':'Activar kiosco'}">
              <input type="checkbox" ${n.kiosco_activo?'checked':''} onchange="toggleKiosco('${n.id}',this.checked)">
              <span class="sw-track"></span>
              <span class="sw-knob"></span>
            </label>
            ${n.kiosco_activo?`<span style="font-size:9px;color:var(--g);font-family:var(--fm);">ON</span>`:`<span style="font-size:9px;color:var(--t3);font-family:var(--fm);">OFF</span>`}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--t3);">💳 SUSCRIPCIÓN</span>
            <label class="sw" title="${n.suscripcion_activa===false?'Reactivar suscripción':'Suspender suscripción'}">
              <input type="checkbox" ${n.suscripcion_activa!==false?'checked':''} onchange="toggleSuscripcion('${n.id}',this.checked)">
              <span class="sw-track"></span>
              <span class="sw-knob"></span>
            </label>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--t3);">🔗 RED NEGOCIOS</span>
            <label class="sw" title="${n.red_negocios_activa?'Desactivar red':'Activar red de negocios'}">
              <input type="checkbox" ${n.red_negocios_activa?'checked':''} onchange="toggleRed('${n.id}',this.checked)">
              <span class="sw-track"></span>
              <span class="sw-knob"></span>
            </label>
          </div>
        </div>
        ${n.red_negocios_activa?`
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;">
          <span style="font-family:var(--fm);font-size:9px;color:var(--t3);">COMISIÓN B2B:</span>
          <input type="number" value="${n.red_comision??3}" min="0" max="20" step="0.5"
            onchange="actualizarComision('${n.id}',this.value)"
            style="width:60px;font-family:var(--fm);font-size:11px;padding:3px 8px;background:var(--s1);border:1px solid var(--b);color:var(--tx);border-radius:5px;text-align:center;">
          <span style="font-family:var(--fm);font-size:9px;color:var(--t3);">% por transacción</span>
          <span style="font-family:var(--fm);font-size:9px;color:var(--g);">· Este mes: $${(n.red_comision_mes||0).toFixed(2)}</span>
        </div>`:''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center;">
          <span style="font-family:var(--fm);font-size:9px;color:var(--t3);">VENCE:</span>
          <input type="date" value="${n.fecha_vencimiento||''}" onchange="actualizarVencimiento('${n.id}',this.value)" style="font-family:var(--fm);font-size:10px;padding:3px 8px;background:var(--s1);border:1px solid var(--b);color:var(--tx);border-radius:5px;cursor:pointer;">
          <select onchange="actualizarPlan('${n.id}',this.value)" style="font-family:var(--fm);font-size:10px;padding:3px 8px;background:var(--s1);border:1px solid var(--b);color:var(--tx);border-radius:5px;cursor:pointer;">
            <option value="" ${!n.plan_activo?'selected':''}>Sin plan</option>
            <option value="basico" ${n.plan_activo==='basico'?'selected':''}>Básico</option>
            <option value="pro" ${n.plan_activo==='pro'?'selected':''}>Pro</option>
            <option value="full" ${n.plan_activo==='full'?'selected':''}>Full</option>
          </select>
        </div>
        ${n.kiosco_activo?`
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <a href="/kiosco/${n.slug||n.id}" target="_blank" style="font-size:9px;color:var(--c);font-family:var(--fm);letter-spacing:.06em;text-decoration:none;border:1px solid rgba(0,200,255,.2);padding:3px 8px;border-radius:4px;">🖥️ ABRIR KIOSCO ↗</a>
          <a href="/cocina/${n.slug||n.id}" target="_blank" style="font-size:9px;color:var(--g);font-family:var(--fm);letter-spacing:.06em;text-decoration:none;border:1px solid rgba(0,255,136,.2);padding:3px 8px;border-radius:4px;">👨‍🍳 ABRIR COCINA ↗</a>
        </div>`:''}
      </div>
      <div class="neg-actions">
        <a href="/panel/${n.slug||n.id}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none;">Ver panel</a>
        <button class="btn btn-edit btn-sm" onclick="abrirEditar(${JSON.stringify(n).replace(/"/g,'&quot;')})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="eliminarNegocio('${n.id}','${n.nombre}')">✕ Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function crearNegocio(){
  const nombre=document.getElementById('f_nombre').value.trim();
  const slug=document.getElementById('f_slug').value.trim();
  const password=document.getElementById('f_password').value.trim();
  const whatsapp_dueno=document.getElementById('f_whatsapp_dueno').value.trim();
  if(!nombre||!slug||!password||!whatsapp_dueno){toast('⚠ Completa los campos obligatorios (*)');return;}
  const negocio={slug,nombre,tipo:document.getElementById('f_tipo').value.trim()||'Negocio',emoji:document.getElementById('f_emoji').value.trim()||'🏪',password,whatsapp_dueno,whatsapp_phone_id:document.getElementById('f_phone_id').value.trim(),whatsapp_numero:document.getElementById('f_whatsapp_numero').value.trim(),activo:true,bot_activo:true,catalogo:[],metodos_pago:['transferencia','efectivo'],modo_vacaciones:false,tiempo_entrega:'30-45 minutos',mensajes:{bienvenida:'¡Hola! Bienvenido/a. ¿En qué puedo ayudarte?',tono:'amigable'},horarios:{Lunes:{abierto:true,desde:'08:00',hasta:'20:00'},Martes:{abierto:true,desde:'08:00',hasta:'20:00'},Miercoles:{abierto:true,desde:'08:00',hasta:'20:00'},Jueves:{abierto:true,desde:'08:00',hasta:'20:00'},Viernes:{abierto:true,desde:'08:00',hasta:'20:00'},Sabado:{abierto:true,desde:'08:00',hasta:'18:00'},Domingo:{abierto:false,desde:'09:00',hasta:'15:00'}}};
  const res=await api('/admin/negocios',{method:'POST',body:JSON.stringify(negocio)});
  if(res.ok){toast('// Negocio registrado');['f_nombre','f_slug','f_tipo','f_emoji','f_password','f_whatsapp_dueno','f_phone_id','f_whatsapp_numero'].forEach(id=>document.getElementById(id).value='');cargarNegocios();}
  else toast('// Error al crear el negocio');
}

async function toggleActivo(id,activo){
  const res=await api(`/admin/negocios/${id}`,{method:'PUT',body:JSON.stringify({activo})});
  if(res.ok){toast(activo?'// Negocio activado':'// Negocio desactivado');cargarNegocios();}
}

async function toggleKiosco(id,activo){
  const res=await api(`/admin/negocios/${id}/kiosco`,{method:'PUT',body:JSON.stringify({activo})});
  if(res.ok){toast(activo?'// 🖥️ Kiosco activado':'// 🖥️ Kiosco desactivado');cargarNegocios();}
  else toast('// Error al cambiar kiosco');
}

async function toggleSuscripcion(id,activo){
  const res=await api(`/admin/negocios/${id}/suscripcion`,{method:'PUT',body:JSON.stringify({activo})});
  if(res.ok){
    if(activo){toast('// ✅ Suscripción reactivada');}
    else{toast('// ⛔ Suscripción suspendida — acceso bloqueado');}
    cargarNegocios();
  } else toast('// Error al cambiar suscripción');
}

async function actualizarVencimiento(id,fecha){
  const res=await api(`/admin/negocios/${id}/suscripcion`,{method:'PUT',body:JSON.stringify({fecha_vencimiento:fecha})});
  if(res.ok)toast('// 📅 Fecha de vencimiento actualizada');
  else toast('// Error al actualizar fecha');
}

async function actualizarPlan(id,plan){
  const res=await api(`/admin/negocios/${id}/suscripcion`,{method:'PUT',body:JSON.stringify({plan_activo:plan||null})});
  if(res.ok)toast('// Plan actualizado: '+(plan||'Sin plan'));
  else toast('// Error al actualizar plan');
}

async function toggleRed(id,activo){
  const res=await api(`/admin/negocios/${id}/red`,{method:'PUT',body:JSON.stringify({activo})});
  if(res.ok){toast(activo?'// 🔗 Red de negocios activada':'// 🔗 Red de negocios desactivada');cargarNegocios();}
  else toast('// Error al cambiar red');
}

async function actualizarComision(id,pct){
  const res=await api(`/admin/negocios/${id}/red`,{method:'PUT',body:JSON.stringify({comision:parseFloat(pct)||3})});
  if(res.ok)toast('// Comisión actualizada: '+pct+'%');
  else toast('// Error al actualizar comisión');
}

async function eliminarNegocio(id,nombre){
  if(!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`))return;
  const res=await api(`/admin/negocios/${id}`,{method:'DELETE'});
  if(res.ok){toast('// Negocio eliminado');cargarNegocios();}
}

function abrirEditar(n){
  document.getElementById('e_id').value=n.id;document.getElementById('e_nombre').value=n.nombre||'';document.getElementById('e_slug').value=n.slug||'';document.getElementById('e_tipo').value=n.tipo||'';document.getElementById('e_emoji').value=n.emoji||'';document.getElementById('e_password').value=n.password||'';document.getElementById('e_whatsapp_dueno').value=n.whatsapp_dueno||'';document.getElementById('e_phone_id').value=n.whatsapp_phone_id||'';document.getElementById('e_whatsapp_numero').value=n.whatsapp_numero||'';
  document.getElementById('modalEditar').classList.add('open');
}

function cerrarModal(){document.getElementById('modalEditar').classList.remove('open');}

async function guardarEdicion(){
  const id=document.getElementById('e_id').value;
  const nombre=document.getElementById('e_nombre').value.trim();
  const slug=document.getElementById('e_slug').value.trim();
  const password=document.getElementById('e_password').value.trim();
  const whatsapp_dueno=document.getElementById('e_whatsapp_dueno').value.trim();
  if(!nombre||!slug||!password||!whatsapp_dueno){toast('⚠ Completa los campos obligatorios');return;}
  const res=await api(`/admin/negocios/${id}`,{method:'PUT',body:JSON.stringify({nombre,slug,tipo:document.getElementById('e_tipo').value.trim(),emoji:document.getElementById('e_emoji').value.trim(),password,whatsapp_dueno,whatsapp_phone_id:document.getElementById('e_phone_id').value.trim(),whatsapp_numero:document.getElementById('e_whatsapp_numero').value.trim()})});
  if(res.ok){toast('// Negocio actualizado');cerrarModal();cargarNegocios();}
  else toast('// Error al actualizar');
}

let toastTimer;
function toast(txt){const t=document.getElementById('toast');t.textContent=txt;t.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2800);}

(async()=>{if(TOKEN&&await verificarToken())mostrarApp();})();

const THEME_PRESETS={
  blue:{accent:'#00d4ff',bg:'#020912',bg2:'#040e1c',tx:'#b8e8ff',t2:'#3d7a99',r:'#ff1a4a',g:'#00ff88'},
  green:{accent:'#00ff88',bg:'#021209',bg2:'#04200e',tx:'#b8ffd8',t2:'#3d9960',r:'#ff1a4a',g:'#00d4ff'},
  red:{accent:'#ff1a4a',bg:'#120209',bg2:'#200408',tx:'#ffb8c8',t2:'#993d50',r:'#00d4ff',g:'#00ff88'},
  purple:{accent:'#a855f7',bg:'#0a0212',bg2:'#110420',tx:'#e8b8ff',t2:'#7a3d99',r:'#ff1a4a',g:'#00ff88'},
  gold:{accent:'#ffc200',bg:'#120e02',bg2:'#201804',tx:'#fff2b8',t2:'#99853d',r:'#ff1a4a',g:'#00ff88'},
  orange:{accent:'#ff6b00',bg:'#120802',bg2:'#201204',tx:'#ffd8b8',t2:'#99573d',r:'#ff1a4a',g:'#00ff88'},
  pink:{accent:'#ff2d78',bg:'#120209',bg2:'#200410',tx:'#ffb8d4',t2:'#993d60',r:'#00d4ff',g:'#00ff88'}
};
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
function applyColors(c){
  const root=document.documentElement;
  const[ar,ag,ab]=hexToRgb(c.accent);
  root.style.setProperty('--c',c.accent);
  root.style.setProperty('--bg',c.bg);
  root.style.setProperty('--bg2',c.bg2);
  root.style.setProperty('--bg3',c.bg2);
  root.style.setProperty('--tx',c.tx);
  root.style.setProperty('--t2',c.t2);
  root.style.setProperty('--t3',c.t2+'80');
  root.style.setProperty('--r',c.r);
  root.style.setProperty('--g',c.g);
  root.style.setProperty('--bh',`rgba(${ar},${ag},${ab},.45)`);
  root.style.setProperty('--b',`rgba(${ar},${ag},${ab},.16)`);
  root.style.setProperty('--s1',`rgba(${ar},${ag},${ab},.04)`);
  root.style.setProperty('--s2',`rgba(${ar},${ag},${ab},.08)`);
  root.style.setProperty('--s3',`rgba(${ar},${ag},${ab},.13)`);
}
function setTheme(t){
  const p=THEME_PRESETS[t];if(!p)return;
  document.documentElement.setAttribute('data-theme',t);
  applyColors(p);
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.remove('active'));
  document.querySelector(`.cp-dot[data-theme="${t}"]`)?.classList.add('active');
  document.getElementById('ce_accent').value=p.accent;
  document.getElementById('ce_bg').value=p.bg;
  document.getElementById('ce_bg2').value=p.bg2;
  document.getElementById('ce_tx').value=p.tx;
  document.getElementById('ce_t2').value=p.t2;
  document.getElementById('ce_r').value=p.r;
  document.getElementById('ce_g').value=p.g;
  const saved={preset:t,...p};localStorage.setItem('vb_admin_theme',JSON.stringify(saved));
}
function applyCustom(){
  const c={
    accent:document.getElementById('ce_accent').value,
    bg:document.getElementById('ce_bg').value,
    bg2:document.getElementById('ce_bg2').value,
    tx:document.getElementById('ce_tx').value,
    t2:document.getElementById('ce_t2').value,
    r:document.getElementById('ce_r').value,
    g:document.getElementById('ce_g').value
  };
  document.documentElement.setAttribute('data-theme','custom');
  applyColors(c);
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.remove('active'));
  localStorage.setItem('vb_admin_theme',JSON.stringify(c));
}
function resetTheme(){setTheme('blue');}
function toggleColorPicker(){document.getElementById('colorPickerPanel').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.color-picker-wrap'))document.getElementById('colorPickerPanel')?.classList.remove('open');});
(function(){
  try{
    const saved=localStorage.getItem('vb_admin_theme');
    if(saved){
      const d=JSON.parse(saved);
      if(d.preset&&THEME_PRESETS[d.preset]){setTheme(d.preset);}
      else{
        document.getElementById('ce_accent').value=d.accent||'#00d4ff';
        document.getElementById('ce_bg').value=d.bg||'#020912';
        document.getElementById('ce_bg2').value=d.bg2||'#040e1c';
        document.getElementById('ce_tx').value=d.tx||'#b8e8ff';
        document.getElementById('ce_t2').value=d.t2||'#3d7a99';
        document.getElementById('ce_r').value=d.r||'#ff1a4a';
        document.getElementById('ce_g').value=d.g||'#00ff88';
        applyCustom();
      }
    }else{setTheme('blue');}
  }catch(e){setTheme('blue');}
})();

// ── PARTÍCULAS ──
(function(){
  const c=document.getElementById('vb-particles');if(!c)return;
  const ctx=c.getContext('2d');let W,H,P=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mkP(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.3,a:Math.random()*.45+.1,col:Math.random()>.6?'0,200,255':'0,148,255'};}
  for(let i=0;i<80;i++)P.push(mkP());
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<P.length;i++){
      const p=P[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W||p.y<0||p.y>H){P[i]=mkP();P[i].x=p.x<0?0:p.x>W?W:p.x;P[i].y=p.y<0?0:p.y>H?H:p.y;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.a})`;ctx.fill();
      for(let j=i+1;j<P.length;j++){
        const q=P[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(0,180,255,${(1-d/90)*.07})`;ctx.lineWidth=.5;ctx.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
