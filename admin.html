<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendeBot Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020912;--bg2:#040e1c;--bg3:#06111e;
  --s1:rgba(0,212,255,.04);--s2:rgba(0,212,255,.09);--s3:rgba(0,212,255,.14);
  --b:rgba(0,212,255,.16);--bh:rgba(0,212,255,.45);
  --tx:#b8e8ff;--t2:#3d7a99;--t3:#1a3f55;
  --c:#00d4ff;--r:#ff1a4a;--g:#00ff88;--gold:#ffc200;
  --f:'Rajdhani',sans-serif;--fh:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;
}
html{-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-weight:500;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 30% -5%,rgba(0,212,255,.08) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 100%,rgba(255,26,74,.06) 0%,transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);
  background-size:50px 50px;}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.login-card{width:100%;max-width:380px;position:relative;}
.login-card::before{content:'';position:absolute;inset:-1px;background:linear-gradient(135deg,rgba(0,212,255,.4),rgba(255,26,74,.3));clip-path:polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);pointer-events:none;}
.login-inner{background:var(--bg2);padding:44px 36px;position:relative;z-index:1;clip-path:polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);}
.login-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),var(--r),transparent);}
.login-logo{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:.12em;color:var(--c);text-shadow:0 0 24px rgba(0,212,255,.6);margin-bottom:5px;}
.login-sub{font-family:var(--fm);font-size:10px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;margin-bottom:28px;}
.login-err{font-family:var(--fm);font-size:11px;color:var(--r);min-height:18px;margin-bottom:8px;letter-spacing:.04em;}
.login-inner input{width:100%;padding:11px 14px;background:var(--s1);border:1px solid var(--b);color:var(--tx);font-family:var(--f);font-size:14px;outline:none;margin-bottom:12px;transition:border-color .18s;clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);}
.login-inner input:focus{border-color:var(--c);}
.login-inner input::placeholder{color:var(--t3);}

/* ── APP ── */
#app{display:none;position:relative;z-index:1;}
.admin-wrap{max-width:1100px;margin:0 auto;padding:28px 20px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.admin-logo-wrap{display:flex;align-items:center;gap:14px;}
.admin-logo{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:.12em;color:var(--c);text-shadow:0 0 20px rgba(0,212,255,.5);}
.admin-badge{font-family:var(--fm);font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.22);color:var(--c);clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.header-right{display:flex;align-items:center;gap:10px;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-box{background:var(--s1);border:1px solid var(--b);padding:18px;position:relative;overflow:hidden;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--c),transparent);opacity:.6;}
.stat-box::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 0%,rgba(0,212,255,.04),transparent 60%);}
.stat-box-label{font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.stat-box-val{font-family:var(--fm);font-size:32px;color:var(--c);line-height:1;}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--b);padding:24px;margin-bottom:16px;position:relative;clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--c),transparent);opacity:.3;}
.card-title{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--c);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'//';font-family:var(--fm);color:var(--r);opacity:.8;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid>div{display:flex;flex-direction:column;}
@media(max-width:640px){.form-grid{grid-template-columns:1fr;}}
label{font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:5px;}
input,select{padding:9px 12px;background:var(--s1);border:1px solid var(--b);color:var(--tx);font-family:var(--f);font-size:13px;outline:none;transition:border-color .18s;width:100%;clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
input:focus,select:focus{border-color:var(--c);}
input::placeholder{color:var(--t3);}
select option{background:var(--bg2);}

/* ── BOTONES ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 20px;font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.1em;cursor:pointer;transition:all .18s;border:1px solid;position:relative;overflow:hidden;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .18s;}
.btn:hover::before{opacity:1;}
.btn-sm{padding:6px 13px;font-size:10px;clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.btn-lg{padding:13px 28px;font-size:12px;}
.btn-primary{background:rgba(0,212,255,.1);border-color:var(--c);color:var(--c);box-shadow:0 0 14px rgba(0,212,255,.12);}
.btn-primary::before{background:rgba(0,212,255,.08);}
.btn-primary:hover{box-shadow:0 0 26px rgba(0,212,255,.3);}
.btn-secondary{background:var(--s1);border-color:var(--b);color:var(--t2);}
.btn-secondary::before{background:var(--s2);}
.btn-secondary:hover{border-color:rgba(0,212,255,.4);color:var(--c);}
.btn-edit{background:rgba(255,194,0,.08);border-color:rgba(255,194,0,.35);color:var(--gold);}
.btn-edit::before{background:rgba(255,194,0,.06);}
.btn-edit:hover{box-shadow:0 0 20px rgba(255,194,0,.2);}
.btn-danger{background:rgba(255,26,74,.08);border-color:rgba(255,26,74,.35);color:var(--r);}
.btn-danger::before{background:rgba(255,26,74,.06);}
.btn-danger:hover{box-shadow:0 0 20px rgba(255,26,74,.25);}
.btn-logout{background:var(--s1);border-color:var(--b);color:var(--t2);}

/* ── NEG GRID ── */
#negGrid{display:flex;flex-direction:column;gap:10px;}
.neg-card{background:var(--s1);border:1px solid var(--b);padding:18px;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s;position:relative;clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);}
.neg-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--c),var(--r));opacity:0;transition:opacity .2s;}
.neg-card:hover{border-color:rgba(0,212,255,.3);}
.neg-card:hover::before{opacity:1;}
.neg-emoji{font-size:32px;flex-shrink:0;width:50px;height:50px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);}
.neg-info{flex:1;min-width:0;}
.neg-name{font-family:var(--fh);font-size:15px;font-weight:600;letter-spacing:.06em;color:var(--tx);margin-bottom:3px;}
.neg-slug{font-family:var(--fm);font-size:11px;color:var(--c);margin-bottom:4px;}
.neg-meta{font-size:12px;color:var(--t2);margin-bottom:4px;}
.neg-phone{font-family:var(--fm);font-size:11px;color:var(--t3);}
.neg-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;grid-column:1/-1;}

/* ── BADGES ── */
.badge{font-family:var(--fm);font-size:9px;letter-spacing:.08em;padding:3px 10px;clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);}
.badge-on{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--g);}
.badge-off{background:rgba(255,26,74,.08);border:1px solid rgba(255,26,74,.25);color:var(--r);}
.badge-bot-on{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:var(--c);}
.badge-bot-off{background:rgba(255,194,0,.08);border:1px solid rgba(255,194,0,.25);color:var(--gold);}

/* ── TOGGLE (switch) ── */
.sw{position:relative;display:inline-flex;align-items:center;cursor:pointer;gap:0;}
.sw input{display:none;}
.sw-track{width:36px;height:20px;background:var(--s2);border:1px solid var(--b);transition:all .2s;clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);display:block;}
.sw-knob{position:absolute;left:3px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:var(--t3);transition:all .2s;clip-path:polygon(2px 0%,100% 0%,calc(100% - 2px) 100%,0% 100%);}
.sw input:checked~.sw-track{border-color:var(--c);background:rgba(0,212,255,.15);}
.sw input:checked~.sw-knob{background:var(--c);left:calc(100% - 17px);box-shadow:0 0 8px rgba(0,212,255,.6);}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(2,9,18,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal.open{display:flex;}
.modal-box{background:var(--bg2);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;position:relative;clip-path:polygon(14px 0%,100% 0%,100% calc(100% - 14px),calc(100% - 14px) 100%,0% 100%,0% 14px);}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),var(--r),transparent);}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--c);}
.modal-close{width:28px;height:28px;background:var(--s1);border:1px solid var(--b);cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px);transition:all .15s;}
.modal-close:hover{border-color:var(--r);color:var(--r);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--b);display:flex;gap:10px;justify-content:flex-end;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.2;}
.empty p{font-family:var(--fm);font-size:12px;color:var(--t3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--b);border-left:2px solid var(--c);color:var(--tx);padding:10px 22px;font-family:var(--fm);font-size:12px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;box-shadow:0 0 22px rgba(0,212,255,.15);clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:640px){.stats-row{grid-template-columns:1fr 1fr;}.neg-card{flex-wrap:wrap;}.admin-header{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-inner">
      <div class="login-logo">VendeBot</div>
      <div class="login-sub">// acceso de administrador</div>
      <div class="login-err" id="loginError"></div>
      <input type="password" id="loginPass" placeholder="CONTRASEÑA MAESTRA" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-primary btn-lg" onclick="login()" style="width:100%;margin-top:4px;">INGRESAR AL SISTEMA</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="admin-wrap">

    <div class="admin-header">
      <div class="admin-logo-wrap">
        <div class="admin-logo">VendeBot</div>
        <div class="admin-badge">ADMINISTRADOR</div>
      </div>
      <div class="header-right">
        <button class="btn btn-logout btn-sm" onclick="logout()">⏻ Salir</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-box-label">Negocios registrados</div><div class="stat-box-val" id="statTotal">—</div></div>
      <div class="stat-box"><div class="stat-box-label">Negocios activos</div><div class="stat-box-val" id="statActivos">—</div></div>
      <div class="stat-box"><div class="stat-box-label">Bots activos</div><div class="stat-box-val" id="statBots">—</div></div>
    </div>

    <!-- FORM NUEVO NEGOCIO -->
    <div class="card">
      <div class="card-title">Registrar nuevo negocio</div>
      <div class="form-grid">
        <div><label>Nombre *</label><input type="text" id="f_nombre" placeholder="Mi Negocio"></div>
        <div><label>Slug * (URL)</label><input type="text" id="f_slug" placeholder="mi-negocio"></div>
        <div><label>Tipo</label><input type="text" id="f_tipo" placeholder="Restaurante, Tienda..."></div>
        <div><label>Emoji</label><input type="text" id="f_emoji" placeholder="🏪" maxlength="2"></div>
        <div><label>Contraseña del panel *</label><input type="password" id="f_password" placeholder="••••••••"></div>
        <div><label>WhatsApp dueño *</label><input type="text" id="f_whatsapp_dueno" placeholder="593912345678"></div>
        <div><label>Phone ID (Meta API)</label><input type="text" id="f_phone_id" placeholder="Opcional - Baileys si vacío"></div>
        <div><label>WhatsApp número</label><input type="text" id="f_whatsapp_numero" placeholder="593912345678"></div>
      </div>
      <div style="margin-top:6px;">
        <button class="btn btn-primary" onclick="crearNegocio()">+ REGISTRAR NEGOCIO</button>
      </div>
    </div>

    <!-- LISTA DE NEGOCIOS -->
    <div class="card">
      <div class="card-title">Negocios registrados</div>
      <div id="negGrid"><div class="empty"><div class="empty-icon">⌀</div><p>// Cargando negocios...</p></div></div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal" id="modalEditar">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">// EDITAR NEGOCIO</span>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="e_id">
      <div class="form-grid">
        <div><label>Nombre *</label><input type="text" id="e_nombre"></div>
        <div><label>Slug *</label><input type="text" id="e_slug"></div>
        <div><label>Tipo</label><input type="text" id="e_tipo"></div>
        <div><label>Emoji</label><input type="text" id="e_emoji" maxlength="2"></div>
        <div><label>Contraseña *</label><input type="password" id="e_password"></div>
        <div><label>WhatsApp dueño *</label><input type="text" id="e_whatsapp_dueno"></div>
        <div><label>Phone ID (Meta)</label><input type="text" id="e_phone_id"></div>
        <div><label>WhatsApp número</label><input type="text" id="e_whatsapp_numero"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">GUARDAR CAMBIOS</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN=sessionStorage.getItem('admin_token')||'';

async function login(){
  const pass=document.getElementById('loginPass').value;
  const res=await fetch('/auth/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
  const data=await res.json();
  if(data.ok){TOKEN=data.token;sessionStorage.setItem('admin_token',TOKEN);mostrarApp();}
  else{document.getElementById('loginError').textContent='// ACCESO DENEGADO';document.getElementById('loginPass').value='';}
}

function logout(){sessionStorage.removeItem('admin_token');TOKEN='';document.getElementById('app').style.display='none';document.getElementById('loginScreen').style.display='flex';}

async function verificarToken(){if(!TOKEN)return false;const res=await fetch('/auth/verify',{headers:{Authorization:'Bearer '+TOKEN}});const data=await res.json();return data.ok;}

async function api(url,opts={}){const res=await fetch(url,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}});return res.json();}

async function mostrarApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';cargarNegocios();}

async function cargarNegocios(){
  const negocios=await api('/admin/negocios');
  if(!Array.isArray(negocios))return;
  document.getElementById('statTotal').textContent=negocios.length;
  document.getElementById('statActivos').textContent=negocios.filter(n=>n.activo).length;
  document.getElementById('statBots').textContent=negocios.filter(n=>n.activo&&n.bot_activo!==false).length;
  const grid=document.getElementById('negGrid');
  if(!negocios.length){grid.innerHTML='<div class="empty"><div class="empty-icon">⌀</div><p>// Sin negocios registrados. Crea el primero.</p></div>';return;}
  grid.innerHTML=negocios.map(n=>`
    <div class="neg-card" id="nc-${n.id}">
      <div class="neg-emoji">${n.emoji||'🏪'}</div>
      <div class="neg-info">
        <div class="neg-name">${n.nombre}</div>
        <div class="neg-slug">/${n.slug||n.id}</div>
        <div class="neg-meta">${n.tipo||'Negocio'}</div>
        <div class="neg-phone">📱 ${n.whatsapp_dueno||'—'} · ${n.whatsapp_phone_id?'<span style="color:#a78bfa;">📡 API Meta</span>':'<span style="color:var(--g);">✅ Baileys</span>'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <span class="badge ${n.activo?'badge-on':'badge-off'}">${n.activo?'● ACTIVO':'● INACTIVO'}</span>
          <span class="badge ${n.bot_activo!==false?'badge-bot-on':'badge-bot-off'}">${n.bot_activo!==false?'🤖 BOT ON':'⏸ BOT OFF'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--t3);">NEGOCIO</span>
          <label class="sw" title="${n.activo?'Desactivar':'Activar'}">
            <input type="checkbox" ${n.activo?'checked':''} onchange="toggleActivo('${n.id}',this.checked)">
            <span class="sw-track"></span>
            <span class="sw-knob"></span>
          </label>
        </div>
      </div>
      <div class="neg-actions">
        <a href="/panel/${n.slug||n.id}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none;">Ver panel</a>
        <button class="btn btn-edit btn-sm" onclick="abrirEditar(${JSON.stringify(n).replace(/"/g,'&quot;')})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="eliminarNegocio('${n.id}','${n.nombre}')">✕ Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function crearNegocio(){
  const nombre=document.getElementById('f_nombre').value.trim();
  const slug=document.getElementById('f_slug').value.trim();
  const password=document.getElementById('f_password').value.trim();
  const whatsapp_dueno=document.getElementById('f_whatsapp_dueno').value.trim();
  if(!nombre||!slug||!password||!whatsapp_dueno){toast('⚠ Completa los campos obligatorios (*)');return;}
  const negocio={slug,nombre,tipo:document.getElementById('f_tipo').value.trim()||'Negocio',emoji:document.getElementById('f_emoji').value.trim()||'🏪',password,whatsapp_dueno,whatsapp_phone_id:document.getElementById('f_phone_id').value.trim(),whatsapp_numero:document.getElementById('f_whatsapp_numero').value.trim(),activo:true,bot_activo:true,catalogo:[],metodos_pago:['transferencia','efectivo'],modo_vacaciones:false,tiempo_entrega:'30-45 minutos',mensajes:{bienvenida:'¡Hola! Bienvenido/a. ¿En qué puedo ayudarte?',tono:'amigable'},horarios:{Lunes:{abierto:true,desde:'08:00',hasta:'20:00'},Martes:{abierto:true,desde:'08:00',hasta:'20:00'},Miercoles:{abierto:true,desde:'08:00',hasta:'20:00'},Jueves:{abierto:true,desde:'08:00',hasta:'20:00'},Viernes:{abierto:true,desde:'08:00',hasta:'20:00'},Sabado:{abierto:true,desde:'08:00',hasta:'18:00'},Domingo:{abierto:false,desde:'09:00',hasta:'15:00'}}};
  const res=await api('/admin/negocios',{method:'POST',body:JSON.stringify(negocio)});
  if(res.ok){toast('// Negocio registrado');['f_nombre','f_slug','f_tipo','f_emoji','f_password','f_whatsapp_dueno','f_phone_id','f_whatsapp_numero'].forEach(id=>document.getElementById(id).value='');cargarNegocios();}
  else toast('// Error al crear el negocio');
}

async function toggleActivo(id,activo){
  const res=await api(`/admin/negocios/${id}`,{method:'PUT',body:JSON.stringify({activo})});
  if(res.ok){toast(activo?'// Negocio activado':'// Negocio desactivado');cargarNegocios();}
}

async function eliminarNegocio(id,nombre){
  if(!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`))return;
  const res=await api(`/admin/negocios/${id}`,{method:'DELETE'});
  if(res.ok){toast('// Negocio eliminado');cargarNegocios();}
}

function abrirEditar(n){
  document.getElementById('e_id').value=n.id;document.getElementById('e_nombre').value=n.nombre||'';document.getElementById('e_slug').value=n.slug||'';document.getElementById('e_tipo').value=n.tipo||'';document.getElementById('e_emoji').value=n.emoji||'';document.getElementById('e_password').value=n.password||'';document.getElementById('e_whatsapp_dueno').value=n.whatsapp_dueno||'';document.getElementById('e_phone_id').value=n.whatsapp_phone_id||'';document.getElementById('e_whatsapp_numero').value=n.whatsapp_numero||'';
  document.getElementById('modalEditar').classList.add('open');
}

function cerrarModal(){document.getElementById('modalEditar').classList.remove('open');}

async function guardarEdicion(){
  const id=document.getElementById('e_id').value;
  const nombre=document.getElementById('e_nombre').value.trim();
  const slug=document.getElementById('e_slug').value.trim();
  const password=document.getElementById('e_password').value.trim();
  const whatsapp_dueno=document.getElementById('e_whatsapp_dueno').value.trim();
  if(!nombre||!slug||!password||!whatsapp_dueno){toast('⚠ Completa los campos obligatorios');return;}
  const res=await api(`/admin/negocios/${id}`,{method:'PUT',body:JSON.stringify({nombre,slug,tipo:document.getElementById('e_tipo').value.trim(),emoji:document.getElementById('e_emoji').value.trim(),password,whatsapp_dueno,whatsapp_phone_id:document.getElementById('e_phone_id').value.trim(),whatsapp_numero:document.getElementById('e_whatsapp_numero').value.trim()})});
  if(res.ok){toast('// Negocio actualizado');cerrarModal();cargarNegocios();}
  else toast('// Error al actualizar');
}

let toastTimer;
function toast(txt){const t=document.getElementById('toast');t.textContent=txt;t.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2800);}

(async()=>{if(TOKEN&&await verificarToken())mostrarApp();})();
</script>
</body>
