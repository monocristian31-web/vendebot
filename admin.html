<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendeBot Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080c10;--bg2:#0d1117;--surface:#111820;--surface2:#161e28;--surface3:#1c2735;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#f0f6ff;--text2:#8b9ab0;--text3:#4a5568;
  --accent:#00e5a0;--accent2:#00b87c;--glow:rgba(0,229,160,0.15);
  --danger:#ff4757;--warning:#ffa502;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:14px;--radius-sm:8px;--t:0.2s cubic-bezier(0.4,0,0.2,1);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(0,229,160,0.05) 0%,transparent 60%),
             radial-gradient(ellipse 40% 30% at 95% 100%,rgba(0,229,160,0.03) 0%,transparent 60%);}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 36px;box-shadow:0 24px 64px rgba(0,0,0,0.6);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.login-logo{font-size:26px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
#loginErr{font-size:12px;color:var(--danger);min-height:16px;margin-bottom:8px;}
.login-card input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;margin-bottom:10px;transition:border-color var(--t),box-shadow var(--t);}
.login-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}

/* LAYOUT */
.admin-wrap{max-width:1100px;margin:0 auto;padding:32px 24px;position:relative;z-index:1;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.admin-logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.admin-badge{font-size:11px;font-weight:700;padding:4px 10px;background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.2);border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;transition:border-color var(--t);}
.card:hover{border-color:var(--border-h);}
.card-title{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid>div{display:flex;flex-direction:column;}
label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
input,select{padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color var(--t),box-shadow var(--t);width:100%;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
input::placeholder{color:var(--text3);}
.hint{font-size:11px;color:var(--text3);margin-top:5px;}
.form-section{margin-top:22px;padding-top:22px;border-top:1px solid var(--border);}
.form-section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden;user-select:none;text-decoration:none;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:var(--accent2);box-shadow:0 4px 20px var(--glow);transform:translateY(-1px);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{background:rgba(255,71,87,0.1);color:var(--danger);border:1px solid rgba(255,71,87,0.2);}
.btn-danger:hover{background:rgba(255,71,87,0.2);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface3);}
.btn-edit{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);}
.btn-edit:hover{background:rgba(96,165,250,0.2);}

/* NEG CARDS */
.neg-grid{display:flex;flex-direction:column;gap:10px;}
.neg-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:16px;transition:all var(--t);}
.neg-card:hover{border-color:var(--border-h);transform:translateX(3px);}
.neg-emoji{font-size:26px;flex-shrink:0;width:46px;height:46px;background:var(--surface3);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.neg-info{flex:1;min-width:0;}
.neg-name{font-weight:700;font-size:15px;letter-spacing:-0.2px;margin-bottom:2px;}
.neg-slug{font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:4px;}
.neg-meta{font-size:12px;color:var(--text2);margin-bottom:3px;}
.neg-phone{font-size:12px;color:var(--text2);}
.neg-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:center;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;}
.badge-on{background:rgba(0,229,160,0.12);color:#00e5a0;}
.badge-off{background:rgba(255,71,87,0.12);color:#ff4757;}
.badge-bot-on{background:rgba(167,139,250,0.12);color:#a78bfa;}
.badge-bot-off{background:rgba(255,165,2,0.12);color:#ffa502;}

/* SW toggle */
.sw{position:relative;display:inline-flex;cursor:pointer;}
.sw input{opacity:0;width:0;height:0;}
.sw-track{width:36px;height:20px;background:var(--surface3);border-radius:100px;transition:background var(--t);border:1px solid var(--border);}
.sw input:checked~.sw-track{background:var(--accent);border-color:var(--accent);}
.sw-knob{position:absolute;width:14px;height:14px;background:var(--text2);border-radius:50%;top:3px;left:3px;transition:all var(--t);}
.sw input:checked~.sw-knob{left:19px;background:#000;}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);padding:24px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.6);position:relative;}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:24px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast-msg{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);color:var(--text);padding:14px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:toastIn .3s cubic-bezier(0.4,0,0.2,1);}
@keyframes toastIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}

@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.neg-card{flex-wrap:wrap;}.admin-wrap{padding:16px;}}
</style>
</head>
<body>

<div id="loginScreen" style="display:flex;" class="login-screen">
  <div class="login-card">
    <div class="login-logo">VendeBot</div>
    <div class="login-sub">Panel de administración</div>
    <div id="loginErr"></div>
    <input type="password" id="adminPass" placeholder="Contraseña admin" onkeydown="if(event.key==='Enter')loginAdmin()">
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;" onclick="loginAdmin()">Entrar →</button>
  </div>
</div>

<div id="adminScreen" style="display:none;">
  <div class="admin-wrap">
    <div class="admin-header">
      <div>
        <div class="admin-logo">VendeBot</div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px;">Panel de administración</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-badge">Super Admin</span>
        <button class="btn btn-ghost btn-sm" onclick="cargarNegocios()">↻ Actualizar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">➕ Registrar nuevo negocio</div>
      <div class="form-grid">
        <div><label>Nombre del negocio *</label><input type="text" id="f_nombre" placeholder="Ej: Asadero Don Carlos"></div>
        <div><label>Slug (URL) *</label><input type="text" id="f_slug" placeholder="Ej: asadero" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')"></div>
        <div><label>Tipo de negocio</label><input type="text" id="f_tipo" placeholder="Ej: Restaurante"></div>
        <div><label>Emoji</label><input type="text" id="f_emoji" placeholder="🍗" maxlength="4"></div>
        <div><label>Contraseña *</label><input type="text" id="f_password" placeholder="Para el dueño"></div>
        <div><label>WhatsApp del dueño *</label><input type="text" id="f_whatsapp_dueno" placeholder="593912345678"><div class="hint">Con código de país, sin + ni espacios</div></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">📱 WhatsApp Business</div>
        <div class="form-grid">
          <div><label>Phone Number ID <span style="font-size:10px;font-weight:400;text-transform:none;color:var(--text3)">(opcional — API Meta)</span></label><input type="text" id="f_phone_id" placeholder="Solo si usa API de Meta"><div class="hint">Vacío = usar Baileys (escaneo QR)</div></div>
          <div><label>Número WhatsApp del negocio</label><input type="text" id="f_whatsapp_numero" placeholder="Ej: 593987654321"><div class="hint">El número donde escriben los clientes</div></div>
        </div>
      </div>
      <div style="margin-top:20px;"><button class="btn btn-primary" onclick="crearNegocio()">✓ Registrar negocio</button></div>
    </div>

    <div class="card">
      <div class="card-title">📋 Negocios registrados</div>
      <div class="neg-grid" id="negGrid"><div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div></div>
    </div>
  </div>
</div>

<div id="modalEditar" style="display:none;" class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-title">✏️ Editar negocio</div>
    <input type="hidden" id="e_id">
    <div class="form-grid">
      <div><label>Nombre *</label><input type="text" id="e_nombre"></div>
      <div><label>Slug *</label><input type="text" id="e_slug" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')"></div>
      <div><label>Tipo</label><input type="text" id="e_tipo"></div>
      <div><label>Emoji</label><input type="text" id="e_emoji" maxlength="4"></div>
      <div><label>Contraseña *</label><input type="text" id="e_password"></div>
      <div><label>WhatsApp dueño *</label><input type="text" id="e_whatsapp_dueno"></div>
      <div><label>Phone Number ID <span style="font-size:10px;font-weight:400;text-transform:none;color:var(--text3)">(opcional)</span></label><input type="text" id="e_phone_id"></div>
      <div><label>Número WhatsApp</label><input type="text" id="e_whatsapp_numero"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarEdicion()">✓ Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>

const BASE = '';
let TOKEN = sessionStorage.getItem('admin_token') || '';

// ── AUTH ──
async function login() {
  const pass = document.getElementById('loginPass').value;
  const res = await fetch('/auth/admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
  const data = await res.json();
  if (data.ok) {
    TOKEN = data.token;
    sessionStorage.setItem('admin_token', TOKEN);
    mostrarApp();
  } else {
    document.getElementById('loginError').textContent = 'Contraseña incorrecta';
  }
}

function logout() {
  sessionStorage.removeItem('admin_token');
  TOKEN = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function verificarToken() {
  if (!TOKEN) return false;
  const res = await fetch('/auth/verify', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const data = await res.json();
  return data.ok;
}

async function api(url, opts = {}) {
  const res = await fetch(url, { ...opts, headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN, ...(opts.headers || {}) } });
  return res.json();
}

async function mostrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  cargarNegocios();
}

// ── NEGOCIOS ──
async function cargarNegocios() {
  const negocios = await api('/admin/negocios');
  if (!Array.isArray(negocios)) return;

  document.getElementById('statTotal').textContent = negocios.length;
  document.getElementById('statActivos').textContent = negocios.filter(n => n.activo).length;
  document.getElementById('statBots').textContent = negocios.filter(n => n.activo && n.bot_activo !== false).length;

  const grid = document.getElementById('negGrid');
  if (!negocios.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🏪</div><div>No hay negocios registrados aún.<br>Usa el formulario de arriba para agregar el primero.</div></div>';
    return;
  }

  grid.innerHTML = negocios.map(n => `
    <div class="neg-card" id="nc-${n.id}">
      <div class="neg-emoji">${n.emoji || '🏪'}</div>
      <div class="neg-info">
        <div class="neg-name">${n.nombre}</div>
        <div class="neg-slug">/${n.slug || n.id}</div>
        <div class="neg-meta">${n.tipo || 'Negocio'}</div>
        <div class="neg-phone">📱 ${n.whatsapp_dueno || '—'} · ${n.whatsapp_phone_id ? '<span style="color:#a78bfa;">📡 API Meta</span>' : '<span style="color:#4ade80;">✅ Baileys (QR)</span>'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;">
        <span class="badge ${n.activo ? 'badge-on' : 'badge-off'}">${n.activo ? '● Activo' : '● Inactivo'}</span>
        <span class="badge ${n.bot_activo !== false ? 'badge-bot-on' : 'badge-bot-off'}">${n.bot_activo !== false ? '🤖 Bot ON' : '⏸ Bot OFF'}</span>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
          <span style="font-size:11px;color:var(--text2);">Negocio</span>
          <label class="sw" title="${n.activo ? 'Desactivar negocio' : 'Activar negocio'}">
            <input type="checkbox" ${n.activo ? 'checked' : ''} onchange="toggleActivo('${n.id}', this.checked)">
            <span class="sw-track"></span>
            <span class="sw-knob"></span>
          </label>
        </div>
      </div>
      <div class="neg-actions">
        <a href="/panel/${n.slug || n.id}" target="_blank" class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border);text-decoration:none;">Ver panel</a>
        <button class="btn btn-edit btn-sm" onclick="abrirEditar(${JSON.stringify(n).replace(/"/g,'&quot;')})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="eliminarNegocio('${n.id}', '${n.nombre}')">Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function crearNegocio() {
  const nombre = document.getElementById('f_nombre').value.trim();
  const slug = document.getElementById('f_slug').value.trim();
  const password = document.getElementById('f_password').value.trim();
  const whatsapp_dueno = document.getElementById('f_whatsapp_dueno').value.trim();
  const whatsapp_phone_id = document.getElementById('f_phone_id').value.trim();

  if (!nombre || !slug || !password || !whatsapp_dueno) { toast('⚠ Completa los campos obligatorios (*)'); return; }

  const negocio = {
    slug, nombre,
    tipo: document.getElementById('f_tipo').value.trim() || 'Negocio',
    emoji: document.getElementById('f_emoji').value.trim() || '🏪',
    password, whatsapp_dueno, whatsapp_phone_id,
    whatsapp_numero: document.getElementById('f_whatsapp_numero').value.trim(),
    activo: true,
    bot_activo: true,
    catalogo: [],
    metodos_pago: ['transferencia', 'efectivo'],
    modo_vacaciones: false,
    tiempo_entrega: '30-45 minutos',
    politica_devoluciones: '',
    mensajes: { bienvenida: '¡Hola! Bienvenido/a. ¿En qué puedo ayudarte?', tono: 'amigable' },
    horarios: {
      Lunes:    { abierto: true,  desde: '08:00', hasta: '20:00' },
      Martes:   { abierto: true,  desde: '08:00', hasta: '20:00' },
      Miercoles:{ abierto: true,  desde: '08:00', hasta: '20:00' },
      Jueves:   { abierto: true,  desde: '08:00', hasta: '20:00' },
      Viernes:  { abierto: true,  desde: '08:00', hasta: '20:00' },
      Sabado:   { abierto: true,  desde: '08:00', hasta: '18:00' },
      Domingo:  { abierto: false, desde: '09:00', hasta: '15:00' },
    }
  };

  const res = await api('/admin/negocios', { method: 'POST', body: JSON.stringify(negocio) });
  if (res.ok) {
    toast('✅ Negocio registrado correctamente');
    ['f_nombre','f_slug','f_tipo','f_emoji','f_password','f_whatsapp_dueno','f_phone_id','f_whatsapp_numero'].forEach(id => document.getElementById(id).value = '');
    cargarNegocios();
  } else {
    toast('❌ Error al crear el negocio');
  }
}

async function toggleActivo(id, activo) {
  const res = await api(`/admin/negocios/${id}`, { method: 'PUT', body: JSON.stringify({ activo }) });
  if (res.ok) {
    toast(activo ? '✅ Negocio activado' : '⏸ Negocio desactivado');
    cargarNegocios();
  }
}

async function eliminarNegocio(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const res = await api(`/admin/negocios/${id}`, { method: 'DELETE' });
  if (res.ok) { toast('🗑 Negocio eliminado'); cargarNegocios(); }
}

// ── EDITAR NEGOCIO ──
function abrirEditar(n) {
  document.getElementById('e_id').value = n.id;
  document.getElementById('e_nombre').value = n.nombre || '';
  document.getElementById('e_slug').value = n.slug || '';
  document.getElementById('e_tipo').value = n.tipo || '';
  document.getElementById('e_emoji').value = n.emoji || '';
  document.getElementById('e_password').value = n.password || '';
  document.getElementById('e_whatsapp_dueno').value = n.whatsapp_dueno || '';
  document.getElementById('e_phone_id').value = n.whatsapp_phone_id || '';
  document.getElementById('e_whatsapp_numero').value = n.whatsapp_numero || '';
  document.getElementById('modalEditar').style.display = 'flex';
}

function cerrarModal() {
  document.getElementById('modalEditar').style.display = 'none';
}

async function guardarEdicion() {
  const id = document.getElementById('e_id').value;
  const nombre = document.getElementById('e_nombre').value.trim();
  const slug = document.getElementById('e_slug').value.trim();
  const password = document.getElementById('e_password').value.trim();
  const whatsapp_dueno = document.getElementById('e_whatsapp_dueno').value.trim();
  const whatsapp_phone_id = document.getElementById('e_phone_id').value.trim();

  if (!nombre || !slug || !password || !whatsapp_dueno) { toast('⚠ Completa los campos obligatorios (*)'); return; }

  const res = await api(`/admin/negocios/${id}`, {
    method: 'PUT',
    body: JSON.stringify({
      nombre, slug,
      tipo: document.getElementById('e_tipo').value.trim(),
      emoji: document.getElementById('e_emoji').value.trim(),
      password, whatsapp_dueno, whatsapp_phone_id,
      whatsapp_numero: document.getElementById('e_whatsapp_numero').value.trim(),
    })
  });

  if (res.ok) {
    toast('✅ Negocio actualizado');
    cerrarModal();
    cargarNegocios();
  } else {
    toast('❌ Error al actualizar el negocio');
  }
}

// ── TOAST ──
let toastTimer;
function toast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2800);
}

// ── INIT ──
(async () => {
  if (TOKEN && await verificarToken()) {
    mostrarApp();
  }
})();

</script>
